    var API_ENDPOINT = 'https://api.anthropic.com/v1/messages';

    // localStorage wrapper — mirrors Claude artifact storage API
    window.storage = {
      get: async function(key) {
        var v = localStorage.getItem(key);
        if (v === null) throw new Error('Not found: ' + key);
        return { key: key, value: v };
      },
      set: async function(key, value) {
        localStorage.setItem(key, typeof value === 'string' ? value : JSON.stringify(value));
        return { key: key, value: value };
      },
      delete: async function(key) {
        localStorage.removeItem(key); return { key: key, deleted: true };
      },
      list: async function(prefix) {
        var keys = [];
        for (var i = 0; i < localStorage.length; i++) {
          var k = localStorage.key(i);
          if (!prefix || k.startsWith(prefix)) keys.push(k);
        }
        return { keys: keys, prefix: prefix };
      }
    };
