function LessonModal({chapter,lang,onClose,onComplete}){
  const t=T[lang];
  const[data,setData]=useState(null);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState(false);
  const[phase,setPhase]=useState("slides");
  const[si,setSi]=useState(0);
  const[qi,setQi]=useState(0);
  const[ans,setAns]=useState(null);
  const[ok,setOk]=useState(null);
  const[score,setScore]=useState(0);
  const[ak,setAk]=useState(0);
  const cfg=COMPLEXITY[chapter.level]||COMPLEXITY[1];

  const load=useCallback(async()=>{
    if(chapter.static){
      const slides=(lang==="es")
        ?(chapter.slides_es||chapter.slides_en||chapter.slides||[])
        :(chapter.slides_en||chapter.slides||[]);
      const quiz=(lang==="es")
        ?(chapter.quiz_es||chapter.quiz_en||chapter.quiz||[])
        :(chapter.quiz_en||chapter.quiz||[]);
      setData({slides,quiz});
      setLoading(false);return;
    }
    setLoading(true);setError(false);
    try{const d=await generateLesson(chapter,lang);setData(d);}
    catch(e){setError(true);}
    setLoading(false);
  },[chapter,lang]);

  useEffect(()=>{load();},[load]);

  const slides=data?.slides||[],quiz=data?.quiz||[];
  const total=slides.length+quiz.length;
  const cur=phase==="slides"?si:slides.length+qi;
  const prog=total>0?cur/total*100:0;
  const slide=slides[si],q=quiz[qi];
  const confetti=Array.from({length:12},(_,i)=>({x:Math.random()*100,c:[RED,GREEN,GOLD,"#A78BFA","#06B6D4"][i%5],d:Math.random()*.8,s:6+Math.random()*8}));

  const handleAnswer=(a)=>{
    const isEngage=q.type==="engage";
    if(ans!==null&&!isEngage)return;
    const c=isEngage||a===q.a;setAns(a);setOk(c);
    if(c){Sounds.correct();setScore(s=>s+1);}else Sounds.wrong();
  };

  const goNext=()=>{
    setAk(k=>k+1);
    if(phase==="slides"){
      if(si<slides.length-1)setSi(i=>i+1);
      else{setPhase("quiz");setQi(0);setAns(null);setOk(null);}
    }else if(qi<quiz.length-1){setQi(i=>i+1);setAns(null);setOk(null);}
    else{setPhase("done");Sounds.complete();}
  };

  return(
    <div style={{position:"absolute",inset:0,zIndex:995,background:"#000",display:"flex",flexDirection:"column"}} className="slide-in">
      <div style={{padding:"12px 16px 10px",display:"flex",alignItems:"center",gap:12,borderBottom:`1px solid ${DARK}`,flexShrink:0}}>
        <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:MUTED,fontSize:22,lineHeight:1}}>✕</button>
        <div style={{flex:1,height:7,background:DARK2,borderRadius:4,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${prog}%`,background:cfg.color||RED,borderRadius:4,transition:"width .4s"}}/>
        </div>
        {!loading&&!error&&<span style={{fontSize:12,color:MUTED,fontWeight:600}}>{phase==="slides"?`${si+1}/${slides.length}`:`Q${qi+1}/${quiz.length}`}</span>}
      </div>
      <div style={{background:`${cfg.color||RED}11`,borderBottom:`1px solid ${cfg.color||RED}22`,padding:"6px 16px",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
        <span style={{fontSize:16}}>{chapter.icon}</span>
        <span style={{fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:13}}>{(lang==="es"&&(CH_TITLES_ES[chapter.id]||chapter.title_es))||chapter.title}</span>
        <span style={{marginLeft:"auto",fontSize:11,color:MUTED,background:DARK,padding:"2px 8px",borderRadius:10}}>{cfg.emoji} {cfg.label} · {cfg.slides}s · {cfg.minQ}Q</span>
      </div>
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:16,minHeight:0}}>
        {loading&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:16}}>
            <DAvatar size={52} online/>
            <div style={{fontSize:14,color:MUTED,textAlign:"center"}}>{lang==="es"?"Preparando tu lección...":"Building your lesson..."}</div>
            <div style={{display:"flex",gap:6}}>{[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:RED,animation:`dot 1.2s ease-in-out ${i*.2}s infinite`}}/>)}</div>
          </div>
        )}
        {error&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:16}}>
            <div style={{fontSize:40}}>⚠️</div>
            <div style={{fontSize:14,color:MUTED,textAlign:"center"}}>{lang==="es"?"No se pudo cargar. Comprueba que la API esté configurada.":"Couldn't load lesson. Make sure the API is configured."}</div>
            <button onClick={load} style={{padding:"12px 24px",borderRadius:12,background:RED,border:"none",cursor:"pointer",fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:14,color:"#fff"}}>Retry</button>
          </div>
        )}
        {!loading&&!error&&data&&(
          <div key={ak} className="fade-up">
            {phase==="slides"&&slide&&(
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                <div style={{display:"flex",alignItems:"flex-end",gap:10}}>
                  <DAvatar size={46} online/>
                  <div style={{background:DARK,border:`1px solid ${DARK2}`,borderRadius:"18px 18px 18px 4px",padding:"12px 14px",flex:1,fontSize:14,lineHeight:1.65,color:"#D1D1D6"}}>{slide.donna||slide.d}</div>
                </div>
                <div style={{background:"#111",border:`1px solid ${DARK2}`,borderRadius:20,padding:22}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                    <span style={{fontSize:28}}>{slide.icon}</span>
                    <h3 style={{fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:18,color:"#fff"}}>{slide.title||slide.t}</h3>
                  </div>
                  <p style={{fontSize:15,color:"#D1D1D6",lineHeight:1.7}}>{slide.body||slide.b}</p>
                </div>
              </div>
            )}
            {phase==="quiz"&&q&&(
              <div style={{display:"flex",flexDirection:"column",gap:14}} className={ans!==null?(ok?"correct-flash":"wrong-shake"):""}>
                <div style={{background:"#111",borderRadius:16,padding:16,border:`1px solid ${DARK2}`}}>
                  <div style={{fontSize:10,fontWeight:700,color:RED,letterSpacing:2.5,marginBottom:10}}>{t.quizTitle}</div>
                  <p style={{fontSize:15,fontWeight:600,lineHeight:1.6,color:"#fff"}}>{q.q}</p>
                </div>
                {q.type==="tf"?(
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    {[{val:true,label:lang==="es"?"VERDADERO":"TRUE",c:GREEN},{val:false,label:lang==="es"?"FALSO":"FALSE",c:RED}].map(opt=>{
                      const sel=ans===opt.val,ir=opt.val===q.a;
                      return(
                        <button key={String(opt.val)} onClick={()=>handleAnswer(opt.val)}
                          style={{padding:"20px 12px",borderRadius:16,background:ans!==null?(ir?"rgba(48,209,88,.14)":sel?"rgba(232,37,60,.14)":"transparent"):"transparent",border:`2px solid ${ans!==null?(ir?GREEN:sel?RED:DARK2):DARK2}`,cursor:ans!==null?"default":"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
                          <div style={{width:44,height:44,borderRadius:13,background:ans!==null?(ir?GREEN:sel?RED:DARK2):DARK2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>
                            {ans!==null&&ir?"✓":ans===opt.val&&!ir?"✗":opt.val?"✓":"✗"}
                          </div>
                          <span style={{fontFamily:"'Sora',sans-serif",fontWeight:900,fontSize:18,color:ans!==null?(ir?GREEN:sel?RED:"#fff"):opt.c}}>{opt.label}</span>
                        </button>
                      );
                    })}
                  </div>
                ):(
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    {(q.opts||[]).map((opt,i)=>{
                      const sel=ans===i,ir=i===q.a;
                      return(
                        <button key={i} onClick={()=>handleAnswer(i)}
                          style={{padding:"13px 15px",borderRadius:14,background:ans!==null?(ir?"rgba(48,209,88,.13)":sel?"rgba(232,37,60,.13)":"transparent"):"transparent",border:`2px solid ${ans!==null?(ir?GREEN:sel?RED:DARK2):DARK2}`,cursor:ans!==null?"default":"pointer",display:"flex",alignItems:"center",gap:12,textAlign:"left",opacity:ans!==null&&!ir&&!sel?.4:1}}>
                          <div style={{width:30,height:30,borderRadius:9,background:ans!==null?(ir?GREEN:sel?RED:DARK2):DARK2,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,color:"#fff",flexShrink:0}}>
                            {ans!==null&&ir?"✓":ans===i&&!ir?"✗":String.fromCharCode(65+i)}
                          </div>
                          <span style={{fontSize:14,color:"#fff",fontWeight:500}}>{opt}</span>
                        </button>
                      );
                    })}
                  </div>
                )}
                {ans!==null&&(
                  <div className="fade-up" style={{background:ok?"rgba(48,209,88,.1)":"rgba(232,37,60,.1)",border:`1px solid ${ok?GREEN:RED}44`,borderRadius:14,padding:14}}>
                    <div style={{fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:13,color:ok?GREEN:RED,marginBottom:6}}>{ok?(lang==="es"?"Exacto.":"Exactly."):(lang==="es"?"No del todo:":"Not quite:")}</div>
                    <p style={{fontSize:13,color:"#D1D1D6",lineHeight:1.65}}>{(q.type==="engage"&&q.exps&&ans!==null?q.exps[ans]:null)||q.exp}</p>
                  </div>
                )}
              </div>
            )}
            {phase==="done"&&(
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 16px",textAlign:"center",position:"relative",overflow:"hidden",minHeight:300}}>
                {confetti.map((c,i)=><div key={i} style={{position:"absolute",top:"-10%",left:`${c.x}%`,width:c.s,height:c.s,background:c.c,borderRadius:2,animation:`confetti 2s ease ${c.d}s both`}}/>)}
                <div className="celebrate" style={{fontSize:52,marginBottom:16}}>🏆</div>
                <h2 style={{fontFamily:"'Sora',sans-serif",fontWeight:900,fontSize:24,marginBottom:8}}>{t.chDone}</h2>
                <p style={{color:MUTED,fontSize:15,marginBottom:8}}><strong style={{color:"#fff"}}>{chapter.title}</strong></p>
                <div style={{padding:"10px 20px",borderRadius:20,background:`rgba(232,37,60,.12)`,border:`1px solid ${RED}44`,fontSize:14,color:RED,fontWeight:700,marginBottom:24}}>{t.chScore(score,quiz.length)} {quiz.length>0&&score/quiz.length<0.7?"— "+( lang==="es"?"Necesitas 70% para avanzar. ¡Inténtalo de nuevo!":"Need 70% to advance. Try again!"):" "}</div>
                {quiz.length>0&&score/quiz.length<0.7&&(
                  <div style={{fontSize:12,color:MUTED,marginBottom:8,textAlign:"center"}}>{lang==="es"?"Puedes volver a intentarlo cuantas veces quieras.":"You can retry as many times as you need."}</div>
                )}
                <button onClick={()=>onComplete(chapter.id, quiz.length===0||score/quiz.length>=0.7)} style={{padding:"16px 48px",borderRadius:14,background:RED,border:"none",cursor:"pointer",fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:17,color:"#fff"}}>{lang==="es"?"Continuar →":"Continue →"}</button>
              </div>
            )}
          </div>
        )}
      </div>
      {!loading&&!error&&phase!=="done"&&(
        <div style={{padding:"12px 16px 20px",borderTop:`1px solid ${DARK}`,flexShrink:0}}>
          {phase==="slides"
            ?<>{si>0&&<button onClick={()=>{setSi(i=>i-1);setAk(k=>k+1);}} style={{padding:"10px 20px",borderRadius:14,background:"#2a2a2a",border:"none",color:"#aaa",fontSize:15,cursor:"pointer",marginBottom:8,width:"100%",display:"block"}}>← {lang==="es"?"Anterior":"Back"}</button>}<button onClick={goNext} style={{width:"100%",padding:15,borderRadius:14,background:cfg.color||RED,border:"none",cursor:"pointer",fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:16,color:"#fff"}}>{si<slides.length-1?t.lessonContinue:t.lessonStart}</button></>
            :ans!==null&&<button onClick={goNext} style={{width:"100%",padding:15,borderRadius:14,background:ok?GREEN:RED,border:"none",cursor:"pointer",fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:16,color:ok?"#000":"#fff"}}>{qi<quiz.length-1?t.nextQ:t.finishCh}</button>
          }
        </div>
      )}
    </div>
  );
}

function ProfileScreen({lang,profile,setProfile,xp,streak,userLevel,levelNames,xpProgress,xpToNext,completedCh,userPlan,sbUser,onSignOut,onUpgrade}){
  const isES=lang==="es";
  const [editing,setEditing]=React.useState(false);
  const [nameEdit,setNameEdit]=React.useState(profile.name||"");
  const [modeEdit,setModeEdit]=React.useState(profile.mode||"beginner");
  const [saved,setSaved]=React.useState(false);
  const totalCh=30;
  const doneCount=completedCh?completedCh.size:0;
  const progressPct=Math.round((doneCount/totalCh)*100);
  const levelName=levelNames?levelNames[userLevel]:(userLevel===0?"Seedling":userLevel===1?"Apprentice":"Trader");
  const planLabel=userPlan==="pro"?(isES?"Pro ✓":"Pro ✓"):(isES?"Gratis":"Free");
  const planColor=userPlan==="pro"?"#FF9F0A":"#8E8E93";

  function saveProfile(){
    const updated={...profile,name:nameEdit,mode:modeEdit};
    setProfile(updated);
    try{localStorage.setItem("donna_profile",JSON.stringify(updated));}catch(e){}
    if(window.supabaseClient&&sbUser){
      fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'save_profile',user_id:sbUser.id,profile:{name:nameEdit,mode:modeEdit,lang:profile.lang||lang}})
      }).catch(()=>{});
    }
    setEditing(false);
    setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  }

  const S={
    wrap:{height:"100%",overflowY:"auto",background:"#000",padding:"20px 16px 32px"},
    header:{marginBottom:24},
    avatar:{width:72,height:72,borderRadius:"50%",background:"linear-gradient(135deg,#FF3B30,#FF6B6B)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,marginBottom:12,border:"2px solid #FF3B3033"},
    name:{fontSize:22,fontWeight:800,color:"#fff",fontFamily:"'Sora',sans-serif"},
    email:{fontSize:12,color:"#8E8E93",marginTop:2},
    planBadge:{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 10px",borderRadius:20,background:`${planColor}22`,border:`1px solid ${planColor}55`,fontSize:11,fontWeight:700,color:planColor,marginTop:8},
    card:{background:"#111",border:"1px solid #222",borderRadius:16,padding:"16px",marginBottom:12},
    cardTitle:{fontSize:11,fontWeight:700,color:"#8E8E93",letterSpacing:1,textTransform:"uppercase",marginBottom:12},
    statRow:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8},
    statLabel:{fontSize:13,color:"#aaa"},
    statVal:{fontSize:14,fontWeight:700,color:"#fff"},
    progressBar:{height:6,background:"#222",borderRadius:3,overflow:"hidden",marginTop:8},
    progressFill:{height:"100%",background:"linear-gradient(90deg,#FF3B30,#FF6B6B)",borderRadius:3,transition:"width 0.6s ease"},
    input:{width:"100%",background:"#1a1a1a",border:"1px solid #333",borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:14,fontFamily:"'Sora',sans-serif",boxSizing:"border-box",outline:"none"},
    btn:{width:"100%",padding:"12px",borderRadius:12,border:"none",cursor:"pointer",fontSize:14,fontWeight:700,fontFamily:"'Sora',sans-serif"},
    modeBtn:(active)=>({flex:1,padding:"10px",borderRadius:10,border:`1px solid ${active?"#FF3B30":"#333"}`,background:active?"#FF3B3022":"transparent",cursor:"pointer",color:active?"#FF3B30":"#8E8E93",fontSize:12,fontWeight:700,fontFamily:"'Sora',sans-serif"}),
  };

  return(
    <div style={S.wrap}>
      {/* Header */}
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",textAlign:"center",...S.header}}>
        <div style={S.avatar}>
          {(profile.name||"?").charAt(0).toUpperCase()}
        </div>
        {!editing?(
          <>
            <div style={S.name}>{profile.name||"—"}</div>
            <div style={S.email}>{sbUser?.email||""}</div>
            <div style={S.planBadge}>{isES?"Plan:":"Plan:"} {planLabel}</div>
            {saved&&<div style={{fontSize:12,color:"#30D158",marginTop:8,fontWeight:600}}>{isES?"✓ Guardado":"✓ Saved"}</div>}
            <button onClick={()=>{setNameEdit(profile.name||"");setModeEdit(profile.mode||"beginner");setEditing(true);}}
              style={{marginTop:14,padding:"8px 20px",borderRadius:20,background:"transparent",border:"1px solid #333",color:"#aaa",fontSize:12,cursor:"pointer",fontWeight:600}}>
              {isES?"✏️ Editar perfil":"✏️ Edit profile"}
            </button>
          </>
        ):(
          <div style={{width:"100%",maxWidth:340}}>
            <div style={{fontSize:13,color:"#8E8E93",marginBottom:6,textAlign:"left"}}>{isES?"Nombre":"Name"}</div>
            <input style={S.input} value={nameEdit} onChange={e=>setNameEdit(e.target.value)} placeholder={isES?"Tu nombre...":"Your name..."} maxLength={30}/>
            <div style={{fontSize:13,color:"#8E8E93",margin:"12px 0 6px",textAlign:"left"}}>{isES?"Modo":"Mode"}</div>
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              <button style={S.modeBtn(modeEdit==="beginner")} onClick={()=>setModeEdit("beginner")}>{isES?"🌱 Principiante":"🌱 Beginner"}</button>
              <button style={S.modeBtn(modeEdit==="advanced")} onClick={()=>setModeEdit("advanced")}>{isES?"⚡ Avanzado":"⚡ Advanced"}</button>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button style={{...S.btn,flex:1,background:"#1a1a1a",color:"#8E8E93",border:"1px solid #333"}} onClick={()=>setEditing(false)}>{isES?"Cancelar":"Cancel"}</button>
              <button style={{...S.btn,flex:1,background:"#FF3B30",color:"#fff"}} onClick={saveProfile}>{isES?"Guardar":"Save"}</button>
            </div>
          </div>
        )}
      </div>

      {/* Progress Card */}
      <div style={S.card}>
        <div style={S.cardTitle}>{isES?"📈 Mi Progreso":"📈 My Progress"}</div>
        <div style={S.statRow}>
          <span style={S.statLabel}>{isES?"Nivel":"Level"}</span>
          <span style={{...S.statVal,color:"#FF9F0A"}}>Lv.{userLevel||0} — {levelName}</span>
        </div>
        <div style={S.statRow}>
          <span style={S.statLabel}>XP</span>
          <span style={{...S.statVal,color:"#FF3B30"}}>{xp||0} XP</span>
        </div>
        <div style={{...S.progressBar}}>
          <div style={{...S.progressFill,width:`${xpProgress||0}%`}}/>
        </div>
        <div style={{fontSize:10,color:"#555",textAlign:"right",marginTop:4}}>{xpToNext||0} XP {isES?"para siguiente nivel":"to next level"}</div>
        <div style={{...S.statRow,marginTop:12}}>
          <span style={S.statLabel}>{isES?"Racha":"Streak"}</span>
          <span style={{...S.statVal,color:"#FF9F0A"}}>🔥 {streak||0} {isES?"días":"days"}</span>
        </div>
      </div>

      {/* Academy Progress */}
      <div style={S.card}>
        <div style={S.cardTitle}>{isES?"📚 Academia":"📚 Academy"}</div>
        <div style={S.statRow}>
          <span style={S.statLabel}>{isES?"Capítulos completados":"Chapters completed"}</span>
          <span style={{...S.statVal,color:"#30D158"}}>{doneCount}/{totalCh}</span>
        </div>
        <div style={S.progressBar}>
          <div style={{...S.progressFill,width:`${progressPct}%`,background:"linear-gradient(90deg,#30D158,#34C759)"}}/>
        </div>
        <div style={{fontSize:10,color:"#555",textAlign:"right",marginTop:4}}>{progressPct}% {isES?"completado":"complete"}</div>
        {doneCount===totalCh&&(
          <div style={{marginTop:10,textAlign:"center",fontSize:12,color:"#FF9F0A",fontWeight:700}}>🎓 {isES?"¡Academia completada!":"Academy complete!"}</div>
        )}
      </div>

      {/* Account Card */}
      <div style={S.card}>
        <div style={S.cardTitle}>{isES?"🔐 Cuenta":"🔐 Account"}</div>
        {sbUser&&(
          <div style={{...S.statRow,marginBottom:14}}>
            <span style={S.statLabel}>{isES?"Email":"Email"}</span>
            <span style={{fontSize:12,color:"#aaa",maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sbUser.email}</span>
          </div>
        )}
        <div style={{...S.statRow,marginBottom:14}}>
          <span style={S.statLabel}>{isES?"Plan actual":"Current plan"}</span>
          <span style={{fontSize:13,fontWeight:700,color:planColor}}>{planLabel}</span>
        </div>
        {userPlan!=="pro"&&(
          <button onClick={onUpgrade}
            style={{...S.btn,background:"linear-gradient(135deg,#FF3B30,#FF6B6B)",color:"#fff",marginBottom:10}}>
            {isES?"⚡ Actualizar a Pro →":"⚡ Upgrade to Pro →"}
          </button>
        )}
        <button onClick={onSignOut}
          style={{...S.btn,background:"transparent",border:"1px solid #333",color:"#8E8E93"}}>
          {isES?"Cerrar sesión":"Sign out"}
        </button>
      </div>

      {/* Language Card */}
      <div style={S.card}>
        <div style={S.cardTitle}>{isES?"🌐 Idioma / Language":""🌐 Language"}</div>
        <div style={{display:"flex",gap:8}}>
          <button
            style={{...S.modeBtn(lang==="es"),flex:1}}
            onClick={()=>{try{localStorage.setItem("donna_lang","es");}catch(e){}window.location.reload();}}>
            🇲🇽 Español
          </button>
          <button
            style={{...S.modeBtn(lang==="en"),flex:1}}
            onClick={()=>{try{localStorage.setItem("donna_lang","en");}catch(e){}window.location.reload();}}>
            🇺🇸 English
          </button>

/* ── SMART PILLS based on Donna response ── */
function getPillsForResponse(text, lang){
  if(!text)return null;
  const es=lang==="es", lo=text.toLowerCase();
  if(lo.includes("timeframe")||lo.includes("temporalidad")||lo.includes("candle")||lo.includes("vela de"))
    return es?["📅 Diaria","🕓 4H","⏰ 1H","🌊 Las combino"]:["📅 Daily","🕓 4H","⏰ 1H","🌊 I combine them"];
  if(lo.includes("bias")||lo.includes("sesgo")||lo.includes("direction")||lo.includes("alcista")||lo.includes("bajista"))
    return es?["📈 Alcista","📉 Bajista","😐 No lo tengo claro"]:["📈 Bullish","📉 Bearish","😐 Not sure yet"];
  if(lo.includes("kill zone")||lo.includes("session")||lo.includes("sesión")||lo.includes("london")||lo.includes("nueva york"))
    return es?["🌅 Londres","🗽 NY Open","🌆 NY PM (advanced)","🌏 Asia","⏰ Sin KZ"]:["🌅 London","🗽 NY Open","🌆 NY PM (advanced)","🌏 Asia","⏰ No KZ"];
  if(lo.includes("stop")||lo.includes("target")||lo.includes("50%")||lo.includes("partial"))
    return es?["✅ Stop fijo","🎯 Toqué el 50%","❌ Me sacó"]:["✅ Stop is fixed","🎯 Hit 50%","❌ Got stopped out"];
  if(lo.includes("checklist")||lo.includes("ready")||lo.includes("listo"))
    return es?["✅ Abrir checklist","📝 Registrar operación"]:["✅ Open checklist","📝 Log a trade"];
  if((lo.match(/\?/)&&(lo.includes("did you")||lo.includes("have you")||lo.includes("¿lo")||lo.includes("¿pasaste")||lo.includes("¿tienes")||lo.includes("¿estás"))))
    return es?["✅ Sí","❌ No","🤔 Más o menos"]:["✅ Yes","❌ No","🤔 Kind of"];
  if(lo.includes("chart")||lo.includes("setup")||lo.includes("gráfico")||lo.includes("setup"))
    return es?["📊 Te mando el gráfico","✅ Listo para operar","📝 Registrar"]:["📊 Send chart","✅ Ready to trade","📝 Log trade"];
  if(lo.includes("academy")||lo.includes("academia")||lo.includes("chapter")||lo.includes("capítulo"))
    return es?["🎓 Ir a academia","📚 Capítulo 1","💬 Tengo preguntas"]:["🎓 Go to academy","📚 Chapter 1","💬 I have questions"];
  return null;
}

function LoginScreen({lang,onSent}){
  const[email,setEmail]=useState("");

    if(!email.trim()||!email.includes("@")){setErr(isES?"Email inválido":"Invalid email");return;}
    setLoading(true);setErr("");
    try{
      const r=await fetch("/api/auth",{method:"POST",headers:{"Content-Type":"application/json"},

              {isES?"¡Revisa tu email!":"Check your email!"}

        ?"Hey. Soy Donna. Estoy aquí para mantenerte responsable — no para enseñarte los básicos. Dime en qué estás trabajando o comparte un setup cuando estés listo."
        :"Hey. I'm Donna. I'm here to keep you accountable — not to teach you basics. Tell me what you're working on, or share a setup when you're ready.";

        :`Hey ${p.name}! I'm Donna — your trading coach. I'll teach you from scratch and keep you accountable. Start with Chapter 0 in the Academy, or just ask me anything.`;

      // No questionnaire - go straight to chat with helpful pills

          :(p.lang==="es"?"Perfecto. La mejor forma de empezar es por la Academia — Capítulo 1. No te saltes nada. Cada pieza construye sobre la anterior. ¿Quieres empezar ahora?":"Perfect. The best way to start is the Academy — Chapter 1. Don't skip anything. Each piece builds on the last. Want to start now?");

          ?(p.lang==="es"?["📊 Te mando un setup","✅ Abrir checklist","📝 Registrar operación","🎓 Ver academia"]:["📊 Send you a setup","✅ Open checklist","📝 Log a trade","🎓 View academy"])
          :(p.lang==="es"?["🎓 Ir a la Academia","💬 Tengo preguntas","📊 Muéstrame un gráfico"]:["🎓 Go to Academy","💬 I have questions","📊 Show me a chart"]));
      },500);

  };

    setShowTradeLog(false);
    addXP(25,lang==="es"?"Operación registrada":"Trade logged");
    const isClose=trade.status==="closed";
    if(isClose){
      setActiveTrade(null);
      setTrades(prev=>prev.map(t=>t.id===trade.id?trade:t));
      // Donna reviews the closed trade
      const review=DONNA.tradeReview(trade,trades,lang);

      setContextPills(DEFAULT_PILLS);

        ?"Operación cerrada. Ve al diario y agrega tus notas — ¿qué salió bien? ¿qué cambiarías?"
        :"Trade closed. Head to the journal and add notes — what went well? What would you change?");},2500);
      showNotif(lang==="es"?"Operación cerrada. Donna la revisó.":"Trade closed. Donna reviewed it.");

      setActiveTrade(trade);
      setTrades(prev=>{

        ?["✅ Checklist completo","📊 El mercado se movió","❌ Salí de la operación"]
        :["✅ Checklist complete","📊 Market moved","❌ I exited the trade"]);
    }
  };

  /* ── SEND MESSAGE ── */
  const addXP=useCallback((amount,label)=>{
    setXp(prev=>{
      const n=prev+amount;
      try{localStorage.setItem("donna_xp",String(n));}catch{}
      // Check for level up
      const oldLv=LEVEL_XP.reduce((lv,t,i)=>prev>=t?i:lv,1);
      const newLv=LEVEL_XP.reduce((lv,t,i)=>n>=t?i:lv,1);
      if(newLv>oldLv){
        setTimeout(()=>setLevelUpData({level:newLv,name:(LEVEL_NAMES_EN[newLv]||"Trader")}),300);
      }
      return n;
    });
    setXpAnim("+"+amount+" XP");
    setTimeout(()=>setXpAnim(null),1800);
  },[]);

  // ── Supabase auth listener ──────────────────────────────
  useEffect(()=>{

            setStreak(p.streak||0);
            setUserPlan(p.plan||'free');
            if(p.name) setPhase('main');
            else setPhase('onboard');

            setPhase('onboard');
          }
          // Load chapters

            body:JSON.stringify({action:'get_trades',user_id:session.user.id})});
          const dt = await rt.json();
          if(dt.trades) setTrades(dt.trades.map(t=>({...t,id:t.id})));
        }catch(e){console.error('Load profile error',e); setPhase('onboard');}

            <JournalScreen trades={trades} setTrades={setTrades} lang={lang} activeTrade={activeTrade}
              onClose={()=>setTab("chat")}
              onOpen={(mode)=>{setTradeLogMode(mode);setShowTradeLog(true);}}
              addXP={addXP} showNotif={showNotif}/>
          )}

          {/* ACADEMY TAB */}
          {tab==="academy"&&(
            <AcademyScreen lang={lang} profile={profile} completed={completedCh} passedCh={passedCh} onOpen={ch=>setOpenChapter(ch)} xp={xp} streak={streak} userLevel={userLevel} levelNames={levelNames} xpProgress={xpProgress} xpToNext={xpToNext}/>
          )}
          {/* PROFILE TAB */}
          {tab==="profile"&&(
            <ProfileScreen lang={lang} profile={profile} setProfile={setProfile} xp={xp} streak={streak} userLevel={userLevel} levelNames={levelNames} xpProgress={xpProgress} xpToNext={xpToNext} completedCh={completedCh} userPlan={userPlan} sbUser={sbUser} onSignOut={()=>{if(window.supabaseClient)window.supabaseClient.auth.signOut();setPhase("login");setMsgs([]);setMsgCount(0);}} onUpgrade={()=>setShowPaywall(true)}/>
          )}
        </div>

        {/* Tab Bar */}
        <div style={{display:"flex",borderTop:`1px solid ${DARK}`,flexShrink:0}}>
          {[{id:"chat",icon:"💬",label:t.tabChat},{id:"journal",icon:"📓",label:t.tabJournal},{id:"academy",icon:"📚",label:t.tabAcademy},{id:"profile",icon:"👤",label:t.tabProfile}].map(tb=>(
            <button key={tb.id} onClick={()=>setTab(tb.id)}
              style={{flex:1,padding:"10px 8px 14px",background:"transparent",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,position:"relative"}}>
              <span style={{fontSize:22}}>{tb.icon}</span>
              <span style={{fontSize:10,fontWeight:700,color:tab===tb.id?RED:MUTED}}>{tb.label}</span>
              {tab===tb.id&&<div style={{width:5,height:5,borderRadius:"50%",background:RED}}/>}
              {tb.id==="journal"&&activeTrade&&<div style={{position:"absolute",top:8,right:"25%",width:8,height:8,borderRadius:"50%",background:GOLD,border:"2px solid #000"}}/>}
            </button>
          ))}
        </div>
      </div>
    
      {tourStep>=0&&phase==="main"&&<TourOverlay step={tourStep} lang={lang} onNext={()=>setTourStep(s=>s+1)} onDone={()=>{setTourStep(-1);try{localStorage.setItem("donna_toured","1");}catch{}}}/>}
      {levelUpData&&<LevelUpModal data={levelUpData} lang={lang} xp={xp} showNotif={showNotif} onClose={()=>setLevelUpData(null)}/>}
      {chapterWin&&<ChapterWinModal chapter={chapterWin.chapter} xpEarned={chapterWin.xpEarned} lang={lang} profile={profile} onClose={()=>setChapterWin(null)}/>}
      {xpAnim&&(
        <div style={{position:"fixed",top:"20%",left:"50%",transform:"translateX(-50%)",background:"linear-gradient(135deg,#E50914,#FF6B35)",color:"#fff",padding:"8px 20px",borderRadius:30,fontSize:14,fontWeight:700,pointerEvents:"none",zIndex:9999,animation:"none",opacity:1}}>
          {xpAnim}
        </div>
      )}
      {showDiploma&&<DiplomaModal profile={profile} lang={lang} xp={xp} onClose={()=>setShowDiploma(false)} showNotif={showNotif}/>}
      </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html{(phase==="login"||sbLoading)&&(
        <LoginScreen lang={lang} onSent={()=>{}}/>
      )}
      >
