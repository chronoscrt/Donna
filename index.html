1:{s:[
{icon:"📊",title:"Four Parts, One Truth",body:"Every candle tells you four things: Open (where it started), High (where it tried to go), Low (where it tested), Close (where it ended up). The body — between open and close — is where price committed. The wicks are where price was rejected. EUR/USD opening at 1.0820, wicking to 1.0865, but closing at 1.0831? That close at 1.0831 is the only number that matters.",donna:"The body is where traders put real money. The wick is where they got trapped. Read the body, ignore the drama."},
{icon:"🎯",title:"The Close is Everything",body:"A close above a resistance level means price committed to being there. A wick above that closes back inside means price tried, failed, and got rejected. Gold wicking to $2,020 but closing at $1,995 is completely bearish. Gold closing at $2,020 is completely bullish. Same wick location, opposite meaning. The close decides everything.",donna:"I don't care where the wick went. Show me the close. That's the only question."}
],q:[
{q:"EUR/USD wicks up to 1.0920 but closes at 1.0871, back inside the week's range. CRT says:",type:"mc",opts:["Bullish — it reached 1.0920","Bearish — the move up was fake","Neutral — wait for more data","Buy the close at 1.0871"],a:1,exp:"Wick above + close inside = fake move = Turtle Soup. The close at 1.0871 reveals the real direction. Price tested 1.0920, got rejected, and that's bearish."},
{q:"Gold closes at $2,018, above last month's high of $2,010. Your bias is:",type:"mc",opts:["Bearish — sell into strength","No bias yet","Bullish — the close confirmed the break","Wait for a retest of $2,010"],a:2,exp:"Close above an old high = True Break = bullish bias confirmed. Price committed to being above $2,010 by closing there. That's your signal."},
{q:"The wick of a candle is more important than the close for determining market direction.",type:"tf",a:false,exp:"False. The close is everything in CRT. Wicks show attempts. Closes show results. You trade closes, not wicks."}
]},
2:{s:[
{icon:"🗺️",title:"Three States. One Question.",body:"Every chart is in one of three states: Trending (consistent directional moves — higher highs, higher lows), Ranging (price bouncing between two defined levels like EUR/USD stuck between 1.0800 and 1.0920 for weeks), or No Structure (random, no structure, no trade). Most losses come from applying trending strategies in ranging markets. Identify the state first. Every. Single. Time.",donna:"What state is this? Ask it before you do anything else. If you can't answer it confidently — it's no structure. Don't trade no structure."},
{icon:"🚫",title:"Never Trade the Middle",body:"In a range, the middle 50% is no-man's land. If EUR/USD is ranging between 1.0800 and 1.0900, the middle is 1.0850. You don't trade at 1.0850. You buy near 1.0800 and sell near 1.0900. The middle is where both bulls and bears get chopped up and nobody wins. Price at the edge of the range? That's your trade. Price in the middle? Go find something else.",donna:"Middle of a range means both sides lose. If you're trading there, you're the exit liquidity for everyone who entered at the edges."}
],q:[
{q:"EUR/USD has been bouncing between 1.0800 and 1.0920 for three weeks. Price is at 1.0855. You:",type:"mc",opts:["Buy — looks like it bounced from support","Sell — it'll go back down","Wait — you're in no-man's land","Look for a breakout entry here"],a:2,exp:"1.0855 is the middle of the 1.0800-1.0920 range — no-man's land. You wait for price to reach the edges before considering a trade."},
{q:"Nasdaq is making higher highs and higher lows consistently. The market state is:",type:"mc",opts:["Ranging","No structure","Trending","Transitioning"],a:2,exp:"Higher highs and higher lows = trending market. Clear directional structure means you look for pullback entries in the trend direction, not range edges."},
{q:"A no structure market with no structure should be traded with smaller position sizes to manage risk.",type:"tf",a:false,exp:"False. A no structure market should not be traded at all. Smaller size does not fix a bad market condition. No structure = no trade. Sit on your hands."}
]},
3:{s:[
{icon:"🔭",title:"HTF — The Why",body:"The Higher Timeframe (Daily or Weekly chart) tells you WHY price should move. It's your compass. If the Daily candle closed above a significant old high, your HTF bias is bullish. If it wicked above and closed back inside, HTF says bearish. This bias overrides everything on lower timeframes. Trading against the Daily is like swimming against the current — possible but exhausting and usually fatal.",donna:"The Daily candle is your boss. Every other timeframe works for the Daily. Not the other way around."},
{icon:"📡",title:"ITF — The What",body:"The Intermediate Timeframe (4H chart) shows you WHAT is happening — is the CRT pattern actually forming? This is where you watch for the AMD sequence developing: accumulation building, then the manipulation (Turtle Soup) occurring. The 4H confirms that what the Daily predicted is actually playing out. Without 4H confirmation, you're guessing.",donna:"If the 4H isn't confirming, the setup doesn't exist yet. Wait for it. Your patience is your edge."},
{icon:"⏱️",title:"LTF — The When and Where",body:"The Lower Timeframe (1H or 15min) gives you the precise entry — WHEN and WHERE. This is where you see the Model 1 candle that triggers your entry. But here's the thing: a perfect Model 1 on the 1H with no HTF reason behind it is just a candle. It's not a trade. All three timeframes must align for a high-probability setup.",donna:"A beautiful candle on the 1H with no Daily reason is just a pretty candle. You don't trade pretty. You trade aligned."}
],q:[
{q:"You see a perfect 1H entry candle but the Daily shows bearish bias. You:",type:"mc",opts:["Take it — the 1H entry is perfect","Skip it — Daily bias overrides","Take it with half size","Wait for the next 1H candle"],a:1,exp:"Daily (HTF) bias overrides everything. Trading a long entry against a bearish Daily is fighting the current. Skip it — even if the 1H looks perfect."},
{q:"The 4H timeframe's main job in your analysis is to:",type:"mc",opts:["Set the directional bias","Confirm the CRT pattern is forming","Give the precise entry price","Determine your stop level"],a:1,exp:"The 4H (ITF) confirms that the AMD pattern is developing and the setup the Daily predicted is actually happening. It bridges the WHY and the WHERE."},
{q:"The 1H timeframe gives you the primary directional bias for your trades.",type:"tf",a:false,exp:"False. The HTF (Daily/Weekly) gives you the bias. The 1H gives you the entry timing and precise level. Working bottom-up is one of the most common mistakes in trading."},
{q:"Without Higher Timeframe alignment, a Model 1 candle on the 1H is:",type:"mc",opts:["Still valid with a tight stop","A high-probability trade","Just a candle with no CRT backing","Worth half position size"],a:2,exp:"No HTF reason = no trade. A Model 1 without HTF alignment is just a candle pattern. CRT requires the WHY before the WHERE. No why = no trade."}
]},
4:{s:[
{icon:"🏦",title:"Retail vs Smart Money",body:"Retail traders were taught to buy breakouts above old highs. That means their buy orders stack up just above every significant high in the market. Smart Money — banks, funds, institutions — knows exactly where those orders are stacked. They use retail's predictable behavior as fuel to fill their own massive positions at the best possible price.",donna:"You were taught to trade the wrong way. Everyone was. That was the point. Let that sink in."},
{icon:"🪤",title:"How the Trap Works",body:"EUR/USD approaches an old high at 1.0900. Retail buy stops are stacked just above it. Price pushes to 1.0915, triggering every single buy order. Smart Money sells into all those buyers — they just filled their shorts at 1.0915 with unlimited liquidity. Price reverses immediately, falls back to 1.0850, and everyone who bought the breakout is stopped out or holding a losing trade.",donna:"Every time you bought a breakout and immediately got destroyed? That wasn't bad luck. That was the plan. Their plan."},
{icon:"👀",title:"Reading Their Footprints",body:"The good news: Smart Money leaves footprints. When price pushes above an old high with a wick that closes back inside — that's them collecting. When price closes decisively above a high — they're distributing, and retail is actually right this time. The close tells you which game is being played. Once you can read it, you stop being the prey.",donna:"You can't beat Smart Money. But you can learn to read them. That's the whole game."}
],q:[
{q:"Gold pushes above the old high of $2,010 during London, collecting all buy stops, then closes the daily at $1,995 — back inside. What happened?",type:"mc",opts:["Bullish breakout — buy","Smart Money collected buy stops then sold into them","Random volatility","Consolidation before the real move up"],a:1,exp:"Classic Turtle Soup liquidity grab. Price went above $2,010, triggered retail buy stops, Smart Money sold into those buyers, and the close at $1,995 reveals the real direction — bearish."},
{q:"Where do retail buy stop orders typically accumulate?",type:"mc",opts:["In the middle of ranges","Below old lows","Just above old highs","At round numbers only"],a:2,exp:"Retail was taught to buy breakouts above highs. So their buy stop orders pile up just above every significant old high — exactly where Smart Money targets to fill short positions."},
{q:"Smart Money moves price by finding predictable retail order locations and trading against them.",type:"tf",a:true,exp:"True. Retail's consistent behavior (buying breakouts above highs, selling breakdowns below lows) creates the liquidity pools Smart Money needs to fill massive positions at scale."},
{q:"A retail trader buys EUR/USD when it breaks above 1.0920. Price immediately reverses to 1.0870. Most likely explanation:",type:"mc",opts:["Random market fluctuation","Stop was too tight","Smart Money sold into retail buy stops above 1.0920","Market makers triggered their stop"],a:2,exp:"This is the Turtle Soup. Smart Money targeted the retail buy orders above 1.0920, sold into them as those orders triggered, collected the liquidity, and price reversed. This is not random — it's the mechanism."}
]},
5:{s:[
{icon:"💧",title:"Two Reasons. Only Two.",body:"Every price move in the history of every market happened for exactly two reasons: to reach a liquidity pool (buy stops above highs, sell stops below lows) or to fill a price imbalance (a gap where price moved too fast and left an area untested). From a 5-pip tick to a year-long trend — one of those two. That's the whole engine.",donna:"Liquidity or imbalance. Write it down. Frame it. That's the whole game in four words."},
{icon:"🎯",title:"External vs Internal",body:"External liquidity sits at the extremes — old highs and lows — the final destination. Internal liquidity sits inside the range — Fair Value Gaps, Order Blocks, imbalances. Price cycles from internal to external and back, constantly. Your job before any trade: know which one price is heading toward right now. If you can't answer that, you don't have a trade.",donna:"Before any entry — where is price going? If you can't point to a level and say 'THERE' with confidence, you're not ready to enter."},
{icon:"🔄",title:"The Cycle Never Stops",body:"Price sweeps an old low (grabs sell stops), fills imbalances on the way up (internal liquidity), reaches the old high above (grabs buy stops), fills imbalances on the way down. This cycle repeats on every timeframe simultaneously. The Weekly is doing it. The Daily is doing it inside the Weekly. The 4H is doing it inside the Daily. Fractals all the way down.",donna:"Once you see the cycle, you can't unsee it. Every move makes sense. Every reversal is predictable. That's when trading stops being gambling."}
],q:[
{q:"EUR/USD sweeps below last week's low of 1.0780, grabs sell stops, then immediately reverses higher. This tells you:",type:"mc",opts:["Real breakdown — go short","Liquidity grab — price took the sell stops, now likely going up","Random volatility — no trade","Failed breakdown — wait"],a:1,exp:"Price swept the external liquidity below 1.0780 (sell stops), then reversed. The sweep collected the fuel Smart Money needed. The reversal direction is bullish — toward the next liquidity target above."},
{q:"What's the difference between External and Internal liquidity?",type:"mc",opts:["External is bigger, internal is smaller moves","External is at old highs/lows (final targets), internal is within the range (FVGs, OBs)","External is on higher timeframes only","They're the same thing, different names"],a:1,exp:"External liquidity = old highs and lows (the final destinations). Internal liquidity = imbalances (FVGs, Order Blocks) within the range. Price uses internal as stepping stones to reach external."},
{q:"Before finding your entry, you must first identify where price is going (your target).",type:"tf",a:true,exp:"True. Target first, always. Without knowing where price is going, your entry has no context and no logical take-profit. The target defines whether the trade makes sense."},
{q:"Price collected the buy stops above 1.0950 on EUR/USD and closed back inside at 1.0920. Where will price most likely go next?",type:"mc",opts:["Higher — momentum is up","Sideways — consolidation","Lower — toward internal or external lows","Cannot determine"],a:2,exp:"After collecting buy stops above 1.0950 (Turtle Soup) and closing inside at 1.0920, Smart Money sold into those buyers. Price should now move lower toward the next liquidity target."}
]},
6:{s:[
{icon:"🗺️",title:"Target First. Always.",body:"The most common mistake in trading: looking for an entry before knowing the target. If you don't know WHERE price is going, you can't know IF the trade makes sense or what the risk-reward is. EUR/USD at 1.0860 with a target at 1.0950 = 90 pips potential. With a target at 1.0880 = 20 pips potential. Same entry, completely different trade.",donna:"Entry is the last thing you look for. Target is the first. I will repeat this in every session until it's permanent."},
{icon:"🎯",title:"How to Find Your Target",body:"Look left. Find the most significant untested levels — old highs above you (buy stops), old lows below you (sell stops). The most powerful targets are old highs that formed after a sweep of a low, or old lows that formed after a sweep of a high. Those are clean liquidity pools that Smart Money will target. Gold at $1,990? That old high at $2,025 that formed after the $1,965 sweep is your target.",donna:"The level nobody is talking about is usually the next target. The obvious ones get front-run. Look for the clean ones that formed after a sweep."},
{icon:"🛤️",title:"The Path: ERL to IRL",body:"Price doesn't go from external level to external level in a straight line. It goes External → Internal → External. From the old low sweep, up through Fair Value Gaps and Order Blocks (internal), to the old high. Understanding this path lets you map not just the final target but the intermediate levels where price will pause, accelerate, or retrace. That's where your entries live.",donna:"Know the full route before you get in the car. ERL to IRL to ERL. Map it. Then wait for the entry on that route."}
],q:[
{q:"Gold is at $1,990. Old high at $2,025, old low at $1,965. Price just swept the $1,965 low. Your target is most likely:",type:"mc",opts:["$1,975 — nearest resistance","$1,990 — current price","$2,025 — the old high above","Below $1,965 — continuation down"],a:2,exp:"Price swept the old low at $1,965 (collected sell stops), suggesting a reversal. The logical target is now the external liquidity above — the old high at $2,025."},
{q:"Your entry is at 1.0860. Stop is 25 pips. The nearest target is 15 pips away. You:",type:"mc",opts:["Take it — the setup looks good","Skip it — negative risk-reward","Tighten the stop to 10 pips","Take half size"],a:1,exp:"Target 15 pips, stop 25 pips = 0.6:1 risk-reward. That's negative. No setup quality justifies a negative R trade. The target defines whether the trade makes sense."},
{q:"You must identify your target before looking for an entry candle.",type:"tf",a:true,exp:"True. Target first, always. Without a target, you have no idea if the reward justifies the risk. Entry is the last step, not the first."},
{q:"What makes one old high more significant as a target than another?",type:"mc",opts:["It's the most recent high","It's the highest high on the chart","It formed after a sweep of a low — clean liquidity pool","It was tested multiple times"],a:2,exp:"Old highs that formed after a sweep of a low are the cleanest targets. The sweep created the fuel (collected sell stops), now the high above is where buy stops are stacked — Smart Money's next target."}
]},
7:{s:[
{icon:"🐢",title:"Every Big Move Starts Here",body:"Before every significant price move, there's a fake breakout. Before a major drop, price pushes above an old high to trigger buy stops. Before a major rally, price breaks below an old low to trigger sell stops. This is not a sometimes-pattern — it's the mechanism that enables large-scale Smart Money positioning. Name one major Gold move that didn't start with a liquidity grab. You can't.",donna:"The fake breakout isn't a glitch in the matrix. It IS the matrix. Once you see it, you trade it instead of getting trapped by it."},
{icon:"📋",title:"Three Types of Turtle Soup",body:"Continuation: brief sweep of a swing high within a trend, then continuation — a pullback entry. Range: price sweeps the high or low of an established range — classic reversal. Reversal: at a major HTF structural level, price sweeps and reverses completely — this is Entry 1, the most powerful and the highest reward. The HTF reversal Turtle Soup is what you build your system around.",donna:"The HTF reversal type is the one. Hardest to catch live. Most violent when it goes. Entry 1. Learn to recognize it."},
{icon:"⚡",title:"The Failure Swing",body:"After a Turtle Soup, watch for the failure swing — price tries to go back in the direction of the fake breakout but makes a lower high (or higher low if below). EUR/USD fake breakout above 1.0920, closes at 1.0890, then tries again to 1.0905 but fails — that lower high is confirmation. The failure swing tells you the Turtle Soup is real and the move is about to begin.",donna:"Failure swing is your confirmation. Don't skip it. It filters 80% of the false signals."},
{icon:"🚫",title:"Rule 1: Never Buy Above an Old High",body:"The most important rule in CRT: never buy above an old high, never sell below an old low. The breakout is almost always fake. The close back inside is your signal. A genuine close above is the exception — and even then, you wait for the pullback, not the breakout itself. This single rule eliminates the most common losing trade in retail trading.",donna:"Never buy above an old high. If you forget everything else I taught you — remember this one. Put it on your screen."}
],q:[
{q:"EUR/USD wicks above last month's high of 1.0950, then closes the daily at 1.0910. CRT says:",type:"mc",opts:["Bullish — buy the break","Bearish Turtle Soup — Smart Money sold above 1.0950","Neutral — wait","Bullish — wick shows demand"],a:1,exp:"Wick above 1.0950, close inside at 1.0910 = Turtle Soup. Smart Money grabbed buy stops above the high and sold into them. The daily close at 1.0910 confirms the bearish bias."},
{q:"Which type of Turtle Soup has the highest probability and reward?",type:"mc",opts:["Continuation type in a trend","Range extreme reversal","Reversal at a major HTF structural level","Any type with a large wick"],a:2,exp:"HTF reversal Turtle Soup is Entry 1 — the highest quality. It combines maximum liquidity collection with major structural significance. Hardest to catch live, most powerful when you do."},
{q:"After a Turtle Soup above an old high, price tries to push back up but only reaches a lower high before reversing. This is called:",type:"mc",opts:["Double top pattern","False change of character","The failure swing — confirms the Turtle Soup","Consolidation before continuation"],a:2,exp:"The failure swing — price failed to go back where the fake breakout happened, making a lower high. This confirms the Turtle Soup and gives you high-confidence entry timing."},
{q:"You should buy when price closes above an old high on strong volume and momentum.",type:"tf",a:false,exp:"False in CRT. Volume doesn't change the analysis. A close above an old high needs context — is it a True Break or will it be Turtle Souped? Even if True Break, you wait for the pullback, not the breakout itself."},
{q:"Gold approaches the old high of $2,000. CRT Rule 1 says you should:",type:"mc",opts:["Buy the breakout above $2,000","Watch for a Turtle Soup — expect a fake break and reversal","Set a buy stop above $2,000","Buy when price touches $2,000"],a:1,exp:"Rule 1: Never buy above an old high. Watch for the Turtle Soup — price wicking above $2,000 and closing back inside. That's your sell signal, not your buy."}
]},
8:{s:[
{icon:"📅",title:"AMD — The Universal Pattern",body:"Every price move on every timeframe follows three phases. Accumulation (C1): price ranges, building the spring. Manipulation (C2): the fake breakout — the Turtle Soup — the liquidity grab. Distribution (C3): the real move — your trade. Monday ranges (C1), Tuesday breaks the high with a close back inside (C2), Wednesday-Thursday drops hard (C3). That's AMD on the weekly. It runs on every timeframe.",donna:"C2 is the most tempting candle to trade. It looks explosive. It looks obvious. Never trade C2. It is designed to trap you."},
{icon:"📆",title:"AMD on the Weekly",body:"Monday builds the weekly accumulation range. Tuesday is manipulation day — this is where the real weekly high or low almost always forms. Wednesday and Thursday distribute in the true direction. If you know Tuesday is manipulation day, you stop trading Tuesday breakouts and start trading Wednesday's follow-through. That one change alone will improve your results immediately.",donna:"Mark Tuesday's high and low. Every week. That's usually where the weekly High or Low is. I'm not kidding."},
{icon:"🗓️",title:"AMD on the Monthly",body:"Week 1 of the month = accumulation. Week 2 = manipulation (the fake monthly high or low forms here). Week 3-4 = distribution (the real monthly move). This is why markets often go one direction in the first two weeks, then violently reverse in week 3. If you're trading week 2 breakouts, you are the fuel for week 3's reversal.",donna:"Week 2 is manipulation week. If you're trading week 2 breakouts like they're real — you're the liquidity. Every single month."},
{icon:"🔄",title:"Fractals — Same Pattern Every Speed",body:"AMD repeats on every timeframe simultaneously. The manipulation candle on the Weekly contains its own AMD on the Daily. The Daily manipulation day contains its own AMD on the 4H. When you find AMD alignment across three timeframes simultaneously — Weekly AMD, Daily AMD, 4H AMD all pointing the same direction — that's the highest-probability setup in CRT.",donna:"When all three timeframes are in AMD alignment — that's the trade. That's when you size up."}
],q:[
{q:"It's Tuesday in New York session. EUR/USD breaks above Monday's high. Based on AMD, you:",type:"mc",opts:["Buy the breakout — momentum is real","This is likely C2 — do not buy the breakout, watch for reversal","Wait for Wednesday to confirm","It's accumulation — range trade it"],a:1,exp:"Tuesday is typically the manipulation day (C2). The breakout above Monday's high is likely the Turtle Soup. Don't buy Tuesday breakouts. Mark Tuesday's high and watch for Wednesday's reversal."},
{q:"In the AMD sequence, which phase is your actual trade entry?",type:"mc",opts:["C1 — Accumulation","C2 — Manipulation","C3 — Distribution","Any of the three"],a:2,exp:"C3 — Distribution — is your trade. C1: don't trade, no direction. C2: never trade, it's the trap. C3: the real move that follows the manipulation."},
{q:"The real weekly high or low typically forms on which day?",type:"mc",opts:["Monday","Tuesday","Wednesday","Friday"],a:1,exp:"Tuesday is the manipulation day. It's where Smart Money creates the weekly fake high or low — the level that the rest of the week will reference and trade off of."},
{q:"AMD only applies to the daily and weekly timeframes.",type:"tf",a:false,exp:"False. AMD is fractal — it appears on every timeframe simultaneously. The 4H has its own AMD. The 1H has its own inside that. When they align across multiple timeframes, that's the highest-quality setup."},
{q:"It's Week 2 of the month. The market breaks to new monthly highs. Based on monthly AMD:",type:"mc",opts:["Buy — strong momentum","Watch for the monthly Turtle Soup — this could be the fake high","Week 2 is always bullish","Accumulation is completing"],a:1,exp:"Week 2 is manipulation week. New highs in week 2 are likely the monthly fake breakout — the Turtle Soup that precedes the real bearish move in weeks 3-4."}
]},
9:{s:[
{icon:"👁️",title:"Closes Reveal. Wicks Deceive.",body:"Reading daily bias is simple once you know this: a prior daily that CLOSED above an old high = bullish bias for today. A prior daily that WICKED above an old high but closed inside = bearish bias. The close is the vote. A bullish bias means you only look for long entries below the daily open. A bearish bias means you only look for shorts above the daily open.",donna:"One filter. One rule. Eliminate most bad trades. The daily close tells you everything."},
{icon:"🔍",title:"The One Filter That Changes Everything",body:"Here's how powerful this is: if the daily has a bearish bias, you should NOT be taking bullish trades — no matter how perfect the setup looks on the 1H. And if the daily shows bullish bias, you should NOT be taking shorts — even if price is near a resistance. This one daily bias filter eliminates the majority of losing trades for most retail traders.",donna:"Most bad trades happen when people ignore the daily bias. They see a pretty 1H candle and forget to ask: what's the Daily doing? Check the Daily first. Always first."}
],q:[
{q:"Yesterday's daily candle wicked above the old high of 1.0920 but closed at 1.0891, back inside. Today's bias is:",type:"mc",opts:["Bullish — it tested 1.0920","Bearish — the wick was rejected","Neutral — one candle isn't enough","Bullish — the wick shows demand"],a:1,exp:"Wick above + close inside = bearish bias. Yesterday the close at 1.0891 revealed that buyers failed to sustain above 1.0920. Today you only look for short entries above the daily open."},
{q:"Daily candle closes at $2,018, above last week's high of $2,010. Today you should look for:",type:"mc",opts:["Short entries above the daily open","Long entries below the daily open","No trades — wait for more confirmation","Long entries above the daily open"],a:1,exp:"Daily close above old high = bullish bias. In a bullish bias, you look for long entries BELOW the daily open (on pullbacks), not above it where you're chasing."},
{q:"You can take short trades even when the daily bias is bullish, as long as the 1H setup is perfect.",type:"tf",a:false,exp:"False. Daily bias overrides 1H setups. Trading against the daily bias — even with a 'perfect' lower timeframe setup — puts you against the dominant flow. Skip those trades."}
]},
10:{s:[
{icon:"⏰",title:"When Matters More Than Where",body:"A perfect setup at 3AM on a Saturday has almost no probability. The same perfect setup at 9:30AM New York on a Tuesday? That's a trade. There are three Kill Zones where Smart Money actively moves price: London (2-5AM NY time, best for EUR/USD, GBP), New York Open (7-11AM NY, best for Indices, Crypto, USD pairs), NY PM (1:30-4PM NY, continuation moves). Outside these windows — think twice.",donna:"Your setup matters. Your timing matters more. Perfect level, wrong session = low probability. Mark the Kill Zones on your chart. Trade inside them."},
{icon:"📍",title:"NYSE Open — The Big One",body:"Every day at 9:30AM New York, the New York Stock Exchange opens. This is the biggest liquidity injection of the session — buy and sell orders from every major institution hit the market simultaneously. This moment often creates the Day's Manipulation (C2 of the daily AMD) — a sharp move to grab stops just before the real direction plays out. The 9:30 candle is almost never your entry. It's the trap.",donna:"9:30AM is when you WATCH, not when you TRADE. Let the 9:30 candle develop. Mark its high and low. Trade what comes after it."},
{icon:"🌍",title:"Session Profiles",body:"Each session has its own personality. London creates the daily manipulation for EUR/USD and GBP pairs — expect fake moves and reversals. New York Open creates the US market manipulation — sharp moves that often reverse. Asian session (8PM-12AM NY) is quieter — best for Gold and JPY. A setup that forms during Asian session should be evaluated with lower probability weight than the same setup during London or NY.",donna:"Same setup, different session — different probability. Context is everything in trading."}
],q:[
{q:"You find a perfect Model 1 candle on EUR/USD at 11:45PM New York time (Asian session). You:",type:"mc",opts:["Take it — the setup is there","Take it with smaller size","Be cautious — Asian session has lower probability for EUR/USD","Skip it — Asian session is always wrong"],a:2,exp:"Asian session is not the primary session for EUR/USD. The same setup during London (2-5AM NY) would have much higher probability. Adjust your confidence level based on session timing."},
{q:"At exactly 9:30AM New York, price makes a sharp move up through an old high. Based on CRT:",type:"mc",opts:["Buy the breakout — NYSE open = bullish","Wait — this is likely the 9:30AM manipulation trap","Sell immediately — 9:30 always reverses","It depends on the direction of the move"],a:1,exp:"9:30AM NYSE open creates massive volatility and often the daily manipulation (C2). Sharp moves at 9:30 are frequently Turtle Soups. Watch, mark the high and low, and trade what develops after."},
{q:"The three main Kill Zones are London Open, New York Open, and:",type:"mc",opts:["Tokyo Open","Asian session","NY PM (1:30-4PM NY)","Pre-market (4-6AM NY)"],a:2,exp:"The three Kill Zones are London (2-5AM NY), New York Open (7-11AM NY), and NY PM (1:30-4PM NY). These are the windows where institutional flow is highest and CRT setups have the most probability."},
{q:"A CRT setup that forms during a Kill Zone has higher probability than the same setup outside a Kill Zone.",type:"tf",a:true,exp:"True. Kill Zones are when institutional participants are most active. The same structural setup carries significantly more probability when it forms during a Kill Zone vs during dead hours."}
]},
11:{s:[
{icon:"🎯",title:"One Candle. One Rule. One Trigger.",body:"The Model 1 is your entry candle. It has three requirements and all three must be present: 1) It's THICK — a significant body, not a doji or small candle. 2) It nails a real structural level — an old high, old low, Order Block, or Fair Value Gap. 3) It forms inside a Kill Zone. When all three are present, that candle's CLOSE is your trigger. Not the wick. The close.",donna:"Three things. If one is missing — it's not a Model 1. Don't enter. Wait for the real one."},
{icon:"📏",title:"Stop, Targets, and the Sacred 50%",body:"Stop goes above or below the Model 1 wick — FIXED, never moves. First target (T1) is always 50% of the setup range — this is MANDATORY. You take partial profit there no matter what. Second target (T2) is the full objective — the external liquidity target you identified before the trade. An FVG (Fair Value Gap) inside the Model 1 candle's body increases the probability significantly.",donna:"The 50% partial is not optional. I don't care how good the trade looks. Take the partial at T1. Always."},
{icon:"⚡",title:"Why the Close — Not the Wick",body:"Retail traders enter on the wick — they see price touch a level and jump in. Smart Money confirms on the close — they wait to see if price COMMITTED to rejecting the level. Entering on the wick means you enter during the noise. Entering on the close means you enter after the signal is confirmed. The extra few seconds of patience is the difference between a high-probability entry and a coin flip.",donna:"Wick touch = hope trade. Close confirmation = CRT trade. You trade closes. Period."},
{icon:"🔄",title:"Managing the Model 1 Trade",body:"Once in: stop is above the wick and stays there. If price hits T1 (50%), take the partial — reduce risk immediately. Move stop to breakeven after T1. Let T2 run. If price hits your stop before T1 — that's a loss. Accept it, log it, move on. If price takes you out at breakeven after T1 — that's a free trade. The Model 1 managed correctly loses no money on 70% of losing trades.",donna:"Manage it correctly and the Model 1 makes money even when it's wrong. That's the system."}
],q:[
{q:"You see a thick candle that closes back inside after wicking above an old high. It's during London session. The level is a clean Order Block. This is:",type:"mc",opts:["A regular candle — wait for more confirmation","A Model 1 entry — all three criteria met","A Turtle Soup but not a Model 1","A potential entry but check the Daily first"],a:1,exp:"All three Model 1 criteria present: thick body, real structural level (Order Block), Kill Zone timing (London). After checking Daily bias alignment, this is a valid entry on the close."},
{q:"Where does the stop go on a Model 1 trade?",type:"mc",opts:["Below the entry candle's body","Below the entry candle's wick","At the nearest support level","2% below entry"],a:1,exp:"Stop goes above or below the Model 1 wick — the extreme of the candle. This protects you from the noise while keeping the stop logical. Fixed. Never moved after placement."},
{q:"Your Model 1 trade hits T1 (50% of the range). You should:",type:"mc",opts:["Hold everything — let it run to T2","Take partial profit — this is mandatory","Move your stop to breakeven and hold","Close the entire trade"],a:1,exp:"T1 at 50% is a mandatory partial exit. Non-negotiable. After T1, move stop to breakeven and let T2 run risk-free. The partial at 50% is what makes the Model 1 consistently profitable."},
{q:"You should enter a Model 1 trade when the wick touches your level, not waiting for the close.",type:"tf",a:false,exp:"False. The close is the trigger — always. Entering on the wick touch is entering before confirmation. Wait for the candle to close and confirm rejection. The few seconds of patience significantly improves entry quality."},
{q:"What increases the probability of a Model 1 setup?",type:"mc",opts:["A large wick above the level","An FVG inside the Model 1 candle's body","Multiple recent tests of the same level","A strong trend into the level"],a:1,exp:"An FVG (Fair Value Gap) inside the Model 1 candle's body adds confluence — price filled an imbalance and rejected simultaneously. This combination carries significantly higher probability than a plain Model 1."}
]},
12:{s:[
{icon:"💀",title:"It Happens Every Single Time",body:"The Kiss of Death is the last fake move before price reaches its target. It happens before every significant target — every single one. Smart Money knows exactly where your stop is (above the Model 1 wick, where you placed it like CRT taught you). Before price reaches the final target, it makes one last move against your trade — just far enough to shake out lightly managed positions.",donna:"The Kiss of Death is not optional. It's not sometimes. It's guaranteed. Every target. If you know it's coming, you stop getting shaken out by it."},
{icon:"📍",title:"Entry 5 — The Most Violent Move",body:"The Kiss of Death is also Entry 5 in the CRT entry sequence. It's the last entry before the final target — and it's the most violent, fastest-moving trade of all five entries. Price has already gone through E1, E2, E3, E4 — all of which have already been stopped out or have taken profits. E5 (the KoD) is for traders who understand the full picture and know the target is imminent.",donna:"If you got stopped out at the KoD — you weren't wrong about the trade. You just didn't size it right. The loss is information, not failure."},
{icon:"🛡️",title:"How to Survive the Kiss of Death",body:"After T1 (50% partial), your stop should be at breakeven. The KoD often reaches just above breakeven — stopping you out but with no actual loss. This is the 'free trade' outcome. If you haven't taken T1 yet when the KoD hits — that's the lesson. Always take T1. The system protects you from the KoD only when you followed the rules leading up to it.",donna:"Took T1? KoD kicks you out at breakeven. Didn't take T1? KoD kills the trade. The partial at 50% is the KoD insurance. Don't skip it."},
{icon:"🎭",title:"Using the KoD as Entry 5",body:"Advanced traders USE the Kiss of Death as a high-probability entry. If you've mapped the full CRT sequence — swept the low, Model 1 formed, partial taken, trade managed — and then price makes one final push against you, that's E5. The entry is the KoD wick rejection, the target is the full objective, and the stop is tight because the trade has significant confirmation behind it.",donna:"Entry 5 is only valid if you understand Entries 1 through 4 first. Don't try to use it before you understand the full sequence."}
],q:[
{q:"Your Gold trade is up, approaching the target at $2,050. Before reaching it, price drops sharply to your stop level. This is most likely:",type:"mc",opts:["The trade is wrong — close it","A random pullback","The Kiss of Death — the final shakeout before the target","Normal volatility — hold"],a:2,exp:"The Kiss of Death always appears before the target. The sharp drop to your stop level is the final shakeout. If you took T1 at 50%, you're at breakeven. If you didn't — this is why T1 exists."},
{q:"The Kiss of Death is:",type:"mc",opts:["A chart pattern","The last fake move before price reaches its final target","A type of Turtle Soup","A stop loss placement technique"],a:1,exp:"The Kiss of Death is the last fake move against your position before price reaches its final target. It's designed to shake out traders who entered correctly but managed incorrectly."},
{q:"You can avoid being stopped out by the Kiss of Death by:",type:"mc",opts:["Using a wider stop","Taking your T1 partial at 50% and moving stop to breakeven","Avoiding volatile sessions","Closing the trade manually before the target"],a:1,exp:"Taking T1 at 50% and moving stop to breakeven means the KoD kicks you out at breakeven — no loss. This is the system's built-in KoD protection. Always take T1."},
{q:"The Kiss of Death only happens on losing trades.",type:"tf",a:false,exp:"False. The Kiss of Death happens on winning trades — specifically before they hit the final target. It's the final test of your discipline. It shakes out traders who didn't follow the rules."},
{q:"Entry 5 (the KoD entry) is the best entry point for beginners because it's closest to the target.",type:"tf",a:false,exp:"False. E5 is for advanced traders who understand the full 5-entry sequence. Without understanding E1-E4 and the full CRT picture, attempting E5 is extremely dangerous."}
]},
13:{s:[
{icon:"🗝️",title:"The Gap Price Always Fills",body:"A Fair Value Gap (FVG) is a 3-candle imbalance where price moved so fast it left an untested area. Candle 1's high and Candle 3's low don't overlap — there's a gap between them. That gap acts like a magnet. Price almost always comes back to test it. EUR/USD gaps up through 1.0880-1.0910, leaving that zone untested? Price will come back to fill it — usually within hours or days.",donna:"FVGs are magnets. Mark them. Price goes back. Not sometimes — almost always. Use them for targets and entries."},
{icon:"📐",title:"The 50% Rule for FVGs",body:"The critical level inside any FVG is its 50% midpoint. Price might enter the FVG from the top and only reach 50% before reversing — or it might fill the entire gap. But the 50% level is where the highest concentration of orders sits. For entries: watch for rejection at the 50% of an FVG. For targets: mark the 50% as your T1 inside FVG zones.",donna:"Mark the FVG. Then mark its 50%. That midpoint is where the action happens most of the time."},
{icon:"🔗",title:"OB + FVG = Maximum Confluence",body:"When an Order Block and a Fair Value Gap overlap at the same price level, that's maximum confluence. An Order Block with an FVG inside it on the Daily chart, during a Kill Zone, with HTF alignment — this is the setup you wait for. Gold at $1,995 where there's a Daily OB and a 4H FVG at the same level? That's not just a level, that's an invitation.",donna:"When everything lines up at the same level — OB, FVG, structural significance, Kill Zone — that's when you size up. That's the setup of setups."}
],q:[
{q:"EUR/USD has a Fair Value Gap between 1.0865 and 1.0895 from three days ago. Price is now approaching from below. You should expect:",type:"mc",opts:["Price to ignore the FVG","Price to be rejected exactly at the bottom of the FVG","Price to be drawn into and through the FVG zone","Price to stop exactly at the top of the FVG"],a:2,exp:"FVGs act as magnets — price is drawn to fill them. Price will likely enter the FVG zone (1.0865-1.0895) and either fill partially (to the 50%) or completely fill the gap."},
{q:"Inside a Fair Value Gap, what is the most significant level?",type:"mc",opts:["The top of the FVG","The bottom of the FVG","The 50% midpoint","The level where the gap formed"],a:2,exp:"The 50% midpoint of the FVG is where the highest concentration of orders sits. It's the most common reversal point inside a FVG and the key level for entries and partial targets."},
{q:"An Order Block and Fair Value Gap at the same price level represents:",type:"mc",opts:["A weak zone — too many traders know about it","Maximum confluence — highest probability level","Two signals canceling each other out","Only valid on the 1H timeframe"],a:1,exp:"OB + FVG at the same level = maximum confluence. Two separate reasons for price to react at the same spot dramatically increases the probability of a reaction there."},
{q:"A Fair Value Gap will always be fully filled before price continues in its direction.",type:"tf",a:false,exp:"False. FVGs often fill to 50% and then reverse. They don't always fill completely. The 50% midpoint is the key level — price reaching it is considered the FVG doing its job."}
]},
14:{s:[
{icon:"📦",title:"Where Big Money Left Its Mark",body:"An Order Block (OB) is the last candle of the opposite color before a significant impulsive move. In an uptrend, the last bearish (red) candle before the big bullish move up = the Order Block. That's where Smart Money placed their positions. Price almost always comes back to test that area before continuing. EUR/USD at 1.0800, big bullish move — the last bearish candle before that move is your OB.",donna:"The Order Block is where Smart Money entered. They need price to come back there to add to positions. That's your entry — riding their second buy."},
{icon:"📐",title:"The 50% Rule for OBs",body:"Just like FVGs, the 50% level of an Order Block is the key entry point. The OB body (between open and close of that last opposite candle) defines the zone. The 50% midpoint is where you look for your entry, your limit orders, your Model 1 rejection. Higher timeframe OBs (Daily, 4H) carry significantly more weight than lower timeframe OBs.",donna:"Daily OB + Kill Zone + Model 1 rejection = one of the cleanest entries in CRT. Mark your HTF Order Blocks every week."},
{icon:"🔗",title:"Why Price Returns to Order Blocks",body:"Institutions can't fill massive position sizes in one moment without moving price against themselves. They fill in batches. The Order Block is where the first batch went in — when price returns, they add more. This is why OBs act as support and resistance with remarkable consistency. You're not trading a pattern; you're trading the mechanics of how large players have to operate.",donna:"You're not guessing at a level. You're following the footprint of where institutions HAVE to add to their positions. Different mindset entirely."}
],q:[
{q:"Before a major bullish move on EUR/USD, the last bearish candle had a high of 1.0850 and a close of 1.0820. The Order Block zone is:",type:"mc",opts:["Only at 1.0850","Only at 1.0820","Between 1.0820 and 1.0850 (the candle's body)","Below 1.0820"],a:2,exp:"The Order Block is the body of the last bearish candle before the bullish move — between its close (1.0820) and open (1.0850). The 50% of this zone is at 1.0835 — your key entry level."},
{q:"Which Order Block carries more weight?",type:"mc",opts:["The most recent one","The Daily timeframe Order Block","The one that has been tested most times","The largest candle body"],a:1,exp:"Higher timeframe Order Blocks (Daily, 4H) carry more weight than lower timeframe OBs. A Daily OB represents larger institutional positioning and commands more significant price reactions."},
{q:"Price returning to an Order Block means the trade is invalidated.",type:"tf",a:false,exp:"False. Price returning to an Order Block is expected and is actually the entry point. OBs are exactly where you look to enter — when price pulls back to where Smart Money originally positioned."},
{q:"What makes Order Blocks consistently reliable as support and resistance levels?",type:"mc",opts:["Many retail traders know about them","Technical analysis tradition","Institutions add to their positions when price returns there","Chart pattern recognition"]
,a:2,exp:"OBs are reliable because institutions can't fill entire positions at once. They place initial orders, then add when price returns. That consistent institutional behavior is what makes OBs work — it's mechanics, not magic."}
]},
15:{s:[
{icon:"🔄",title:"When Support Becomes Resistance",body:"A Breaker Block is an Order Block that was broken — price moved through it, invalidating it as support. But here's the thing: that zone doesn't disappear. It flips. Old support at 1.0850 that price breaks below = Breaker Block. Now when price comes back up to 1.0850, it acts as resistance. The same zone, opposite role. And the reaction there is often the cleanest, lowest-drawdown entry in CRT.",donna:"Flip it. If it was support and price breaks below, it's now resistance. If it was resistance and price breaks above, it's now support. Mark the flip, wait for the return, enter on rejection."},
{icon:"📊",title:"Three Passes — The Most Balanced Level",body:"When price has passed through the same zone three times — once as support, broken through, once as resistance, broken through, then returns — that area is the most balanced location on the entire chart. Least drawdown. Most predictable reaction. Nasdaq at 17,000: tested as support, broke below, tested as resistance, broke above, returns to 17,000 — that's three passes. Highest probability zone.",donna:"Three passes through the same zone = the chart's most balanced level. Least drawdown entry of all five. This is Entry 3 in the sequence."},
{icon:"🔑",title:"Valid Flip vs Random Level",body:"Not every broken level becomes a valid Breaker Block. For a valid flip: the original move through the level must be decisive (a genuine break, not a wick), the zone must be clearly defined (a previous Order Block or structural level, not random price), and the return must happen within a reasonable timeframe (not months later). A vague break of a vague level is not a Breaker Block.",donna:"Quality over quantity. One valid Breaker Block setup a week is worth more than five questionable ones. Mark only the clean ones."}
],q:[
{q:"EUR/USD had strong support at 1.0880 for two weeks. Price broke decisively below it last week. Now price is returning to 1.0880. What is 1.0880 now?",type:"mc",opts:["Still support — multi-week levels are strong","A Breaker Block — now acting as resistance","Neutral — broken levels lose significance","A target for a long trade"],a:1,exp:"Old support broken = Breaker Block = new resistance. The 1.0880 zone flipped when price decisively broke below it. Now when price returns, you look for rejection and a short entry there."},
{q:"A Breaker Block is:",type:"mc",opts:["An Order Block that hasn't been tested yet","An Order Block that was broken and flipped its role","A failed Turtle Soup","A Fair Value Gap in reverse"],a:1,exp:"A Breaker Block is an Order Block that price broke through decisively, causing the zone to flip its role — support becomes resistance, resistance becomes support."},
{q:"The zone where price has passed through three times (both as support and resistance) is:",type:"mc",opts:["A weak zone — too much traffic","The most balanced location on the chart — lowest drawdown entry","A zone to avoid — too much noise","Only valid as a short entry"],a:1,exp:"Three passes through the same zone = the most balanced location on the chart. Both bulls and bears have been tested there. The third touch reaction typically has the lowest drawdown of any entry in the CRT sequence."},
{q:"Any broken level automatically becomes a valid Breaker Block.",type:"tf",a:false,exp:"False. A valid Breaker Block requires: a decisive break (not a wick), a clearly defined zone (previous OB or structural level), and a return within a reasonable timeframe. Not every broken level qualifies."}
]},
16:{s:[
{icon:"🔢",title:"Five Entries. One Sequence.",body:"CRT has five entry points for any setup. E1: Turtle Soup wick (live, hardest, highest reward). E2: Model 1 close (daily confirmed, your standard entry). E3: Breaker Block (least drawdown, very clean). E4: OTE 60-75% retrace (where ICT traders enter — also where the Kiss of Death often traps them). E5: Kiss of Death (most violent, most certain, smallest stop). Each is valid. Each has its context.",donna:"Five entries means you have five chances to get the same trade right. But you can only go forward — never backward in the sequence."},
{icon:"🚫",title:"Never Go Backward",body:"The rule that most people miss: once a higher entry has formed, you cannot go back to a lower-numbered entry. If E3 (Breaker Block) has formed, E1 and E2 no longer exist for this setup. You're now at E3 or waiting for E4-E5. If you missed E1 and E2, your only valid entries are E3, E4, and E5. Trying to enter at E1 after E3 has formed means you're fighting the sequence.",donna:"Missed E1? You're an E2 trader now. Missed E2? E3. Missed E3? E4. Missed everything? Wait for E5. Never go back."},
{icon:"⚡",title:"E4 and the ICT Trap",body:"Entry 4 is the 60-75% retrace of the full setup range — this is where ICT methodology traders enter. Smart Money knows this. The Kiss of Death (E5) is specifically designed to stop out E4 traders before the final move. If you enter at E4, your stop needs to account for the KoD. Many E4 entries get stopped out by the KoD before the target — that's why E5 exists.",donna:"If you enter at E4, the KoD is coming for you. Size accordingly, stop below the KoD zone, or wait for E5."},
{icon:"🏆",title:"Combining the Entries",body:"Advanced traders use the 5-entry sequence to scale into positions. Small size at E1, add at E2, add at E3 with stop moved to near entry of E1, add at E5 with tight stop. This creates a position that's partially free by E3, fully at risk only at E5, and maximally sized for the final move. The sequence is not just five separate entries — it's a position-building framework.",donna:"This is the advanced game. Build the position across the sequence. By E5, most of the position is running free."}
],q:[
{q:"A setup has completed its E1 (Turtle Soup wick) and E2 (Model 1 close). You missed both. Your valid entries now are:",type:"mc",opts:["E1 is still valid — it just formed","Only E2","E3, E4, and E5","No valid entries remain"],a:2,exp:"Once E1 and E2 have formed, you cannot go back. Your valid remaining entries are E3 (Breaker Block), E4 (OTE 60-75%), and E5 (Kiss of Death). The sequence only moves forward."},
{q:"Entry 4 (OTE, 60-75% retrace) is specifically designed to be trapped by:",type:"mc",opts:["E3 traders","The Kiss of Death (E5)","E1 traders","Stop hunters"],a:1,exp:"E4 is where ICT methodology traders enter — and Smart Money knows this. The Kiss of Death is specifically designed to stop out E4 traders before the final move. E5 is the KoD response to E4 traders getting shaken out."},
{q:"In the 5-entry sequence, E5 (Kiss of Death) has the:",type:"mc",opts:["Highest risk and lowest reward","Widest stop but most time","Tightest stop and most certainty — the target is imminent","Same characteristics as E2"],a:2,exp:"E5 has the tightest stop because price is closest to the target — the KoD wick's extreme is the stop. Most certainty because all previous entries have already played out. Target is imminent."},
{q:"You can enter at E1 again after E3 has already formed in the same setup.",type:"tf",a:false,exp:"False. The sequence only moves forward. Once E3 has formed, E1 and E2 are no longer valid for this setup. Never go backward in the entry sequence."},
{q:"What is the primary advantage of scaling into a trade across multiple entry points?",type:"mc",opts:["Increases the average entry price","Creates a position that becomes progressively risk-free as entries play out","Reduces total position size","Simplifies stop management"],a:1,exp:"Scaling across E1-E5 means by E3, your E1 and E2 entries can have stops moved to breakeven — a portion of the position is running free. By E5, most of the position carries no risk while being maximally sized for the final move."}
]},
17:{s:[
{icon:"🔗",title:"When Markets Tattle on Each Other",body:"SMT Divergence (Smart Money Technique) is when two correlated assets don't confirm each other's move. EUR/USD and DXY are inverse — when one goes up, the other goes down. S&P 500 and Nasdaq are direct — they should move together. When they don't — when one takes a new high that the other doesn't — that's divergence. The one that took the false high is about to reverse.",donna:"When correlated markets diverge, one of them is lying. It's always the one that extended to a new high or low without confirmation."},
{icon:"📊",title:"The Pairs to Watch",body:"Key correlations: EUR/USD vs DXY (inverse). GBP/USD vs DXY (inverse). BTC vs ETH (direct — both should move together). S&P 500 vs Nasdaq (direct). Gold vs DXY (inverse). When EUR/USD takes a new high but DXY doesn't make a new low, or BTC makes a new high but ETH doesn't — that's your signal. The one that extended is the Turtle Soup. The other is telling the truth.",donna:"Watch the pair. Watch its correlated market. If they disagree on a new high or low — trade the disagreement."},
{icon:"⚠️",title:"SMT Alone Is Not a Trade",body:"SMT divergence is a filter and a signal enhancer — not a standalone trade trigger. Never enter on SMT alone. You need: SMT divergence at a structural level, during a Kill Zone, with a Model 1 confirmation candle. SMT tells you WHICH direction. The Model 1 tells you WHEN and WHERE to enter. Both together = one of the cleanest setups in CRT.",donna:"SMT divergence is the why. The Model 1 is the when. You need both. One without the other is just observation."}
],q:[
{q:"EUR/USD makes a new 4H high at 1.0950. At the same time, DXY does NOT make a new 4H low. This is:",type:"mc",opts:["Confirmation — both agree EUR/USD is bullish","SMT Divergence — EUR/USD's new high is likely false","Normal market behavior — pairs don't always sync","Bullish for EUR/USD — the extension shows strength"],a:1,exp:"EUR/USD up + DXY not confirming (not going lower) = SMT Divergence. EUR/USD's new high is likely a Turtle Soup. DXY is telling the truth — no real directional change happened. Look for EUR/USD to reverse."},
{q:"Bitcoin makes a new high but Ethereum doesn't. SMT divergence suggests:",type:"mc",opts:["Bitcoin is stronger than Ethereum — buy Bitcoin","Ethereum will catch up to Bitcoin","Bitcoin's new high may be false — watch for reversal","No action — crypto pairs don't correlate"],a:2,exp:"BTC and ETH are directly correlated. If BTC takes a new high without ETH confirming, BTC's new high is likely false (Turtle Soup). Watch for BTC to reverse back inside the range."},
{q:"You see SMT Divergence at a structural level. You should:",type:"mc",opts:["Enter immediately — SMT is enough","Wait for a Model 1 candle to confirm at the level","Use a wider stop since SMT signals are less reliable","Trade both correlated assets simultaneously"],a:1,exp:"SMT is a signal enhancer, not a trade trigger. You still need the Model 1 candle confirmation at the structural level, during a Kill Zone, with HTF alignment. SMT tells you direction, Model 1 tells you entry."},
{q:"SMT Divergence alone, without a Model 1 confirmation, is a complete and valid entry signal.",type:"tf",a:false,exp:"False. SMT divergence alone is observation, not a trade. It needs to be combined with a structural level, Kill Zone timing, and a Model 1 confirmation candle. SMT tells you the WHY — Model 1 gives you the WHEN."}
]},
18:{s:[
{icon:"⚠️",title:"The Setup Designed to Trap Smart Traders",body:"The False Change of Character (FCoC) is specifically designed to trap informed traders — the ones who know what a real Change of Character (CoC) looks like. It looks perfect: decisive move through a key level, looks like a genuine break, looks like the trend is changing. But there's no real stop purge, no Kill Zone backing, no HTF alignment. It's the Turtle Soup for people who think they're too smart to get Turtle Souped.",donna:"If a setup looks too perfect and shows up outside a Kill Zone — that's your first warning. Smart Money traps smart traders too."},
{icon:"✅",title:"Real CoC vs False CoC",body:"Real CoC: violent, explosive move through a key level that also triggers a significant stop purge, closes decisively THROUGH the level on a higher timeframe candle, with HTF backing and Kill Zone timing. False CoC: textbook clean break, medium-sized move, no obvious stop purge, often outside Kill Zone, no strong HTF reason behind it. Real is violent and supported. False is clean and unsupported.",donna:"Real Change of Character is ugly and violent. If it looks clean and textbook — question it. Real market moves are messy."},
{icon:"🔍",title:"Verification Checklist",body:"Before calling any move a real Change of Character: 1) Is there a key HTF level being broken? 2) Is it inside a Kill Zone? 3) Does a correlated market confirm (SMT)? 4) Was there a genuine stop purge (visible wick or gap)? 5) Did the higher timeframe candle CLOSE through the level? All five should be yes for a real CoC. Missing even two makes it suspect.",donna:"1H CoC in an HTF premium zone = sell signal dressed as a buy. Check the HTF first. Always first."},
{icon:"🔄",title:"Trading the False CoC",body:"The False CoC is itself a tradable setup — and a powerful one. It's essentially a Turtle Soup at a structural level. Price appears to break, traps informed traders who go long (or short), collects their stops, then violently reverses. If you've identified it correctly: the Model 1 rejection candle after the false break is your entry, and your target is the original structural level that the false CoC was supposed to break.",donna:"The FCoC traps smart traders. If you can identify it — you get to trade against them. That's the sweetest trade in CRT."}
],q:[
{q:"A 1H candle closes cleanly above a key resistance level at 1.0900 during Asian session with no obvious stop purge. This is most likely:",type:"mc",opts:["A real Change of Character — buy","A False CoC — question it: no Kill Zone, no purge","No Structure — ignore it","A Breaker Block forming"],a:1,exp:"Asian session + no stop purge + clean (not violent) break = False CoC red flags. Real CoC is violent and occurs during Kill Zones with visible stop purging."},
{q:"What distinguishes a Real Change of Character from a False one?",type:"mc",opts:["Real CoC has a bigger candle","Real CoC is violent, has stop purge, Kill Zone backing, HTF alignment","Real CoC happens on higher timeframes only","False CoC occurs on bearish moves only"],a:1,exp:"Real CoC is violent, messy, accompanied by a visible stop purge, happens during a Kill Zone, and has clear HTF backing. False CoC looks clean and textbook but lacks all of these supporting factors."},
{q:"A 1H Change of Character in an HTF premium zone (overbought area) is most likely:",type:"mc",opts:["A genuine bullish signal","A sell signal dressed as a buy — likely False CoC","Neutral until confirmed by Daily","A valid buy with reduced size"],a:1,exp:"A 1H CoC in an HTF premium zone = the classic False CoC trap. The HTF premium zone makes a genuine bullish break unlikely. Price is more likely collecting retail long entries before reversing."},
{q:"The False CoC can itself be traded as a setup, similar to a Turtle Soup.",type:"tf",a:true,exp:"True. The False CoC is essentially a Turtle Soup at a structural level. Once identified, the Model 1 rejection after the false break is your entry, and the original level is your target. It's a high-probability contrarian trade."},
{q:"For a genuine Change of Character, how many of the 5 verification criteria should ideally be met?",type:"mc",opts:["At least 2","At least 3","At least 4","All 5"],a:3,exp:"All 5 criteria should be met for a high-probability genuine CoC: HTF level being broken, Kill Zone timing, correlated market confirmation, genuine stop purge, and HTF candle close through the level. Missing even two makes it suspect."}
]},
19:{s:[
{icon:"📈",title:"Range Rules",body:"Trading ranges have three rules: Buy near the low, sell near the high, never trade the middle. The first breakout from a range is almost always fake — this is the Turtle Soup that precedes the real directional move. EUR/USD ranging between 1.0800 and 1.0920 for two weeks: the first breakout above 1.0920 is likely fake. Wait for the Turtle Soup, then trade the distribution back inside or the genuine break.",donna:"First breakout = almost always fake. The range is the spring. The Turtle Soup is the compression. The real move comes after."},
{icon:"🔄",title:"Range as Accumulation",body:"A range is not just a boring period of consolidation — it's Smart Money accumulating a massive position at the best possible prices. While retail traders get chopped up trading inside the range, institutions are quietly buying at the bottom and selling at the top, building the position that will create the next major trend. The range ends when they've accumulated enough to make the move.",donna:"Boring range = Smart Money shopping. When they're done shopping, price moves hard. The range tells you the direction — they're buying the bottom means the move will be up."},
{icon:"📐",title:"Range to Trend Transition",body:"The genuine break out of a range looks different from the fake one. Real breakout: decisive close above/below the range on increasing momentum, HTF backing, Kill Zone timing, and the corrective pullback after the break holds above the breakout level (former resistance becomes support). Fake breakout: aggressive move that immediately reverses, closes back inside, no HTF backing. Wait for the pullback after the real break — that's Entry 2.",donna:"Real break pulls back. Fake break reverses. If the 'breakout' never pulls back and tests the level it broke — be suspicious."}
],q:[
{q:"EUR/USD has been ranging 1.0800-1.0920 for three weeks. Price breaks above 1.0920 during Asian session, then immediately closes back inside at 1.0905. This is:",type:"mc",opts:["Real breakout — buy","Turtle Soup — likely the fake break from the range","Neutral — needs more time","Range expanding"],a:1,exp:"Asian session break that immediately closes back inside = Turtle Soup. The fake breakout from the range top. This is the manipulation before the real move (probably down, back toward 1.0800)."},
{q:"In a range, where should you look for trade entries?",type:"mc",opts:["The middle of the range","Above the highs","Near the low (to buy) or near the high (to sell)","Only on breakouts"],a:2,exp:"Range trading: buy near the low, sell near the high. The middle is no-man's land. Never trade the middle — that's where both sides lose."},
{q:"After a genuine range breakout to the upside, the first pullback back to the broken level should:",type:"mc",opts:["Break back below it — this shows the breakout failed","Hold above it — former resistance becomes support","Go all the way back to the range mid-point","Test it multiple times before confirming"],a:1,exp:"After a real breakout, the pullback to the broken level should hold — former resistance becomes support. This is Entry 2: the confirmation of the genuine break. If it breaks back inside, the breakout was fake."},
{q:"The first breakout from an established range is almost always the real move.",type:"tf",a:false,exp:"False. The first breakout from a range is almost always the fake move — the Turtle Soup. Wait for it to close back inside, then trade the real direction. Or wait for the fake to complete and the genuine break to follow."}
]},
20:{s:[
{icon:"🏗️",title:"Top-Down Always",body:"The complete process: Week of month → HTF narrative (Weekly/Daily bias) → Daily open position → Liquidity target → Kill Zone → Structural level → Entry candle. In that order. Always. If you start with 'I see a nice candle on the 1H,' you've already started wrong. The 1H candle is the last thing you look at. The first question is always: what week of the month is it and what is the Weekly narrative?",donna:"Entry is the last step. I will say this until you dream about it. Last. Step."},
{icon:"📋",title:"Four Things Before the Button",body:"Before you press the buy or sell button, you must know four things: 1) Where is your stop? (above/below the Model 1 wick — exact level). 2) Where is T1? (50% of the setup range — exact level). 3) Where is T2? (external liquidity target — exact level). 4) What % of your account are you risking? If you cannot answer all four in five seconds — you are not ready to enter.",donna:"Can't answer all four in five seconds? Close the chart. Come back when you can. The market will always be there tomorrow."},
{icon:"🔍",title:"The Weekly Narrative",body:"Every Sunday before the week opens, ask: what week of the month is this? Week 1 = accumulation, be patient. Week 2 = manipulation, do not trade breakouts. Week 3-4 = distribution, look for continuation entries. Then look at last week's high and low. Price will most likely take one of those levels this week. That's your weekly target. That's the context for every trade you take this week.",donna:"Sunday is not a day off. Sunday is when you map the week. Five minutes on Sunday beats five hours of confusion during the week."},
{icon:"✅",title:"The Pre-Trade Mental Checklist",body:"Before any entry, run this in your head: Is the HTF bias clear? Do I know my target? Am I inside a Kill Zone? Is there a structural level here? Do I see a Model 1 candle? Is my stop placed? Are my targets marked? Is my risk 1-2%? Eight questions. Eight yeses before you touch the button. One 'no' or 'not sure' = wait. The setup will come again. The blown account will not fix itself.",donna:"Eight yeses. Not seven. Eight. If you're at six and a half and entering anyway — that's how you lose."}
],q:[
{q:"What is the correct first step in top-down CRT analysis?",type:"mc",opts:["Find a good 1H entry candle","Check the 4H for structure","Determine the week of month and Weekly narrative","Draw key levels on the Daily"],a:2,exp:"Top-down analysis starts with the highest timeframe context. Week of month + Weekly narrative sets the overall bias. Everything below it works within this framework."},
{q:"Before pressing the entry button, which four things must you know?",type:"mc",opts:["Entry price, candle type, session, and pair","Stop level, T1 level, T2 level, and risk percentage","Trend direction, support, resistance, and volume","HTF bias, ITF structure, LTF entry, and news events"],a:1,exp:"The four pre-trade requirements: exact stop level, exact T1 (50%), exact T2 (external target), and risk percentage. If you can't answer all four instantly, you're not ready to enter."},
{q:"You can take a trade on Tuesday of Week 2 if the setup looks perfect.",type:"tf",a:false,exp:"False. Week 2 is manipulation week — the week of Turtle Soups and fake breakouts. Trading Week 2 breakouts like they're real is how you provide liquidity for the Week 3 distribution move. Be extra cautious in Week 2."},
{q:"In the top-down process, when should you look at the 1H chart for an entry candle?",type:"mc",opts:["First — to find the opportunity","After checking the 4H","After HTF bias, target identification, Kill Zone, and structural level are all confirmed","Any time — all timeframes are equal"],a:2,exp:"The 1H entry candle is the LAST step. After: weekly narrative, HTF bias, liquidity target identified, Kill Zone active, structural level present. Only then do you drop to the 1H for the entry."},
{q:"You know your HTF bias and target but you're not inside a Kill Zone. You should:",type:"mc",opts:["Enter anyway — HTF and target are enough","Wait for the Kill Zone — timing matters","Use a wider stop to compensate","Take a smaller position size"],a:1,exp:"Kill Zone timing is a requirement, not a preference. The same setup outside a Kill Zone has dramatically lower probability. Wait for the Kill Zone. The setup will either still be there or it will have already played out — either way, you made the right decision."}
]},
21:{s:[
{icon:"⚡",title:"Two Valid Entry Types Only",body:"Once in a trade, you should only be managing positions from two valid entry types: Model 1 close (the standard entry) or a genuine Change of Character close. These are the only two entry confirmations in CRT. Any other reason you entered — 'it looked strong,' 'I saw a pattern,' 'gut feeling' — means you're in a trade with no CRT backing. That's not a managed trade, that's gambling in progress.",donna:"If you can't tell me exactly WHY you entered in CRT terms — Model 1 or genuine CoC — you're not trading CRT. You're just trading."},
{icon:"🛑",title:"Why the Stop Never Moves",body:"Moving your stop away from the Model 1 wick — making it wider because price is getting close — is how good trades become account-destroying losses. Your stop is placed where it is because that's where the setup is invalidated. If price reaches that level, the setup is wrong. That's not bad luck — that's the market telling you the trade was incorrect. Accept it. Log it. Move on.",donna:"Every time you moved your stop and it saved the trade — the market taught you the wrong lesson. Every time you moved it and it doubled your loss — that was the right lesson."},
{icon:"💰",title:"The Mandatory Partial",body:"T1 at 50% is not a suggestion. It's not 'take it if price gets there easily.' It is mandatory every single trade. Here's why: the 50% partial funds your trading. Even when T2 doesn't hit, you're green. Even when price reverses after T1, you broke even or made money. Over 100 trades, always taking T1 creates consistent small gains that compound into a real edge. Skipping T1 'because it looks strong' is how you give back profits.",donna:"Always take T1. Your future self will thank you. The one time you skip it because it 'looks strong' will be the time it reverses hard. Always take T1."},
{icon:"📓",title:"The Journal Is the Real Edge",body:"The actual edge in trading is not a setup — it's data. Your journal tells you which sessions you lose most in, which emotional states preceded your worst trades, which setup types have the highest win rate for you specifically. Donna can see patterns in your journal that you can't see in the moment. FOMO trades at 3PM after a loss? That's a pattern. The journal catches it. You fix it.",donna:"Your journal is your coaching session. Every week, read the last 10 entries. I guarantee you'll see a pattern that's costing you money. Fix that pattern. That's the edge."}
],q:[
{q:"Your stop is placed correctly below the Model 1 wick. Price moves against you and approaches the stop. You:",type:"mc",opts:["Move the stop wider — give it more room","Close the trade manually — cut the loss","Let the stop do its job — don't touch it","Add to the position — average down"],a:2,exp:"The stop is where it is because that's where the setup is invalidated. Moving it is the most dangerous habit in trading. Let it do its job. If it triggers — the trade was wrong and you limited your loss. Correct."},
{q:"You've been using a trading journal for three months. The best use of that data is to:",type:"mc",opts:["Count win rate only","Find patterns in your mistakes — session, emotion, setup type — and systematically eliminate them","Show it to other traders","Delete old losing trades to focus on winners"],a:1,exp:"The journal's power is pattern recognition. Which sessions do you lose in most? What emotional state precedes your biggest losses? What setup types work for you? The data tells you what to fix specifically."},
{q:"You took T1 at 50%. Price continues toward T2. Then the Kiss of Death hits and triggers your stop at breakeven. This outcome is:",type:"mc",opts:["A loss — the trade failed","A win — T1 was taken","Breakeven — acceptable outcome","Should be avoided by moving stop away from breakeven"],a:2,exp:"Stopped at breakeven after T1 = breakeven trade. You made money on T1, gave it back on the stop, net zero. This is a perfectly acceptable outcome and exactly how the system is designed to work."},
{q:"Moving your stop wider when price approaches it is a valid risk management technique.",type:"tf",a:false,exp:"False. Moving your stop wider is the opposite of risk management — it's risk expansion. Your stop was placed where the trade is invalidated. Moving it means you're now holding an invalidated trade with more risk. This is how small losses become large ones."},
{q:"What is the primary behavioral pattern that causes the most losses in CRT traders?",type:"mc",opts:["Trading too many pairs","Using wrong indicators","Entering before T1 and moving stops — breaking the management rules","Trading in Asian session"],a:2,exp:"Rule violations during trade management — entering without full criteria, skipping T1, moving stops — cause the majority of losses. The setups are often correct. The management is what fails."}
]},
22:{s:[
{icon:"🏆",title:"The Universal Pattern",body:"Open. Key Level. Fake breakout. Real move. That is every significant price move in history on every asset on every timeframe. Weekly, Daily, 4H, 1H — same pattern, different speeds. Gold's 2024 run from $1,900 to $2,400? Open, key level at $2,000, fake break above, collection, real distribution up. S&P 500 every single morning? Open, key level, manipulation, real move. The pattern never changes.",donna:"Once you see this pattern everywhere, you can't unsee it. And you stop trading the noise and start trading the pattern. That's the shift."},
{icon:"🔄",title:"Fractals — Every Timeframe",body:"The CRT pattern is fractal. The Weekly pattern contains the Daily pattern. The Daily contains the 4H. The 4H contains the 1H. When all three major timeframes are aligned in the same AMD phase simultaneously — Weekly in Distribution, Daily in Distribution, 4H in Distribution, 1H showing the Model 1 — that's the highest probability trade you will ever see. Rare. But unforgettable.",donna:"Three timeframe alignment is the unicorn. When you see it — size appropriately. Those trades pay for months of losses."},
{icon:"📊",title:"The 8-Loss Streak",body:"Here's the truth nobody tells you: every profitable trader has gone through at least one streak of 8 consecutive losses. It comes for everyone. Your edge doesn't disappear — variance does that. The question is not if it happens. The question is whether you're still in the game when it ends. 1-2% risk means an 8-loss streak is a 16% drawdown. Recoverable. At 5% risk per trade, it's a 40% drawdown. Career-ending.",donna:"The 8-loss streak is coming. I don't know when. But it's coming. 1-2% risk is what keeps you in the game when it does."},
{icon:"📝",title:"Documentation Separates the Profitable",body:"The difference between traders who eventually become profitable and traders who perpetually struggle is documentation. Profitable traders know their win rate, their average R, their best session, their worst emotional pattern. Struggling traders trade by feel. Donna can help you track this — but you have to log every trade. Every one. No exceptions. The shortcut in trading has one name: losses.",donna:"The shortcut has one name: losses. Document everything. Review weekly. That's the full system. Everything else is a detail."}
],q:[
{q:"The universal CRT pattern across all timeframes and assets is:",type:"mc",opts:["Up, consolidation, down, consolidation","Open, key level, fake breakout, real move","Accumulation, breakout, trend, reversal","Support, resistance, breakout, pullback"],a:1,exp:"Open, key level, fake breakout, real move. That's every significant price move in CRT. Same pattern on the 1H and on the Weekly. Same on Gold and on Nasdaq. The fractal never changes."},
{q:"Three timeframe AMD alignment (Weekly, Daily, 4H all in Distribution phase) signals:",type:"mc",opts:["Avoid the trade — too much confirmation is suspicious","The highest probability trade in CRT","A guaranteed win","Average probability — additional signals needed"],a:1,exp:"Three timeframe alignment is the highest probability setup in CRT. When Weekly, Daily, and 4H are all in the same phase pointing the same direction, the probability of the move completing is maximized."},
{q:"A trader risking 5% per trade goes through an 8-loss streak. Their drawdown is approximately:",type:"mc",opts:["8%","24%","40%","60%"],a:2,exp:"8 consecutive losses at 5% risk = approximately 40% drawdown. At 1-2% risk, the same 8-loss streak is 8-16% — recoverable. 40% drawdown is psychologically and financially devastating for most traders."},
{q:"The shortcut to becoming profitable in trading is:",type:"mc",opts:["Finding the right indicators","Getting better entries","Losses — they are the unavoidable cost of real learning","Trading higher timeframes only"],a:2,exp:"The shortcut in trading has one name: losses. You learn most from your losing trades — if you document them. Profitable traders didn't find a shortcut. They paid the tuition in losses and documented what the losses taught them."},
{q:"You have completed all 22 chapters of the CHRONOS CRT Academy. You are now ready to:",type:"mc",opts:["Trade with full size immediately","Start with demo trading, log every trade, review with Donna weekly","Never lose again — you know the full system","Stop learning — the system is complete"],a:1,exp:"Completing the academy means you understand the framework. Now the real work begins: demo trading, logging every trade, reviewing with Donna, identifying your personal patterns. Knowledge without practice is not an edge."}
]}
},

{icon:"👋",title:"Hola. Soy Donna.",body:"Soy tu coach de accountability en el trading. No soy un servicio de señales, un chatbot, ni un sistema mágico. Estoy aquí para ayudarte a construir disciplina, aprender a leer el precio, y volverte consistente. Úsame en la pestaña CHAT cuando quieras hablar de una operación, pedir feedback, o simplemente pensar en voz alta.",donna:"Soy honesta, no hype. Vamos a trabajar."},
