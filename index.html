window.storage = {
  get: async (key) => {
    const v = localStorage.getItem(key);
    if (v === null) throw new Error('Not found');
    return { key, value: v };
  },
  set: async (key, value) => {
    localStorage.setItem(key, typeof value === 'string' ? value : JSON.stringify(value));
    return { key, value };
  },
  delete: async (key) => { localStorage.removeItem(key); return { key, deleted: true }; },
  list: async (prefix) => {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!prefix || k.startsWith(prefix)) keys.push(k);
    }
    return { keys, prefix };
  }
};
</script>

  const sys = `You generate lesson content for a CRT trading education app called Donna. Return ONLY valid JSON — no markdown, no preamble, no explanation.

FORMAT:
{"slides":[{"icon":"1 emoji","title":"max 5 words","body":"2-4 sentences. MUST include a specific real market example with actual numbers (Gold at 2010, Bitcoin at 65000, EUR/USD at 1.0850, Nasdaq at 17000 etc).","donna":"1-2 sentences in Donna's voice — warm, direct, slightly funny."}],"quiz":[{"q":"Scenario question testing understanding NOT definitions","type":"mc","opts":["A","B","C","D"],"a":0,"exp":"2-3 sentence explanation"}]}

RULES:
- EVERY slide body must include a real example with specific price numbers
- Quiz questions MUST test scenario understanding, not memorized definitions
- Mix mc and tf types. For tf: {"q":"statement","type":"tf","a":true,"exp":"..."}
- ${chapter.id <= 2 ? "AVOID CRT jargon: no 'Smart Money','Turtle Soup','Model 1','AMD','Kill Zone','Liquidity'. Use plain English: 'fake breakout','real move','key level','the candle close'" : "Use CRT terminology naturally"}
- ${isES ? "Generate ALL content in Spanish — natural conversational Mexican/Latin Spanish" : "Generate ALL content in English"}
- Generate EXACTLY ${cfg.slides} slides and ${cfg.minQ} quiz questions
- Return ONLY the JSON object. Nothing else.`;

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 3500,
      system: sys,
      messages: [{ role: "user", content: `Chapter ${chapter.id}: "${chapter.title}". Topic: ${chapter.desc}. Language: ${lang}. Level ${chapter.level} (${cfg.label}): generate ${cfg.slides} slides and ${cfg.minQ} questions.` }]
    })
  });

  if (!res.ok) throw new Error(`API ${res.status}`);
  const data   = await res.json();
  const text   = data.content?.[0]?.text || "";
  const clean  = text.replace(/```json|```/g, "").trim();
  const parsed = JSON.parse(clean);
  await window.storage.set(cacheKey, JSON.stringify(parsed));
  return parsed;
}

/* ═══════════════════════════════════════════════════

function buildPrompt(p, stats) {
  const isAdv = p.mode === "advanced", isES = p.lang === "es";
  const kzInfo = isES
    ? "Kill Zones: Londres 1-5 AM hora NY · Nueva York 7-11 AM hora NY (NYSE abre 9:30 AM = mayor inyección de liquidez y momento típico de manipulación/Candle 2) · NY PM 1:30-4 PM"
    : "Kill Zones: London 1-5 AM New York time · New York 7-11 AM New York time (NYSE opens 9:30 AM = biggest liquidity injection and most common time for the Candle 2 Manipulation/Turtle Soup) · NY PM 1:30-4 PM";
  const statsCtx = stats.total > 0
    ? `TRADER STATS: ${stats.total} trades. Win rate: ${Math.round(stats.wins/stats.total*100)}%. Best session: ${stats.bestSession||"TBD"}. Emotion pattern on losses: ${stats.worstEmotion||"TBD"}.`
    : "";
  const profileCtx = isAdv
    ? `TRADER: ${p.name}, Advanced. Candle: ${p.candle||"?"}. Process: ${p.process||"?"}. Challenge: ${p.challenge||"?"}.${statsCtx}`
    : `TRADER: ${p.name}, Beginner. Inspired by: ${p.inspiration||"?"}. Chart exp: ${p.chartExp||"none"}. Available: ${p.availability||"?"}.${statsCtx}`;
  const voice = isAdv
    ? "VOICE — ADVANCED: 2-3 sentences max. Peer-level. No explaining basics unless asked. Sharp and funny when sloppy. First response to any setup = a question. Push back before validating. Bring up stats when relevant. End with challenge or question."
    : "VOICE — BEGINNER: 3 sentences max. Warm — like a knowledgeable older sibling. One idea per message. One analogy per concept. Celebrate understanding. Correct kindly with the WHY. End with an engaging question. Explain every CRT term first time used.";
  const chartP = `CHART ANALYSIS: 1.Identify timeframe/asset/structure(trend-range-choppy). 2.CRT read: Turtle Soups? Model 1? Key levels (FVG/OB/Breaker)? Liquidity above/below? 3.Name ONE strongest structural feature and WHY. 4.Name ONE risk or weakness. 5.Advanced: challenge first. Beginner: teach from the image. ALWAYS end: "What are you seeing here?" Never confirm a trade.`;
  const crt = `CRT: Two outcomes only — Turtle Soup(wick beyond,closes inside=fake) or True Break(close beyond=real). Closes=intention,Wicks=deception. Rule1: never buy above old high/sell below old low. AMD: C1=Accumulation,C2=Manipulation,C3=Distribution(your trade). Model 1: thick candle,nails old high/low,closes inside,that close=trigger,stop=above/below wick(fixed),T1=50%(mandatory),T2=opposite extreme. KoD=always before target. 5 entries never backward. TF alignment: HTF=WHY,ITF=WHAT,LTF=WHEN/WHERE. SMT=divergence+Model1. ${kzInfo}. Risk=1-2%max.`;
  return `You are Donna — CRT trading accountability mentor.\n${isES?"Responde en español conversacional.":"Respond in English."}\n${profileCtx}\n${voice}\n${chartP}\n${crt}\nNEVER give financial advice. Never say take a specific trade.`;
}

/* ═══════════════════════════════════════════════════
   COMPONENT: LessonModal  (AI-generated, variable depth)
═══════════════════════════════════════════════════ */
function LessonModal({ chapter, lang, onClose, onComplete }) {
  const t = T[lang];
  const [data, setData]       = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError]     = useState(false);
  const [phase, setPhase]     = useState("slides");
  const [si, setSi]           = useState(0);
  const [qi, setQi]           = useState(0);
  const [ans, setAns]         = useState(null);
  const [ok, setOk]           = useState(null);
  const [score, setScore]     = useState(0);
  const [ak, setAk]           = useState(0);

  const load = useCallback(async () => {
    setLoading(true); setError(false);
    try { const d = await generateLesson(chapter, lang); setData(d); }
    catch(e) { setError(true); }
    setLoading(false);
  }, [chapter, lang]);

  useEffect(() => { load(); }, [load]);

  const slides = data?.slides || [], quiz = data?.quiz || [];
  const total  = slides.length + quiz.length;
  const cur    = phase === "slides" ? si : slides.length + qi;
  const prog   = total > 0 ? cur / total * 100 : 0;
  const slide  = slides[si], q = quiz[qi];
  const cfg    = COMPLEXITY[chapter.level] || COMPLEXITY[1];
  const lvlColor = LVL_COLOR[chapter.level] || RED;

  const confetti = Array.from({ length: 12 }, (_, i) => ({
    x: Math.random()*100, c:[RED,GREEN,GOLD,"#A78BFA","#06B6D4"][i%5], d:Math.random()*.8, s:6+Math.random()*8
  }));

  const handleAnswer = (a) => {
    if (ans !== null) return;
    const c = a === q.a;
    setAns(a); setOk(c);
    if (c) { Sounds.correct(); setScore(s => s+1); } else Sounds.wrong();
  };

  const goNext = () => {
    setAk(k => k+1);
    if (phase === "slides") {
      if (si < slides.length-1) setSi(i => i+1);
      else { setPhase("quiz"); setQi(0); setAns(null); setOk(null); }
    } else if (qi < quiz.length-1) {
      setQi(i => i+1); setAns(null); setOk(null);
    } else { setPhase("done"); Sounds.complete(); }
  };

  return (
    <div style={{ position:"absolute", inset:0, zIndex:995, background:"#000", display:"flex", flexDirection:"column" }} className="slide-in">
      {/* Top bar */}
      <div style={{ padding:"12px 16px 10px", display:"flex", alignItems:"center", gap:12, borderBottom:`1px solid ${DARK}`, flexShrink:0 }}>
        <button onClick={onClose} style={{ background:"none", border:"none", cursor:"pointer", color:MUTED, fontSize:22, lineHeight:1 }}>✕</button>
        <div style={{ flex:1, height:7, background:DARK2, borderRadius:4, overflow:"hidden" }}>
          <div style={{ height:"100%", width:`${prog}%`, background:RED, borderRadius:4, transition:"width .4s" }} />
        </div>
        {!loading && !error && (
          <span style={{ fontSize:12, color:MUTED, fontWeight:600 }}>
            {phase==="slides" ? `${si+1}/${slides.length}` : `Q${qi+1}/${quiz.length}`}
          </span>
        )}
      </div>
      {/* Chapter badge — shows level + variable depth */}
      <div style={{ background:`${lvlColor}11`, borderBottom:`1px solid ${lvlColor}22`, padding:"6px 16px", display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
        <span style={{ fontSize:16 }}>{chapter.icon}</span>
        <span style={{ fontFamily:"'Sora',sans-serif", fontWeight:700, fontSize:13 }}>{chapter.title}</span>
        <span style={{ marginLeft:"auto", fontSize:11, color:MUTED, background:DARK, padding:"2px 8px", borderRadius:10 }}>
          {LVL_EMOJI[chapter.level]} {cfg.label} · {cfg.slides} slides · {cfg.minQ}Q
        </span>
      </div>
      {/* Content */}
      <div style={{ flex:1, overflowY:"auto", WebkitOverflowScrolling:"touch", padding:16, minHeight:0 }}>
        {loading && (
          <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"100%", gap:16 }}>
            <DAvatar size={52} online />
            <div style={{ fontSize:14, color:MUTED, textAlign:"center" }}>{lang==="es"?"Preparando tu lección...":"Building your lesson..."}</div>
            <div style={{ display:"flex", gap:6 }}>
              {[0,1,2].map(i => <div key={i} style={{ width:8, height:8, borderRadius:"50%", background:RED, animation:`dot 1.2s ease-in-out ${i*.2}s infinite` }} />)}
            </div>
          </div>
        )}
        {error && (
          <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"100%", gap:16 }}>
            <div style={{ fontSize:40 }}>⚠️</div>
            <div style={{ fontSize:14, color:MUTED, textAlign:"center" }}>{lang==="es"?"No se pudo cargar. Toca para reintentar.":"Couldn't load. Tap to retry."}</div>
            <button onClick={load} style={{ padding:"12px 24px", borderRadius:12, background:RED, border:"none", cursor:"pointer", fontFamily:"'Sora',sans-serif", fontWeight:700, fontSize:14, color:"#fff" }}>Retry</button>
          </div>
        )}
        {!loading && !error && data && (
          <div key={ak} className="fade-up">
            {/* SLIDE PHASE */}
            {phase==="slides" && slide && (
              <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                <div style={{ display:"flex", alignItems:"flex-end", gap:10 }}>
                  <DAvatar size={46} online />
                  <div style={{ background:DARK, border:`1px solid ${DARK2}`, borderRadius:"18px 18px 18px 4px", padding:"12px 14px", flex:1, fontSize:14, lineHeight:1.65, color:"#D1D1D6" }}>
                    {slide.donna || slide.d}
                  </div>
                </div>
                <div style={{ background:"#111", border:`1px solid ${DARK2}`, borderRadius:20, padding:22 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
                    <span style={{ fontSize:28 }}>{slide.icon}</span>
                    <h3 style={{ fontFamily:"'Sora',sans-serif", fontWeight:800, fontSize:18, color:"#fff" }}>{slide.title||slide.t}</h3>
                  </div>
                  <p style={{ fontSize:15, color:"#D1D1D6", lineHeight:1.7 }}>{slide.body||slide.b}</p>
                </div>
              </div>
            )}
            {/* QUIZ PHASE */}
            {phase==="quiz" && q && (
              <div style={{ display:"flex", flexDirection:"column", gap:14 }} className={ans!==null?(ok?"correct-flash":"wrong-shake"):""}>
                <div style={{ background:"#111", borderRadius:16, padding:16, border:`1px solid ${DARK2}` }}>
                  <div style={{ fontSize:10, fontWeight:700, color:RED, letterSpacing:2.5, marginBottom:10 }}>{t.quizTitle}</div>
                  <p style={{ fontSize:15, fontWeight:600, lineHeight:1.6, color:"#fff" }}>{q.q}</p>
                </div>
                {q.type==="tf" ? (
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                    {[{val:true,label:"TRUE",c:GREEN},{val:false,label:"FALSE",c:RED}].map(opt => {
                      const sel=ans===opt.val, ir=opt.val===q.a;
                      const bg=ans!==null?(ir?"rgba(48,209,88,.14)":sel?"rgba(232,37,60,.14)":"transparent"):"transparent";
                      const br=ans!==null?(ir?GREEN:sel?RED:DARK2):DARK2;
                      return (
                        <button key={String(opt.val)} onClick={() => handleAnswer(opt.val)}
                          style={{ padding:"20px 12px", borderRadius:16, background:bg, border:`2px solid ${br}`, cursor:ans!==null?"default":"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:8 }}>
                          <div style={{ width:44, height:44, borderRadius:13, background:ans!==null?(ir?GREEN:sel?RED:DARK2):DARK2, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20 }}>
                            {ans!==null&&ir?"✓":ans===opt.val&&!ir?"✗":opt.val?"✓":"✗"}
                          </div>
                          <span style={{ fontFamily:"'Sora',sans-serif", fontWeight:900, fontSize:18, color:ans!==null?(ir?GREEN:sel?RED:"#fff"):opt.c }}>{opt.label}</span>
                        </button>
                      );
                    })}
                  </div>
                ) : (
                  <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                    {(q.opts||[]).map((opt,i) => {
                      const sel=ans===i, ir=i===q.a;
                      const bg=ans!==null?(ir?"rgba(48,209,88,.13)":sel?"rgba(232,37,60,.13)":"transparent"):"transparent";
                      const br=ans!==null?(ir?GREEN:sel?RED:DARK2):DARK2;
                      return (
                        <button key={i} onClick={() => handleAnswer(i)}
                          style={{ padding:"13px 15px", borderRadius:14, background:bg, border:`2px solid ${br}`, cursor:ans!==null?"default":"pointer", display:"flex", alignItems:"center", gap:12, textAlign:"left", opacity:ans!==null&&!ir&&!sel?.4:1 }}>
                          <div style={{ width:30, height:30, borderRadius:9, background:ans!==null?(ir?GREEN:sel?RED:DARK2):DARK2, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:13, color:"#fff", flexShrink:0 }}>
                            {ans!==null&&ir?"✓":ans===i&&!ir?"✗":String.fromCharCode(65+i)}
                          </div>
                          <span style={{ fontSize:14, color:"#fff", fontWeight:500 }}>{opt}</span>
                        </button>
                      );
                    })}
                  </div>
                )}
                {ans !== null && (
                  <div className="fade-up" style={{ background:ok?"rgba(48,209,88,.1)":"rgba(232,37,60,.1)", border:`1px solid ${ok?GREEN:RED}44`, borderRadius:14, padding:14 }}>
                    <div style={{ fontFamily:"'Sora',sans-serif", fontWeight:700, fontSize:13, color:ok?GREEN:RED, marginBottom:6 }}>
                      {ok?(lang==="es"?"Exacto.":"Exactly."):(lang==="es"?"No del todo:":"Not quite:")}
                    </div>
                    <p style={{ fontSize:13, color:"#D1D1D6", lineHeight:1.65 }}>{q.exp}</p>
                  </div>
                )}
              </div>
            )}
            {/* DONE SCREEN */}
            {phase==="done" && (
              <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"32px 16px", textAlign:"center", position:"relative", overflow:"hidden", minHeight:300 }}>
                {confetti.map((c,i) => <div key={i} style={{ position:"absolute", top:"-10%", left:`${c.x}%`, width:c.s, height:c.s, background:c.c, borderRadius:2, animation:`confetti 2s ease ${c.d}s both` }} />)}
                <div className="celebrate" style={{ fontSize:52, marginBottom:16 }}>🏆</div>
                <h2 style={{ fontFamily:"'Sora',sans-serif", fontWeight:900, fontSize:24, marginBottom:8 }}>{t.chDone}</h2>
                <p style={{ color:MUTED, fontSize:15, marginBottom:8 }}><strong style={{ color:"#fff" }}>{chapter.title}</strong></p>
                <div style={{ padding:"10px 20px", borderRadius:20, background:`rgba(232,37,60,.12)`, border:`1px solid ${RED}44`, fontSize:14, color:RED, fontWeight:700, marginBottom:24 }}>
                  {t.chScore(score, quiz.length)}
                </div>
                <button onClick={() => onComplete(chapter.id)}
                  style={{ padding:"16px 48px", borderRadius:14, background:RED, border:"none", cursor:"pointer", fontFamily:"'Sora',sans-serif", fontWeight:800, fontSize:17, color:"#fff" }}>
                  {lang==="es"?"Continuar →":"Continue →"}
                </button>
              </div>
            )}
          </div>
        )}
      </div>
      {/* Bottom CTA */}
      {!loading && !error && phase!=="done" && (
        <div style={{ padding:"12px 16px 20px", borderTop:`1px solid ${DARK}`, flexShrink:0 }}>
          {phase==="slides"
            ? <button onClick={goNext} style={{ width:"100%", padding:15, borderRadius:14, background:RED, border:"none", cursor:"pointer", fontFamily:"'Sora',sans-serif", fontWeight:800, fontSize:16, color:"#fff" }}>
                {si<slides.length-1?t.lessonContinue:t.lessonStart}
              </button>
            : ans!==null&&<button onClick={goNext} style={{ width:"100%", padding:15, borderRadius:14, background:ok?GREEN:RED, border:"none", cursor:"pointer", fontFamily:"'Sora',sans-serif", fontWeight:800, fontSize:16, color:ok?"#000":"#fff" }}>
                {qi<quiz.length-1?t.nextQ:t.finishCh}
              </button>
          }
        </div>
      )}
    </div>
  );
}

            {[["🔥",0,"STREAK"],["⚡",xp,"XP"],["🏆",Math.floor(completed.size/3)+1,"LEVEL"]].map(([ic,v,lb]) => (
              <div key={lb} style={{ textAlign:"center" }}>
                <div style={{ fontSize:18 }}>{ic}</div>
                <div style={{ fontFamily:"'Sora',sans-serif", fontWeight:800, fontSize:16 }}>{v}</div>
                <div style={{ fontSize:10, color:MUTED }}>{lb}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{ background:"rgba(245,158,11,.1)", border:"1px solid rgba(245,158,11,.2)", borderRadius:14, padding:"12px 14px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <span style={{ fontSize:26 }}>🔥</span>
            <div>
              <div style={{ fontFamily:"'Sora',sans-serif", fontWeight:700, fontSize:14 }}>{lang==="es"?"Racha Diaria":"Daily Streak"}</div>
              <div style={{ fontSize:12, color:MUTED }}>{lang==="es"?"Estudia un capítulo hoy":"Study a chapter today to keep it"}</div>
            </div>
          </div>
          <div style={{ fontFamily:"'Sora',sans-serif", fontWeight:900, fontSize:28, color:GOLD }}>0</div>
        </div>
      </div>
      {/* Learning Path */}
      <div style={{ padding:"20px 16px 50px" }}>
        <div style={{ fontSize:11, fontWeight:700, color:MUTED, letterSpacing:2, textAlign:"center", marginBottom:16 }}>
          {lang==="es"?"RUTA DE APRENDIZAJE":"LEARNING PATH"}
        </div>
        {/* Level legend */}
        <div style={{ display:"flex", gap:8, justifyContent:"center", marginBottom:20 }}>
          {[1,2,3].map(lv => {
            const cfg = COMPLEXITY[lv];
            return (
              <div key={lv} style={{ display:"flex", alignItems:"center", gap:4, padding:"4px 10px", borderRadius:20, background:`${LVL_COLOR[lv]}15`, border:`1px solid ${LVL_COLOR[lv]}33` }}>
                <span style={{ fontSize:12 }}>{LVL_EMOJI[lv]}</span>
                <span style={{ fontSize:10, fontWeight:700, color:LVL_COLOR[lv] }}>{cfg.label}</span>
                <span style={{ fontSize:10, color:MUTED }}>{cfg.slides}s</span>
              </div>
            );
          })}
        </div>
        {/* Chapter cards */}
        {CHAPTERS.map((ch, i) => {
          const done    = completed.has(ch.id);
          const current = !done && (i===0 || completed.has(CHAPTERS[i-1]?.id));
          const locked  = !done && !current;
          const isLeft  = i % 2 === 0;
          const bc      = done ? RED : current ? RED : DARK2;
          // FIX: was L[ch.id]?.quiz?.length — now uses COMPLEXITY config
          const cfg     = COMPLEXITY[ch.level] || COMPLEXITY[1];
          const lc      = LVL_COLOR[ch.level] || RED;

          return (
            <div key={ch.id} style={{ display:"flex", flexDirection:"column", alignItems:isLeft?"flex-start":"flex-end" }}>
              {i > 0 && (
                <div style={{ width:2.5, height:22, background:completed.has(CHAPTERS[i-1]?.id)?RED:DARK2, marginLeft:isLeft?"22%":"auto", marginRight:!isLeft?"22%":"auto", transition:"background .3s" }} />
              )}
              <div onClick={() => !locked && onOpen(ch)}
                className={current?"pulse":""}
                style={{ width:"74%", padding:"13px 14px", borderRadius:18, background:current?"rgba(232,37,60,.07)":done?"rgba(232,37,60,.06)":"#111", border:`1.5px solid ${bc}`, display:"flex", alignItems:"center", gap:12, opacity:locked?.38:1, cursor:locked?"default":"pointer" }}>
                <div style={{ width:48, height:48, borderRadius:14, flexShrink:0, background:done?RED:current?"rgba(232,37,60,.15)":DARK, display:"flex", alignItems:"center", justifyContent:"center", fontSize:22 }}>
                  {locked?"🔒":done?"✅":ch.icon}
                </div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:10, fontWeight:700, color:current||done?RED:MUTED, letterSpacing:1.5 }}>CH {String(ch.id).padStart(2,"0")}</div>
                  <div style={{ fontFamily:"'Sora',sans-serif", fontWeight:700, fontSize:13, color:locked?MUTED:"#fff", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", marginTop:1 }}>{ch.title}</div>
                  <div style={{ fontSize:12, color:MUTED, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", marginTop:2 }}>{ch.sub}</div>
                </div>
                <div style={{ flexShrink:0, display:"flex", flexDirection:"column", gap:3, alignItems:"flex-end" }}>
                  {current && <div style={{ background:RED, borderRadius:8, padding:"3px 8px", fontSize:12, fontWeight:700, color:"#fff" }}>▶</div>}
                  {/* Shows correct slide count per level */}
                  <div style={{ background:`${lc}20`, border:`1px solid ${lc}44`, borderRadius:8, padding:"3px 8px", fontSize:11, color:lc, fontWeight:700 }}>{cfg.slides}s</div>
                  <div style={{ background:DARK, borderRadius:8, padding:"3px 8px", fontSize:11, color:MUTED }}>{cfg.minQ}Q</div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Paywall({ lang, onClose }) {

  return (
    <div style={{ position:"absolute", inset:0, zIndex:980, background:"#000", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"24px 20px", gap:20 }}>

      <div style={{ fontFamily:"'Sora',sans-serif", fontWeight:900, fontSize:24, textAlign:"center", lineHeight:1.3 }}>{t.paywallTitle}</div>

      <button style={{ width:"100%", maxWidth:340, padding:17, borderRadius:14, background:RED, border:"none", cursor:"pointer", fontFamily:"'Sora',sans-serif", fontWeight:800, fontSize:17, color:"#fff" }}>
        {t.upgrade}
      </button>
      <button onClick={onClose} style={{ background:"none", border:"none", cursor:"pointer", fontSize:14, color:MUTED, padding:"8px 0" }}>{t.later}</button>

}

/* ═══════════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════════ */
function App() {
  const [phase, setPhase]         = useState("onboard");
  const [nameInput, setName]      = useState("");
  const [selLang, setSelLang]     = useState("en");
  const [selMode, setSelMode]     = useState(null);
  const [profile, setProfile]     = useState({});
  const [tab, setTab]             = useState("chat");
  const [msgs, setMsgs]           = useState([]);
  const [input, setInput]         = useState("");
  const [loading, setLoading]     = useState(false);
  const [imgData, setImgData]     = useState(null);
  const [imgPreview, setImgPrev]  = useState(null);
  const [pqStep, setPqStep]       = useState(0);
  const [showCL, setShowCL]       = useState(false);
  const [clChecked, setClChecked] = useState(new Set());
  const [flowState, setFlow]      = useState(null);
  const [activeJ, setActiveJ]     = useState(null);
  const [journal, setJournal]     = useState([]);
  const [stats, setStats]         = useState({ total:0, wins:0, losses:0, be:0, bestSession:null, worstEmotion:null });
  const [notif, setNotif]         = useState(null);
  const [completedCh, setCompletedCh] = useState(new Set());
  const [openChapter, setOpenChapter] = useState(null);
  const [apiError, setApiError]   = useState(null);
  const [msgCount, setMsgCount]   = useState(0);
  const [showPaywall, setShowPaywall] = useState(false);

  const fileRef   = useRef(null);
  const bottomRef = useRef(null);
  const inputRef  = useRef(null);
  const notifRef  = useRef(null);

  const t    = T[profile.lang || selLang];
  const lang = profile.lang || selLang;

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:"smooth" }); }, [msgs, loading]);

  const showNotif = (msg) => {
    setNotif(msg); clearTimeout(notifRef.current);
    notifRef.current = setTimeout(() => setNotif(null), 4800);
  };

  const addMsg = useCallback((role, text, extra = {}) => {
    setMsgs(p => [...p, { role, text, id: Date.now()+Math.random(), ...extra }]);
  }, []);

  const startApp = () => {
    if (!nameInput.trim() || !selMode) return;
    const p = { name: nameInput.trim(), lang: selLang, mode: selMode };
    setProfile(p); setPhase("main");
    if (selMode === "advanced") {
      addMsg("donna", p.lang==="es"
        ? "La mayoría de los traders pierden porque siguen reglas que alguien más les vendió. Tú ya sabes que hay algo más detrás de cómo se mueve el precio.\n\nSoy Donna. No te digo qué operar. Te hago las preguntas que preferirías saltarte."
        : "Most traders lose because they follow rules someone else sold them. You already know there's something more behind how price moves.\n\nI'm Donna. I don't tell you what to trade. I ask the questions you'd rather skip.");
      setPqStep(1);
      setTimeout(() => addMsg("donna", p.lang==="es"?"¿Cuál es tu vela principal?":"What's your main candle?"), 900);
    } else {
      addMsg("donna", p.lang==="es"
        ? "La mayoría cree que el mercado es impredecible. No lo es.\n\nTiene una lógica — y yo te la enseño desde cero. Soy Donna."
        : "Most people think the market is unpredictable. It isn't.\n\nIt has a logic — and I'll teach you to see it from scratch. I'm Donna.");
      setPqStep(1);
      setTimeout(() => addMsg("donna", p.lang==="es"?"¿Qué te trajo hasta aquí?":"What brought you here?"), 900);
    }
  };

  const getPQPills = (step, mode, lang) => {
    const es = lang==="es", adv = mode==="advanced";
    if (step===1) return adv
      ? (es?["📅 Vela diaria","🕓 Vela de 4H","⏰ Vela de 1H","🌊 Las mezclo todas"]:["📅 Daily candle","🕓 4H candle","⏰ 1H candle","🌊 I mix them all"])
      : (es?["🎯 Libertad financiera","👀 Vi a otros hacerlo","💡 Perdí dinero","❤️ Más para mi familia","🤔 Curiosidad"]:["🎯 Financial freedom","👀 I saw others doing it","💡 I lost money","❤️ More for my family","🤔 Pure curiosity"]);
    if (step===2) return adv
      ? (es?["📊 Top-down desde HTF","📍 Encuentro nivel y espero","⚡ Reacciono a lo que veo","🔄 Construyendo proceso"]:["📊 Top-down from HTF","📍 I find a level and wait","⚡ I react to what I see","🔄 Still building my process"])
      : (es?["Nunca en mi vida","Los he visto pero confunden","He intentado leerlos","Los miro pero no entiendo"]:["Never in my life","I've seen them but they confuse me","I've tried reading them","I look but don't understand"]);
    return null;
  };

  const handlePQ = (pill) => {
    const step=pqStep, p=profile, adv=p.mode==="advanced";
    addMsg("user", pill);
    if (step===1) {
      setProfile(pr => adv?{...pr,candle:pill}:{...pr,inspiration:pill});
      setPqStep(2);
      setTimeout(() => addMsg("donna", adv
        ? (p.lang==="es"?"¿Y cuál es tu proceso antes de entrar?":"And what's your process before entering?")
        : (p.lang==="es"?"Me alegra que estés aquí. ¿Alguna vez has abierto un gráfico de trading?":"I'm glad you're here. Have you ever actually looked at a trading chart before?")), 400);
    } else if (step===2) {
      setProfile(pr => adv?{...pr,process:pill}:{...pr,chartExp:pill});
      setPqStep(0);
      setTimeout(() => addMsg("donna", adv
        ? (p.lang==="es"?"Anotado. Mándame setups, adjunta gráficos, pasa el checklist antes de cada entrada. ¿Qué tienes en el radar?":"Noted. Send me setups, attach charts, run the checklist before every entry. What's on the radar?")
        : (p.lang==="es"?"Perfecto. Empieza por la Academia — Capítulo 1. No te saltes nada. Cada pieza construye sobre la anterior.":"Perfect. Start in the Academy — Chapter 1. Don't skip anything. Each piece builds on the last.")), 500);
    }
  };

  const handleFlowPill = (pill) => {
    if (flowState==="jb-2") { setActiveJ(p=>({...p,direction:pill})); setFlow("jb-3"); setTimeout(()=>addMsg("donna",lang==="es"?"¿Por qué esta entrada? Una sola frase.":"Why this entry? One sentence."),300); return; }
    if (flowState==="jb-4") { setActiveJ(p=>({...p,feeling:pill})); setFlow("jb-5"); setTimeout(()=>addMsg("donna",lang==="es"?"¿En qué sesión?":"Which session?"),300); return; }
    if (flowState==="jb-5") { const e={...activeJ,session:pill,status:"open",ts:Date.now()}; setActiveJ(e); setJournal(p=>[...p,e]); setFlow(null); setTimeout(()=>addMsg("donna",lang==="es"?`📝 Registrado — ${pill}.`:`📝 Logged — ${pill} session.`),300); return; }
    if (flowState==="jd-1") { setActiveJ(p=>({...p,hit50:pill.includes("Yes")||pill.includes("Sí")})); setFlow("jd-2"); setTimeout(()=>addMsg("donna",lang==="es"?"¿Quisiste mover el stop?":"Did you want to move your stop?"),300); return; }
    if (flowState==="jd-2") { const m=pill.startsWith("No"); setActiveJ(p=>({...p,movedStop:!m})); setFlow(null); setTimeout(()=>addMsg("donna",m?(lang==="es"?"Bien. Stop fijo. El mercado que trabaje.":"Good. Fixed stop. Let the market do its job."):(lang==="es"?"Anotado. Mover el stop = abrir la puerta a las pérdidas.":"Noted. Moving your stop is how good trades become losses.")),300); return; }
    if (flowState==="ja-1") { const r=pill.includes("Win")||pill.includes("Ganada")?"win":pill.includes("Loss")||pill.includes("Pérdida")?"loss":"be"; setActiveJ(p=>({...p,result:r})); setStats(p=>({...p,total:p.total+1,wins:p.wins+(r==="win"?1:0),losses:p.losses+(r==="loss"?1:0),be:p.be+(r==="be"?1:0)})); setFlow("ja-2"); setTimeout(()=>addMsg("donna",lang==="es"?"¿Ratio R?":"R multiple?"),300); return; }
  };

  const handleJournalText = (text) => {
    if (flowState==="jb-1") { setActiveJ({asset:text}); setFlow("jb-2"); setTimeout(()=>addMsg("donna",lang==="es"?"¿Dirección?":"Direction?"),300); return true; }
    if (flowState==="jb-3") { setActiveJ(p=>({...p,reason:text})); setFlow("jb-4"); setTimeout(()=>addMsg("donna",lang==="es"?"¿Cómo te sientes?":"How are you feeling?"),300); return true; }
    if (flowState==="ja-2") { setActiveJ(p=>({...p,rMultiple:text})); setFlow("ja-3"); setTimeout(()=>addMsg("donna",lang==="es"?"Una cosa que hiciste bien.":"One thing you did right."),300); return true; }
    if (flowState==="ja-3") { setActiveJ(p=>({...p,didRight:text})); setFlow("ja-4"); setTimeout(()=>addMsg("donna",lang==="es"?"Una cosa que cambiarías.":"One thing you'd change."),300); return true; }
    if (flowState==="ja-4") { const e={...activeJ,wouldChange:text,status:"closed"}; setJournal(p=>p.map(j=>j.ts===e.ts?e:j)); setActiveJ(null); setFlow(null); return false; }
    return false;
  };

  const sendMessage = async (text, img = null) => {
    if (!text?.trim() && !img || loading) return;
    if (msgCount >= FREE_MSG_LIMIT) { setShowPaywall(true); return; }
    const userText = text?.trim() || (lang==="es"?"[Gráfico adjunto]":"[Chart attached]");
    if (text?.trim() && handleJournalText(text.trim())) { addMsg("user", text.trim()); setInput(""); return; }
    addMsg("user", userText, img?{img}:{});
    setInput(""); setImgData(null); setImgPrev(null); setLoading(true); setApiError(null); setMsgCount(c=>c+1);
    try {
      const sys = buildPrompt(profile, stats);
      const history = msgs.slice(-14).map(m => {
        if (m.role==="donna") return { role:"assistant", content:m.text };
        if (m.img) { const b64=m.img.split(",")[1], mime=m.img.split(";")[0].split(":")[1]; return { role:"user", content:[{type:"image",source:{type:"base64",media_type:mime,data:b64}},{type:"text",text:m.text||(lang==="es"?"Analiza con CRT.":"Analyze with CRT.")}] }; }
        return { role:"user", content:m.text };
      });
      const cur = img ? [{type:"image",source:{type:"base64",media_type:img.split(";")[0].split(":")[1],data:img.split(",")[1]}},{type:"text",text:userText}] : userText;
      history.push({ role:"user", content:cur });
      const res = await fetch("/api/chat", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:800, system:sys, messages:history }) });
      if (!res.ok) { const ed=await res.json().catch(()=>({})); throw new Error(ed.error?.message||`API ${res.status}`); }
      const data  = await res.json();
      const reply = data.content?.[0]?.text;
      if (!reply) throw new Error("Empty response");
      addMsg("donna", reply);
    } catch(e) { setApiError(e.message); addMsg("donna", DONNA.fallback(lang, profile.mode)); }
    setLoading(false);
  };

  const handleSend = () => { imgData ? sendMessage(input, imgData) : sendMessage(input); };

  const triggerChecklist = () => { setClChecked(new Set()); setShowCL(true); };

  // FIX: was gradeComment(grade, lang) — now correctly DONNA.gradeComment()
  const onCLConfirm = (grade) => {
    setShowCL(false); setFlow("jb-1");
    addMsg("donna", lang==="es"
      ? `${grade} — ${DONNA.gradeComment(grade, lang)}\n\nVamos a registrarlo. ¿Qué activo es?`
      : `${grade} — ${DONNA.gradeComment(grade, lang)}\n\nLet's log it. What's the asset?`);
  };

  const getFlowPills = (fs) => {
    const es = lang==="es";
    if (fs==="jb-2") return es?["📈 Alcista","📉 Bajista"]:["📈 Bullish","📉 Bearish"];
    if (fs==="jb-4") return es?["😌 Calmado","💪 Confiado","😰 Ansioso","😤 FOMO"]:["😌 Calm","💪 Confident","😰 Anxious","😤 FOMO"];
    if (fs==="jb-5") return es?["🌅 Londres","🗽 NY Open","🌆 NY PM","⏰ Sin KZ"]:["🌅 London","🗽 NY Open","🌆 NY PM","⏰ No KZ"];
    if (fs==="jd-1") return es?["✅ Sí, tocó","⏳ Aún no"]:["✅ Yes, hit it","⏳ Not yet"];
    if (fs==="jd-2") return es?["No 💪","Sí... 😬"]:["No 💪","Yes... 😬"];
    if (fs==="ja-1") return es?["✅ Ganada","❌ Pérdida","➡️ Empate"]:["✅ Win","❌ Loss","➡️ Break Even"];
    return null;
  };

  const pqPills     = pqStep > 0 ? getPQPills(pqStep, profile.mode, lang) : null;
  const flowPills   = getFlowPills(flowState);
  const activePills = pqPills || flowPills;
  const defaultPills = !activePills && pqStep===0
    ? (lang==="es"?["¿Listo para operar?","Turtle Soup","Model 1","Revisar última operación"]:["Ready to trade?","Turtle Soup","Model 1","Review my last trade"])
    : null;
  const displayPills = activePills || defaultPills;

  const handlePillTap = (pill) => {
    if ((pill==="Ready to trade?"||pill==="¿Listo para operar?") && pqStep===0) { triggerChecklist(); return; }
    if (pqStep>0) { handlePQ(pill); return; }
    if (flowState) { handleFlowPill(pill); return; }
    sendMessage(pill);
  };

  const msgsLeft = FREE_MSG_LIMIT - msgCount;

  /* ── ONBOARDING ── */
  if (phase==="onboard") {
    const tO = T[selLang];
    return (
      <>
        <style>{CSS}</style>
        <div style={{ width:"100%", height:"100vh", background:"#000", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"24px 20px", maxWidth:430, margin:"0 auto", overflowY:"auto" }}>
          <div className="fade-up" style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:10, marginBottom:28 }}>
            <CandleIcon />
            <h1 style={{ fontFamily:"'Sora',sans-serif", fontWeight:900, fontSize:32, letterSpacing:-.5 }}>Meet Donna.</h1>
            <p style={{ fontSize:14, color:MUTED, textAlign:"center" }}>{tO.tagline}</p>
          </div>
          <div className="fade-up" style={{ width:"100%", display:"flex", flexDirection:"column", gap:18 }}>
            <div>
              <div style={{ fontSize:11, fontWeight:700, color:MUTED, letterSpacing:1.2, marginBottom:8 }}>{tO.nameLabel}</div>
              <input autoFocus value={nameInput} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&nameInput.trim()&&selMode&&startApp()} placeholder={tO.namePH}
                style={{ width:"100%", padding:"14px 16px", borderRadius:12, background:DARK, border:`1.5px solid ${nameInput.trim()?"rgba(232,37,60,.6)":"transparent"}`, color:"#fff", fontSize:16, outline:"none", transition:"border-color .2s" }} />
            </div>
            <div>
              <div style={{ fontSize:11, fontWeight:700, color:MUTED, letterSpacing:1.2, marginBottom:8 }}>{tO.langLabel}</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                {[{code:"en",flag:"🇺🇸",label:"English"},{code:"es",flag:"🇪🇸",label:"Español"}].map(l => (
                  <button key={l.code} onClick={()=>setSelLang(l.code)}
                    style={{ padding:"16px 12px", borderRadius:12, background:selLang===l.code?"rgba(232,37,60,.12)":DARK, border:`1.5px solid ${selLang===l.code?RED:"transparent"}`, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:6, transition:"all .2s" }}>
                    <span style={{ fontSize:28 }}>{l.flag}</span>
                    <span style={{ fontFamily:"'Sora',sans-serif", fontWeight:700, fontSize:14, color:"#fff" }}>{l.label}</span>
                  </button>
                ))}
              </div>
            </div>
            <div>
              <div style={{ fontSize:11, fontWeight:700, color:MUTED, letterSpacing:1.2, marginBottom:8 }}>{tO.modeLabel}</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                {[{key:"beginner",icon:"📚",label:tO.beg,sub:tO.begSub},{key:"advanced",icon:"⚡",label:tO.adv,sub:tO.advSub}].map(m => (
                  <button key={m.key} onClick={()=>setSelMode(m.key)}
                    style={{ padding:"16px 12px", borderRadius:12, background:selMode===m.key?"rgba(232,37,60,.12)":DARK, border:`1.5px solid ${selMode===m.key?RED:"transparent"}`, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:6, transition:"all .2s" }}>
                    <span style={{ fontSize:26 }}>{m.icon}</span>
                    <span style={{ fontFamily:"'Sora',sans-serif", fontWeight:700, fontSize:14, color:"#fff" }}>{m.label}</span>
                    <span style={{ fontSize:12, color:MUTED }}>{m.sub}</span>
                  </button>
                ))}
              </div>
            </div>
            <button onClick={startApp} disabled={!nameInput.trim()||!selMode}
              style={{ width:"100%", padding:17, borderRadius:14, background:nameInput.trim()&&selMode?RED:"#2C2C2E", border:"none", cursor:nameInput.trim()&&selMode?"pointer":"not-allowed", fontFamily:"'Sora',sans-serif", fontWeight:800, fontSize:17, color:"#fff", transition:"background .25s", marginTop:4 }}>
              {tO.start}
            </button>
            <div style={{ textAlign:"center", display:"flex", flexDirection:"column", gap:4 }}>
              <span style={{ fontSize:12, color:"#48484A" }}>{tO.disclaimer}</span>
              <span style={{ fontSize:12, color:"#48484A" }}>{tO.privacy}</span>
            </div>
          </div>
        </div>
      </>
    );
  }

  /* ── MAIN APP ── */
  return (
    <>
      <style>{CSS}</style>
      <div style={{ width:"100%", height:"100vh", background:"#000", display:"flex", flexDirection:"column", maxWidth:430, margin:"0 auto", position:"relative", overflow:"hidden" }}>

        {openChapter && (
          <LessonModal chapter={openChapter} lang={lang} onClose={()=>setOpenChapter(null)}
            onComplete={(id) => {
              setCompletedCh(p=>new Set([...p,id]));
              const chTitle = CHAPTERS.find(c=>c.id===id)?.title;
              setOpenChapter(null);
              setTimeout(()=>showNotif(lang==="es"?`${chTitle} completado.`:`${chTitle} complete.`), 300);
            }} />
        )}

        {showPaywall && <Paywall lang={lang} onClose={()=>setShowPaywall(false)} />}

        {notif && (
          <div style={{ position:"absolute", top:0, left:0, right:0, zIndex:999, background:"rgba(28,28,30,.96)", backdropFilter:"blur(14px)", borderBottom:`1px solid ${DARK}`, padding:"12px 16px", display:"flex", alignItems:"center", gap:10, animation:"notifDrop 4.8s ease forwards", cursor:"pointer" }}>
            <DAvatar size={32} />
            <div>
              <div style={{ fontSize:12, fontWeight:700, color:RED }}>Donna</div>
              <div style={{ fontSize:13 }}>{notif}</div>
            </div>
          </div>
        )}

        {showCL && (
          <ChecklistModal lang={lang} checked={clChecked}
            onToggle={(id)=>setClChecked(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;})}
            onConfirm={onCLConfirm} onClose={()=>setShowCL(false)} />
        )}

        {/* Nav */}
        <div style={{ padding:"12px 16px 10px", display:"flex", alignItems:"center", justifyContent:"space-between", borderBottom:`1px solid ${DARK}`, flexShrink:0 }}>
          <div style={{ fontSize:12, color:MUTED, width:76 }}>{profile.mode==="advanced"?t.advMode:t.begMode}</div>
          <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:2 }}>
            <DAvatar size={36} online={tab==="chat"} />
            <span style={{ fontFamily:"'Sora',sans-serif", fontWeight:800, fontSize:14 }}>Donna</span>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <div style={{ display:"flex", background:DARK, borderRadius:20, padding:3 }}>
              {["beginner","advanced"].map(m => (
                <button key={m} onClick={()=>setProfile(p=>({...p,mode:m}))}
                  style={{ padding:"4px 9px", borderRadius:16, border:"none", cursor:"pointer", background:profile.mode===m?RED:"transparent", color:profile.mode===m?"#fff":MUTED, fontSize:11, fontWeight:700 }}>
                  {m==="beginner"?"BEG":"ADV"}
                </button>
              ))}
            </div>
            {tab==="chat" && (
              <button onClick={()=>{
                if(activeJ){setFlow("jd-1");addMsg("donna",lang==="es"?"¿Tocó el 50%?":"Did it hit the 50%?");}
                else{setFlow("jb-1");addMsg("donna",lang==="es"?"Vamos a registrar. ¿Qué activo es?":"Let's log it. What's the asset?");}
              }} style={{ width:32, height:32, borderRadius:"50%", background:DARK, border:"none", cursor:"pointer", color:"#fff", fontSize:20, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700 }}>+</button>
            )}
          </div>
        </div>

        {/* Trial banner */}
        {msgsLeft <= 5 && msgsLeft > 0 && (
          <div style={{ background:`${RED}15`, borderBottom:`1px solid ${RED}33`, padding:"6px 16px", display:"flex", alignItems:"center", justifyContent:"space-between", flexShrink:0 }}>
            <span style={{ fontSize:12, color:RED, fontWeight:600 }}>{t.trialLeft(msgsLeft)}</span>
          </div>
        )}

        {/* Content */}
        <div style={{ flex:1, overflow:"hidden", display:"flex", flexDirection:"column", minHeight:0 }}>
          {tab==="chat" && (
            <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden", minHeight:0 }}>
              <div style={{ flex:1, overflowY:"auto", WebkitOverflowScrolling:"touch", padding:"10px 14px", display:"flex", flexDirection:"column", minHeight:0 }}>
                {msgs.map(m => (
                  <div key={m.id} className="msg-in" style={{ display:"flex", flexDirection:m.role==="donna"?"row":"row-reverse", alignItems:"flex-end", gap:7, marginBottom:10 }}>
                    {m.role==="donna" && <DAvatar size={26} />}
                    <div style={{ maxWidth:"80%", display:"flex", flexDirection:"column", gap:3, alignItems:m.role==="donna"?"flex-start":"flex-end" }}>
                      {m.img && <img src={m.img} alt="" style={{ maxWidth:"100%", borderRadius:14, maxHeight:170, objectFit:"cover", border:`1px solid ${DARK}` }} />}
                      {m.text && (
                        <div style={{ padding:"10px 13px", borderRadius:m.role==="donna"?"18px 18px 18px 4px":"18px 18px 4px 18px", background:m.role==="donna"?DARK:"#0A84FF", color:"#fff", fontSize:15, lineHeight:1.58, whiteSpace:"pre-wrap", fontWeight:m.role==="user"?500:400 }}>
                          {m.text.split(/(\*\*.*?\*\*)/).map((p,i)=>p.startsWith("**")?<strong key={i}>{p.slice(2,-2)}</strong>:p)}
                        </div>
                      )}
                      <div style={{ fontSize:11, color:"#48484A", padding:"0 3px" }}>
                        {new Date(m.id).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}
                      </div>
                    </div>
                  </div>
                ))}
                {loading && (
                  <div className="msg-in" style={{ display:"flex", alignItems:"flex-end", gap:7, marginBottom:10 }}>
                    <DAvatar size={26} />
                    <div style={{ padding:"12px 16px", borderRadius:"18px 18px 18px 4px", background:DARK, display:"flex", gap:5, alignItems:"center" }}>
                      {[0,1,2].map(i=><div key={i} style={{ width:7, height:7, borderRadius:"50%", background:MUTED, animation:`dot 1.2s ease-in-out ${i*.18}s infinite` }} />)}
                    </div>
                  </div>
                )}
                {apiError && (
                  <div style={{ padding:"8px 12px", margin:"0 0 8px", background:"rgba(232,37,60,.1)", borderRadius:10, fontSize:12, color:"#FF6B6B", border:`1px solid ${RED}44` }}>
                    ⚠️ {apiError}
                  </div>
                )}
                <div ref={bottomRef} />
              </div>
              {displayPills && (
                <div style={{ padding:"0 14px 8px", display:"flex", gap:8, overflowX:"auto", flexShrink:0 }}>
                  {displayPills.map(p=>(
                    <button key={p} onClick={()=>handlePillTap(p)}
                      style={{ padding:"8px 14px", borderRadius:20, whiteSpace:"nowrap", background:"transparent", border:`1px solid ${DARK2}`, color:BLUE, fontSize:14, fontWeight:500, cursor:"pointer", flexShrink:0 }}>
                      {p}
                    </button>
                  ))}
                </div>
              )}
              {imgPreview && (
                <div style={{ padding:"0 14px 8px", display:"flex", alignItems:"center", gap:8 }}>
                  <div style={{ position:"relative" }}>
                    <img src={imgPreview} alt="" style={{ height:52, borderRadius:8, border:`1px solid ${RED}66` }} />
                    <button onClick={()=>{setImgData(null);setImgPrev(null);}} style={{ position:"absolute", top:-6, right:-6, width:18, height:18, borderRadius:"50%", background:"#EF4444", border:"none", cursor:"pointer", color:"#fff", fontSize:10, fontWeight:900, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
                  </div>
                  <span style={{ fontSize:12, color:GREEN, fontWeight:600 }}>{lang==="es"?"Gráfico adjunto ✓":"Chart attached ✓"}</span>
                </div>
              )}
              <div style={{ padding:"8px 12px 14px", borderTop:`1px solid ${DARK}`, display:"flex", gap:8, alignItems:"center", flexShrink:0 }}>
                <input type="file" ref={fileRef} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{setImgData(ev.target.result);setImgPrev(ev.target.result);};r.readAsDataURL(f);e.target.value="";}} accept="image/*" style={{ display:"none" }} />
                <button onClick={()=>fileRef.current?.click()} style={{ width:36, height:36, borderRadius:"50%", background:DARK, border:"none", cursor:"pointer", fontSize:18, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, color:MUTED }}>📷</button>
                <input ref={inputRef} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&handleSend()} placeholder={t.msgPH}
                  style={{ flex:1, padding:"10px 14px", borderRadius:22, background:DARK, border:"none", color:"#fff", fontSize:15, outline:"none" }} />
                <button onClick={handleSend} disabled={!input.trim()&&!imgData}
                  style={{ width:36, height:36, borderRadius:"50%", background:input.trim()||imgData?BLUE:DARK, border:"none", cursor:"pointer", color:"#fff", fontSize:16, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, transition:"background .2s" }}>▶</button>
              </div>
            </div>
          )}
          {tab==="academy" && <AcademyScreen profile={profile} completed={completedCh} onOpen={ch=>setOpenChapter(ch)} />}
        </div>

        {/* Tab Bar */}
        <div style={{ display:"flex", borderTop:`1px solid ${DARK}`, flexShrink:0 }}>
          {[{id:"chat",icon:"💬",label:t.tabChat},{id:"academy",icon:"📚",label:t.tabAcademy}].map(tb=>(
            <button key={tb.id} onClick={()=>setTab(tb.id)} style={{ flex:1, padding:"10px 8px 14px", background:"transparent", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3 }}>
              <span style={{ fontSize:24 }}>{tb.icon}</span>
              <span style={{ fontSize:11, fontWeight:700, color:tab===tb.id?RED:MUTED }}>{tb.label}</span>
              {tab===tb.id && <div style={{ width:5, height:5, borderRadius:"50%", background:RED }} />}
            </button>
          ))}
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
