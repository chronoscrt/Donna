    {icon:"📊",title:"What creates an order block",body:"An order block forms when the last candle before a significant move closes in the OPPOSITE direction of that move. Bullish OB: the last DOWN candle before price rallied sharply. Bearish OB: the last UP candle before price dropped. That specific candle is the order block.",donna:"El order block es una vela específica. La ÚLTIMA vela que tocó el nivel clave y a la que le cerraron por encima — esa es el order block."},
    {icon:"⭐",title:"High-probability OBs",body:"A high-probability order block is one that rebalanced a fair value gap. The last down candle that filled a bullish FVG before the move up — that is the highest quality OB. When price returns to it, the reaction will be strong because the area already proved its importance.",donna:"Un order block de alta probabilidad rebalanceó un fair value gap. Cuando el precio regrese ahí, va a respetar ese nivel."},
    {icon:"🎯",title:"The OB as Model #1 entry",body:"In CRT execution, the order block in the lower timeframe IS the Model #1 entry. The last candle that stabbed the key level — close above it (bullish) or close below it (bearish) is your trigger.",donna:"El order block en la temporalidad baja es el Modelo Número Uno. La última vela que apuñaló el nivel clave."},
    {icon:"📏",title:"Stop-loss placement",body:"Stop-loss for a bullish OB trade goes BELOW the wick of the last down candle. That is the full extent of the Turtle Soup. If price closes decisively below that — setup is invalid. Take the loss.",donna:"Stoplos en el extremo de la mecha del order block. Si el precio cierra decisivamente por debajo — el setup es inválido."}
  ],
  slides_es:[
    {icon:"🖌️",title:"La pared balanceada",body:"Donde un fair value gap es un espacio sin pintar, un order block es donde la brocha fue hacia arriba Y hacia abajo — ambos lados participaron. Esta área balanceada actúa como base. Cuando el precio regresa, la usa para lanzarse.",donna:"El fair value gap es una mancha. El order block es un área balanceada. Cuando el precio regresa, lo usa como base para lanzarse."},
    {icon:"📊",title:"Qué crea un order block",body:"Un order block se forma cuando la última vela ANTES de un movimiento significativo cierra en la dirección OPUESTA a ese movimiento. OB alcista: la última vela BAJISTA antes de que el precio subiera bruscamente. OB bajista: la última ALCISTA antes de que cayera.",donna:"El order block es una vela específica. La ÚLTIMA vela que tocó el nivel clave y a la que le cerraron por encima — esa es el order block."},
    {icon:"⭐",title:"Order blocks de alta probabilidad",body:"Un order block de alta probabilidad es aquel que rebalanceó un fair value gap. La última vela bajista que llenó un FVG alcista antes del movimiento hacia arriba — ese es el OB de mayor calidad.",donna:"Un order block de alta probabilidad rebalanceó un fair value gap. Cuando el precio regrese ahí, va a respetar ese nivel."},
    {icon:"🎯",title:"El OB como entrada del Modelo #1",body:"En la ejecución de CRT, el order block en la temporalidad baja ES la entrada del Modelo #1. La última vela que apuñaló el nivel clave. Cierre por encima (alcista) o por debajo (bajista) es tu gatillo.",donna:"El order block en la temporalidad baja es el Modelo Número Uno. La última vela que apuñaló el nivel clave."},
    {icon:"📏",title:"Colocación del stop-loss",body:"El stop-loss para un trade alcista de OB va POR DEBAJO de la mecha de la última vela bajista. Si el precio cierra por debajo — el setup es inválido. Toma la pérdida.",donna:"Stoplos en el extremo de la mecha del order block. Si el precio cierra decisivamente por debajo — el setup es inválido."}
  ],
  quiz_en:[
    {q:"A bullish order block is the last UP candle before a major price drop.",type:"tf",a:false,exp:"False. A BULLISH OB is the last DOWN candle BEFORE a major rally upward."},
    {q:"What makes an OB high probability?",type:"mc",opts:["Largest candle on chart","OB that also rebalanced a fair value gap","Very long wick","Appears on 1-minute"],a:1,exp:"An OB that rebalanced a FVG has the highest probability — proved its importance once already."},
    {q:"The order block in the lower timeframe equals the Model #1 entry.",type:"tf",a:true,exp:"True. The Model #1 entry IS the order block being created — the last candle that stabbed the key level."},
    {q:"Stop-loss on a bullish OB trade:",type:"mc",opts:["At 50% of candle","At open of OB candle","Below extreme wick of OB candle","10 pips below"],a:2,exp:"Stop below the extreme wick of the OB candle. That is the full Turtle Soup point."}
  ],
  quiz_es:[
    {q:"Un order block alcista es la última vela ALCISTA antes de una gran caída.",type:"tf",a:false,exp:"Falso. Un OB ALCISTA es la última vela BAJISTA ANTES de un rally alcista importante."},
    {q:"¿Qué hace que un OB sea de alta probabilidad?",type:"mc",opts:["La vela más grande del gráfico","OB que también rebalanceó un fair value gap","Mecha muy larga","Aparece en 1 minuto"],a:1,exp:"Un OB que rebalanceó un FVG tiene la mayor probabilidad."},
    {q:"El order block en la temporalidad baja equivale a la entrada del Modelo #1.",type:"tf",a:true,exp:"Verdadero. La entrada del Modelo #1 ES el order block creándose — la última vela que apuñaló el nivel clave."},
    {q:"Stop-loss en un trade alcista de OB:",type:"mc",opts:["En el 50% de la vela","En apertura del OB","Por debajo del extremo de la mecha del OB","10 pips abajo"],a:2,exp:"Stop por debajo del extremo de la mecha del OB. Ese es el punto completo del Turtle Soup."}
  ]
},
  {id:17,icon:"🔓",title:"Breaker and Rejection Blocks",title_es:"Breaker y Rejection Blocks",sub:"The failed order block and the long wick — two powerful entries.",sub_es:"El order block fallido y la mecha larga — dos entradas muy poderosas.",level:2,
  slides_en:[
    {icon:"💥",title:"The Breaker Block",body:"A breaker block is a FAILED order block. An area where everyone thought price would hold — Smart Money let it fail on purpose — and now that failed level becomes the entry point from the other side. It is an order block that was broken and is now retested.",donna:"El breaker block es el order block fallido. El mercado lo rompió deliberadamente para atrapar más gente. Ese nivel se convierte en la entrada."},
    {icon:"🔢",title:"Three price deliveries",body:"A breaker has three price deliveries at the same level. First touch and reversal. Second touch and breakthrough. Third delivery — the retest from the other side — is the entry. Three touches at the same level create a very sensitive zone.",donna:"Tres entregas de precio en la misma zona. Eso es lo que hace al breaker block un nivel muy sensible."},
    {icon:"🎯",title:"Almost zero drawdown",body:"The breaker block produces the lowest drawdown entries in the CRT system. When price retests the breaker from the opposite side, the reaction is usually immediate and violent. You often need the smallest stop-loss of all entry types.",donna:"El breaker block da la entrada con menor drawdown de todo el sistema. La reacción usualmente es inmediata."},
    {icon:"🔴",title:"Rejection Block",body:"A rejection block is a long wick at a key level. Price visited that area, was rejected violently, and closed far away — leaving a visible long wick. That wick represents a balanced zone. When price returns, that zone acts as resistance or support.",donna:"El rejection block es una mecha larga. El precio fue ahí, lo rechazaron violentamente, y cerró lejos. Cuando el precio regresa, va a respetar ese nivel."},
    {icon:"📐",title:"How to use both",body:"Breaker block: wait for price to retest the broken OB from the opposite side, look for Model #1 trigger. Rejection block: mark the opening of the long wick as a key level. When price returns expect rejection — find Model #1 in the lower timeframe.",donna:"En el rejection block, marca la apertura de la mecha larga. Ahí es donde el precio debería reaccionar."}
  ],
  slides_es:[
    {icon:"💥",title:"El Breaker Block",body:"Un breaker block es un order block FALLIDO. Un área donde todos pensaron que el precio se sostendría — el Dinero Inteligente lo dejó fallar a propósito — y ahora ese nivel fallido se convierte en el punto de entrada desde el otro lado.",donna:"El breaker block es el order block fallido. El mercado lo rompió deliberadamente para atrapar más gente."},
    {icon:"🔢",title:"Tres entregas de precio",body:"Un breaker tiene tres entregas de precio en el mismo nivel. Primer toque y reversión. Segundo toque y rompimiento. Tercera entrega — el retest desde el otro lado — es la entrada.",donna:"Tres entregas de precio en la misma zona. Eso es lo que hace al breaker block un nivel muy sensible."},
    {icon:"🎯",title:"Casi cero drawdown",body:"El breaker block produce las entradas con menor drawdown del sistema CRT. Cuando el precio retestea el breaker desde el lado opuesto, la reacción es usualmente inmediata y violenta.",donna:"El breaker block da la entrada con menor drawdown de todo el sistema. La reacción usualmente es inmediata."},
    {icon:"🔴",title:"Rejection Block",body:"Un rejection block es una mecha larga en un nivel clave. El precio visitó esa área, fue rechazado violentamente, y cerró lejos — dejando una mecha larga visible.",donna:"El rejection block es una mecha larga. Cuando el precio regresa, va a respetar ese nivel."},
    {icon:"📐",title:"Cómo usar ambos",body:"Breaker block: espera que el precio retestee el OB roto desde el lado opuesto, busca gatillo del Modelo #1. Rejection block: marca la apertura de la mecha larga como nivel clave. Cuando el precio regrese espera rechazo.",donna:"En el rejection block, marca la apertura de la mecha larga. Ahí es donde el precio debería reaccionar."}
  ],
  quiz_en:[
    {q:"A breaker block is an order block that held and never failed.",type:"tf",a:false,exp:"False. A breaker block is a FAILED order block. Price broke through it and now retesting from the other side is the entry."},
    {q:"How many price deliveries are at a breaker block level?",type:"mc",opts:["One","Two","Three","Four or more"],a:2,exp:"Three: first touch and reversal, second touch and breakthrough, third delivery (retest from other side)."},
    {q:"What is a rejection block?",type:"mc",opts:["Candle with no wicks","Long wick at key level that rejected price violently","Same as order block","Range that consolidates"],a:1,exp:"A rejection block is a long wick at a key level — price went there, was rejected violently, closed far away."},
    {q:"Breaker block typically produces the LOWEST drawdown entries.",type:"tf",a:true,exp:"True. Reaction is usually immediate with minimal risk when price retests from the other side."}
  ],
  quiz_es:[
    {q:"Un breaker block es un order block que se sostuvo y nunca falló.",type:"tf",a:false,exp:"Falso. Un breaker block es un order block FALLIDO. El precio lo rompió y ahora el retest desde el otro lado es la entrada."},
    {q:"¿Cuántas entregas de precio se encuentran en un nivel de breaker block?",type:"mc",opts:["Una","Dos","Tres","Cuatro o más"],a:2,exp:"Tres: primer toque y reversión, segundo toque y rompimiento, tercera entrega (retest desde el otro lado)."},
    {q:"¿Qué es un rejection block?",type:"mc",opts:["Vela sin mechas","Mecha larga en nivel clave que rechazó el precio violentamente","Lo mismo que un order block","Rango que consolida"],a:1,exp:"Un rejection block es una mecha larga en un nivel clave — el precio fue ahí, fue rechazado violentamente, cerró lejos."},
    {q:"El breaker block típicamente produce las entradas con MENOR drawdown.",type:"tf",a:true,exp:"Verdadero. La reacción es usualmente inmediata con riesgo mínimo."}
  ]
},
  {id:18,icon:"🔭",title:"Timeframe Alignment",title_es:"Alineación de Temporalidades",sub:"Higher, intermediate, lower. Always in this order. Always.",sub_es:"Alta, intermedia, baja. Siempre en este orden. Siempre.",level:2,
  slides_en:[
    {icon:"🏔️",title:"Three timeframes — three jobs",body:"Every CRT trade uses three timeframes. HIGHER: tells you WHY — key level, bias, direction. INTERMEDIATE: tells you HOW — CRT forming, manipulation candle touching key level. LOWER: tells you WHEN — exact Model #1 entry candle.",donna:"Temporalidad alta: el POR QUÉ. Temporalidad intermedia: el CÓMO. Temporalidad baja: el CUÁNDO. Siempre en ese orden. Nunca al revés."},
    {icon:"📋",title:"The timeframe combinations",body:"1H CRT: 15min or 5min intermediate → 1min entry. 4H CRT: 1H or 15min intermediate → 5min entry. Daily CRT: 4H or 1H intermediate → 15min entry. Weekly CRT: 4H intermediate → 1H entry. Same logic for every CRT size.",donna:"Un CRT de una hora, 15 minutos intermedia, un minuto entrada. Un CRT de 4 horas, una hora intermedia, 5 minutos entrada."},
    {icon:"⏳",title:"Wait for the key level touch",body:"Stay on the higher timeframe watching the key level. The moment Candle 2 starts pushing into your key level — only then drop to intermediate. The moment intermediate shows its own CRT manipulation — only then drop to lower for entry. Patience is the skill.",donna:"No bajes de temporalidades hasta que el nivel clave no sea tocado. Ese es el proceso. Espera. Luego baja. Luego busca entrada."},
    {icon:"🔍",title:"CRTs within CRTs within CRTs",body:"The 1-minute Model #1 entry is INSIDE the wick of a 5-minute CRT. That 5-minute CRT is inside a 15-minute CRT. That 15-minute CRT is inside a 1-hour CRT. Every level contains the same pattern.",donna:"CRTs dentro de CRTs dentro de CRTs. Cuando entiendes esto, todo hace clic."},
    {icon:"🎯",title:"All three aligned = maximum conviction",body:"When HTF key level is confirmed, ITF CRT manipulation is confirmed, and LTF Model #1 triggers — you are not guessing. You are executing a high-probability trade confirmed at three different levels simultaneously.",donna:"Cuando los tres niveles te dicen lo mismo — no estás adivinando. Estás ejecutando. Sin dudas, sin miedo."}
  ],
  slides_es:[
    {icon:"🏔️",title:"Tres temporalidades — tres trabajos",body:"Cada trade de CRT usa tres temporalidades. ALTA: te dice el POR QUÉ — nivel clave, sesgo, dirección. INTERMEDIA: te dice el CÓMO — el CRT formándose, la vela de manipulación. BAJA: te dice el CUÁNDO — la vela exacta del Modelo #1.",donna:"Temporalidad alta: el POR QUÉ. Temporalidad intermedia: el CÓMO. Temporalidad baja: el CUÁNDO. Siempre en ese orden."},
    {icon:"📋",title:"Las combinaciones de temporalidades",body:"CRT de 1H: 15min o 5min intermedia → 1min entrada. CRT de 4H: 1H o 15min intermedia → 5min entrada. CRT Diario: 4H o 1H intermedia → 15min entrada. CRT Semanal: 4H intermedia → 1H entrada.",donna:"Un CRT de una hora, 15 minutos intermedia, un minuto entrada. Un CRT de 4 horas, una hora intermedia, 5 minutos entrada."},
    {icon:"⏳",title:"Espera el toque del nivel clave",body:"Quédate en la temporalidad alta observando el nivel clave. En el momento que la Vela 2 empieza a empujar hacia tu nivel clave — solo entonces baja a la intermedia. Solo cuando la intermedia muestre su propia manipulación — baja a la baja para la entrada.",donna:"No bajes de temporalidades hasta que el nivel clave no sea tocado. Ese es el proceso."},
    {icon:"🔍",title:"CRTs dentro de CRTs dentro de CRTs",body:"La entrada del Modelo #1 de 1 minuto está DENTRO de la mecha de un CRT de 5 minutos. Ese CRT de 5 minutos está dentro de un CRT de 15 minutos. Ese está dentro de un CRT de 1 hora. Cada nivel contiene el mismo patrón.",donna:"CRTs dentro de CRTs dentro de CRTs. Cuando entiendes esto, todo hace clic."},
    {icon:"🎯",title:"Los tres alineados = máxima convicción",body:"Cuando el nivel clave de temporalidad alta está confirmado, la manipulación del CRT de temporalidad intermedia está confirmada, y el Modelo #1 de temporalidad baja se activa — no estás adivinando.",donna:"Cuando los tres niveles te dicen lo mismo — no estás adivinando. Estás ejecutando. Sin dudas, sin miedo."}
  ],
  quiz_en:[
    {q:"The higher timeframe tells you WHEN to enter.",type:"tf",a:false,exp:"False. The HIGHER TF tells you WHY — key level and bias. The LOWER TF tells you WHEN — the exact Model #1 candle."},
    {q:"For a 4H CRT, entry is found on which chart?",type:"mc",opts:["4H directly","1H","5min","1min"],a:2,exp:"4H CRT: 4H=HTF, 1H or 15min=ITF, 5min=LTF entry (Model #1)."},
    {q:"Drop to lower timeframes as soon as the session opens.",type:"tf",a:false,exp:"False. Stay on HTF until Candle 2 touches your key level. Only then drop."},
    {q:"Three-timeframe alignment means maximum conviction.",type:"tf",a:true,exp:"True. HTF says why, ITF confirms how, LTF triggers when. All three aligned = highest probability."}
  ],
  quiz_es:[
    {q:"La temporalidad alta te dice CUÁNDO entrar.",type:"tf",a:false,exp:"Falso. La temporalidad ALTA te dice el POR QUÉ. La BAJA te dice el CUÁNDO."},
    {q:"Para un CRT de 4H, la entrada se encuentra en qué gráfico?",type:"mc",opts:["4H directamente","1H","5min","1min"],a:2,exp:"CRT de 4H: 4H=temporalidad alta, 1H o 15min=intermedia, 5min=entrada (Modelo #1)."},
    {q:"Baja a temporalidades menores tan pronto como abra la sesión.",type:"tf",a:false,exp:"Falso. Quédate en la temporalidad alta hasta que la Vela 2 toque tu nivel clave."},
    {q:"La alineación de tres temporalidades significa máxima convicción.",type:"tf",a:true,exp:"Verdadero. La alta dice por qué, la intermedia confirma cómo, la baja activa el cuándo."}
  ]
},
  {id:19,icon:"⚡",title:"Model #1 — The Only Entry You Need",title_es:"Modelo #1 — La Única Entrada que Necesitas",sub:"The trigger. The last candle that stabbed the level. Wait for the close.",sub_es:"El gatillo. La última vela que apuñaló el nivel. Espera el cierre.",level:2,
  slides_en:[
    {icon:"🎯",title:"The cleanest CRT entry",body:"Model #1 is the entry trigger of the entire CRT system. It is the last candle that stabbed into a key level — thick, decisive — and then had the NEXT candle close back in the opposite direction. That close confirms the Turtle Soup and triggers your entry.",donna:"Modelo Número Uno. La última vela que apuñaló el nivel clave. En el momento que la siguiente vela cierra por encima — eso es tu gatillo. Entras. Sin dudar."},
    {icon:"📐",title:"Exactly what it looks like",body:"Bullish Model #1: a thick down candle stabs below a key low. The next candle closes ABOVE that down candle. Entry at the close of that second candle. Stop-loss below the wick of the Model #1 candle. Target: 50% first, then full range.",donna:"Una vela gruesa que apuñaló el bajo. La siguiente cierra por encima. Esa es la entrada. Stop en el bajo de la mecha."},
    {icon:"⏰",title:"Always wait for the close",body:"The most common mistake: entering BEFORE the confirmation candle closes. You must wait for the full close above (bullish) or below (bearish) the Model #1 candle. Entering early means guessing — the Turtle Soup may not be confirmed yet.",donna:"Siempre espera el cierre. Siempre. Si entras antes del cierre, estás adivinando. El cierre es la confirmación."},
    {icon:"💪",title:"Thick and decisive",body:"The Model #1 candle should be thick and decisive — not a small doji. It needs to show a real push was made into the key level. The bigger and more decisive, the higher the probability of a strong reversal.",donna:"La vela del Modelo #1 tiene que ser gruesa y decisiva. No una velita. Entre más gruesa, mayor probabilidad."},
    {icon:"🔁",title:"The retest",body:"After a Model #1 entry is confirmed, price often returns to retest that candle before moving to target. This is NOT failure — it is a second entry opportunity. Mark the Model #1 close as a line. That level should hold.",donna:"El retest del Modelo #1 es una segunda oportunidad. Si ya estás en el trade — no te asustes. Si no rompe, el trade sigue siendo válido."}
  ],
  slides_es:[
    {icon:"🎯",title:"La entrada más limpia de CRT",body:"El Modelo #1 es el gatillo de entrada de todo el sistema CRT. Es la última vela que apuñaló un nivel clave — gruesa, decisiva — y luego la SIGUIENTE vela cerró de vuelta en la dirección opuesta. Ese cierre confirma el Turtle Soup y activa tu entrada.",donna:"Modelo Número Uno. La última vela que apuñaló el nivel clave. En el momento que la siguiente vela cierra por encima — eso es tu gatillo. Entras. Sin dudar."},
    {icon:"📐",title:"Exactamente cómo se ve",body:"Modelo #1 Alcista: una vela bajista gruesa apuñala por debajo de un bajo clave. La siguiente vela cierra POR ENCIMA de esa vela bajista. Entrada al cierre de esa segunda vela. Stop-loss por debajo de la mecha.",donna:"Una vela gruesa que apuñaló el bajo. La siguiente cierra por encima. Esa es la entrada. Stop en el bajo de la mecha."},
    {icon:"⏰",title:"Siempre espera el cierre",body:"El error más común: entrar ANTES de que cierre la vela de confirmación. Debes esperar el cierre completo de la vela por encima (alcista) o por debajo (bajista) del Modelo #1. Entrar antes significa adivinar.",donna:"Siempre espera el cierre. Siempre. Si entras antes del cierre, estás adivinando. El cierre es todo."},
    {icon:"💪",title:"Gruesa y decisiva",body:"La vela del Modelo #1 debe ser gruesa y decisiva — no un doji pequeño. Necesita mostrar que se hizo un empuje real hacia el nivel clave. Cuanto más grande y decisiva, mayor la probabilidad.",donna:"La vela del Modelo #1 tiene que ser gruesa y decisiva. No una velita. Entre más gruesa, mayor probabilidad."},
    {icon:"🔁",title:"El retest",body:"Después de que se confirma una entrada del Modelo #1, el precio a menudo regresa a retestear esa vela antes de moverse al objetivo. Esto NO es falla — es una segunda oportunidad de entrada.",donna:"El retest del Modelo #1 es una segunda oportunidad. Si ya estás en el trade — no te asustes."}
  ],
  quiz_en:[
    {q:"Enter a Model #1 trade as soon as the key level is touched.",type:"tf",a:false,exp:"False. Wait for the CLOSE of the confirmation candle above (bullish) or below (bearish) the Model #1 candle."},
    {q:"Bullish Model #1 trigger is:",type:"mc",opts:["Candle opens above key level","Thick down candle stabs key low, NEXT candle closes ABOVE it","Price touches 50% of range","Price closes below previous high"],a:1,exp:"Bullish Model #1: thick down candle stabs key low → next candle closes ABOVE it = entry."},
    {q:"A retest of the Model #1 level after entry means the trade failed.",type:"tf",a:false,exp:"False. A retest is normal — often a second entry opportunity. Fails only if price closes past the extreme wick."},
    {q:"Stop-loss on a bullish Model #1:",type:"mc",opts:["At open of M1 candle","At close of M1 candle","Below extreme wick of M1 candle","At 50% of range"],a:2,exp:"Stop below the extreme wick. That is the full extent of the Turtle Soup — below that the setup is invalid."}
  ],
  quiz_es:[
    {q:"Entra a un trade de Modelo #1 tan pronto como el nivel clave sea tocado.",type:"tf",a:false,exp:"Falso. Espera el CIERRE de la vela de confirmación por encima (alcista) o por debajo (bajista) del Modelo #1."},
    {q:"El gatillo del Modelo #1 alcista es:",type:"mc",opts:["Una vela abre por encima del nivel clave","Vela bajista gruesa apuñala el bajo clave, SIGUIENTE vela cierra POR ENCIMA","El precio toca el 50% del rango","El precio cierra por debajo del alto anterior"],a:1,exp:"Modelo #1 Alcista: vela bajista gruesa apuñala el bajo clave → siguiente vela cierra POR ENCIMA = entrada."},
    {q:"Un retest del nivel del Modelo #1 después de entrar significa que el trade falló.",type:"tf",a:false,exp:"Falso. Un retest es normal — a menudo una segunda oportunidad. Falla solo si el precio cierra más allá del extremo de la mecha."},
    {q:"Stop-loss en un Modelo #1 alcista:",type:"mc",opts:["En apertura del M1","En cierre del M1","Por debajo del extremo de la mecha del M1","En el 50% del rango"],a:2,exp:"Stop por debajo del extremo de la mecha. Ese es el alcance completo del Turtle Soup."}
  ]
},
  {id:20,icon:"💀",title:"Kiss of Death — KOD",title_es:"Kiss of Death — KOD",sub:"The final Turtle Soup before the target. The fastest move in the system.",sub_es:"El último Turtle Soup antes del objetivo. El movimiento más rápido del sistema.",level:3,
  slides_en:[
    {icon:"💀",title:"The last trap before the target",body:"The Kiss of Death is the last Turtle Soup before price reaches its final target. In a bullish CRT, as price approaches the top of the range, it fakes a reversal down — trapping late sellers — then explodes up to the target. Romeo says this is guaranteed. It will always be there.",donna:"El KOD está garantizado. Va a estar ahí antes del objetivo. Romeo lo dijo: está escrito, es destino."},
    {icon:"📐",title:"Where the KOD appears",body:"The KOD appears in the upper 25% of a bullish range or lower 25% of a bearish range. Price is close to target. It makes a fake reversal into a small FVG or OB — triggering ICT traders, supply-demand traders, and double-top pattern traders simultaneously.",donna:"KOD en el 25% superior en un CRT alcista. KOD en el 25% inferior en un bajista."},
    {icon:"⚡",title:"The fastest move",body:"Once the final Turtle Soup is confirmed at the KOD level, the move to target is explosive. Price has collected the last round of stops and has clear fuel to complete the objective with no more obstacles.",donna:"El KOD es el movimiento más rápido y violento del sistema. El precio recoge la última ronda de stops y explota hacia el objetivo."},
    {icon:"🧠",title:"Why it works",body:"Multiple trading communities all see their own setups against the trend at the same price level: ICT traders see an OB, supply-demand traders see a supply zone, pattern traders see a double top. The KOD collects ALL their stop-losses simultaneously — massive fuel for the final push.",donna:"Los traders de ICT, S&D, y patrones — todos venden al mismo tiempo. El KOD recolecta todos sus stops. Ese combustible impulsa el movimiento final."},
    {icon:"🎯",title:"The KOD entry",body:"KOD still requires a Model #1 trigger in the lower timeframe. Same rules — just applied at the 25% zone near the target instead of at the original CRT manipulation level.",donna:"KOD sigue requiriendo un Modelo #1. Las reglas no cambian."}
  ],
  slides_es:[
    {icon:"💀",title:"La última trampa antes del objetivo",body:"El Kiss of Death es el último Turtle Soup antes de que el precio alcance su objetivo final. En un CRT alcista, a medida que el precio se acerca al tope, simula una reversión hacia abajo — atrapando vendedores tardíos — y luego explota hacia arriba al objetivo.",donna:"El KOD está garantizado. Va a estar ahí antes del objetivo. Romeo lo dijo: está escrito, es destino."},
    {icon:"📐",title:"Dónde aparece el KOD",body:"El KOD aparece en el 25% superior de un rango alcista o 25% inferior de un bajista. El precio hace una reversión falsa hacia un pequeño FVG u OB — activando a traders de ICT, S&D y patrones simultáneamente.",donna:"KOD en el 25% superior en un CRT alcista. KOD en el 25% inferior en un bajista."},
    {icon:"⚡",title:"El movimiento más rápido",body:"Una vez confirmado el último Turtle Soup en el nivel del KOD, el movimiento hacia el objetivo es explosivo. El precio tiene combustible claro para completar el objetivo sin más obstáculos.",donna:"El KOD es el movimiento más rápido y violento del sistema."},
    {icon:"🧠",title:"Por qué funciona",body:"Múltiples comunidades de trading ven sus propios setups contra la tendencia en el mismo nivel: traders de ICT ven un OB y venden, traders de S&D ven una zona de oferta y venden, traders de patrones ven un doble techo y venden. El KOD recolecta TODOS sus stops simultáneamente.",donna:"Los traders de ICT, S&D, y patrones — todos venden al mismo tiempo. El KOD recolecta todos sus stops."},
    {icon:"🎯",title:"La entrada del KOD",body:"El KOD sigue requiriendo un gatillo de Modelo #1 en la temporalidad baja. Las mismas reglas — solo aplicadas en la zona del 25% cerca del objetivo.",donna:"KOD sigue requiriendo un Modelo #1. Las reglas no cambian."}
  ],
  quiz_en:[
    {q:"The KOD is guaranteed to appear before every major target.",type:"tf",a:true,exp:"True. Romeo says it clearly — before every major target there will always be a final fake reversal."},
    {q:"Where does the KOD appear in a bullish CRT?",type:"mc",opts:["At 50% of range","Upper 25% of range near target","At the original Turtle Soup level","At the beginning"],a:1,exp:"Upper 25% of a bullish range (lower 25% of bearish). A fake reversal close to target."},
    {q:"The KOD has different entry rules than Model #1.",type:"tf",a:false,exp:"False. KOD still requires Model #1 trigger — same rules everywhere in the system."},
    {q:"Why is the KOD such a fast violent move?",type:"mc",opts:["Fewer traders in market","Multiple communities all bet against trend simultaneously — Smart Money collects all stops at once","Market is thin near target","Always at news events"],a:1,exp:"Multiple communities independently see their own anti-trend setups at the same level. Smart Money collects ALL their stops — creating massive fuel."}
  ],
  quiz_es:[
    {q:"El KOD está garantizado a aparecer antes de cada objetivo mayor.",type:"tf",a:true,exp:"Verdadero. Romeo lo dice claramente — siempre habrá un último Turtle Soup falso antes del objetivo."},
    {q:"¿Dónde aparece el KOD en un CRT alcista?",type:"mc",opts:["En el 50% del rango","25% superior del rango cerca del objetivo","En el nivel del Turtle Soup original","Al comienzo"],a:1,exp:"25% superior de un rango alcista (25% inferior de un bajista)."},
    {q:"El KOD tiene reglas de entrada diferentes al Modelo #1.",type:"tf",a:false,exp:"Falso. El KOD sigue requiriendo el gatillo del Modelo #1 — las mismas reglas en todo el sistema."},
    {q:"¿Por qué el KOD produce un movimiento tan rápido y violento?",type:"mc",opts:["Hay menos traders","Múltiples comunidades apuestan contra la tendencia al mismo tiempo — Dinero Inteligente recolecta todos los stops a la vez","El mercado es delgado","Siempre en noticias"],a:1,exp:"Múltiples comunidades ven sus propios setups anti-tendencia en el mismo nivel. El Dinero Inteligente recolecta TODOS sus stops."}
  ]
},
  {id:21,icon:"⏰",title:"Kill Zones — When to Trade",title_es:"Kill Zones — Cuándo Operar",sub:"The exact hours when high-probability setups form. Trade these only.",sub_es:"Las horas exactas cuando se forman los setups de alta probabilidad. Solo estas.",level:2,
  slides_en:[
    {icon:"🌍",title:"Three sessions that matter",body:"Markets do not trade with equal energy 24 hours a day. Three sessions matter: Asian (accumulation), London (manipulation), New York (distribution). Each has a Kill Zone — specific hours when high-probability setups form.",donna:"Fuera de los kill zones — no fuerces nada. Si operas Nasdaq, enfócate de 7 a 11 AM. Si operas Forex, enfócate de 1 a 5 AM."},
    {icon:"🌙",title:"Asian Kill Zone",body:"8 PM to midnight New York time. Typically accumulation — building the range London will trade. Gold and yen pairs move most during Asia. For Euro/GBP, Asia creates the pre-open range that London will manipulate.",donna:"Asia es la acumulación. Si operas oro — Asia es tu sesión principal."},
    {icon:"🇬🇧",title:"London Kill Zone",body:"1 AM to 5 AM New York time. Where the majority of large Forex moves begin. London often creates the high or low of the day on EUR and GBP pairs. The London manipulation at a key level is the most reliable Turtle Soup in all of Forex.",donna:"Londres de 1 a 5 AM. Ahí es donde los movimientos grandes de Forex empiezan."},
    {icon:"🗽",title:"New York Kill Zone",body:"7 AM to 11 AM New York time. Where Nasdaq and S&P 500 CRTs happen. The 9:30 AM stock market open is always a liquidity injection — the most common Nasdaq manipulation moment.",donna:"Nueva York de 7 a 11 AM. La apertura de las 9:30 es una inyección de liquidez — siempre."},
    {icon:"🚫",title:"Outside kill zones",body:"Outside these windows, probability drops significantly. The algorithm runs on New York time. Do not force setups outside kill zones. Patience is the skill — wait for the window.",donna:"Fuera de los kill zones no hay setup de alta probabilidad. Los kill zones existen para reducir tu tiempo en la pantalla."}
  ],
  slides_es:[
    {icon:"🌍",title:"Tres sesiones que importan",body:"Los mercados no operan con la misma energía 24 horas. Tres sesiones importan: Asia (acumulación), Londres (manipulación), Nueva York (distribución). Cada una tiene su Kill Zone.",donna:"Fuera de los kill zones — no fuerces nada. Si operas Nasdaq, enfócate de 7 a 11 AM. Si operas Forex, enfócate de 1 a 5 AM."},
    {icon:"🌙",title:"Kill Zone Asiático",body:"8 PM a medianoche hora de Nueva York. Típicamente acumulación — construyendo el rango que Londres va a operar. El oro y los pares de yen se mueven más durante Asia.",donna:"Asia es la acumulación. Si operas oro — Asia es tu sesión principal."},
    {icon:"🇬🇧",title:"Kill Zone de Londres",body:"1 AM a 5 AM hora de Nueva York. Donde comienzan la mayoría de los grandes movimientos de Forex. Londres crea el alto o bajo del día en los pares de Euro y GBP.",donna:"Londres de 1 a 5 AM. Ahí es donde los movimientos grandes de Forex empiezan."},
    {icon:"🗽",title:"Kill Zone de Nueva York",body:"7 AM a 11 AM hora de Nueva York. Donde ocurren los CRTs de Nasdaq y S&P 500. La apertura de las 9:30 AM siempre es una inyección de liquidez — el momento de manipulación más común de Nasdaq.",donna:"Nueva York de 7 a 11 AM. La apertura de las 9:30 es una inyección de liquidez — siempre."},
    {icon:"🚫",title:"Fuera de los kill zones",body:"Fuera de estas ventanas, la probabilidad cae significativamente. No fuerces setups fuera de los kill zones. La paciencia es la habilidad — espera la ventana.",donna:"Fuera de los kill zones no hay setup de alta probabilidad."}
  ],
  quiz_en:[
    {q:"London Kill Zone produces the biggest Forex moves.",type:"tf",a:true,exp:"True. London (1-5 AM NY) is where most large Forex moves begin."},
    {q:"New York Kill Zone runs:",type:"mc",opts:["Midnight to 4 AM","7 AM to 11 AM NY","1 PM to 5 PM NY","All day"],a:1,exp:"New York Kill Zone: 7 AM to 11 AM New York time."},
    {q:"You should look for Nasdaq setups any time of day.",type:"tf",a:false,exp:"False. Nasdaq CRTs focus on the NY session (7-11 AM). Outside this window probability drops significantly."},
    {q:"The Asian session is which phase of the daily AMD cycle?",type:"mc",opts:["Distribution","Manipulation","Accumulation","None"],a:2,exp:"Asia = accumulation. It builds the range that London will manipulate with a Turtle Soup."}
  ],
  quiz_es:[
    {q:"El Kill Zone de Londres produce los movimientos más grandes en Forex.",type:"tf",a:true,exp:"Verdadero. Londres (1-5 AM NY) es donde comienzan la mayoría de los grandes movimientos de Forex."},
    {q:"El Kill Zone de Nueva York corre de:",type:"mc",opts:["Medianoche a 4 AM","7 AM a 11 AM hora NY","1 PM a 5 PM NY","Todo el día"],a:1,exp:"Kill Zone de Nueva York: 7 AM a 11 AM hora de Nueva York."},
    {q:"Deberías buscar setups de Nasdaq en cualquier momento del día.",type:"tf",a:false,exp:"Falso. Los CRTs de Nasdaq se enfocan en la sesión de NY (7-11 AM)."},
    {q:"La sesión asiática es qué fase del ciclo AMD diario?",type:"mc",opts:["Distribución","Manipulación","Acumulación","Ninguna"],a:2,exp:"Asia = acumulación. Construye el rango que Londres va a manipular."}
  ]
},
  {id:22,icon:"📡",title:"SMT Divergence",title_es:"Divergencia SMT",sub:"When correlated markets split — a powerful confirmation signal.",sub_es:"Cuando los mercados correlacionados divergen — una señal de confirmación poderosa.",level:3,
  slides_en:[
    {icon:"🤝",title:"Correlated markets move together",body:"Nasdaq and S&P 500 should both make new highs or lows simultaneously. Euro and GBP should move in the same direction. Gold and Silver should move together. When one does and the other does NOT — that is an SMT divergence.",donna:"Nasdaq y S&P 500 se deberían mover igual. Si uno toma un alto y el otro no — eso es un SMT. La divergencia te dice que el movimiento puede ser falso."},
    {icon:"⚠️",title:"What SMT tells you",body:"An SMT signals that a Turtle Soup happened on one market but NOT the other. The market that did NOT take the level shows weakness — confirming the Turtle Soup on the other is fake and a reversal is coming. SMT is a CONFIRMATION tool — not a standalone entry.",donna:"El SMT confirma el turtle soup. Si Nasdaq toma el alto y S&P 500 no — el alto del Nasdaq es falso. Busca la reversión."},
    {icon:"📊",title:"The main SMT pairs",body:"Nasdaq ↔ S&P 500. EUR/USD ↔ DXY (inverse). GBP/USD ↔ DXY (inverse). Gold ↔ Silver. Bitcoin ↔ Ethereum. If DXY makes a bearish Turtle Soup, that confirms a bullish bias in EUR/USD.",donna:"DXY bajista = EUR alcista. DXY alcista = EUR bajista. Siempre mira DXY cuando operas Forex."},
    {icon:"🎯",title:"How to use SMT",body:"You have an entry signal on Nasdaq. Check S&P 500. Did it also make the same Turtle Soup? Yes — strong confirmation. S&P 500 FAILED to make the move (SMT) — the Nasdaq Turtle Soup is even MORE confirmed and the reversal will be stronger.",donna:"SMT no se usa como entrada independiente. Se usa como confirmación. Aumenta tu convicción."},
    {icon:"⚡",title:"SMT and failure swings",body:"The market with the SMT (did not make the Turtle Soup) absorbs the failure swing. The other market then runs full force to the target.",donna:"El mercado que tiene el SMT va a absorber el failure swing. El que sí hizo el turtle soup va a ir con más fuerza."}
  ],
  slides_es:[
    {icon:"🤝",title:"Los mercados correlacionados se mueven juntos",body:"Nasdaq y S&P 500 deberían hacer nuevos altos o bajos al mismo tiempo. Euro y GBP deberían moverse en la misma dirección. Oro y Plata deberían moverse juntos. Cuando uno lo hace y el otro NO — eso es un SMT.",donna:"Nasdaq y S&P 500 se deberían mover igual. Si uno toma un alto y el otro no — eso es un SMT."},
    {icon:"⚠️",title:"Qué te dice el SMT",body:"Un SMT señala que un Turtle Soup ocurrió en un mercado pero NO en el otro. El mercado que NO tomó el nivel muestra debilidad — confirmando que el Turtle Soup en el otro es falso. SMT es herramienta de CONFIRMACIÓN.",donna:"El SMT confirma el turtle soup. Si Nasdaq toma el alto y S&P 500 no — el alto del Nasdaq es falso."},
    {icon:"📊",title:"Los principales pares de SMT",body:"Nasdaq ↔ S&P 500. EUR/USD ↔ DXY (inverso). GBP/USD ↔ DXY (inverso). Oro ↔ Plata. Bitcoin ↔ Ethereum. Si DXY hace un Turtle Soup bajista, eso confirma sesgo alcista en EUR/USD.",donna:"DXY bajista = EUR alcista. DXY alcista = EUR bajista. Siempre mira DXY cuando operas Forex."},
    {icon:"🎯",title:"Cómo usar el SMT",body:"Tienes señal de entrada en Nasdaq. Revisa S&P 500. ¿También hizo el mismo Turtle Soup? Sí — confirmación fuerte. S&P 500 FALLÓ en hacer el movimiento (SMT) — el Turtle Soup del Nasdaq está aún MÁS confirmado.",donna:"SMT no se usa como entrada independiente. Se usa como confirmación. Aumenta tu convicción."},
    {icon:"⚡",title:"SMT y failure swings",body:"El mercado con el SMT (no hizo el Turtle Soup) absorbe el failure swing. El otro mercado corre con toda la fuerza al objetivo.",donna:"El mercado que tiene el SMT va a absorber el failure swing. El que sí hizo el turtle soup va a ir con más fuerza."}
  ],
  quiz_en:[
    {q:"An SMT occurs when two correlated markets both make the same high or low.",type:"tf",a:false,exp:"False. An SMT is a DIVERGENCE — one market takes the level and the other does NOT."},
    {q:"DXY making a bearish Turtle Soup confirms what for EUR/USD?",type:"mc",opts:["Bearish EUR","Bullish EUR — inverse relationship","Both make new lows","No correlation"],a:1,exp:"DXY and EUR/USD move INVERSELY. DXY bearish Turtle Soup = bullish EUR/USD setup."},
    {q:"SMT is a standalone entry signal.",type:"tf",a:false,exp:"False. SMT is CONFIRMATION only. You still need key level, timing, and Model #1."},
    {q:"Nasdaq and S&P 500 should move:",type:"mc",opts:["In opposite directions","Together — direct correlation","Nasdaq leads S&P by 30 minutes","There is no correlation"],a:1,exp:"Nasdaq and S&P 500 should both make new highs and lows simultaneously — direct correlation."}
  ],
  quiz_es:[
    {q:"Un SMT ocurre cuando dos mercados correlacionados hacen el mismo alto o bajo.",type:"tf",a:false,exp:"Falso. Un SMT es una DIVERGENCIA — uno toma el nivel y el otro NO."},
    {q:"¿El DXY haciendo un Turtle Soup bajista confirma qué para EUR/USD?",type:"mc",opts:["EUR bajista","EUR alcista — relación inversa","Ambos hacen nuevos bajos","Sin correlación"],a:1,exp:"DXY y EUR/USD se mueven INVERSAMENTE."},
    {q:"El SMT es una señal de entrada independiente.",type:"tf",a:false,exp:"Falso. El SMT es solo CONFIRMACIÓN. Sigues necesitando nivel clave, timing y Modelo #1."},
    {q:"Nasdaq y S&P 500 deberían moverse:",type:"mc",opts:["En direcciones opuestas","Juntos — correlación directa","Nasdaq lidera S&P por 30 minutos","No hay correlación"],a:1,exp:"Nasdaq y S&P 500 deberían hacer nuevos altos y bajos al mismo tiempo — correlación directa."}
  ]
},
  {id:23,icon:"📓",title:"The Trade Journal",title_es:"La Bitácora de Trading",sub:"The difference between a trader and a gambler. No exceptions.",sub_es:"La diferencia entre un trader y un apostador. Sin excepciones.",level:2,
  slides_en:[
    {icon:"📚",title:"Journal or you are gambling",body:"Every professional keeps records. The doctor journals patient histories. The lawyer journals case notes. Without a journal you are not a professional — you are pressing buttons and hoping for the best. That is gambling.",donna:"Sin bitácora — no eres un trader. El journal es la diferencia entre un trader rentable y uno que pierde a largo plazo."},
    {icon:"📷",title:"Before, during, after",body:"Every trade documented at three stages. BEFORE: what do you see? Key level? Bias? DURING: how does price behave? What are you feeling? AFTER: what happened? Did you follow the rules? What would you change?",donna:"Antes: qué ves. Durante: cómo te sientes. Después: qué pasó. Esas tres preguntas — con fotos — son todo tu journal."},
    {icon:"😤",title:"Document your emotions",body:"The emotion you feel DURING a trade is the same that makes or breaks future decisions. Always feel fear at a key level and exit early? Your journal will show that pattern. See it and fix it.",donna:"Escribe la emoción. Miedo, avaricia, duda, euforia. Un día vas a leer tu journal y ver el patrón. Ese día cambia tu trading para siempre."},
    {icon:"🏆",title:"Win-journal-repeat. Lose-journal-avoid.",body:"Romeo's law: Win → journal → repeat the behavior. Lose → journal → identify what to avoid. Miss → journal → catch it next time. The journal makes you a mistake-correcting machine.",donna:"Win, journal, repeat. Lose, journal, avoid. Miss, journal, catch next time. Eso es la ley del journal según Romeo."},
    {icon:"🎯",title:"Use encouraging language",body:"Do not insult yourself in the journal. Write: I exited early because I felt fear. Next time I will trust the 50% target. Be clinical, honest, constructive. Your journal should motivate improvement.",donna:"Sé honesto pero constructivo. No te insultes. Eso solo alimenta el miedo la próxima vez."}
  ],
  slides_es:[
    {icon:"📚",title:"Documenta o estás apostando",body:"Todo profesional lleva registros. El médico documenta historiales. El abogado documenta notas. Sin una bitácora no eres un profesional — eres alguien que aprieta botones y espera lo mejor.",donna:"Sin bitácora — no eres un trader. El journal es la diferencia entre un trader rentable y uno que pierde."},
    {icon:"📷",title:"Antes, durante, después",body:"Cada trade documentado en tres momentos. ANTES: ¿qué ves? Nivel clave, sesgo. DURANTE: ¿cómo se comporta el precio? ¿Qué sientes? DESPUÉS: ¿qué pasó? ¿Seguiste las reglas? ¿Qué cambiarías?",donna:"Antes: qué ves. Durante: cómo te sientes. Después: qué pasó. Con fotos. Esas tres preguntas son todo tu journal."},
    {icon:"😤",title:"Documenta tus emociones",body:"La emoción que sientes DURANTE un trade es la misma que toma o arruina futuras decisiones. ¿Siempre sientes miedo en un nivel clave y sales temprano? Tu journal mostrará ese patrón.",donna:"Escribe la emoción. Un día vas a leer tu journal y ver el patrón. Ese día cambia tu trading para siempre."},
    {icon:"🏆",title:"Gana-documenta-repite. Pierde-documenta-evita.",body:"La ley de Romeo: Gana → documenta → repite el comportamiento. Pierde → documenta → identifica qué evitar. Te lo perdiste → documenta → atrápalo la próxima vez.",donna:"Win, journal, repeat. Lose, journal, avoid. Miss, journal, catch next time. Eso es la ley del journal según Romeo."},
    {icon:"🎯",title:"Usa lenguaje alentador",body:"No te insultes en el journal. Escribe: salí temprano porque sentí miedo. La próxima vez voy a confiar en el objetivo del 50%. Sé clínico, honesto y constructivo.",donna:"Sé honesto pero constructivo. No te insultes. Eso solo alimenta el miedo la próxima vez."}
  ],
  quiz_en:[
    {q:"Journaling is optional if you are profitable.",type:"tf",a:false,exp:"False. Journaling is non-negotiable. Without it you cannot identify patterns in your behavior."},

    {q:"Win → journal → what next?",type:"mc",opts:["Take a break","REPEAT the winning behavior","Change the strategy","Skip next trade"],a:1,exp:"Win → journal → REPEAT the winning behavior. Understanding why you won is as important as why you lost."},

  {id:24,icon:"🚫",title:"The 8 Fatal Errors",title_es:"Los 8 Errores Fatales",sub:"The mistakes that destroy accounts. Know them before they know you.",sub_es:"Los errores que destruyen cuentas. Conócelos antes de que te conozcan.",level:2,
  slides_en:[
    {icon:"❌",title:"Errors 1 and 2",body:"Error 1 — No HTF check: you see a 5-minute setup and enter without checking the 1H/4H/daily context. The HTF was at a major opposing key level. You lost. Always HTF first. Error 2 — Random key levels: you entered on a 1-minute FVG with no HTF context. No reason behind the level — no trade.",donna:"Siempre la temporalidad alta primero. El nivel clave tiene que tener una razón detrás."},
    {icon:"❌",title:"Errors 3 and 4",body:"Error 3 — Trading the 50% of the range: you entered right in the middle of a CRT range. That is accumulation — where Smart Money traps people. Wait for the extremes. Error 4 — Not waiting for Model #1 close: you anticipated the Turtle Soup and entered before confirmation closed. Price reversed and stopped you out.",donna:"Nunca operes el 50% de un rango. El cierre del Modelo #1. No el toque. El cierre."},
    {icon:"❌",title:"Error 5 — Over-leveraging",body:"You see the clearest CRT setup of your life. You risk 10% because you are certain. It does not work. The streak of death does not care about setup quality. Always 1-2% per trade. No exceptions for confidence.",donna:"El mejor setup de tu vida + 10% de tu cuenta = bomba de tiempo. 1-2% siempre."},
    {icon:"❌",title:"Errors 6 and 7",body:"Error 6 — Fighting the liquidity objective: entering without identifying where price is GOING first. Always identify your target before your entry. Error 7 — Ignoring the time: the right setup at the wrong time loses. Always verify you are in a Kill Zone.",donna:"Identifica el objetivo antes de la entrada. Siempre. Y si no estás en un kill zone — no estás en un trade."},
    {icon:"❌",title:"Error 8 — Blaming the system",body:"The system is not wrong. Your analysis was wrong. Every losing trade has a reason: wrong time, wrong key level, wrong timeframe alignment, or a rule was broken. Find the error every single time. That is what the journal is for.",donna:"El sistema nunca se equivoca. Tu análisis se equivocó. Encuentra la razón. Siempre hay una razón. Para eso es el journal."}
  ],
  slides_es:[
    {icon:"❌",title:"Errores 1 y 2",body:"Error 1 — Sin verificar la temporalidad alta: ves un setup en 5 minutos y entras sin verificar el contexto 1H/4H/diario. Error 2 — Niveles clave aleatorios: entraste porque había un FVG en 1 minuto sin contexto de temporalidad alta.",donna:"Siempre la temporalidad alta primero. El nivel clave tiene que tener una razón detrás."},
    {icon:"❌",title:"Errores 3 y 4",body:"Error 3 — Operar el 50% del rango: entraste justo en el medio de un rango de CRT. Eso es acumulación. Espera los extremos. Error 4 — No esperar el cierre del Modelo #1: anticipaste el Turtle Soup y entraste antes de que cerrara la confirmación.",donna:"Nunca operes el 50% de un rango. El cierre del Modelo #1. No el toque. El cierre."},
    {icon:"❌",title:"Error 5 — Sobreapalancar",body:"Ves el setup de CRT más claro de tu vida. Arriesgas el 10% porque estás SEGURO. No funciona. La racha de la muerte no le importa la calidad del setup. Siempre 1-2% por trade.",donna:"El mejor setup de tu vida + 10% de tu cuenta = bomba de tiempo. 1-2% siempre."},
    {icon:"❌",title:"Errores 6 y 7",body:"Error 6 — Luchar contra el objetivo de liquidez: entrar sin identificar primero hacia DÓNDE va el precio. Siempre identifica el objetivo antes de la entrada. Error 7 — Ignorar el tiempo: el setup correcto a la hora incorrecta pierde.",donna:"Identifica el objetivo antes de la entrada. Siempre. Y si no estás en un kill zone — no estás en un trade."},
    {icon:"❌",title:"Error 8 — Culpar al sistema",body:"El sistema no está equivocado. Tu análisis estuvo equivocado. Cada trade perdedor tiene una razón: hora incorrecta, nivel clave incorrecto, alineación incorrecta, o una regla rota. Encuentra el error. Para eso es el journal.",donna:"El sistema nunca se equivoca. Tu análisis se equivocó. Encuentra la razón. Siempre hay una razón."}
  ],
  quiz_en:[
    {q:"The system is sometimes wrong — CRT can just fail.",type:"tf",a:false,exp:"False. The system does not fail — the analysis does. Every losing trade has a reason."},
    {q:"Trading the 50% of a CRT range is a valid entry.",type:"tf",a:false,exp:"False. The 50% is accumulation — Smart Money builds liquidity there. Wait for the extremes."},
    {q:"Risking 10% on a very clear setup is justified.",type:"tf",a:false,exp:"False. No setup justifies more than 1-2%."},
    {q:"Error #4 is:",type:"mc",opts:["Entering after Model #1 close","Entering BEFORE Model #1 close is confirmed","Using too wide a stop","Entering at right key level"],a:1,exp:"Error #4: entering before Model #1 close is confirmed. Price reverses before the Turtle Soup is complete."}
  ],
  quiz_es:[
    {q:"El sistema a veces está equivocado — CRT simplemente puede fallar.",type:"tf",a:false,exp:"Falso. El sistema no falla — el análisis sí. Cada trade perdedor tiene una razón."},
    {q:"Operar el 50% de un rango de CRT es una entrada válida.",type:"tf",a:false,exp:"Falso. El 50% es acumulación. Espera los extremos."},
    {q:"Arriesgar el 10% en un setup muy claro está justificado.",type:"tf",a:false,exp:"Falso. Ningún setup justifica más del 1-2%."},
    {q:"El Error #4 es:",type:"mc",opts:["Entrar después del cierre del M1","Entrar ANTES de que se confirme el cierre del M1","Usar stop muy amplio","Entrar en el nivel clave correcto"],a:1,exp:"Error #4: entrar antes de que se confirme el cierre del Modelo #1."}
  ]
},
  {id:25,icon:"🏦",title:"Funded Accounts — The Full Picture",title_es:"Cuentas Fondeadas — El Cuadro Completo",sub:"The most scalable path in trading. How to use it correctly.",sub_es:"El camino más escalable en el trading. Cómo usarlo correctamente.",level:2,
  slides_en:[
    {icon:"💡",title:"What funded accounts are",body:"Funded firms give you access to their capital. You pay a challenge fee, meet profit and drawdown rules to pass, and they fund you. You keep 70-90% of the profits. It is the most scalable model in retail trading.",donna:"Las cuentas fondeadas son la manera más escalable de volverse millonario en el trading."},
    {icon:"📐",title:"The real numbers",body:"A $50,000 account might cost $100-300 to challenge. Drawdown is typically $2,000-5,000. At 1% risk: $500 per trade. At 1:3 RR: $1,500 per winning trade. Pass the challenge and those numbers multiply.",donna:"Arriesgas $100-300 para acceder a $50,000 de capital. Con 1:3, cada win es $1,500."},
    {icon:"🔢",title:"Scaling multiple accounts",body:"Once one account works, scale to two, then three, then ten. Ten accounts at $50,000 each = $500,000 of capital. At 1% risk per account: each win = $15,000 across all accounts (1:3 RR).",donna:"Un trade bien ejecutado en 10 cuentas de $50K = $15,000 de ganancia. Ese es el poder de escalar cuentas fondeadas."},
    {icon:"⚠️",title:"Rules that must never be broken",body:"Every funded account has daily loss limits and overall drawdown limits. Hit the daily limit — stop trading that day. The number one cause of funded account failure: breaking risk rules, not bad strategy.",donna:"Si rompes las reglas de riesgo en fondeo, pierdes la cuenta y el challenge fee. Cuida el drawdown como lo más valioso."},
    {icon:"🎯",title:"Demo first — always",body:"Nobody should attempt a funded challenge without first proving consistent profitability in demo trading. A funded challenge is a job application, not practice. Show up with a system, a journal, and a demo track record.",donna:"Demo trading primero. Siempre. El challenge de fondeo no es para practicar. Es para demostrar que ya sabes."}
  ],
  slides_es:[
    {icon:"💡",title:"Qué son las cuentas fondeadas",body:"Las firmas fondeadas te dan acceso a su capital. Pagas una tarifa de challenge, cumples reglas de ganancia y drawdown para pasar, y te fondean. Te quedas el 70-90% de las ganancias.",donna:"Las cuentas fondeadas son la manera más escalable de volverse millonario en el trading."},
    {icon:"📐",title:"Los números reales",body:"Una cuenta de $50,000 puede costar $100-300 para el challenge. El drawdown es típicamente $2,000-5,000. Al 1% de riesgo: $500 por trade. Al 1:3 RR: $1,500 por trade ganador.",donna:"Arriesgas $100-300 para acceder a $50,000 de capital. Con 1:3, cada win es $1,500."},
    {icon:"🔢",title:"Escalar múltiples cuentas",body:"Una vez que una cuenta funciona, escala a dos, luego tres, luego diez. Diez cuentas de $50,000 = $500,000 de capital. Al 1% de riesgo en todas: cada win = $15,000 (1:3 RR).",donna:"Un trade bien ejecutado en 10 cuentas de $50K = $15,000 de ganancia."},
    {icon:"⚠️",title:"Reglas que nunca deben romperse",body:"Toda cuenta fondeada tiene límites de pérdida diaria y drawdown total. Alcanza el límite diario — deja de operar ese día. La causa número uno de fallos: romper reglas de riesgo, no mala estrategia.",donna:"Si rompes las reglas de riesgo en fondeo, pierdes la cuenta y el challenge fee."},
    {icon:"🎯",title:"Demo primero — siempre",body:"Nadie debería intentar un challenge fondeado sin primero demostrar rentabilidad consistente en demo. Un challenge fondeado es una solicitud de empleo, no práctica.",donna:"Demo trading primero. Siempre. El challenge de fondeo no es para practicar."}
  ],
  quiz_en:[
    {q:"Use a funded account to practice CRT.",type:"tf",a:false,exp:"False. Funded challenges are job applications. Practice in demo first, then challenge when you have a consistent track record."},
    {q:"Percentage of profits you keep from a funded account:",type:"mc",opts:["100%","0%","70-90%","50%"],a:2,exp:"Most funded firms: 70-90% profits to you."},
    {q:"Main reason traders fail funded challenges is bad strategy.",type:"tf",a:false,exp:"False. Main reason is breaking RISK RULES — daily loss limits or drawdown limits from emotional trading."},
    {q:"10 accounts at $50K, 1% risk, 1:3 RR — profit per winning trade?",type:"mc",opts:["$500","$1,500","$5,000","$15,000"],a:3,exp:"$50K × 1% = $500 per account × 3 = $1,500 per account × 10 accounts = $15,000."}
  ],
  quiz_es:[
    {q:"Usa una cuenta fondeada para practicar CRT.",type:"tf",a:false,exp:"Falso. Los challenges fondeados son solicitudes de empleo. Practica en demo primero."},
    {q:"¿Qué porcentaje de las ganancias te quedas de una cuenta fondeada?",type:"mc",opts:["100%","0%","70-90%","50%"],a:2,exp:"La mayoría de las firmas: 70-90% de ganancias para ti."},
    {q:"La razón principal por la que los traders fallan challenges fondeados es la mala estrategia.",type:"tf",a:false,exp:"Falso. La razón principal es romper las REGLAS DE RIESGO."},
    {q:"10 cuentas de $50K, 1% riesgo, 1:3 RR — ganancia por trade ganador?",type:"mc",opts:["$500","$1,500","$5,000","$15,000"],a:3,exp:"$50K × 1% = $500 por cuenta × 3 = $1,500 × 10 cuentas = $15,000."}

  {id:26,icon:"🏗️",title:"Top-Down Analysis",title_es:"Análisis Top-Down",sub:"Build a complete trade from monthly to 1-minute. Every single time.",sub_es:"Construye un trade completo desde mensual hasta 1 minuto. Siempre.",level:3,
  slides_en:[
    {icon:"🌍",title:"Always start at the top",body:"Top-down analysis: always start from the highest timeframe and work down. Monthly → Weekly → Daily → 4H → 1H → 15min → 5min → 1min. Every level adds context and narrows your focus. By the 1-minute chart you should have a very specific entry area.",donna:"Siempre empieza arriba. El mensual te dice por qué. El semanal cómo. El diario cuándo. El 4H y 1H el CRT. El 15 o 5 minutos la manipulación. El 1 minuto la entrada."},
    {icon:"📅",title:"Questions at each level",body:"Monthly: overall trend and open CRTs. Weekly: which AMD day, key level. Daily: above or below daily open, bias. 4H/1H: where is the CRT and key level. 15min/5min: has price touched the key level. 1min: is there a Model #1. Answer each before moving to the next level.",donna:"Esas son las preguntas en cada temporalidad. No entras en la siguiente hasta que puedas responder la anterior."},
    {icon:"⏳",title:"Patience is the real skill",body:"The hard part of top-down analysis is not the analysis — it is the waiting. You do your analysis, mark your levels, set vertical lines. Then you wait. Maybe 40 minutes. Maybe 2 hours. Nothing. That is fine. The market is not going anywhere.",donna:"Sebastian grabó un video esperando 40 minutos a una entrada. Ese es el trading real. Preparación, espera, ejecución."},
    {icon:"🔑",title:"The 7-item checklist",body:"Before pressing the button: 1) HTF bias clear. 2) Key level identified. 3) In a Kill Zone. 4) Candle 2 has touched key level. 5) ITF structure confirmed. 6) LTF Model #1 close confirmed. 7) Risk 1-2% max. All 7 — execute. One missing — wait.",donna:"Siete checks. Todos los siete. Si uno falta — no presiones el botón. No es una sugerencia. Es el proceso."},
    {icon:"📊",title:"The Sunday ritual",body:"Every Sunday before the market opens: monthly → daily top-down. Mark your levels, mark vertical lines for candle openings, write your bias. During the week you are just waiting for pre-identified setups — not hunting randomly.",donna:"Domingo antes de que abra el mercado: análisis top-down completo. Toda la semana solo esperas los setups que ya identificaste."}
  ],
  slides_es:[
    {icon:"🌍",title:"Siempre empieza arriba",body:"Análisis top-down: siempre empieza desde la temporalidad más alta y baja. Mensual → Semanal → Diario → 4H → 1H → 15min → 5min → 1min. Cada nivel añade contexto y estrecha tu enfoque.",donna:"Siempre empieza arriba. El mensual te dice por qué. El semanal cómo. El diario cuándo. El 4H y 1H el CRT. El 15 o 5 minutos la manipulación. El 1 minuto la entrada."},
    {icon:"📅",title:"Preguntas en cada nivel",body:"Mensual: tendencia general y CRTs abiertos. Semanal: qué día AMD, nivel clave. Diario: por encima o por debajo de la apertura diaria, sesgo. 4H/1H: dónde está el CRT y el nivel clave. 15min/5min: ¿el precio tocó el nivel clave. 1min: ¿hay un Modelo #1.",donna:"Esas son las preguntas en cada temporalidad. No entras en la siguiente hasta que puedas responder la anterior."},
    {icon:"⏳",title:"La paciencia es la habilidad real",body:"La parte difícil del análisis top-down no es el análisis — es la espera. Haces tu análisis, marcas tus niveles, pones tus verticales. Luego esperas. Quizás 40 minutos. Quizás 2 horas. Nada. Está bien.",donna:"Sebastian grabó un video esperando 40 minutos a una entrada. Ese es el trading real. Preparación, espera, ejecución."},
    {icon:"🔑",title:"El checklist de 7 items",body:"Antes de presionar el botón: 1) Sesgo de temporalidad alta claro. 2) Nivel clave identificado. 3) En un Kill Zone. 4) Vela 2 tocó el nivel clave. 5) Estructura de temporalidad intermedia confirmada. 6) Cierre del Modelo #1 de temporalidad baja confirmado. 7) Riesgo máximo 1-2%. Los 7 — ejecuta.",donna:"Siete checks. Todos los siete. Si uno falta — no presiones el botón."},
    {icon:"📊",title:"El ritual del domingo",body:"Cada domingo antes de que abra el mercado: análisis top-down mensual → diario. Marca niveles, marca verticales para aperturas de velas, escribe tu sesgo. Durante la semana solo esperas los setups que ya identificaste.",donna:"Domingo antes de que abra el mercado: análisis top-down completo. Toda la semana solo esperas los setups que ya identificaste."}
  ],
  quiz_en:[
    {q:"Top-down analysis starts from the 1-minute chart upward.",type:"tf",a:false,exp:"False. Top-down starts from the HIGHEST timeframe (monthly) and works DOWN to the 1-minute entry."},
    {q:"Main question on the daily chart:",type:"mc",opts:["What is the 1-min Model #1","Are we above or below the daily open — what is the bias","What happened last year","What does RSI show"],a:1,exp:"Daily: above or below the daily opening price determines where to look for setups."},
    {q:"Do your weekly analysis every Monday morning.",type:"tf",a:false,exp:"False. Do it SUNDAY before the market opens. Enter the week with levels already marked."},
    {q:"If one of the 7 checklist items is missing:",type:"mc",opts:["Enter anyway if confident","Skip it — 6 of 7 is fine","Do not enter — wait for all 7","Enter with half size"],a:2,exp:"Do not enter. All 7 must align. Patience is the skill."}
  ],
  quiz_es:[
    {q:"El análisis top-down empieza desde el gráfico de 1 minuto hacia arriba.",type:"tf",a:false,exp:"Falso. Top-down empieza desde la temporalidad MÁS ALTA (mensual) y baja hasta la entrada en 1 minuto."},
    {q:"Pregunta principal en el gráfico diario:",type:"mc",opts:["¿Cuál es el Modelo #1 de 1 minuto","¿Estamos por encima o por debajo de la apertura diaria — cuál es el sesgo","¿Qué pasó el año pasado","¿Qué muestra el RSI"],a:1,exp:"Diario: por encima o por debajo de la apertura diaria determina dónde buscar setups."},
    {q:"Haz tu análisis semanal cada lunes por la mañana.",type:"tf",a:false,exp:"Falso. Hazlo el DOMINGO antes de que abra el mercado."},
    {q:"Si uno de los 7 items del checklist falta:",type:"mc",opts:["Entrar de todos modos si estás confiado","Saltarlo — 6 de 7 está bien","No entrar — esperar los 7","Entrar con la mitad del tamaño"],a:2,exp:"No entres. Los 7 deben alinearse. La paciencia es la habilidad."}
  ]
},
  {id:27,icon:"🎬",title:"1H CRT — Nasdaq Walkthrough",title_es:"CRT de 1H — Walkthrough Nasdaq",sub:"The 8-9-10 AM model. Step by step. Your daily setup.",sub_es:"El modelo 8-9-10 AM. Paso a paso. Tu setup diario.",level:3,
  slides_en:[
    {icon:"⏰",title:"The 8-9-10 AM model",body:"In Nasdaq and S&P 500, the most common CRT is the 1-hour model. 8 AM = accumulation (candle 1). 9 AM = manipulation (candle 2 — Turtle Soup at key level). 10 AM = distribution (candle 3 — your trade). The 9:30 AM stock market open is always a liquidity injection. Repeats every trading day.",donna:"La apertura de las 9:30 AM siempre es una inyección de liquidez. Siempre. Eso es la manipulación más común de Nasdaq."},
    {icon:"📋",title:"Step 1 — Mark the 8 AM range",body:"Before 9 AM opens, mark the HIGH and LOW of the 8 AM candle with the Fibonacci tool (0, 0.5, 1 only). This is Candle 1. Draw a vertical line at the 9 AM opening. Do not drop to lower timeframes until the 9 AM candle touches a key level.",donna:"Marca el alto y el bajo de las 8 AM con el Fibonacci. Marca la vertical de las 9 AM. Ese es tu setup. Ahora esperas."},
    {icon:"🔍",title:"Step 2 — Identify the key level",body:"On the 1-hour or 4-hour chart, identify the key level near the 8 AM range. FVG, OB, previous session high or low. This is the level Candle 2 must touch to produce the Turtle Soup. Without this level — no trade.",donna:"El nivel clave para un CRT de una hora debe ser de una hora o superior. Sin nivel clave, sin trade."},
    {icon:"📉",title:"Step 3 — Wait for manipulation",body:"9 AM candle opens. If bearish — wait for price to spike UP above 8 AM high into your key level. If bullish — wait for price to dip DOWN below 8 AM low into your key level. Do not touch lower timeframes until this touch happens.",donna:"Quedas sentado en la temporalidad alta esperando. Solo observas hasta que el precio toque el nivel clave."},
    {icon:"⚡",title:"Step 4 — Drop and find Model #1",body:"Once 9 AM candle touches your key level, drop to 15min. Find the specific candle that made the touch. Then drop to 1min. Look for the last thick candle that stabbed the key level. Wait for the next candle to close back in trade direction. That is your Model #1 entry.",donna:"A la hora correcta, en el nivel clave correcto — vas a encontrar el Modelo #1. Cierra por encima — entras. Stop en la mecha. 50% primero."}
  ],
  slides_es:[
    {icon:"⏰",title:"El modelo 8-9-10 AM",body:"En Nasdaq y S&P 500, el CRT más común es el modelo de 1 hora. 8 AM = acumulación (vela 1). 9 AM = manipulación (vela 2 — Turtle Soup en nivel clave). 10 AM = distribución (vela 3 — tu trade). La apertura de las 9:30 AM siempre es inyección de liquidez.",donna:"La apertura de las 9:30 AM siempre es una inyección de liquidez. Siempre. Eso es la manipulación más común de Nasdaq."},
    {icon:"📋",title:"Paso 1 — Marca el rango de las 8 AM",body:"Antes de que abra la vela de las 9 AM, marca el ALTO y el BAJO de la vela de las 8 AM con el Fibonacci (0, 0.5, 1 solo). Este es el rango de la Vela 1. Marca una línea vertical en la apertura de las 9 AM.",donna:"Marca el alto y el bajo de las 8 AM con el Fibonacci. Marca la vertical de las 9 AM. Ese es tu setup. Ahora esperas."},
    {icon:"🔍",title:"Paso 2 — Identifica el nivel clave",body:"En el gráfico de 1 hora o 4 horas, identifica el nivel clave cerca del rango de las 8 AM. FVG, OB, alto o bajo de sesión anterior. Sin este nivel — sin trade.",donna:"El nivel clave para un CRT de una hora debe ser de una hora o superior. Sin nivel clave, sin trade."},
    {icon:"📉",title:"Paso 3 — Espera la manipulación",body:"La vela de las 9 AM abre. Si bajista — espera que el precio suba POR ENCIMA del alto de las 8 AM hacia tu nivel clave. Si alcista — espera que baje POR DEBAJO del bajo. No toques temporalidades menores hasta que ocurra este toque.",donna:"Quedas sentado en la temporalidad alta esperando. Solo observas hasta que el precio toque el nivel clave."},
    {icon:"⚡",title:"Paso 4 — Baja y encuentra el Modelo #1",body:"Una vez que la vela de las 9 AM toca tu nivel clave, baja al gráfico de 15 min. Encuentra la vela específica. Luego baja a 1 min. Busca la última vela gruesa que apuñaló el nivel. Espera el cierre en la dirección del trade. Esa es tu entrada del Modelo #1.",donna:"A la hora correcta, en el nivel clave correcto — vas a encontrar el Modelo #1. Cierra por encima — entras. Stop en la mecha. 50% primero."}
  ],
  quiz_en:[
    {q:"In the Nasdaq 1H CRT, the 9 AM candle is the manipulation candle.",type:"tf",a:true,exp:"True. 9 AM = Candle 2 = Manipulation. It pushes into the key level, sweeping the 8 AM high or low."},
    {q:"Drop to 1-minute as soon as the session opens at 7 AM.",type:"tf",a:false,exp:"False. Stay on HTF until the 9 AM candle TOUCHES your key level. Only then drop."},
    {q:"First partial profit target on a 1H Nasdaq CRT:",type:"mc",opts:["100% of range immediately","50% of the 8 AM range","Previous day high or low","Random HTF level"],a:1,exp:"First target = 50% of the 8 AM candle range. Take partials here, move stop to break-even."},
    {q:"After taking partials at 50%, move stop-loss to:",type:"mc",opts:["Break-even","Original stop","Remove stop","25% of range"],a:0,exp:"Move stop to break-even after taking partials at 50%. Protects profits and ensures no loss on remaining position."}
  ],
  quiz_es:[

const timeAgo=(ts)=>{
  const m=Math.floor((Date.now()-ts)/60000);
  if(m<60)return`${m}m`;
  const h=Math.floor(m/60);
  if(h<24)return`${h}h`;
  return`${Math.floor(h/24)}d`;
};

const getStats=(trades)=>{
  const closed=trades.filter(t=>t.status==="closed");
  const wins=closed.filter(t=>t.result&&(t.result.toLowerCase().includes("win")||t.result.includes("Ganada"))).length;
  const losses=closed.filter(t=>t.result&&(t.result.toLowerCase().includes("loss")||t.result.includes("rdida"))).length;
  return{total:trades.length,closed:closed.length,wins,losses,winRate:closed.length>0?Math.round(wins/closed.length*100):0};
};

async function generateLesson(chapter, lang){
  // Static content — instant, always works
  const _SL=window.SL||{};
  const langData = _SL[lang] || _SL['en'] || {};
  // Spanish chapters may be at top-level SL[id] if SL.es is incomplete
  const chData = langData[chapter.id]
    || (lang==="es"?_SL[chapter.id]:null)
    || (_SL['en']||{})[chapter.id];
  if(chData){
    // Normalize keys for rendering
    const slides = chData.s.map(s=>({icon:s.icon,title:s.title,body:s.body,donna:s.donna}));
    const quiz = chData.q.map(q=>({q:q.q,type:q.type,opts:q.opts,a:q.a,exp:q.exp}));
    return {slides,quiz};
  }
  // Fallback: this chapter doesn't have static content yet
  return {
    slides:[{icon:"🚧",title:"Coming Soon",body:"This chapter is being prepared. Check back soon!",donna:"Good things take time. Go review the previous chapters while you wait."}],
    quiz:[{q:"The academy chapters are added progressively.",type:"tf",a:true,exp:"True. Chapters are released as they're refined and ready."}]
  };
}

function VoiceButton({onResult,lang}){
  const [listening,setListening]=useState(false);
  const recRef=useRef(null);
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  const toggle=()=>{
    if(listening){recRef.current?.stop();setListening(false);return;}
    try{
      const r=new SR();
      r.lang=lang==="es"?"es-ES":"en-US";
      r.continuous=false;r.interimResults=false;
      r.onresult=(e)=>{const txt=e.results[0][0].transcript;onResult(txt);};
      r.onend=()=>setListening(false);
      r.onerror=(ev)=>{
      setListening(false);
      const msg={
        "not-allowed":lang==="es"?"Permiso de micrófono denegado. Actívalo en la configuración del navegador.":"Mic permission denied. Enable it in browser settings.",
        "no-speech":lang==="es"?"No se detectó voz. Inténtalo de nuevo.":"No speech detected. Try again.",
        "network":lang==="es"?"Error de red con el micrófono.":"Network error with mic.",
      }[ev.error]||(lang==="es"?"Micrófono no disponible.":"Mic unavailable.");
      showNotif(msg);
    };
      recRef.current=r;r.start();setListening(true);

  };
  return(

}

function TradeLogModal({lang,mode,activeTrade,onSave,onClose}){
  const t=T[lang];
  const isClose=mode==="close"&&activeTrade;
  const [step,setStep]=useState(0);
  const [data,setData]=useState(isClose?{...activeTrade}:{});
  const [textVal,setTextVal]=useState("");

  const openSteps=[
    {key:"asset",label:t.tradeAsset,type:"text",ph:lang==="es"?"Ej: Gold, EUR/USD, NQ":"e.g. Gold, EUR/USD, NQ"},
    {key:"direction",label:t.tradeDirection,type:"pills",opts:lang==="es"?["📈 Alcista","📉 Bajista"]:["📈 Bullish","📉 Bearish"]},
    {key:"killZone",label:t.tradeKZ,type:"pills",opts:lang==="es"?["🌅 Londres","🗽 NY Open","🌆 NY PM (advanced)","🌏 Asia","⏰ Sin KZ"]:["🌅 London","🗽 NY Open","🌆 NY PM (advanced)","🌏 Asia","⏰ No KZ"]},
    {key:"emotion",label:t.tradeEmotion,type:"pills",opts:lang==="es"?["😌 Calmado","💪 Confiado","😰 Ansioso","😤 FOMO"]:["😌 Calm","💪 Confident","😰 Anxious","😤 FOMO"]},
    {key:"reason",label:t.tradeReason,type:"text",ph:lang==="es"?"Estructura + sesgo HTF...":"Structure + HTF bias..."},
    {key:"riskMode",label:lang==="es"?"¿Cómo manejas el riesgo?":"How do you manage risk?",type:"pills",opts:lang==="es"?["📊 Porcentaje","📈 Contratos"]:["📊 Percentage","📈 Contracts"]},
    {key:"riskMode",label:lang==="es"?"¿Cómo manejas el riesgo?":"How do you manage risk?",type:"pills",opts:lang==="es"?["📊 Porcentaje","📈 Contratos"]:["📊 Percentage","📈 Contracts"]},{key:"risk",label:lang==="es"?"Cantidad / Contratos":"Amount / Contracts",type:"text",ph:lang==="es"?"ej: 1%, 2R, 1 contrato":"e.g. 1%, 2R, 1 contract"},
  ];
  const closeSteps=[
    {key:"result",label:t.tradeResult,type:"pills",opts:lang==="es"?["✅ Ganada","❌ Pérdida","➡️ Empate"]:["✅ Win","❌ Loss","➡️ Break Even"]},
    {key:"rMultiple",label:t.tradeR,type:"text",ph:"e.g. 2.5R"},
    {key:"didRight",label:t.tradeDoneRight,type:"text",ph:lang==="es"?"Seguí el plan...":"Followed the plan..."},
    {key:"wouldChange",label:t.tradeWouldChange,type:"text",ph:lang==="es"?"Esperar la KZ...":"Wait for KZ..."},
  ];
  const steps=isClose?closeSteps:openSteps;
  const cur=steps[step];
  if(!cur)return null;

  const next=(val)=>{
    // Normalize result pill text to clean value
    if(cur.key==="result"){
      val=val.includes("Win")||val.includes("Ganada")?"win":
          val.includes("Loss")||val.includes("Pérdida")?"loss":
          val.includes("Break")||val.includes("Empate")?"be":val;
    }
    const nd={...data,[cur.key]:val};
    setData(nd);setTextVal("");
    if(step<steps.length-1){setStep(step+1);}
    else{
      const trade={
        ...nd,
        id:activeTrade?.id||Date.now(),
        status:isClose?"closed":"open",
        openedAt:activeTrade?.openedAt||Date.now(),
        closedAt:isClose?Date.now():undefined,
      };
      onSave(trade);
    }
  };

  return(
    <div style={{position:"absolute",inset:0,zIndex:992,background:"rgba(0,0,0,.78)",display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
      <div className="slide-up-panel" style={{background:"#111",borderRadius:"22px 22px 0 0",padding:"0 0 24px"}}>
        <div style={{display:"flex",justifyContent:"center",padding:"12px 0 4px"}}>
          <div style={{width:36,height:4,borderRadius:2,background:DARK2}}/>
        </div>
        <div style={{padding:"8px 20px 16px",borderBottom:`1px solid ${DARK}`,display:"flex",alignItems:"center",gap:10}}>
          <DAvatar size={32}/>
          <div>
            <div style={{fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:15}}>{isClose?t.tradeClose:t.journalLog}</div>
            <div style={{fontSize:12,color:MUTED}}>{step+1} / {steps.length}</div>
          </div>
          <div style={{marginLeft:"auto",display:"flex",gap:4}}>
            {steps.map((_,i)=><div key={i} style={{width:20,height:3,borderRadius:2,background:i<=step?RED:DARK2,transition:"background .2s"}}/>)}
          </div>
        </div>
        <div style={{padding:"20px 20px 8px"}}>
          <div style={{fontSize:16,fontWeight:700,color:"#fff",marginBottom:16}}>{cur.label}</div>
          {cur.type==="pills"?(
            <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
              {cur.opts.map(o=>(
                <button key={o} onClick={()=>next(o)}
                  style={{padding:"12px 18px",borderRadius:14,background:`${BLUE}18`,border:`1.5px solid ${BLUE}55`,color:BLUE,fontSize:15,fontWeight:600,cursor:"pointer"}}>
                  {o}
                </button>
              ))}
            </div>
          ):(
            <div style={{display:"flex",gap:10}}>
              <input autoFocus value={textVal} onChange={e=>setTextVal(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&textVal.trim()&&next(textVal.trim())}
                placeholder={cur.ph||""}
                style={{flex:1,padding:"13px 16px",borderRadius:12,background:DARK,border:`1.5px solid ${DARK2}`,color:"#fff",fontSize:15,outline:"none"}}/>
              <button onClick={()=>textVal.trim()&&next(textVal.trim())}
                style={{padding:"13px 20px",borderRadius:12,background:RED,border:"none",cursor:"pointer",fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:14,color:"#fff"}}>
                {lang==="es"?"Sigue":"Next"}
              </button>
            </div>
          )}
        </div>
        <button onClick={onClose} style={{display:"block",margin:"12px auto 0",background:"none",border:"none",cursor:"pointer",fontSize:13,color:MUTED,padding:"4px 16px"}}>
          {lang==="es"?"Cancelar":"Cancel"}
        </button>
      </div>
    </div>
  );
}
