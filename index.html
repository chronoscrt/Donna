  {id:1,icon:"🕯️",title:"Reading Candles",sub:"What every candle is actually telling you.",level:1,desc:"The four parts of a candlestick (OHLC), body vs wick, why the CLOSE is the single most important data point. Closes reveal intention. Wicks reveal deception. A wick above a high that closes inside = failed attempt = bearish. A close above a high = commitment = bullish. Include specific price examples with real numbers."},
  {id:2,icon:"📊",title:"Market States",sub:"First question every time you open a chart.",level:1,desc:"Three market states: trending (clear direction), ranging (bouncing between two levels), choppy (no trade). How to identify each. The devastating mistake of applying trending strategy in a ranging market. The no-man\'s-land concept — never trade the middle of a range."},

  {id:7,icon:"🐢",title:"The Fake Breakout",sub:"The engine behind every big move.",level:3,desc:"The fake breakout precedes every major move. Price pushes above an old high, triggers buy stops, collects liquidity, then reverses. Three types: continuation, range, reversal. Rule 1: never buy above old high, never sell below old low. Reversal type at HTF key level = highest quality."},
  {id:8,icon:"📅",title:"The 3-Candle Sequence",sub:"Accumulation · Manipulation · Distribution.",level:3,desc:"Every price move follows AMD: C1 accumulates the range, C2 performs the fake breakout (never trade this candle), C3 is the real move. Weekly: Monday=accumulation, Tuesday=manipulation and real high/low, Wednesday-Thursday=distribution."},
  {id:9,icon:"👁️",title:"Reading Bias",sub:"Closes reveal. Wicks deceive.",level:1,desc:"How to read daily bias from candle closes. Bullish trades only below the daily open. Bearish trades only above the daily open. Prior daily closed above old high = bullish bias. Wicked above but closed inside = bearish bias. This one filter eliminates most bad trades."},

  {id:14,icon:"📦",title:"Order Blocks",sub:"Where big money left its footprint.",level:2,desc:"The last candle of the opposite color before a major move = Order Block. In a bullish market, the last bearish candle before the impulse up = support. The 50% rule. Higher TF Order Blocks carry more weight."},
  {id:15,icon:"🔄",title:"Flipped Levels",sub:"Old support becomes resistance — and vice versa.",level:2,desc:"Breaker Blocks: Order Blocks that were broken and flipped. Three price passes through same area = most balanced location on chart. Least drawdown of all entries. Same event as the true Change of Character."},
  {id:16,icon:"🔢",title:"Five Entry Points",sub:"The full sequence. Never go backward.",level:3,desc:"E1: Turtle Soup wick (live, hardest, highest reward). E2: Model 1 close (standard entry). E3: Breaker Block (least drawdown). E4: OTE 60-75% retrace (KoD often traps here). E5: Kiss of Death (most violent, most certain). Never go backward — if E3 formed, only E5 remains."},
  {id:17,icon:"🔗",title:"Correlated Markets",sub:"When one market tells on another.",level:2,desc:"SMT divergence: correlated assets not confirming each other. EUR/USD vs DXY (inverse). BTC vs ETH (direct). S&P vs NASDAQ (direct). One takes a high the other doesn\'t = fake move in the one that took it. Never trade SMT alone — combine with Model 1 at structural level."},

const DONNA={
  gradeComment:(g,l)=>{
    const en={"A+":"All 8. Perfect setup. Execute with discipline.","A":"Strong. One condition open — know what it is.","A-":"Solid but two gaps. Size down slightly.","B+":"Decent. Proceed with half size.","B-":"More missing than confirmed. Are you sure?","F":"Don\'t trade this. Wait for a clean setup."};

    return(l==="es"?es:en)[g]||"";
  },
  fallback:(l,m)=>{
    const a=l==="es"
      ?m==="advanced"?["¿Cuál es tu sesgo HTF?","¿Dónde está tu objetivo de liquidez?","¿Estás en una Kill Zone?","¿Pasaste el checklist?","¿Qué te dice la vela mayor?"]
                     :["Buena pregunta. Una idea a la vez.","El cierre siempre revela la verdad.","Estás haciendo las preguntas correctas.","Déjame explicarlo simple.","Piensa en el mercado como un río."]
      :m==="advanced"?["What\'s your HTF bias?","Where\'s your liquidity target?","Are you in a Kill Zone?","Did you run the checklist?","What does the higher candle tell you?"]
                     :["Good question. One idea at a time.","The close always tells the truth.","You\'re asking the right things.","Let me break that down simply.","Think of price like a river."];
    return a[Math.floor(Math.random()*a.length)];
  },
  tradeReview:(trade,trades,l)=>{
    const closed=trades.filter(t=>t.status==="closed"&&t.id!==trade.id);
    const noKZ=closed.filter(t=>t.killZone==="No KZ"&&t.result==="loss").length;
    const fomo=closed.filter(t=>(t.emotion==="FOMO"||t.emotion==="Anxious"||t.emotion==="😤 FOMO"||t.emotion==="😰 Ansioso")&&t.result==="loss").length;
    if(l==="es"){
      let msg=`${trade.asset} ${trade.direction} registrado. `;
      if(noKZ>=2)msg+=`Nota: tienes ${noKZ} pérdidas fuera de Kill Zone. Ese patrón te está costando. `;
      if(fomo>=2)msg+=`Y ${fomo} pérdidas con FOMO o ansiedad. Las emociones están operando por ti. `;
      msg+=`¿Checklist completo antes de entrar?`;
      return msg;
    }
    let msg=`${trade.asset} ${trade.direction} logged. `;
    if(noKZ>=2)msg+=`Note: you have ${noKZ} losses outside Kill Zone. That pattern is costing you. `;
    if(fomo>=2)msg+=`And ${fomo} losses with FOMO or anxiety. Your emotions are trading for you. `;
    msg+=`Full checklist before entry?`;
    return msg;
  }
};

const timeAgo=(ts)=>{
  const m=Math.floor((Date.now()-ts)/60000);
  if(m<60)return`${m}m`;
  const h=Math.floor(m/60);
  if(h<24)return`${h}h`;
  return`${Math.floor(h/24)}d`;
};

const getStats=(trades)=>{
  const closed=trades.filter(t=>t.status==="closed");
  const wins=closed.filter(t=>t.result==="win").length;
  const losses=closed.filter(t=>t.result==="loss").length;
  return{total:closed.length,wins,losses,winRate:closed.length>0?Math.round(wins/closed.length*100):0};
};

/* ── LESSON GENERATION ──────────────────────────── */
async function generateLesson(chapter,lang){
  const cacheKey=`lesson_ch${chapter.id}_${lang}`;
  try{const cached=await window.storage.get(cacheKey);if(cached?.value){const d=JSON.parse(cached.value);if(d?.slides?.length>0)return d;}}catch(e){}
  const cfg=COMPLEXITY[chapter.level]||COMPLEXITY[1];
  const isES=lang==="es";
  const sys=`Return ONLY a JSON object. No markdown. No explanation.\nFormat: {"slides":[{"icon":"emoji","title":"5 words","body":"2 sentences with real price number example","donna":"1 short sentence Donna voice"}],"quiz":[{"q":"scenario question","type":"mc","opts":["A","B","C","D"],"a":0,"exp":"1 sentence"}]}\nRules: ${isES?"Spanish only":"English only"}. ${chapter.id<=2?"No jargon":"Use CRT terms"}. Exactly ${cfg.slides} slides and ${cfg.minQ} quiz items. Return JSON only.`;
  const res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-5-20250929",max_tokens:500,system:sys,messages:[{role:"user",content:`Chapter ${chapter.id}: "${chapter.title}". ${chapter.desc}. Level ${chapter.level} (${cfg.label}). Generate ${cfg.slides} slides and ${cfg.minQ} questions in ${lang}.`}]})});
  if(!res.ok)throw new Error(`API ${res.status}`);
  const data=await res.json();
  const text=data.content?.[0]?.text||"";
  const clean=text.replace(/```json|```/g,"").trim();
  const parsed=JSON.parse(clean);
  await window.storage.set(cacheKey,JSON.stringify(parsed));
  return parsed;
}

function buildPrompt(profile,trades,activeTrade){
  const isAdv=profile.mode==="advanced",isES=profile.lang==="es";
  const stats=getStats(trades);
  const closed=trades.filter(t=>t.status==="closed").slice(-10);
  const kz=isES?"Kill Zones: Londres 1-5 AM hora NY · Nueva York 7-11 AM hora NY (NYSE 9:30 AM = mayor inyección de liquidez y momento típico del Candle 2/Turtle Soup) · NY PM 1:30-4 PM":"Kill Zones: London 1-5 AM NY time · New York 7-11 AM NY time (NYSE opens 9:30 AM = biggest liquidity injection and most common time for Candle 2 Manipulation/Turtle Soup) · NY PM 1:30-4 PM";
  const profileCtx=isAdv?`TRADER: ${profile.name}, Advanced. Candle: ${profile.candle||"?"}. Process: ${profile.process||"?"}.`:`TRADER: ${profile.name}, Beginner. Inspired by: ${profile.inspiration||"?"}. Chart exp: ${profile.chartExp||"none"}.`;
  const statsCtx=stats.total>0?`STATS: ${stats.total} trades, ${stats.winRate}% win rate, ${stats.wins}W/${stats.losses}L.`:"No trades logged yet.";
  const tradeHistory=closed.length>0?`\nRECENT TRADES:\n${closed.map(t=>`- ${t.asset} ${t.direction} (${t.killZone||"?"}): ${(t.result||"open").toUpperCase()} ${t.rMultiple?t.rMultiple+"R":""} | Emotion: ${t.emotion||"?"} | Would change: ${t.wouldChange||"N/A"}`).join("\n")}`:"";
  const activeCtx=activeTrade?`\n⚠️ IN A LIVE TRADE RIGHT NOW: ${activeTrade.asset} ${activeTrade.direction} | ${activeTrade.killZone} | Open for ${timeAgo(activeTrade.openedAt)}. Check in. Ask about their 50%, stop, emotion.`:"";
  const noKZ=closed.filter(t=>t.killZone==="No KZ"&&t.result==="loss").length;

  const patternCtx=noKZ>=2?`\nPATTERN: ${noKZ} losses outside Kill Zone — address this proactively.`:"";

  const voice=isAdv?"VOICE — ADVANCED: 2-3 sentences max. Peer-level. Sharp and direct. Challenge sloppy thinking. First response to any setup = a question. Push back before validating. Reference their stats and patterns. End with a challenge or question.":"VOICE — BEGINNER: 3 sentences max. Warm — like a knowledgeable older sibling. One idea at a time. One analogy per concept. Celebrate understanding. Correct kindly with the WHY. End with an engaging question.";
  const chartP=`CHART: 1.Identify timeframe/asset/structure. 2.CRT read: Turtle Soups? Model 1? FVG/OB/Breaker? Liquidity above/below? 3.ONE strongest feature and WHY. 4.ONE risk. 5.End: "What are you seeing here?" Never confirm a trade.`;
  const crt=`CRT: Turtle Soup(wick beyond,closes inside=fake) or True Break(close beyond=real). AMD: C1=Accumulation,C2=Manipulation,C3=Distribution. Model 1: thick candle,nails old high/low,closes inside,close=trigger,stop=above/below wick(fixed),T1=50%,T2=opposite extreme. KoD=always before target. 5 entries never backward. HTF=WHY,ITF=WHAT,LTF=WHEN/WHERE. SMT=divergence+Model1. ${kz}. Risk=1-2%max.`;
  return`You are Donna — CRT trading accountability mentor and coach.
${isES?"Responde en español conversacional.":"Respond in English."}
${profileCtx}
${statsCtx}${tradeHistory}${activeCtx}${patternCtx}${fomoCtx}
${voice}
${chartP}
${crt}
NEVER give financial advice. Never say take a specific trade. ALWAYS be an accountability partner — reference their history when relevant.`;
}

/* ═══════════════════════════════════
   VOICE BUTTON
═══════════════════════════════════ */
function VoiceButton({onResult,lang}){
  const [listening,setListening]=useState(false);
  const recRef=useRef(null);
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  const toggle=()=>{
    if(listening){recRef.current?.stop();setListening(false);return;}
    try{
      const r=new SR();
      r.lang=lang==="es"?"es-ES":"en-US";
      r.continuous=false;r.interimResults=false;
      r.onresult=(e)=>{const txt=e.results[0][0].transcript;onResult(txt);};
      r.onend=()=>setListening(false);
      r.onerror=()=>setListening(false);
      recRef.current=r;r.start();setListening(true);
    }catch(e){setListening(false);}
  };
  return(
    <button onClick={toggle} style={{width:36,height:36,borderRadius:"50%",background:listening?RED:DARK2,border:"none",cursor:"pointer",fontSize:17,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:"#fff",transition:"background .2s",animation:listening?"pulseMic 1s ease-in-out infinite":"none"}}>
      🎤
    </button>
  );
}

function TradeLogModal({lang,mode,activeTrade,onSave,onClose}){
  const t=T[lang];
  const isClose=mode==="close"&&activeTrade;
  const [step,setStep]=useState(0);
  const [data,setData]=useState(isClose?{...activeTrade}:{});
  const [textVal,setTextVal]=useState("");

  const openSteps=[
    {key:"asset",label:t.tradeAsset,type:"text",ph:lang==="es"?"Ej: Gold, EUR/USD, NQ":"e.g. Gold, EUR/USD, NQ"},
    {key:"direction",label:t.tradeDirection,type:"pills",opts:lang==="es"?["📈 Alcista","📉 Bajista"]:["📈 Bullish","📉 Bearish"]},
    {key:"killZone",label:t.tradeKZ,type:"pills",opts:lang==="es"?["🌅 Londres","🗽 NY Open","🌆 NY PM","⏰ Sin KZ"]:["🌅 London","🗽 NY Open","🌆 NY PM","⏰ No KZ"]},
    {key:"emotion",label:t.tradeEmotion,type:"pills",opts:lang==="es"?["😌 Calmado","💪 Confiado","😰 Ansioso","😤 FOMO"]:["😌 Calm","💪 Confident","😰 Anxious","😤 FOMO"]},
    {key:"reason",label:t.tradeReason,type:"text",ph:lang==="es"?"Estructura + sesgo HTF...":"Structure + HTF bias..."},
    {key:"risk",label:t.tradeRisk,type:"pills",opts:["1%","1.5%","2%"]},
  ];
  const closeSteps=[
    {key:"result",label:t.tradeResult,type:"pills",opts:lang==="es"?["✅ Ganada","❌ Pérdida","➡️ Empate"]:["✅ Win","❌ Loss","➡️ Break Even"]},
    {key:"rMultiple",label:t.tradeR,type:"text",ph:"e.g. 2.5R"},
    {key:"didRight",label:t.tradeDoneRight,type:"text",ph:lang==="es"?"Seguí el plan...":"Followed the plan..."},
    {key:"wouldChange",label:t.tradeWouldChange,type:"text",ph:lang==="es"?"Esperar la KZ...":"Wait for KZ..."},
  ];
  const steps=isClose?closeSteps:openSteps;
  const cur=steps[step];
  if(!cur)return null;

  const next=(val)=>{
    const nd={...data,[cur.key]:val};
    setData(nd);setTextVal("");
    if(step<steps.length-1){setStep(step+1);}
    else{
      const trade={
        ...nd,
        id:activeTrade?.id||Date.now(),
        status:isClose?"closed":"open",
        openedAt:activeTrade?.openedAt||Date.now(),
        closedAt:isClose?Date.now():undefined,
      };
      onSave(trade);
    }
  };

  return(
    <div style={{position:"absolute",inset:0,zIndex:992,background:"rgba(0,0,0,.78)",display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
      <div className="slide-up-panel" style={{background:"#111",borderRadius:"22px 22px 0 0",padding:"0 0 24px"}}>
        <div style={{display:"flex",justifyContent:"center",padding:"12px 0 4px"}}>
          <div style={{width:36,height:4,borderRadius:2,background:DARK2}}/>
        </div>
        <div style={{padding:"8px 20px 16px",borderBottom:`1px solid ${DARK}`,display:"flex",alignItems:"center",gap:10}}>
          <DAvatar size={32}/>
          <div>
            <div style={{fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:15}}>{isClose?t.tradeClose:t.journalLog}</div>
            <div style={{fontSize:12,color:MUTED}}>{step+1} / {steps.length}</div>
          </div>
          <div style={{marginLeft:"auto",display:"flex",gap:4}}>
            {steps.map((_,i)=><div key={i} style={{width:20,height:3,borderRadius:2,background:i<=step?RED:DARK2,transition:"background .2s"}}/>)}
          </div>
        </div>
        <div style={{padding:"20px 20px 8px"}}>
          <div style={{fontSize:16,fontWeight:700,color:"#fff",marginBottom:16}}>{cur.label}</div>
          {cur.type==="pills"?(
            <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
              {cur.opts.map(o=>(
                <button key={o} onClick={()=>next(o)}
                  style={{padding:"12px 18px",borderRadius:14,background:`${BLUE}18`,border:`1.5px solid ${BLUE}55`,color:BLUE,fontSize:15,fontWeight:600,cursor:"pointer"}}>
                  {o}
                </button>
              ))}
            </div>
          ):(
            <div style={{display:"flex",gap:10}}>
              <input autoFocus value={textVal} onChange={e=>setTextVal(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&textVal.trim()&&next(textVal.trim())}
                placeholder={cur.ph||""}
                style={{flex:1,padding:"13px 16px",borderRadius:12,background:DARK,border:`1.5px solid ${DARK2}`,color:"#fff",fontSize:15,outline:"none"}}/>
              <button onClick={()=>textVal.trim()&&next(textVal.trim())}
                style={{padding:"13px 20px",borderRadius:12,background:RED,border:"none",cursor:"pointer",fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:14,color:"#fff"}}>
                {lang==="es"?"Sigue":"Next"}
              </button>
            </div>
          )}
        </div>
        <button onClick={onClose} style={{display:"block",margin:"12px auto 0",background:"none",border:"none",cursor:"pointer",fontSize:13,color:MUTED,padding:"4px 16px"}}>
          {lang==="es"?"Cancelar":"Cancel"}
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════
   LESSON MODAL
═══════════════════════════════════ */
function LessonModal({chapter,lang,onClose,onComplete}){
  const t=T[lang];
  const[data,setData]=useState(null);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState(false);
  const[phase,setPhase]=useState("slides");
  const[si,setSi]=useState(0);
  const[qi,setQi]=useState(0);
  const[ans,setAns]=useState(null);
  const[ok,setOk]=useState(null);
  const[score,setScore]=useState(0);
  const[ak,setAk]=useState(0);
  const cfg=COMPLEXITY[chapter.level]||COMPLEXITY[1];

  const load=useCallback(async()=>{
    if(chapter.static){
      setData({slides:chapter.slides,quiz:chapter.quiz});
      setLoading(false);return;
    }
    setLoading(true);setError(false);
    try{const d=await generateLesson(chapter,lang);setData(d);}
    catch(e){setError(true);}
    setLoading(false);
  },[chapter,lang]);

  useEffect(()=>{load();},[load]);

  const slides=data?.slides||[],quiz=data?.quiz||[];
  const total=slides.length+quiz.length;
  const cur=phase==="slides"?si:slides.length+qi;
  const prog=total>0?cur/total*100:0;
  const slide=slides[si],q=quiz[qi];
  const confetti=Array.from({length:12},(_,i)=>({x:Math.random()*100,c:[RED,GREEN,GOLD,"#A78BFA","#06B6D4"][i%5],d:Math.random()*.8,s:6+Math.random()*8}));

  const handleAnswer=(a)=>{
    if(ans!==null)return;
    const c=a===q.a;setAns(a);setOk(c);
    if(c){Sounds.correct();setScore(s=>s+1);}else Sounds.wrong();
  };

  const goNext=()=>{
    setAk(k=>k+1);
    if(phase==="slides"){
      if(si<slides.length-1)setSi(i=>i+1);
      else{setPhase("quiz");setQi(0);setAns(null);setOk(null);}
    }else if(qi<quiz.length-1){setQi(i=>i+1);setAns(null);setOk(null);}
    else{setPhase("done");Sounds.complete();}
  };

  return(
    <div style={{position:"absolute",inset:0,zIndex:995,background:"#000",display:"flex",flexDirection:"column"}} className="slide-in">
      <div style={{padding:"12px 16px 10px",display:"flex",alignItems:"center",gap:12,borderBottom:`1px solid ${DARK}`,flexShrink:0}}>
        <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:MUTED,fontSize:22,lineHeight:1}}>✕</button>
        <div style={{flex:1,height:7,background:DARK2,borderRadius:4,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${prog}%`,background:cfg.color||RED,borderRadius:4,transition:"width .4s"}}/>
        </div>
        {!loading&&!error&&<span style={{fontSize:12,color:MUTED,fontWeight:600}}>{phase==="slides"?`${si+1}/${slides.length}`:`Q${qi+1}/${quiz.length}`}</span>}
      </div>
      <div style={{background:`${cfg.color||RED}11`,borderBottom:`1px solid ${cfg.color||RED}22`,padding:"6px 16px",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
        <span style={{fontSize:16}}>{chapter.icon}</span>
        <span style={{fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:13}}>{chapter.title}</span>
        <span style={{marginLeft:"auto",fontSize:11,color:MUTED,background:DARK,padding:"2px 8px",borderRadius:10}}>{cfg.emoji} {cfg.label} · {cfg.slides}s · {cfg.minQ}Q</span>
      </div>
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:16,minHeight:0}}>
        {loading&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:16}}>
            <DAvatar size={52} online/>
            <div style={{fontSize:14,color:MUTED,textAlign:"center"}}>{lang==="es"?"Preparando tu lección...":"Building your lesson..."}</div>
            <div style={{display:"flex",gap:6}}>{[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:RED,animation:`dot 1.2s ease-in-out ${i*.2}s infinite`}}/>)}</div>
          </div>
        )}
        {error&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:16}}>
            <div style={{fontSize:40}}>⚠️</div>
            <div style={{fontSize:14,color:MUTED,textAlign:"center"}}>{lang==="es"?"No se pudo cargar. Comprueba que la API esté configurada.":"Couldn't load lesson. Make sure the API is configured."}</div>
            <button onClick={load} style={{padding:"12px 24px",borderRadius:12,background:RED,border:"none",cursor:"pointer",fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:14,color:"#fff"}}>Retry</button>
          </div>
        )}
        {!loading&&!error&&data&&(
          <div key={ak} className="fade-up">
            {phase==="slides"&&slide&&(
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                <div style={{display:"flex",alignItems:"flex-end",gap:10}}>
                  <DAvatar size={46} online/>
                  <div style={{background:DARK,border:`1px solid ${DARK2}`,borderRadius:"18px 18px 18px 4px",padding:"12px 14px",flex:1,fontSize:14,lineHeight:1.65,color:"#D1D1D6"}}>{slide.donna||slide.d}</div>
                </div>
                <div style={{background:"#111",border:`1px solid ${DARK2}`,borderRadius:20,padding:22}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                    <span style={{fontSize:28}}>{slide.icon}</span>
                    <h3 style={{fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:18,color:"#fff"}}>{slide.title||slide.t}</h3>
                  </div>
                  <p style={{fontSize:15,color:"#D1D1D6",lineHeight:1.7}}>{slide.body||slide.b}</p>
                </div>
              </div>
            )}
            {phase==="quiz"&&q&&(
              <div style={{display:"flex",flexDirection:"column",gap:14}} className={ans!==null?(ok?"correct-flash":"wrong-shake"):""}>
                <div style={{background:"#111",borderRadius:16,padding:16,border:`1px solid ${DARK2}`}}>
                  <div style={{fontSize:10,fontWeight:700,color:RED,letterSpacing:2.5,marginBottom:10}}>{t.quizTitle}</div>
                  <p style={{fontSize:15,fontWeight:600,lineHeight:1.6,color:"#fff"}}>{q.q}</p>
                </div>
                {q.type==="tf"?(
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    {[{val:true,label:"TRUE",c:GREEN},{val:false,label:"FALSE",c:RED}].map(opt=>{
                      const sel=ans===opt.val,ir=opt.val===q.a;
                      return(
                        <button key={String(opt.val)} onClick={()=>handleAnswer(opt.val)}
                          style={{padding:"20px 12px",borderRadius:16,background:ans!==null?(ir?"rgba(48,209,88,.14)":sel?"rgba(232,37,60,.14)":"transparent"):"transparent",border:`2px solid ${ans!==null?(ir?GREEN:sel?RED:DARK2):DARK2}`,cursor:ans!==null?"default":"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
                          <div style={{width:44,height:44,borderRadius:13,background:ans!==null?(ir?GREEN:sel?RED:DARK2):DARK2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>
                            {ans!==null&&ir?"✓":ans===opt.val&&!ir?"✗":opt.val?"✓":"✗"}
                          </div>
                          <span style={{fontFamily:"'Sora',sans-serif",fontWeight:900,fontSize:18,color:ans!==null?(ir?GREEN:sel?RED:"#fff"):opt.c}}>{opt.label}</span>
                        </button>
                      );
                    })}
                  </div>
                ):(
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    {(q.opts||[]).map((opt,i)=>{
                      const sel=ans===i,ir=i===q.a;
                      return(
                        <button key={i} onClick={()=>handleAnswer(i)}
                          style={{padding:"13px 15px",borderRadius:14,background:ans!==null?(ir?"rgba(48,209,88,.13)":sel?"rgba(232,37,60,.13)":"transparent"):"transparent",border:`2px solid ${ans!==null?(ir?GREEN:sel?RED:DARK2):DARK2}`,cursor:ans!==null?"default":"pointer",display:"flex",alignItems:"center",gap:12,textAlign:"left",opacity:ans!==null&&!ir&&!sel?.4:1}}>
                          <div style={{width:30,height:30,borderRadius:9,background:ans!==null?(ir?GREEN:sel?RED:DARK2):DARK2,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,color:"#fff",flexShrink:0}}>
                            {ans!==null&&ir?"✓":ans===i&&!ir?"✗":String.fromCharCode(65+i)}
                          </div>
                          <span style={{fontSize:14,color:"#fff",fontWeight:500}}>{opt}</span>
                        </button>
                      );
                    })}
                  </div>
                )}
                {ans!==null&&(
                  <div className="fade-up" style={{background:ok?"rgba(48,209,88,.1)":"rgba(232,37,60,.1)",border:`1px solid ${ok?GREEN:RED}44`,borderRadius:14,padding:14}}>
                    <div style={{fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:13,color:ok?GREEN:RED,marginBottom:6}}>{ok?(lang==="es"?"Exacto.":"Exactly."):(lang==="es"?"No del todo:":"Not quite:")}</div>
                    <p style={{fontSize:13,color:"#D1D1D6",lineHeight:1.65}}>{q.exp}</p>
                  </div>
                )}
              </div>
            )}
            {phase==="done"&&(
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 16px",textAlign:"center",position:"relative",overflow:"hidden",minHeight:300}}>
                {confetti.map((c,i)=><div key={i} style={{position:"absolute",top:"-10%",left:`${c.x}%`,width:c.s,height:c.s,background:c.c,borderRadius:2,animation:`confetti 2s ease ${c.d}s both`}}/>)}
                <div className="celebrate" style={{fontSize:52,marginBottom:16}}>🏆</div>
                <h2 style={{fontFamily:"'Sora',sans-serif",fontWeight:900,fontSize:24,marginBottom:8}}>{t.chDone}</h2>
                <p style={{color:MUTED,fontSize:15,marginBottom:8}}><strong style={{color:"#fff"}}>{chapter.title}</strong></p>
                <div style={{padding:"10px 20px",borderRadius:20,background:`rgba(232,37,60,.12)`,border:`1px solid ${RED}44`,fontSize:14,color:RED,fontWeight:700,marginBottom:24}}>{t.chScore(score,quiz.length)}</div>
                <button onClick={()=>onComplete(chapter.id)} style={{padding:"16px 48px",borderRadius:14,background:RED,border:"none",cursor:"pointer",fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:17,color:"#fff"}}>{lang==="es"?"Continuar →":"Continue →"}</button>
              </div>
            )}
          </div>
        )}
      </div>
      {!loading&&!error&&phase!=="done"&&(
        <div style={{padding:"12px 16px 20px",borderTop:`1px solid ${DARK}`,flexShrink:0}}>
          {phase==="slides"
            ?<button onClick={goNext} style={{width:"100%",padding:15,borderRadius:14,background:cfg.color||RED,border:"none",cursor:"pointer",fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:16,color:"#fff"}}>{si<slides.length-1?t.lessonContinue:t.lessonStart}</button>
            :ans!==null&&<button onClick={goNext} style={{width:"100%",padding:15,borderRadius:14,background:ok?GREEN:RED,border:"none",cursor:"pointer",fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:16,color:ok?"#000":"#fff"}}>{qi<quiz.length-1?t.nextQ:t.finishCh}</button>
          }
        </div>
      )}
    </div>
  );
}

/* ── SMART PILLS based on Donna response ── */
function getPillsForResponse(text, lang){
  if(!text)return null;
  const es=lang==="es", lo=text.toLowerCase();
  if(lo.includes("timeframe")||lo.includes("temporalidad")||lo.includes("candle")||lo.includes("vela de"))
    return es?["📅 Diaria","🕓 4H","⏰ 1H","🌊 Las combino"]:["📅 Daily","🕓 4H","⏰ 1H","🌊 I combine them"];
  if(lo.includes("bias")||lo.includes("sesgo")||lo.includes("direction")||lo.includes("alcista")||lo.includes("bajista"))
    return es?["📈 Alcista","📉 Bajista","😐 No lo tengo claro"]:["📈 Bullish","📉 Bearish","😐 Not sure yet"];
  if(lo.includes("kill zone")||lo.includes("session")||lo.includes("sesión")||lo.includes("london")||lo.includes("nueva york"))
    return es?["🌅 Londres","🗽 NY Open","🌆 NY PM","⏰ Sin KZ"]:["🌅 London","🗽 NY Open","🌆 NY PM","⏰ No KZ"];
  if(lo.includes("stop")||lo.includes("target")||lo.includes("50%")||lo.includes("partial"))
    return es?["✅ Stop fijo","🎯 Toqué el 50%","❌ Me sacó"]:["✅ Stop is fixed","🎯 Hit 50%","❌ Got stopped out"];
  if(lo.includes("checklist")||lo.includes("ready")||lo.includes("listo"))
    return es?["✅ Abrir checklist","📝 Registrar operación"]:["✅ Open checklist","📝 Log a trade"];
  if((lo.match(/\?/)&&(lo.includes("did you")||lo.includes("have you")||lo.includes("¿lo")||lo.includes("¿pasaste")||lo.includes("¿tienes")||lo.includes("¿estás"))))
    return es?["✅ Sí","❌ No","🤔 Más o menos"]:["✅ Yes","❌ No","🤔 Kind of"];
  if(lo.includes("chart")||lo.includes("setup")||lo.includes("gráfico")||lo.includes("setup"))
    return es?["📊 Te mando el gráfico","✅ Listo para operar","📝 Registrar"]:["📊 Send chart","✅ Ready to trade","📝 Log trade"];
  if(lo.includes("academy")||lo.includes("academia")||lo.includes("chapter")||lo.includes("capítulo"))
    return es?["🎓 Ir a academia","📚 Capítulo 1","💬 Tengo preguntas"]:["🎓 Go to academy","📚 Chapter 1","💬 I have questions"];
  return null;
}

          <div>
            <div style={{fontSize:12,fontWeight:700,color:RED}}>Donna</div>
            <div style={{fontSize:13}}>{notif}</div>
          </div>
        </div>}

        {/* Header */}
        <div style={{padding:"10px 16px 8px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:`1px solid ${DARK}`,flexShrink:0}}>
          <div style={{fontSize:11,color:MUTED,width:72}}>{profile.mode==="advanced"?t.advMode:t.begMode}</div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <DAvatar size={34} online={tab==="chat"}/>
            <span style={{fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:13}}>Donna</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            {activeTrade&&tab==="chat"&&(
              <button onClick={()=>{setTradeLogMode("close");setShowTradeLog(true);}}
                style={{padding:"5px 10px",borderRadius:20,background:`${GOLD}22`,border:`1px solid ${GOLD}66`,cursor:"pointer",fontSize:11,fontWeight:700,color:GOLD}}>
                🔵 {t.checkIn}
              </button>
            )}
            <button onClick={()=>{if(activeTrade){setTradeLogMode("close");setShowTradeLog(true);}else{setTradeLogMode("open");setShowTradeLog(true);}}}
              style={{width:30,height:30,borderRadius:"50%",background:activeTrade?`${GOLD}33`:DARK,border:activeTrade?`1px solid ${GOLD}66`:"none",cursor:"pointer",color:activeTrade?GOLD:"#fff",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>
              {activeTrade?"⏺":"＋"}
            </button>
          </div>
        </div>

        {/* Trial banner */}
        {msgsLeft<=5&&msgsLeft>0&&(
          <div style={{background:`${RED}15`,borderBottom:`1px solid ${RED}33`,padding:"5px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
            <span style={{fontSize:12,color:RED,fontWeight:600}}>{t.trialLeft(msgsLeft)}</span>
          </div>
        )}

        {/* Active trade banner */}
        {activeTrade&&tab==="chat"&&(
          <div style={{background:`${GOLD}0F`,borderBottom:`1px solid ${GOLD}33`,padding:"8px 16px",display:"flex",alignItems:"center",gap:10,flexShrink:0,cursor:"pointer"}} onClick={()=>{setTradeLogMode("close");setShowTradeLog(true);}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:GOLD,animation:"pulse 2s ease-in-out infinite",flexShrink:0}}/>
            <div style={{flex:1}}>
              <span style={{fontSize:12,fontWeight:700,color:GOLD}}>{t.activeTrade}: </span>
              <span style={{fontSize:12,color:"#fff"}}>{activeTrade.asset} · {activeTrade.direction} · {activeTrade.killZone}</span>
            </div>
            <span style={{fontSize:11,color:MUTED}}>{timeAgo(activeTrade.openedAt)}</span>
          </div>
        )}

        {/* Content */}
        <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",minHeight:0}}>

          {/* CHAT TAB */}
          {tab==="chat"&&(
            <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minHeight:0}}>
              <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"10px 14px",display:"flex",flexDirection:"column",minHeight:0}}>
                {msgs.map(m=>(
                  <div key={m.id} className="msg-in" style={{display:"flex",flexDirection:m.role==="donna"?"row":"row-reverse",alignItems:"flex-end",gap:7,marginBottom:10}}>
                    {m.role==="donna"&&<DAvatar size={26}/>}
                    <div style={{maxWidth:"80%",display:"flex",flexDirection:"column",gap:3,alignItems:m.role==="donna"?"flex-start":"flex-end"}}>
                      {m.img&&<img src={m.img} alt="" style={{maxWidth:"100%",borderRadius:14,maxHeight:180,objectFit:"cover",border:`1px solid ${DARK}`}}/>}
                      {m.text&&(
                        <div style={{padding:"10px 13px",borderRadius:m.role==="donna"?"18px 18px 18px 4px":"18px 18px 4px 18px",background:m.role==="donna"?DARK:"#0A84FF",color:"#fff",fontSize:15,lineHeight:1.58,whiteSpace:"pre-wrap",fontWeight:m.role==="user"?500:400}}>
                          {m.text.split(/(\*\*.*?\*\*)/).map((p,i)=>p.startsWith("**")?<strong key={i}>{p.slice(2,-2)}</strong>:p)}
                        </div>
                      )}
                      <div style={{fontSize:11,color:"#48484A",padding:"0 3px"}}>{new Date(m.id).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</div>
                    </div>
                  </div>
                ))}
                {loading&&(
                  <div className="msg-in" style={{display:"flex",alignItems:"flex-end",gap:7,marginBottom:10}}>
                    <DAvatar size={26}/>
                    <div style={{padding:"12px 16px",borderRadius:"18px 18px 18px 4px",background:DARK,display:"flex",gap:5,alignItems:"center"}}>
                      {[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:MUTED,animation:`dot 1.2s ease-in-out ${i*.18}s infinite`}}/>)}
                    </div>
                  </div>
                )}
                {apiError&&(
                  <div style={{padding:"8px 12px",margin:"0 0 8px",background:"rgba(232,37,60,.1)",borderRadius:10,fontSize:12,color:"#FF6B6B",border:`1px solid ${RED}44`}}>
                    ⚠️ {apiError}
                  </div>
                )}
                <div ref={bottomRef}/>
              </div>

              {/* Pills */}
              <PillsRow pills={displayPills} onTap={handlePillTap}/>

              {/* Image preview */}
              {imgPreview&&(
                <div style={{padding:"0 14px 8px",display:"flex",alignItems:"center",gap:8}}>
                  <div style={{position:"relative"}}>
                    <img src={imgPreview} alt="" style={{height:52,borderRadius:8,border:`1px solid ${RED}66`}}/>
                    <button onClick={()=>{setImgData(null);setImgPrev(null);}} style={{position:"absolute",top:-6,right:-6,width:18,height:18,borderRadius:"50%",background:"#EF4444",border:"none",cursor:"pointer",color:"#fff",fontSize:10,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                  </div>
                  <span style={{fontSize:12,color:GREEN,fontWeight:600}}>{lang==="es"?"Gráfico adjunto ✓":"Chart attached ✓"}</span>
                </div>
              )}

              {/* Input row */}
              <div style={{padding:"8px 12px 14px",borderTop:`1px solid ${DARK}`,display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
                <input type="file" ref={fileRef} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{setImgData(ev.target.result);setImgPrev(ev.target.result);};r.readAsDataURL(f);e.target.value="";}} accept="image/*" style={{display:"none"}}/>
                <button onClick={()=>fileRef.current?.click()} style={{width:36,height:36,borderRadius:"50%",background:DARK2,border:"none",cursor:"pointer",fontSize:17,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:MUTED}}>📷</button>
                <VoiceButton onResult={(txt)=>setInput(i=>i?i+" "+txt:txt)} lang={lang}/>
                <input ref={inputRef} value={input} onChange={e=>setInput(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&handleSend()}
                  placeholder={t.msgPH}
                  style={{flex:1,padding:"10px 14px",borderRadius:22,background:DARK,border:"none",color:"#fff",fontSize:15,outline:"none"}}/>
                <button onClick={handleSend} disabled={!input.trim()&&!imgData}
                  style={{width:36,height:36,borderRadius:"50%",background:input.trim()||imgData?BLUE:DARK,border:"none",cursor:"pointer",color:"#fff",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"background .2s"}}>▶</button>
              </div>
            </div>
          )}

          {/* JOURNAL TAB */}
          {tab==="journal"&&(
            <JournalScreen trades={trades} lang={lang} activeTrade={activeTrade}
              onClose={()=>setTab("chat")}
              onOpen={(mode)=>{setTradeLogMode(mode);setShowTradeLog(true);}}/>
          )}

          {/* ACADEMY TAB */}
          {tab==="academy"&&(
            <AcademyScreen profile={profile} completed={completedCh} onOpen={ch=>setOpenChapter(ch)}/>
          )}
        </div>

        {/* Tab Bar */}
        <div style={{display:"flex",borderTop:`1px solid ${DARK}`,flexShrink:0}}>
          {[{id:"chat",icon:"💬",label:t.tabChat},{id:"journal",icon:"📓",label:t.tabJournal},{id:"academy",icon:"📚",label:t.tabAcademy}].map(tb=>(
            <button key={tb.id} onClick={()=>setTab(tb.id)}
              style={{flex:1,padding:"10px 8px 14px",background:"transparent",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,position:"relative"}}>
              <span style={{fontSize:22}}>{tb.icon}</span>
              <span style={{fontSize:10,fontWeight:700,color:tab===tb.id?RED:MUTED}}>{tb.label}</span>
              {tab===tb.id&&<div style={{width:5,height:5,borderRadius:"50%",background:RED}}/>}
              {tb.id==="journal"&&activeTrade&&<div style={{position:"absolute",top:8,right:"25%",width:8,height:8,borderRadius:"50%",background:GOLD,border:"2px solid #000"}}/>}
            </button>
          ))}
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
