{icon:"📱",title:"Tres pestañas. Simple.",body:"CHAT — habla conmigo cuando quieras sobre tus operaciones o preguntas. DIARIO — registra cada operación aquí para que pueda rastrear tus patrones. ACADEMIA — 22 capítulos que te llevan de cero a entender cómo se mueve el precio de verdad. La academia es siempre gratis. El chat es donde ocurre el coaching real.",donna:"Empieza con el Capítulo 1 en la Academia. No te saltes capítulos. Cada uno construye sobre el anterior."},
{icon:"📋",title:"Un hábito antes que todo.",body:"Después de cada operación — ganadora o perdedora — regístrala en el Diario. Dime qué hiciste y por qué. Esos datos son cómo aprendo tus patrones y te doy coaching que realmente aplica a ti. Sin el diario, solo estoy adivinando. Con él, puedo ver exactamente qué te está costando dinero.",donna:"Un hábito. Registra cada operación. Eso es todo por ahora. Ve a la Academia cuando estés listo."}
],q:[
{q:"¿Cuál es el trabajo principal de Donna?",type:"mc",opts:["Mandar señales de trading","Ser tu coach de accountability y ayudarte a construir disciplina","Gestionar tus posiciones automáticamente","Predecir hacia dónde va el precio"],a:1,exp:"Donna es una coach de accountability. Te ayuda a construir disciplina, aprender CRT, e identificar los patrones que te están costando dinero. No es un servicio de señales."},
{q:"¿Por qué es importante registrar cada operación en el Diario?",type:"mc",opts:["No lo es — es opcional","Ayuda a Donna a aprender tus patrones específicos y darte coaching relevante","Copia automáticamente tus operaciones a Stripe","Es necesario para desbloquear nuevos capítulos"],a:1,exp:"El diario es cómo Donna aprende tus patrones. Sin él, el coaching es genérico. Con él, Donna puede ver exactamente qué estás haciendo bien, qué estás haciendo mal, y señalarlo por nombre."},
{q:"Los capítulos de la Academia son gratis para todos.",type:"tf",a:true,exp:"Verdadero. La Academia de 22 capítulos es siempre gratis. El chat con Donna es la función premium."}
]}},
1:{s:[
{icon:"📊",title:"Cuatro Partes, Una Verdad",body:"Cada vela te dice cuatro cosas: Open (donde empezó), High (donde intentó ir), Low (donde probó), Close (donde terminó). El cuerpo — entre el open y el close — es donde el precio se comprometió. Las mechas son donde el precio fue rechazado. EUR/USD abriendo en 1.0820, mecheando hasta 1.0865, pero cerrando en 1.0831? Ese cierre en 1.0831 es el único número que importa.",donna:"El cuerpo es donde los traders ponen dinero real. La mecha es donde quedaron atrapados. Lee el cuerpo, ignora el drama."},
{icon:"🎯",title:"El Cierre Lo Decide Todo",body:"Un cierre por encima de una resistencia significa compromiso — el precio se fue y se quedó. Una mecha por encima que cierra de regreso adentro significa rechazo — el precio intentó, falló, y fue rechazado. Gold mecheando hasta $2,020 pero cerrando en $1,995 es completamente bajista. Gold cerrando en $2,020 es completamente alcista. Misma ubicación de mecha, significado opuesto. El cierre decide todo.",donna:"No me importa dónde fue la mecha. Muéstrame el cierre. Esa es la única pregunta."}
],q:[
{q:"EUR/USD mecha hasta 1.0920 pero cierra en 1.0871, de regreso dentro del rango de la semana. CRT dice:",type:"mc",opts:["Alcista — llegó a 1.0920","Bajista — el movimiento alcista fue falso","Neutral — espera más datos","Compra el cierre en 1.0871"],a:1,exp:"Mecha arriba + cierre adentro = movimiento falso = Turtle Soup. El cierre en 1.0871 revela la dirección real. El precio probó 1.0920, fue rechazado, y eso es bajista."},
{q:"Oro cierra en $2,018, por encima del máximo del mes pasado de $2,010. Tu sesgo es:",type:"mc",opts:["Bajista — vende en la fortaleza","Sin sesgo todavía","Alcista — el cierre confirmó el rompimiento","Espera un nuevo test de $2,010"],a:2,exp:"Cierre por encima del máximo anterior = True Break = sesgo alcista confirmado. El precio se comprometió a estar por encima de $2,010 cerrando ahí. Esa es tu señal."},
{q:"La mecha de una vela es más importante que el cierre para determinar la dirección del mercado.",type:"tf",a:false,exp:"Falso. El cierre lo es todo en CRT. Las mechas muestran intentos. Los cierres muestran resultados. Operas cierres, no mechas."}
]},
2:{s:[
{icon:"🗺️",title:"Tres Estados. Una Pregunta.",body:"Todo gráfico está en uno de tres estados: En Tendencia (movimientos direccionales consistentes), En Rango (precio rebotando entre dos niveles definidos como EUR/USD atascado entre 1.0800 y 1.0920 por semanas), o No Structure (aleatorio, sin estructura, sin operación). La mayoría de las pérdidas vienen de aplicar estrategias de tendencia en mercados en rango. Identifica el estado primero. Cada. Vez.",donna:"¿En qué estado está esto? Pregúntalo antes de hacer cualquier cosa. Si no puedes responderlo con confianza — es no structure. No operes no structure."},
{icon:"🚫",title:"Nunca Operes el Medio",body:"En un rango, el 50% del medio es tierra de nadie. Si EUR/USD está en rango entre 1.0800 y 1.0900, el medio es 1.0850. No operas en 1.0850. Compras cerca de 1.0800 y vendes cerca de 1.0900. El medio es donde tanto alcistas como bajistas quedan picados y nadie gana. ¿Precio en el borde del rango? Esa es tu operación. ¿Precio en el medio? Ve a buscar otra cosa.",donna:"El medio de un rango significa que los dos lados pierden. Si estás operando ahí, eres la liquidez de salida para todos los que entraron en los bordes."}
],q:[
{q:"EUR/USD ha estado rebotando entre 1.0800 y 1.0920 por tres semanas. El precio está en 1.0855. Tú:",type:"mc",opts:["Compras — parece que rebotó del soporte","Vendes — volverá hacia abajo","Esperas — estás en tierra de nadie","Buscas una entrada de rompimiento aquí"],a:2,exp:"1.0855 es el medio del rango de 1.0800-1.0920 — tierra de nadie. Esperas a que el precio alcance los bordes antes de considerar una operación."},
{q:"Nasdaq está haciendo máximos más altos y mínimos más altos consistentemente. El estado del mercado es:",type:"mc",opts:["En rango","No structure","En tendencia","En transición"],a:2,exp:"Máximos más altos y mínimos más altos = mercado en tendencia. Estructura direccional clara significa que buscas entradas en pullback en la dirección de la tendencia, no en los bordes del rango."},
{q:"Un mercado no structure sin estructura debería operarse con posiciones más pequeñas para manejar el riesgo.",type:"tf",a:false,exp:"Falso. Un mercado no structure no debería operarse en absoluto. Un tamaño más pequeño no arregla una mala condición de mercado. Sin estructura = sin operación. Siéntate en tus manos."}
]},
3:{s:[
{icon:"🔭",title:"HTF — El Por Qué",body:"El Marco Temporal Superior (gráfico Diario o Semanal) te dice POR QUÉ debería moverse el precio. Es tu brújula. Si la vela Diaria cerró por encima de un máximo significativo anterior, tu sesgo HTF es alcista. Si mechó arriba y cerró de regreso adentro, el HTF dice bajista. Este sesgo anula todo en marcos temporales inferiores. Operar contra el Diario es como nadar contra la corriente.",donna:"La vela Diaria es tu jefe. Todos los demás marcos temporales trabajan para el Diario. No al revés."},
{icon:"📡",title:"ITF — El Qué",body:"El Marco Temporal Intermedio (gráfico 4H) te muestra QUÉ está pasando — ¿se está formando realmente el patrón CRT? Aquí es donde observas la secuencia AMD desarrollándose: la acumulación construyendo, luego la manipulación (Turtle Soup) ocurriendo. El 4H confirma que lo que predijo el Diario está realmente sucediendo. Sin confirmación del 4H, estás adivinando.",donna:"Si el 4H no confirma, el setup aún no existe. Espéralo. Tu paciencia es tu ventaja."},
{icon:"⏱️",title:"LTF — El Cuándo y Dónde",body:"El Marco Temporal Inferior (1H o 15min) te da la entrada precisa — CUÁNDO y DÓNDE. Aquí es donde ves la vela Model 1 que activa tu entrada. Pero aquí está la cosa: un Model 1 perfecto en el 1H sin razón HTF detrás es solo una vela. No es una operación. Los tres marcos temporales deben alinearse para un setup de alta probabilidad.",donna:"Una vela hermosa en el 1H sin razón Diaria es solo una vela bonita. No operas lo bonito. Operas lo alineado."}
],q:[
{q:"Ves una vela de entrada perfecta en el 1H pero el Diario muestra sesgo bajista. Tú:",type:"mc",opts:["La tomas — la entrada del 1H es perfecta","La saltas — el sesgo Diario anula","La tomas con la mitad del tamaño","Esperas la próxima vela del 1H"],a:1,exp:"El sesgo Diario (HTF) anula todo. Operar una entrada larga contra un Diario bajista es pelear contra la corriente. Saltátela — aunque el 1H se vea perfecto."},
{q:"El trabajo principal del marco temporal 4H en tu análisis es:",type:"mc",opts:["Establecer el sesgo direccional","Confirmar que el patrón CRT se está formando","Dar el precio de entrada preciso","Determinar tu nivel de stop"],a:1,exp:"El 4H (ITF) confirma que el patrón AMD se está desarrollando y que el setup que predijo el Diario está realmente ocurriendo. Es el puente entre el POR QUÉ y el DÓNDE."},
{q:"El marco temporal 1H da el sesgo direccional principal para tus operaciones.",type:"tf",a:false,exp:"Falso. El HTF (Diario/Semanal) da el sesgo. El 1H da el tiempo de entrada y el nivel preciso. Trabajar de abajo hacia arriba es uno de los errores más comunes en el trading."},
{q:"Sin alineación del Marco Temporal Superior, una vela Model 1 en el 1H es:",type:"mc",opts:["Todavía válida con un stop ajustado","Una operación de alta probabilidad","Solo una vela sin respaldo CRT","Vale la mitad del tamaño de posición"],a:2,exp:"Sin razón HTF = sin operación. Un Model 1 sin alineación HTF es solo un patrón de vela. CRT requiere el POR QUÉ antes del DÓNDE. Sin por qué = sin operación."}
]},
4:{s:[
{icon:"🏦",title:"Retail vs Smart Money",body:"Los traders minoristas fueron enseñados a comprar rompimientos por encima de máximos anteriores. Eso significa que sus órdenes de compra se acumulan justo por encima de cada máximo significativo en el mercado. El Smart Money — bancos, fondos, instituciones — sabe exactamente dónde están apiladas esas órdenes. Usan el comportamiento predecible del retail como combustible para llenar sus propias posiciones masivas al mejor precio posible.",donna:"Te enseñaron a operar de la manera equivocada. A todos les enseñaron. Ese era el punto. Déjalo absorber."},
{icon:"🪤",title:"Cómo Funciona la Trampa",body:"EUR/USD se acerca a un máximo anterior en 1.0900. Los stops de compra del retail están apilados justo arriba. El precio sube a 1.0915, activando cada orden de compra. El Smart Money vende a todos esos compradores — acaban de llenar sus cortos en 1.0915 con liquidez ilimitada. El precio revierte inmediatamente, cae a 1.0850, y todos los que compraron el rompimiento están parados o sosteniendo una posición perdedora.",donna:"Cada vez que compraste un rompimiento y te destruyeron inmediatamente? No fue mala suerte. Ese era el plan. Su plan."},
{icon:"👀",title:"Leyendo Sus Huellas",body:"La buena noticia: el Smart Money deja huellas. Cuando el precio sube por encima de un máximo anterior con una mecha que cierra de regreso adentro — eso es ellos recolectando. Cuando el precio cierra decisivamente por encima de un máximo — están distribuyendo, y el retail está realmente en lo correcto esta vez. El cierre te dice qué juego se está jugando. Una vez que puedes leerlo, dejas de ser la presa.",donna:"No puedes vencer al Smart Money. Pero puedes aprender a leerlos. Ese es el juego completo."}
],q:[
{q:"Oro sube por encima del máximo anterior de $2,010 durante Londres, recolectando todos los stops de compra, luego cierra el diario en $1,995 — de regreso adentro. ¿Qué pasó?",type:"mc",opts:["Rompimiento alcista — compra","El Smart Money recolectó stops de compra luego vendió","Volatilidad aleatoria","Consolidación antes del movimiento real alcista"],a:1,exp:"Turtle Soup clásico de recolección de liquidez. El precio subió por encima de $2,010, activó los stops de compra del retail, el Smart Money vendió a esos compradores, y el cierre en $1,995 revela la dirección real — bajista."},
{q:"¿Dónde típicamente se acumulan las órdenes de stop de compra del retail?",type:"mc",opts:["En el medio de los rangos","Por debajo de mínimos anteriores","Justo por encima de máximos anteriores","Solo en números redondos"],a:2,exp:"Al retail le enseñaron a comprar rompimientos por encima de máximos. Entonces sus órdenes de stop de compra se apilan justo por encima de cada máximo anterior significativo — exactamente donde el Smart Money apunta para llenar posiciones cortas."},
{q:"El Smart Money mueve el precio encontrando ubicaciones predecibles de órdenes del retail y operando contra ellas.",type:"tf",a:true,exp:"Verdadero. El comportamiento consistente del retail (comprar rompimientos por encima de máximos, vender rompimientos por debajo de mínimos) crea los pools de liquidez que el Smart Money necesita para llenar posiciones masivas a escala."},
{q:"Un trader retail compra EUR/USD cuando rompe por encima de 1.0920. El precio revierte inmediatamente a 1.0870. La explicación más probable:",type:"mc",opts:["Fluctuación aleatoria del mercado","El stop era muy ajustado","El Smart Money vendió a los stops de compra del retail por encima de 1.0920","Los market makers activaron su stop"],a:2,exp:"Esto es el Turtle Soup en acción. El Smart Money apuntó a las órdenes de compra del retail por encima de 1.0920, vendió a ellos cuando esas órdenes se activaron, recolectó la liquidez, y el precio revirtió. Esto no es aleatorio — es el mecanismo."}
]},
5:{s:[
{icon:"💧",title:"Dos Razones. Solo Dos.",body:"Cada movimiento de precio en la historia de cada mercado sucedió por exactamente dos razones: alcanzar un pool de liquidez (stops de compra por encima de máximos, stops de venta por debajo de mínimos) o llenar un desequilibrio de precio (un gap donde el precio se movió demasiado rápido y dejó un área sin probar). Desde un tick de 5 pips hasta una tendencia de un año — uno de esos dos. Ese es todo el motor.",donna:"Liquidez o desequilibrio. Escríbelo. Enmárcalo. Ese es el juego completo en cuatro palabras."},
{icon:"🎯",title:"Externa vs Interna",body:"La liquidez externa está en los extremos — máximos y mínimos anteriores — el destino final. La liquidez interna está dentro del rango — Fair Value Gaps, Order Blocks, desequilibrios. El precio cicla de interna a externa y de regreso, constantemente. Tu trabajo antes de cualquier operación: saber hacia cuál se dirige el precio ahora mismo. Si no puedes responder eso, no tienes una operación.",donna:"Antes de cualquier entrada — ¿hacia dónde va el precio? Si no puedes señalar un nivel y decir 'AHÍ' con confianza, no estás listo para entrar."},
{icon:"🔄",title:"El Ciclo Nunca Para",body:"El precio barre un mínimo anterior (agarra stops de venta), llena desequilibrios en el camino hacia arriba (liquidez interna), alcanza el máximo anterior arriba (agarra stops de compra), llena desequilibrios en el camino hacia abajo. Este ciclo se repite en cada marco temporal simultáneamente. El Semanal lo hace. El Diario lo hace dentro del Semanal. El 4H lo hace dentro del Diario. Fractales hasta abajo.",donna:"Una vez que ves el ciclo, no puedes ignorarlo. Cada movimiento tiene sentido. Cada reversión es predecible. Ahí es cuando el trading deja de ser un juego de azar."}
],q:[
{q:"EUR/USD barre por debajo del mínimo de la semana pasada de 1.0780, agarra stops de venta, luego revierte inmediatamente hacia arriba. Esto te dice:",type:"mc",opts:["Rompimiento real — vende","Recolección de liquidez — el precio tomó los stops de venta, ahora probablemente va arriba","Volatilidad aleatoria — sin operación","Rompimiento fallido — espera"],a:1,exp:"El precio barrió la liquidez externa por debajo de 1.0780 (stops de venta), luego revirtió. El barrido recolectó el combustible que el Smart Money necesitaba. La dirección de reversión es alcista — hacia el próximo objetivo de liquidez arriba."},
{q:"¿Cuál es la diferencia entre liquidez Externa e Interna?",type:"mc",opts:["Externa es más grande, interna son movimientos más pequeños","Externa está en máximos/mínimos anteriores (destinos finales), interna está dentro del rango (FVGs, OBs)","Externa solo está en marcos temporales superiores","Son lo mismo, nombres diferentes"],a:1,exp:"Liquidez externa = máximos y mínimos anteriores (los destinos finales). Liquidez interna = desequilibrios (FVGs, Order Blocks) dentro del rango. El precio usa la interna como peldaños para alcanzar la externa."},
{q:"Antes de encontrar tu entrada, primero debes identificar hacia dónde va el precio (tu objetivo).",type:"tf",a:true,exp:"Verdadero. Objetivo primero, siempre. Sin saber hacia dónde va el precio, tu entrada no tiene contexto y no tiene un take-profit lógico. El objetivo define si la operación tiene sentido."},
{q:"El precio recolectó los stops de compra por encima de 1.0950 en EUR/USD y cerró de regreso adentro en 1.0920. ¿Hacia dónde irá el precio más probablemente después?",type:"mc",opts:["Más arriba — el momentum es alcista","Lateral — consolidación","Más abajo — hacia mínimos internos o externos","No se puede determinar"],a:2,exp:"Después de recolectar stops de compra por encima de 1.0950 (Turtle Soup) y cerrar adentro en 1.0920, el Smart Money vendió a esos compradores. El precio ahora debería moverse hacia abajo hacia el próximo objetivo de liquidez."}
]},
6:{s:[
{icon:"🗺️",title:"Objetivo Primero. Siempre.",body:"El error más común en el trading: buscar una entrada antes de saber el objetivo. Si no sabes HACIA DÓNDE va el precio, no puedes saber SI la operación tiene sentido o cuál será la relación riesgo-recompensa. EUR/USD en 1.0860 con objetivo en 1.0950 = 90 pips potenciales. Con objetivo en 1.0880 = 20 pips potenciales. Misma entrada, operación completamente diferente.",donna:"La entrada es lo último que buscas. El objetivo es lo primero. Esto no es opcional."},
{icon:"🎯",title:"Cómo Encontrar Tu Objetivo",body:"Mira hacia la izquierda. Encuentra los niveles significativos no probados — máximos anteriores arriba (stops de compra), mínimos anteriores abajo (stops de venta). Los objetivos más poderosos son máximos anteriores que se formaron después de un barrido de un mínimo, o mínimos anteriores que se formaron después de un barrido de un máximo. Oro en $1,990? Ese máximo anterior en $2,025 que se formó después del barrido de $1,965 es tu objetivo.",donna:"El nivel del que nadie habla es usualmente el próximo objetivo. Los obvios son anticipados por todos. Busca los limpios que se formaron después de un barrido."},
{icon:"🛤️",title:"La Ruta: ERL a IRL",body:"El precio no va de nivel externo a nivel externo en línea recta. Va Externo → Interno → Externo. Desde el barrido del mínimo anterior, arriba a través de Fair Value Gaps y Order Blocks (interno), hasta el máximo anterior. Entender esta ruta te permite mapear no solo el objetivo final sino los niveles intermedios donde el precio pausará, acelerará o retrocederá. Ahí es donde viven tus entradas.",donna:"Conoce la ruta completa antes de subirte al carro. ERL a IRL a ERL. Mapéala. Luego espera la entrada en esa ruta."}
],q:[
{q:"Oro está en $1,990. Máximo anterior en $2,025, mínimo anterior en $1,965. El precio acaba de barrer el mínimo de $1,965. Tu objetivo más probable es:",type:"mc",opts:["$1,975 — la resistencia más cercana","$1,990 — precio actual","$2,025 — el máximo anterior arriba","Por debajo de $1,965 — continuación hacia abajo"],a:2,exp:"El precio barrió el mínimo anterior en $1,965 (recolectó stops de venta), sugiriendo una reversión. El objetivo lógico ahora es la liquidez externa arriba — el máximo anterior en $2,025."},
{q:"Tu entrada es en 1.0860. Stop es 25 pips. El objetivo más cercano es 15 pips de distancia. Tú:",type:"mc",opts:["La tomas — el setup se ve bien","La saltas — relación riesgo-recompensa negativa","Ajustas el stop a 10 pips","Tomas la mitad del tamaño"],a:1,exp:"Objetivo 15 pips, stop 25 pips = 0.6:1 riesgo-recompensa. Eso es negativo. Ninguna calidad de setup justifica una operación con R negativo. El objetivo define si la operación tiene sentido."},
{q:"Debes identificar tu objetivo de liquidez antes de buscar una vela de entrada.",type:"tf",a:true,exp:"Verdadero. Objetivo primero, siempre. Sin un objetivo, no tienes idea si la recompensa justifica el riesgo. La entrada es el último paso, no el primero."},
{q:"¿Qué hace que un máximo anterior sea más significativo como objetivo que otro?",type:"mc",opts:["Es el más reciente","Es el máximo más alto en el gráfico","Se formó después de un barrido de un mínimo — pool de liquidez limpio","Ha sido probado múltiples veces"],a:2,exp:"Los máximos anteriores que se formaron después de un barrido de un mínimo son los objetivos más limpios. El barrido creó el combustible (recolectó stops de venta), ahora el máximo arriba es donde los stops de compra están apilados — el próximo objetivo del Smart Money."}
]},
7:{s:[
{icon:"🐢",title:"Cada Gran Movimiento Empieza Aquí",body:"Antes de cada movimiento de precio significativo, hay un rompimiento falso. Antes de una gran caída, el precio sube por encima de un máximo anterior para activar stops de compra. Antes de un gran rally, el precio rompe por debajo de un mínimo anterior para activar stops de venta. Esto no es un patrón que pasa a veces — es el mecanismo que permite el posicionamiento a gran escala del Smart Money.",donna:"El rompimiento falso no es un error en la matrix. ES la matrix. Una vez que lo ves, lo operas en lugar de quedar atrapado por él."},
{icon:"📋",title:"Tres Tipos de Turtle Soup",body:"Continuación: barrido breve de un máximo reciente dentro de una tendencia, luego continuación — entrada en pullback. Rango: el precio barre el máximo o mínimo de un rango establecido — reversión clásica. Reversión: en un nivel estructural HTF mayor, el precio barre y revierte completamente — esta es la Entrada 1, la más poderosa y de mayor recompensa. El Turtle Soup de reversión HTF es lo que construyes alrededor de tu sistema.",donna:"El tipo de reversión HTF es el bueno. El más difícil de capturar en vivo. El más violento cuando va. Entrada 1. Aprende a reconocerlo."},
{icon:"⚡",title:"El Swing de Falla",body:"Después de un Turtle Soup, observa el swing de falla — el precio intenta volver en la dirección del rompimiento falso pero hace un máximo más bajo (o mínimo más alto si está abajo). EUR/USD rompimiento falso por encima de 1.0920, cierra en 1.0890, luego intenta de nuevo hasta 1.0905 pero falla — ese máximo más bajo es confirmación. El swing de falla te dice que el Turtle Soup es real y el movimiento está por comenzar.",donna:"El swing de falla es tu confirmación. No te lo saltes. Filtra el 80% de las señales falsas."},
{icon:"🚫",title:"Regla 1: Nunca Compres Por Encima de un Máximo Anterior",body:"La regla más importante en CRT: nunca compres por encima de un máximo anterior, nunca vendas por debajo de un mínimo anterior. El rompimiento casi siempre es falso. El cierre de regreso adentro es tu señal. Un cierre genuino por encima es la excepción — e incluso entonces, esperas el pullback, no el rompimiento mismo. Esta regla elimina la operación perdedora más común en el trading retail.",donna:"Nunca compres por encima de un máximo anterior. Si olvidas todo lo demás que te enseñé — recuerda esto. Ponlo en tu pantalla."}
],q:[
{q:"EUR/USD mecha por encima del máximo del mes pasado de 1.0950, luego cierra el diario en 1.0910. CRT dice:",type:"mc",opts:["Alcista — compra el rompimiento","Turtle Soup bajista — el Smart Money vendió por encima de 1.0950","Neutral — espera","Alcista — la mecha muestra demanda"],a:1,exp:"Mecha arriba de 1.0950, cierre adentro en 1.0910 = Turtle Soup. El Smart Money agarró stops de compra por encima del máximo y vendió a ellos. El cierre diario en 1.0910 confirma el sesgo bajista."},
{q:"¿Qué tipo de Turtle Soup tiene la mayor probabilidad y recompensa?",type:"mc",opts:["Tipo continuación en una tendencia","Reversión en extremo de rango","Reversión en un nivel estructural HTF mayor","Cualquier tipo con una mecha grande"],a:2,exp:"El Turtle Soup de reversión HTF es la Entrada 1 — la de mayor calidad. Combina la máxima recolección de liquidez con la máxima importancia estructural. El más difícil de capturar en vivo, el más poderoso cuando lo logras."},
{q:"Después de un Turtle Soup por encima de un máximo anterior, el precio intenta volver pero solo alcanza un máximo más bajo antes de revertir. Esto se llama:",type:"mc",opts:["Doble techo","Falso cambio de carácter","El swing de falla — confirma el Turtle Soup","Consolidación antes de continuar"],a:2,exp:"El swing de falla — el precio falló en volver donde ocurrió el rompimiento falso, haciendo un máximo más bajo. Esto confirma el Turtle Soup y te da tiempo de entrada de alta confianza."},
{q:"Deberías comprar cuando el precio cierra por encima de un máximo anterior con volumen y momentum fuertes.",type:"tf",a:false,exp:"Falso en CRT. El volumen no cambia el análisis. Un cierre por encima de un máximo anterior necesita contexto — ¿es un True Break o será objeto de Turtle Soup? E incluso si es True Break, esperas el pullback, no el rompimiento mismo."},
{q:"Gold se acerca al máximo anterior de $2,000. La Regla 1 de CRT dice que deberías:",type:"mc",opts:["Comprar el rompimiento por encima de $2,000","Observar el Turtle Soup — esperar un rompimiento falso y reversión","Poner un stop de compra por encima de $2,000","Comprar cuando el precio toca $2,000"],a:1,exp:"Regla 1: Nunca compres por encima de un máximo anterior. La jugada correcta es observar el Turtle Soup — precio mecheando por encima de $2,000 y cerrando de regreso adentro. Esa es tu señal de venta, no de compra."}
]},
8:{s:[
{icon:"📅",title:"AMD — El Patrón Universal",body:"Cada movimiento de precio en cada marco temporal sigue tres fases. Acumulación (C1): el precio forma rango, construyendo el resorte. Manipulación (C2): el rompimiento falso — el Turtle Soup — la recolección de liquidez. Distribución (C3): el movimiento real — tu operación. Lunes en rango (C1), Martes rompe el máximo con cierre de regreso adentro (C2), Miércoles-Jueves cae fuerte (C3). Eso es AMD en el semanal. Funciona en cada marco temporal.",donna:"C2 es la vela más tentadora de operar. Se ve explosiva. Se ve obvia. Nunca operes C2. Está diseñada para atraparte."},
{icon:"📆",title:"AMD en el Semanal",body:"El Lunes construye el rango de acumulación semanal. El Martes es el día de manipulación — aquí es donde el máximo o mínimo semanal real casi siempre se forma. El Miércoles y Jueves distribuyen en la dirección verdadera. Si sabes que el Martes es el día de manipulación, dejas de operar rompimientos del Martes y empiezas a operar el seguimiento del Miércoles. Solo ese cambio mejorará tus resultados inmediatamente.",donna:"Marca el máximo y mínimo del Martes. Cada semana. Ahí es usualmente donde está el Máximo o Mínimo semanal. No estoy bromeando."},
{icon:"🗓️",title:"AMD en el Mensual",body:"Semana 1 del mes = acumulación. Semana 2 = manipulación (el máximo o mínimo mensual falso se forma aquí). Semana 3-4 = distribución (el movimiento mensual real). Por eso los mercados frecuentemente van en una dirección las primeras dos semanas del mes, luego revierten violentamente en la semana 3. Si operas rompimientos de la Semana 2 como si fueran reales — eres el combustible para la reversión de la Semana 3.",donna:"La Semana 2 es la semana de manipulación. Si operas rompimientos de la Semana 2 como si fueran reales — eres la liquidez. Cada mes."},
{icon:"🔄",title:"Fractales — El Mismo Patrón a Cada Velocidad",body:"AMD se repite en cada marco temporal simultáneamente. La vela de manipulación en el Semanal contiene su propio AMD en el Diario. El día de manipulación Diario contiene su propio AMD en el 4H. Cuando encuentras alineación AMD en tres marcos temporales simultáneamente — Semanal AMD, Diario AMD, 4H AMD todos apuntando en la misma dirección — ese es el setup de mayor probabilidad en CRT.",donna:"Cuando los tres marcos temporales están en alineación AMD — ese es el trade. Ese es cuando aumentas el tamaño."}
],q:[
{q:"Es Martes en sesión de Nueva York. EUR/USD rompe por encima del máximo del Lunes. Basado en AMD, tú:",type:"mc",opts:["Compras el rompimiento — el momentum es real","Esto es probablemente C2 — no compres el rompimiento, observa reversión","Esperas el Miércoles para confirmar","Es acumulación — opéralo en rango"],a:1,exp:"El Martes es típicamente el día de manipulación (C2). El rompimiento por encima del máximo del Lunes es probablemente el Turtle Soup. No compres rompimientos del Martes. Marca el máximo del Martes y observa la reversión del Miércoles."},
{q:"En la secuencia AMD, ¿cuál fase es tu entrada real de operación?",type:"mc",opts:["C1 — Acumulación","C2 — Manipulación","C3 — Distribución","Cualquiera de los tres"],a:2,exp:"C3 — Distribución — es tu operación. C1: no operes, sin dirección. C2: nunca operes, es la trampa. C3: el movimiento real que sigue a la manipulación."},
{q:"El máximo o mínimo semanal real típicamente se forma en qué día:",type:"mc",opts:["Lunes","Martes","Miércoles","Viernes"],a:1,exp:"El Martes es el día de manipulación. Es donde el Smart Money crea el máximo o mínimo semanal falso — el nivel que el resto de la semana referenciará y desde el cual operará."},
{q:"AMD solo aplica a los marcos temporales diario y semanal.",type:"tf",a:false,exp:"Falso. AMD es fractal — aparece en cada marco temporal simultáneamente. El 4H tiene su propio AMD. El 1H tiene el suyo dentro de ese. Cuando se alinean en múltiples marcos temporales, ese es el setup de mayor calidad."},
{q:"Es la Semana 2 del mes. El mercado rompe a nuevos máximos mensuales. Basado en AMD mensual:",type:"mc",opts:["Compra — momentum fuerte","Observa el Turtle Soup mensual — este podría ser el máximo falso","La Semana 2 siempre es alcista","La acumulación está completando"],a:1,exp:"La Semana 2 es la semana de manipulación. Los nuevos máximos en la Semana 2 son probablemente el rompimiento falso mensual — el Turtle Soup que precede el movimiento bajista real en las semanas 3-4."}
]},
9:{s:[
{icon:"👁️",title:"Los Cierres Revelan. Las Mechas Engañan.",body:"Leer el sesgo diario es simple cuando sabes esto: un diario anterior que CERRÓ por encima de un máximo anterior = sesgo alcista para hoy. Un diario anterior que MECHÓ por encima de un máximo anterior pero cerró adentro = sesgo bajista. El cierre es el voto. Un sesgo alcista significa que solo buscas entradas largas por debajo del open diario. Un sesgo bajista significa que solo buscas cortos por encima del open diario.",donna:"Un filtro. Una regla. Elimina la mayoría de las malas operaciones. El cierre diario te dice todo."},
{icon:"🔍",title:"El Filtro Que Lo Cambia Todo",body:"Así de poderoso es esto: si el diario tiene sesgo bajista, NO deberías tomar operaciones alcistas — sin importar qué tan perfecto se vea el setup en el 1H. Y si el diario muestra sesgo alcista, NO deberías tomar cortos — incluso si el precio está cerca de una resistencia. Este único filtro de sesgo diario elimina la mayoría de las operaciones perdedoras para la mayoría de los traders retail.",donna:"La mayoría de las malas operaciones pasan cuando la gente ignora el sesgo diario. Ven una vela bonita en el 1H y olvidan preguntar: ¿qué está haciendo el Diario? Revisa el Diario primero. Siempre primero."}
],q:[
{q:"La vela diaria de ayer mechó por encima del máximo anterior de 1.0920 pero cerró en 1.0891, de regreso adentro. El sesgo de hoy es:",type:"mc",opts:["Alcista — probó 1.0920","Bajista — la mecha fue rechazada","Neutral — una vela no es suficiente","Alcista — la mecha muestra demanda"],a:1,exp:"Mecha arriba + cierre adentro = sesgo bajista. Ayer el cierre en 1.0891 reveló que los compradores fallaron en sostenerse por encima de 1.0920. Hoy solo buscas entradas cortas por encima del open diario."},
{q:"La vela diaria cierra en $2,018, por encima del máximo de la semana pasada de $2,010. Hoy deberías buscar:",type:"mc",opts:["Entradas cortas por encima del open diario","Entradas largas por debajo del open diario","Sin operaciones — espera más confirmación","Entradas largas por encima del open diario"],a:1,exp:"Cierre diario por encima del máximo anterior = sesgo alcista. En sesgo alcista, buscas entradas largas POR DEBAJO del open diario (en pullbacks), no por encima donde estás persiguiendo."},
{q:"Puedes tomar operaciones cortas incluso cuando el sesgo diario es alcista, siempre que el setup del 1H sea perfecto.",type:"tf",a:false,exp:"Falso. El sesgo diario anula los setups del 1H. Operar contra el sesgo diario — incluso con un setup 'perfecto' en el marco temporal inferior — te pone contra el flujo dominante. Sáltate esas operaciones."}
]},
10:{s:[
{icon:"⏰",title:"Cuándo Importa Más Que Dónde",body:"Un setup perfecto a las 3AM del sábado tiene casi ninguna probabilidad. El mismo setup perfecto a las 9:30AM de Nueva York un Martes? Esa es una operación. Hay tres Kill Zones donde el Smart Money activamente mueve el precio: Londres (2-5AM hora NY, mejor para EUR/USD, GBP), Nueva York Open (7-11AM hora NY, mejor para Índices, Cripto, pares USD), NY PM (1:30-4PM hora NY, movimientos de continuación). Fuera de estas ventanas — piénsalo dos veces.",donna:"Tu setup importa. Tu timing importa más. Nivel perfecto, sesión equivocada = baja probabilidad. Marca las Kill Zones en tu gráfico. Opera dentro de ellas."},
{icon:"📍",title:"NYSE Open — El Grande",body:"Cada día a las 9:30AM de Nueva York, la Bolsa de Nueva York abre. Esta es la mayor inyección de liquidez de la sesión — órdenes de compra y venta de cada institución importante golpean el mercado simultáneamente. Este momento frecuentemente crea la Manipulación del Día (C2 del AMD diario) — un movimiento brusco para agarrar stops justo antes de que la dirección real se desarrolle. La vela de las 9:30 casi nunca es tu entrada. Es la trampa.",donna:"Las 9:30AM es cuando OBSERVAS, no cuando OPERAS. Deja que la vela de las 9:30 se desarrolle. Marca su máximo y mínimo. Opera lo que viene después."},
{icon:"🌍",title:"Perfiles de Sesión",body:"Cada sesión tiene su propia personalidad. Londres crea la manipulación diaria para pares EUR/USD y GBP — espera movimientos falsos y reversiones. Nueva York Open crea la manipulación del mercado US — movimientos bruscos que frecuentemente revierten. Sesión Asiática (8PM-12AM hora NY) es más tranquila — mejor para Gold y JPY. Un setup que se forma durante la sesión asiática debería evaluarse con menor peso de probabilidad que el mismo setup durante Londres o NY.",donna:"Mismo setup, sesión diferente — probabilidad diferente. El contexto lo es todo en el trading."}
],q:[
{q:"Encuentras una vela Model 1 perfecta en EUR/USD a las 11:45PM hora de Nueva York (sesión asiática). Tú:",type:"mc",opts:["La tomas — el setup está ahí","La tomas con posición más pequeña","Tienes cuidado — la sesión asiática tiene menor probabilidad para EUR/USD","La saltas — la sesión asiática siempre está equivocada"],a:2,exp:"La sesión asiática no es la sesión principal para EUR/USD. El mismo setup durante Londres (2-5AM hora NY) tendría probabilidad mucho mayor. Ajusta tu nivel de confianza según el timing de la sesión."},
{q:"Exactamente a las 9:30AM Nueva York, el precio hace un movimiento brusco hacia arriba a través de un máximo anterior. Basado en CRT:",type:"mc",opts:["Compra el rompimiento — NYSE open = alcista","Espera — esto es probablemente la trampa de manipulación de las 9:30AM","Vende inmediatamente — las 9:30 siempre revierten","Depende de la dirección del movimiento"],a:1,exp:"El open NYSE de las 9:30AM crea volatilidad masiva y frecuentemente la manipulación diaria (C2). Los movimientos bruscos a las 9:30 son frecuentemente Turtle Soups. Observa, marca el máximo y mínimo, y opera lo que se desarrolla después."},
{q:"Las tres Kill Zones principales son Londres Open, Nueva York Open, y:",type:"mc",opts:["Tokyo Open","Sesión asiática","NY PM (1:30-4PM hora NY)","Pre-market (4-6AM hora NY)"],a:2,exp:"Las tres Kill Zones son Londres (2-5AM hora NY), Nueva York Open (7-11AM hora NY), y NY PM (1:30-4PM hora NY). Estas son las ventanas donde el flujo institucional es más alto y los setups CRT tienen la mayor probabilidad."},
{q:"Un setup CRT que se forma durante una Kill Zone tiene mayor probabilidad que el mismo setup fuera de una Kill Zone.",type:"tf",a:true,exp:"Verdadero. Las Kill Zones son cuando los participantes institucionales están más activos. El mismo setup estructural tiene significativamente más probabilidad cuando se forma durante una Kill Zone que durante horas muertas."}
]},
11:{s:[
{icon:"🎯",title:"Una Vela. Una Regla. Un Trigger.",body:"El Model 1 es tu vela de entrada. Tiene tres requisitos y los tres deben estar presentes: 1) Es GRUESA — un cuerpo significativo, no un doji o vela pequeña. 2) Clava un nivel estructural real — un máximo anterior, mínimo anterior, Order Block, o Fair Value Gap. 3) Se forma dentro de una Kill Zone. Cuando los tres están presentes, el CIERRE de esa vela es tu trigger. No la mecha. El cierre.",donna:"Tres cosas. Si falta una — no es un Model 1. No entres. Espera el real."},
{icon:"📏",title:"Stop, Objetivos, y el Sagrado 50%",body:"El stop va por encima o por debajo de la mecha del Model 1 — FIJO, nunca se mueve. El primer objetivo (T1) siempre es el 50% del rango del setup — esto es OBLIGATORIO. Tomas ganancia parcial ahí sin importar qué. El segundo objetivo (T2) es el objetivo completo — el objetivo de liquidez externa que identificaste antes de la operación. Un FVG dentro del cuerpo de la vela Model 1 aumenta la probabilidad significativamente.",donna:"El parcial al 50% no es opcional. No me importa qué tan buena se vea la operación. Toma el parcial en T1. Siempre."},
{icon:"⚡",title:"Por Qué el Cierre — No la Mecha",body:"Los traders retail entran cuando la mecha toca — ven el precio tocar un nivel y se lanzan. El Smart Money confirma en el cierre — esperan a ver si el precio SE COMPROMETIÓ a rechazar el nivel. Entrar en la mecha significa entrar durante el ruido. Entrar en el cierre significa entrar después de que la señal es confirmada. Los pocos segundos extra de paciencia es la diferencia entre una entrada de alta probabilidad y un lanzamiento de moneda.",donna:"Toque de mecha = operación de esperanza. Confirmación de cierre = operación CRT. Operas cierres. Punto."},
{icon:"🔄",title:"Gestionando la Operación Model 1",body:"Una vez dentro: el stop está por encima de la mecha y se queda ahí. Si el precio llega a T1 (50%), toma el parcial — reduce el riesgo inmediatamente. Mueve el stop a punto de equilibrio después de T1. Deja T2 correr. Si el precio llega a tu stop antes de T1 — eso es una pérdida. Acéptala, regístrala, sigue adelante. Si el precio te saca en punto de equilibrio después de T1 — eso es una operación gratuita. El Model 1 gestionado correctamente no pierde dinero en el 70% de las operaciones perdedoras.",donna:"Gestiónala correctamente y el Model 1 hace dinero incluso cuando está equivocado. Ese es el sistema."}
],q:[
{q:"Ves una vela gruesa que cierra de regreso adentro después de mechar por encima de un máximo anterior. Es durante la sesión de Londres. El nivel es un Order Block limpio. Esto es:",type:"mc",opts:["Una vela regular — espera más confirmación","Una entrada Model 1 — los tres criterios cumplidos","Un Turtle Soup pero no un Model 1","Una entrada potencial pero revisa el Diario primero"],a:1,exp:"Los tres criterios del Model 1 presentes: cuerpo grueso, nivel estructural real (Order Block), timing de Kill Zone (Londres). Después de verificar la alineación del sesgo Diario, esta es una entrada válida en el cierre."},
{q:"¿Dónde va el stop en una operación Model 1?",type:"mc",opts:["Por debajo del cuerpo de la vela de entrada","Por debajo de la mecha de la vela de entrada","En el nivel de soporte más cercano","2% por debajo de la entrada"],a:1,exp:"El stop va por encima o por debajo de la mecha del Model 1 — el extremo de la vela. Esto te protege del ruido mientras mantiene el stop lógico. Fijo. Nunca movido después de colocarlo."},
{q:"Tu operación Model 1 llega a T1 (50% del rango). Deberías:",type:"mc",opts:["Mantener todo — deja que corra a T2","Tomar ganancia parcial — esto es obligatorio","Mover tu stop a punto de equilibrio y mantener","Cerrar toda la operación"],a:1,exp:"T1 al 50% es una salida parcial obligatoria. No negociable. Después de T1, mueve el stop a punto de equilibrio y deja T2 correr sin riesgo. El parcial al 50% es lo que hace al Model 1 consistentemente rentable."},
{q:"Deberías entrar en una operación Model 1 cuando la mecha toca tu nivel, sin esperar el cierre.",type:"tf",a:false,exp:"Falso. El cierre es el trigger — siempre. Entrar cuando la mecha toca es entrar antes de la confirmación. Espera que la vela cierre y confirme el rechazo. Los pocos segundos de paciencia mejoran significativamente la calidad de la entrada."},
{q:"¿Qué aumenta la probabilidad de un setup Model 1?",type:"mc",opts:["Una mecha grande por encima del nivel","Un FVG dentro del cuerpo de la vela Model 1","Múltiples pruebas recientes del mismo nivel","Una tendencia fuerte hacia el nivel"],a:1,exp:"Un FVG dentro del cuerpo de la vela Model 1 añade confluencia — el precio llenó un desequilibrio y rechazó simultáneamente. Esta combinación tiene probabilidad significativamente mayor que un Model 1 simple."}
]},
12:{s:[
{icon:"💀",title:"Pasa Cada Vez. Sin Excepción.",body:"El Kiss of Death (KoD) es el último movimiento falso antes de que el precio alcance su objetivo. Pasa antes de cada objetivo significativo — cada uno. El Smart Money sabe exactamente dónde está tu stop (por encima de la mecha del Model 1, donde CRT te enseñó a colocarlo). Antes de que el precio alcance el objetivo final, hace un último movimiento contra tu operación — justo lo suficiente para sacudir las posiciones gestionadas ligeramente.",donna:"El Kiss of Death no es opcional. No es a veces. Es garantizado. Cada objetivo. Si sabes que viene, dejas de ser sacudido por él."},
{icon:"📍",title:"Entrada 5 — El Movimiento Más Violento",body:"El Kiss of Death también es la Entrada 5 en la secuencia de entradas CRT. Es la última entrada antes del objetivo final — y es la operación más violenta y de movimiento más rápido de las cinco entradas. El precio ya ha pasado por E1, E2, E3, E4 — todos los cuales ya han sido parados o han tomado ganancias. E5 (el KoD) es para traders que entienden el panorama completo y saben que el objetivo es inminente.",donna:"Si te sacaron en el KoD — no estabas equivocado en la operación. Solo no la dimensionaste bien. La pérdida es información, no fracaso."},
{icon:"🛡️",title:"Cómo Sobrevivir el Kiss of Death",body:"Después de T1 (50% parcial), tu stop debería estar en punto de equilibrio. El KoD frecuentemente llega justo por encima del punto de equilibrio — sacándote pero sin pérdida real. Este es el resultado de 'operación gratuita'. Si no has tomado T1 todavía cuando llega el KoD — esa es la lección. Siempre toma T1. El sistema te protege del KoD solo cuando seguiste las reglas que llevaron hasta él.",donna:"¿Tomaste T1? El KoD te saca en punto de equilibrio. ¿No tomaste T1? El KoD mata la operación. El parcial al 50% es el seguro contra el KoD. No te lo saltes."},
{icon:"🎭",title:"Usando el KoD como Entrada 5",body:"Los traders avanzados USAN el Kiss of Death como entrada de alta probabilidad. Si has mapeado la secuencia CRT completa — barrido del mínimo, Model 1 formado, parcial tomado, operación gestionada — y luego el precio hace un último empuje contra ti, esa es E5. La entrada es el rechazo de la mecha del KoD, el objetivo es el completo, y el stop es ajustado porque la operación tiene confirmación significativa detrás.",donna:"La Entrada 5 solo es válida si entiendes las Entradas 1 a 4 primero. No intentes usarla antes de entender la secuencia completa."}
],q:[
{q:"Tu operación en Oro está arriba, acercándose al objetivo en $2,050. Antes de alcanzarlo, el precio cae bruscamente a tu nivel de stop. Esto es más probablemente:",type:"mc",opts:["La operación está equivocada — ciérrala","Un pullback aleatorio","El Kiss of Death — la última sacudida antes del objetivo","Volatilidad normal — mantén"],a:2,exp:"El Kiss of Death siempre aparece antes del objetivo. La caída brusca a tu nivel de stop es la última sacudida. Si tomaste T1 al 50%, estás en punto de equilibrio. Si no — por eso existe T1."},
{q:"El Kiss of Death es:",type:"mc",opts:["Un patrón gráfico","El último movimiento falso antes de que el precio alcance su objetivo final","Un tipo de Turtle Soup","Una técnica de colocación de stop"],a:1,exp:"El Kiss of Death es el último movimiento falso contra tu posición antes de que el precio alcance su objetivo final. Está diseñado para sacudir a los traders que entraron correctamente pero gestionaron incorrectamente."},
{q:"Puedes evitar ser parado por el Kiss of Death:",type:"mc",opts:["Usando un stop más amplio","Tomando tu parcial T1 al 50% y moviendo el stop a punto de equilibrio","Evitando sesiones volátiles","Cerrando la operación manualmente antes del objetivo"],a:1,exp:"Tomar T1 al 50% y mover el stop a punto de equilibrio significa que el KoD te saca en punto de equilibrio — sin pérdida. Esta es la protección incorporada del sistema contra el KoD. Siempre toma T1."},
{q:"El Kiss of Death solo pasa en operaciones perdedoras.",type:"tf",a:false,exp:"Falso. El Kiss of Death pasa en operaciones ganadoras — específicamente antes de que lleguen al objetivo final. Es la prueba final de tu disciplina. Sacude a los traders que no siguieron las reglas."},
{q:"La Entrada 5 (entrada KoD) es la mejor para principiantes porque está más cerca del objetivo.",type:"tf",a:false,exp:"Falso. E5 es para traders avanzados que entienden la secuencia completa de 5 entradas. Sin entender E1-E4 y el panorama CRT completo, intentar E5 es extremadamente peligroso."}
]},
13:{s:[
{icon:"🗝️",title:"El Gap Que el Precio Siempre Llena",body:"Un Fair Value Gap (FVG) es un desequilibrio de 3 velas donde el precio se movió tan rápido que dejó un área sin probar. El máximo de la Vela 1 y el mínimo de la Vela 3 no se superponen — hay un gap entre ellos. Ese gap actúa como un imán. El precio casi siempre vuelve a probarlo. EUR/USD hace un gap alcista a través de 1.0880-1.0910, dejando esa zona sin probar? El precio volverá a llenarla — usualmente en horas o días.",donna:"Los FVGs son imanes. Márcalos. El precio vuelve. No a veces — casi siempre. Úsalos para objetivos y entradas."},
{icon:"📐",title:"La Regla del 50% para FVGs",body:"El nivel crítico dentro de cualquier FVG es su punto medio al 50%. El precio podría entrar al FVG desde arriba y solo alcanzar el 50% antes de revertir — o podría llenar el gap completo. Pero el nivel del 50% es donde se concentra la mayor cantidad de órdenes. Para entradas: observa el rechazo al 50% de un FVG. Para objetivos: marca el 50% como tu T1 dentro de zonas FVG.",donna:"Marca el FVG. Luego marca su 50%. Ese punto medio es donde pasa la acción la mayor parte del tiempo."},
{icon:"🔗",title:"OB + FVG = Máxima Confluencia",body:"Cuando un Order Block y un Fair Value Gap se superponen en el mismo nivel de precio, eso es máxima confluencia. Un Order Block con un FVG dentro en el gráfico Diario, durante una Kill Zone, con alineación HTF — este es el setup que esperas. Oro en $1,995 donde hay un OB Diario y un FVG de 4H en el mismo nivel? Eso no es solo un nivel, eso es una invitación.",donna:"Cuando todo se alinea en el mismo nivel — OB, FVG, importancia estructural, Kill Zone — es cuando aumentas el tamaño. Ese es el setup de los setups."}
],q:[
{q:"EUR/USD tiene un Fair Value Gap entre 1.0865 y 1.0895 de hace tres días. El precio se acerca desde abajo. Deberías esperar:",type:"mc",opts:["Que el precio ignore el FVG","Que el precio sea rechazado exactamente en el fondo del FVG","Que el precio sea atraído hacia y a través de la zona FVG","Que el precio se detenga exactamente en la parte superior del FVG"],a:2,exp:"Los FVGs actúan como imanes — el precio es atraído para llenarlos. El precio probablemente entrará a la zona FVG (1.0865-1.0895) y ya sea llenará parcialmente (al 50%) o completará el gap."},
{q:"Dentro de un Fair Value Gap, ¿cuál es el nivel más significativo?",type:"mc",opts:["La parte superior del FVG","La parte inferior del FVG","El punto medio al 50%","El nivel donde se formó el gap"],a:2,exp:"El punto medio al 50% del FVG es donde se concentra la mayor cantidad de órdenes. Es el punto de reversión más común dentro de un FVG y el nivel clave para entradas y objetivos parciales."},
{q:"Un Order Block y Fair Value Gap en el mismo nivel de precio representa:",type:"mc",opts:["Una zona débil — demasiados traders la conocen","Máxima confluencia — nivel de mayor probabilidad","Dos señales que se cancelan","Solo válido en el marco temporal 1H"],a:1,exp:"OB + FVG en el mismo nivel = máxima confluencia. Dos razones separadas para que el precio reaccione en el mismo punto dramáticamente aumentan la probabilidad de una reacción ahí."},
{q:"Un Fair Value Gap siempre será llenado completamente antes de que el precio continúe en su dirección.",type:"tf",a:false,exp:"Falso. Los FVGs frecuentemente se llenan al 50% y luego revierten. No siempre se llenan completamente. El punto medio al 50% es el nivel clave — que el precio lo alcance se considera que el FVG hizo su trabajo."}
]},
14:{s:[
{icon:"📦",title:"Donde el Dinero Grande Dejó Su Marca",body:"Un Order Block (OB) es la última vela del color opuesto antes de un movimiento impulsivo significativo. En una tendencia alcista, la última vela bajista (roja) antes del gran movimiento alcista = el Order Block. Ahí es donde el Smart Money colocó sus posiciones. El precio casi siempre vuelve a probar esa área antes de continuar. EUR/USD en 1.0800, gran movimiento alcista — la última vela bajista antes de ese movimiento es tu OB.",donna:"El Order Block es donde entró el Smart Money. Necesitan que el precio vuelva ahí para añadir posiciones. Esa es tu entrada — montándote en su segunda compra."},
{icon:"📐",title:"La Regla del 50% para OBs",body:"Al igual que los FVGs, el nivel del 50% de un Order Block es el punto de entrada clave. El cuerpo del OB (entre el open y close de esa última vela opuesta) define la zona. El punto medio al 50% es donde buscas tu entrada, tus órdenes límite, tu rechazo del Model 1. Los Order Blocks de marcos temporales superiores (Diario, 4H) tienen significativamente más peso que los OBs de marcos temporales inferiores.",donna:"OB Diario + Kill Zone + rechazo Model 1 = una de las entradas más limpias en CRT. Marca tus Order Blocks HTF cada semana."},
{icon:"🔗",title:"Por Qué el Precio Vuelve a los Order Blocks",body:"Las instituciones no pueden llenar tamaños de posición masivos en un momento sin mover el precio contra ellas mismas. Llenan en lotes. El Order Block es donde entró el primer lote — cuando el precio vuelve, añaden más. Por eso los OBs actúan como soporte y resistencia con consistencia notable. No estás operando un patrón; estás operando la mecánica de cómo los grandes participantes tienen que operar.",donna:"No estás adivinando en un nivel. Estás siguiendo la huella de donde las instituciones TIENEN que añadir a sus posiciones. Una mentalidad completamente diferente."}
],q:[
{q:"Antes de un gran movimiento alcista en EUR/USD, la última vela bajista tenía un máximo de 1.0850 y un cierre de 1.0820. La zona de Order Block es:",type:"mc",opts:["Solo en 1.0850","Solo en 1.0820","Entre 1.0820 y 1.0850 (el cuerpo de la vela)","Por debajo de 1.0820"],a:2,exp:"El Order Block es el cuerpo de la última vela bajista antes del movimiento alcista — entre su cierre (1.0820) y apertura (1.0850). El 50% de esta zona es en 1.0835 — tu nivel de entrada clave."},
{q:"¿Qué Order Block tiene más peso?",type:"mc",opts:["El más reciente","El Order Block del marco temporal Diario","El que ha sido probado más veces","El cuerpo de vela más grande"],a:1,exp:"Los Order Blocks de marcos temporales superiores (Diario, 4H) tienen más peso que los OBs de marcos temporales inferiores. Un OB Diario representa un posicionamiento institucional mayor y genera reacciones de precio más significativas."},
{q:"El precio volviendo a un Order Block significa que la operación está invalidada.",type:"tf",a:false,exp:"Falso. El precio volviendo a un Order Block es esperado y es el punto de entrada. Los OBs son exactamente donde buscas entrar — cuando el precio hace pullback a donde el Smart Money originalmente se posicionó."},
{q:"¿Qué hace que los Order Blocks sean niveles confiables de soporte y resistencia?",type:"mc",opts:["Muchos traders retail los conocen","Tradición del análisis técnico","Las instituciones añaden a sus posiciones cuando el precio vuelve","Reconocimiento de patrones gráficos"],a:2,exp:"Los OBs son confiables porque las instituciones no pueden llenar posiciones completas a la vez. Colocan órdenes iniciales, luego añaden cuando el precio vuelve. Ese comportamiento institucional consistente es lo que hace funcionar los OBs — es mecánica, no magia."}
]},
15:{s:[
{icon:"🔄",title:"Cuando el Soporte Se Convierte en Resistencia",body:"Un Breaker Block es un Order Block que fue roto — el precio se movió a través de él, invalidándolo como soporte. Pero la zona no desaparece. Se invierte. Soporte anterior en 1.0850 que el precio rompe por debajo = Breaker Block. Ahora cuando el precio vuelve a 1.0850, actúa como resistencia. La misma zona, rol opuesto. Y la reacción ahí es frecuentemente la entrada más limpia y de menor drawdown en CRT.",donna:"Inviértelo. Si era soporte y el precio rompe por debajo, ahora es resistencia. Si era resistencia y el precio rompe por encima, ahora es soporte. Marca la inversión, espera el retorno, entra en el rechazo."},
{icon:"📊",title:"Tres Pasadas — El Nivel Más Equilibrado",body:"Cuando el precio ha pasado por la misma zona tres veces — una vez como soporte, roto, una vez como resistencia, roto, luego vuelve — esa área es la ubicación más equilibrada del gráfico completo. Menor drawdown. Reacción más predecible. Nasdaq en 17,000: probado como soporte, rompió por debajo, probado como resistencia, rompió por encima, vuelve a 17,000 — esas son tres pasadas. Zona de mayor probabilidad.",donna:"Tres pasadas por la misma zona = el nivel más equilibrado del gráfico. Entrada de menor drawdown de las cinco. Esta es la Entrada 3 en la secuencia."},
{icon:"🔑",title:"Inversión Válida vs Nivel Aleatorio",body:"No todo nivel roto se convierte en Breaker Block válido. Para una inversión válida: el movimiento original a través del nivel debe ser decisivo (un rompimiento genuino, no una mecha), la zona debe estar claramente definida (un Order Block o nivel estructural previo, no precio aleatorio), y el retorno debe ocurrir en un tiempo razonable. Un rompimiento vago de un nivel vago no es un Breaker Block.",donna:"Calidad sobre cantidad. Un setup de Breaker Block válido a la semana vale más que cinco cuestionables. Marca solo los limpios."}
],q:[
{q:"EUR/USD tenía soporte sólido en 1.0880 por dos semanas. El precio rompió decisivamente por debajo la semana pasada. Ahora el precio está volviendo a 1.0880. ¿Qué es 1.0880 ahora?",type:"mc",opts:["Todavía soporte — niveles de varias semanas son fuertes","Un Breaker Block — ahora actuando como resistencia","Neutral — los niveles rotos pierden importancia","Un objetivo para una operación larga"],a:1,exp:"Soporte anterior roto = Breaker Block = nueva resistencia. La zona de 1.0880 se invirtió cuando el precio rompió decisivamente por debajo. Ahora cuando el precio vuelve, buscas rechazo y una entrada corta ahí."},
{q:"Un Breaker Block es:",type:"mc",opts:["Un Order Block que aún no ha sido probado","Un Order Block que fue roto e invirtió su rol","Un Turtle Soup fallido","Un Fair Value Gap invertido"],a:1,exp:"Un Breaker Block es un Order Block que el precio rompió decisivamente, causando que la zona invierta su rol — soporte se convierte en resistencia, resistencia se convierte en soporte."},
{q:"La zona donde el precio ha pasado tres veces (tanto como soporte como resistencia) es:",type:"mc",opts:["Una zona débil — demasiado tráfico","La ubicación más equilibrada del gráfico — entrada de menor drawdown","Una zona a evitar — demasiado ruido","Solo válida como entrada corta"],a:1,exp:"Tres pasadas por la misma zona = la ubicación más equilibrada del gráfico. Tanto alcistas como bajistas han sido probados ahí. La tercera reacción típicamente tiene el menor drawdown de cualquier entrada en la secuencia CRT."},
{q:"Cualquier nivel roto se convierte automáticamente en un Breaker Block válido.",type:"tf",a:false,exp:"Falso. Un Breaker Block válido requiere: una ruptura decisiva (no una mecha), una zona claramente definida (OB o nivel estructural previo), y un retorno en un tiempo razonable. No todo nivel roto califica."}
]},
16:{s:[
{icon:"🔢",title:"Cinco Entradas. Una Secuencia.",body:"CRT tiene cinco puntos de entrada para cualquier setup. E1: Mecha Turtle Soup (en vivo, la más difícil, mayor recompensa). E2: Cierre Model 1 (confirmado diario, tu entrada estándar). E3: Breaker Block (menor drawdown, muy limpia). E4: OTE retroceso 60-75% (donde entran los traders ICT — también donde el Kiss of Death frecuentemente los atrapa). E5: Kiss of Death (la más violenta, la más segura, stop más pequeño). Cada una es válida. Cada una tiene su contexto.",donna:"Cinco entradas significa que tienes cinco oportunidades de acertar el mismo trade. Pero solo puedes avanzar — nunca retroceder en la secuencia."},
{icon:"🚫",title:"Nunca Vayas Hacia Atrás",body:"La regla que la mayoría de la gente omite: una vez que se ha formado una entrada de número mayor, no puedes volver a una de número menor. Si E3 (Breaker Block) se ha formado, E1 y E2 ya no existen para este setup. Ahora estás en E3 o esperando E4-E5. Intentar entrar en E1 después de que se ha formado E3 significa que estás peleando contra la secuencia.",donna:"¿Perdiste E1? Ahora eres un trader de E2. ¿Perdiste E2? E3. ¿Perdiste E3? E4. ¿Perdiste todo? Espera E5. Nunca vayas hacia atrás."},
{icon:"⚡",title:"E4 y la Trampa ICT",body:"La Entrada 4 es el retroceso del 60-75% del rango completo del setup — aquí es donde entran los traders de metodología ICT. El Smart Money lo sabe. El Kiss of Death (E5) está diseñado específicamente para parar a los traders de E4 antes del movimiento final. Si entras en E4, tu stop necesita tener en cuenta el KoD. Muchas entradas de E4 son paradas por el KoD antes del objetivo — por eso existe E5.",donna:"Si entras en E4, el KoD viene por ti. Dimensiona adecuadamente, stop por debajo de la zona KoD, o espera E5."},
{icon:"🏆",title:"Combinando las Entradas",body:"Los traders avanzados usan la secuencia de 5 entradas para escalar en posiciones. Tamaño pequeño en E1, añadir en E2, añadir en E3 con stop movido cerca de la entrada de E1, añadir en E5 con stop ajustado. Esto crea una posición que es parcialmente libre en E3, completamente en riesgo solo en E5, y maximalmente dimensionada para el movimiento final. La secuencia no es solo cinco entradas separadas — es un marco de construcción de posición.",donna:"Este es el juego avanzado. Construye la posición a través de la secuencia. Para E5, la mayor parte de la posición está corriendo libre."}
],q:[
{q:"Un setup ha completado su E1 (mecha Turtle Soup) y E2 (cierre Model 1). Perdiste ambos. Tus entradas válidas ahora son:",type:"mc",opts:["E1 todavía es válida — acaba de formarse","Solo E2","E3, E4, y E5","No quedan entradas válidas"],a:2,exp:"Una vez que E1 y E2 se han formado, no puedes volver. Tus entradas restantes válidas son E3 (Breaker Block), E4 (OTE 60-75%), y E5 (Kiss of Death). La secuencia solo avanza."},
{q:"La Entrada 4 (OTE, retroceso 60-75%) es específicamente diseñada para ser atrapada por:",type:"mc",opts:["Traders de E3","El Kiss of Death (E5)","Traders de E1","Cazadores de stops"],a:1,exp:"E4 es donde entran los traders de metodología ICT — y el Smart Money lo sabe. El Kiss of Death está diseñado específicamente para parar a los traders de E4 antes del movimiento final. E5 es la respuesta del KoD a que los traders de E4 son sacudidos."},
{q:"En la secuencia de 5 entradas, E5 (Kiss of Death) tiene el:",type:"mc",opts:["Mayor riesgo y menor recompensa","Stop más amplio pero más tiempo","Stop más ajustado y mayor certeza — el objetivo es inminente","Mismas características que E2"],a:2,exp:"E5 tiene el stop más ajustado porque el precio está más cerca del objetivo — el extremo de la mecha del KoD es el stop. Mayor certeza porque todas las entradas anteriores ya se han desarrollado. El objetivo es inminente."},
{q:"Puedes entrar en E1 de nuevo después de que E3 ya se ha formado en el mismo setup.",type:"tf",a:false,exp:"Falso. La secuencia solo avanza. Una vez que se ha formado E3, E1 y E2 ya no son válidas para este setup. Nunca vayas hacia atrás en la secuencia de entradas."},
{q:"¿Cuál es la principal ventaja de escalar una operación a través de múltiples puntos de entrada?",type:"mc",opts:["Aumenta el precio promedio de entrada","Crea una posición que progresivamente se vuelve libre de riesgo a medida que se desarrollan las entradas","Reduce el tamaño total de la posición","Simplifica la gestión del stop"],a:1,exp:"Escalar a través de E1-E5 significa que para E3, tus entradas de E1 y E2 pueden tener stops movidos a punto de equilibrio — parte de la posición corre libre. Para E5, la mayor parte de la posición no tiene riesgo mientras está maximalmente dimensionada para el movimiento final."}
]},
17:{s:[
{icon:"🔗",title:"Cuando los Mercados Se Delatan",body:"La Divergencia SMT (Smart Money Technique) es cuando dos activos correlacionados no se confirman el movimiento del otro. EUR/USD y DXY son inversos — cuando uno sube, el otro baja. S&P 500 y Nasdaq son directos — deberían moverse juntos. Cuando no lo hacen — cuando uno toma un nuevo máximo que el otro no confirma — eso es divergencia. El que tomó el máximo falso está a punto de revertir.",donna:"Cuando mercados correlacionados divergen, uno de ellos está mintiendo. Siempre es el que se extendió a un nuevo máximo o mínimo sin confirmación."},
{icon:"📊",title:"Los Pares a Observar",body:"Correlaciones clave: EUR/USD vs DXY (inverso). GBP/USD vs DXY (inverso). BTC vs ETH (directo — ambos deberían moverse juntos). S&P 500 vs Nasdaq (directo). Gold vs DXY (inverso). Cuando EUR/USD toma un nuevo máximo pero DXY no hace un nuevo mínimo, o BTC hace un nuevo máximo pero ETH no — esa es tu señal. El que se extendió es el Turtle Soup. El otro está diciendo la verdad.",donna:"Observa el par. Observa su mercado correlacionado. Si están en desacuerdo en un nuevo máximo o mínimo — opera el desacuerdo."},
{icon:"⚠️",title:"SMT Solo No Es una Operación",body:"La divergencia SMT es un filtro y potenciador de señal — no un disparador de operación independiente. Nunca entres solo con SMT. Necesitas: divergencia SMT en un nivel estructural, durante una Kill Zone, con una vela Model 1 de confirmación. SMT te dice CUÁL dirección. El Model 1 te dice CUÁNDO y DÓNDE entrar. Ambos juntos = uno de los setups más limpios en CRT.",donna:"La divergencia SMT es el por qué. El Model 1 es el cuándo. Necesitas ambos. Uno sin el otro es solo observación."}
],q:[
{q:"EUR/USD hace un nuevo máximo de 4H en 1.0950. Al mismo tiempo, DXY NO hace un nuevo mínimo de 4H. Esto es:",type:"mc",opts:["Confirmación — ambos acuerdan que EUR/USD es alcista","Divergencia SMT — el nuevo máximo de EUR/USD es probablemente falso","Comportamiento normal del mercado","Alcista para EUR/USD — la extensión muestra fuerza"],a:1,exp:"EUR/USD arriba + DXY no confirmando (no bajando) = Divergencia SMT. El nuevo máximo de EUR/USD es probablemente un Turtle Soup. DXY está diciendo la verdad — no ocurrió ningún cambio direccional real. Busca que EUR/USD revierta."},
{q:"Bitcoin hace un nuevo máximo pero Ethereum no. La divergencia SMT sugiere:",type:"mc",opts:["Bitcoin es más fuerte que Ethereum — compra Bitcoin","Ethereum alcanzará a Bitcoin","El nuevo máximo de Bitcoin podría ser falso — observa la reversión","Sin acción — los pares cripto no se correlacionan"],a:2,exp:"BTC y ETH están directamente correlacionados. Si BTC toma un nuevo máximo sin que ETH confirme, el nuevo máximo de BTC es probablemente falso (Turtle Soup). Observa que BTC revierta de regreso dentro del rango."},
{q:"Ves Divergencia SMT en un nivel estructural. Deberías:",type:"mc",opts:["Entrar inmediatamente — SMT es suficiente","Esperar una vela Model 1 que confirme en el nivel","Usar un stop más amplio ya que las señales SMT son menos confiables","Operar ambos activos correlacionados simultáneamente"],a:1,exp:"SMT es un potenciador de señal, no un disparador de operación. Todavía necesitas la confirmación de la vela Model 1 en el nivel estructural, durante una Kill Zone, con alineación HTF. SMT te dice la dirección, Model 1 te da la entrada."},
{q:"La Divergencia SMT sola, sin confirmación Model 1, es una señal de entrada completa y válida.",type:"tf",a:false,exp:"Falso. La divergencia SMT sola es observación, no una operación. Necesita combinarse con un nivel estructural, timing de Kill Zone, y vela de confirmación Model 1. SMT te dice el POR QUÉ — Model 1 te da el CUÁNDO."}
]},
18:{s:[
{icon:"⚠️",title:"El Setup Diseñado Para Atrapar Traders Inteligentes",body:"El Falso Cambio de Carácter (FCoC) está diseñado específicamente para atrapar a traders informados — los que saben cómo se ve un Cambio de Carácter real. Se ve perfecto: movimiento decisivo a través de un nivel clave, parece una ruptura genuina. Pero no hay una purga real de stops, sin respaldo de Kill Zone, sin alineación HTF. Es el Turtle Soup para personas que piensan ser demasiado inteligentes para ser atrapadas por un Turtle Soup.",donna:"Si un setup se ve demasiado perfecto y aparece fuera de una Kill Zone — esa es tu primera advertencia. El Smart Money atrapa a los traders inteligentes también."},
{icon:"✅",title:"CoC Real vs CoC Falso",body:"CoC Real: movimiento violento y explosivo a través de un nivel clave que también activa una purga significativa de stops, cierra decisivamente A TRAVÉS del nivel en una vela de marco temporal superior, con respaldo HTF y timing de Kill Zone. CoC Falso: ruptura limpia de libro de texto, movimiento de tamaño mediano, sin purga obvia de stops, frecuentemente fuera de Kill Zone, sin razón HTF fuerte. El real es violento y respaldado. El falso es limpio y sin respaldo.",donna:"El Cambio de Carácter real es feo y violento. Si se ve limpio y de libro de texto — cuestionalo. Los movimientos reales del mercado son desordenados."},
{icon:"🔍",title:"Lista de Verificación",body:"Antes de llamar a cualquier movimiento un Cambio de Carácter real: 1) ¿Se está rompiendo un nivel HTF clave? 2) ¿Está dentro de una Kill Zone? 3) ¿Un mercado correlacionado confirma (SMT)? 4) ¿Hubo una purga genuina de stops? 5) ¿La vela del marco temporal superior CERRÓ a través del nivel? Los cinco deberían ser sí para un CoC real. Faltar incluso dos lo hace sospechoso.",donna:"CoC de 1H en una zona premium HTF = señal de venta disfrazada de compra. Revisa el HTF primero. Siempre primero."},
{icon:"🔄",title:"Operando el CoC Falso",body:"El CoC Falso es en sí mismo un setup operable — y uno poderoso. Es esencialmente un Turtle Soup en un nivel estructural. El precio parece romper, atrapa a traders informados que van largo (o corto), recolecta sus stops, luego revierte violentamente. Si lo has identificado correctamente: la vela de rechazo Model 1 después de la ruptura falsa es tu entrada, y tu objetivo es el nivel estructural original que el CoC falso supuestamente iba a romper.",donna:"El FCoC atrapa a traders inteligentes. Si puedes identificarlo — puedes operar contra ellos. Esa es la operación más dulce en CRT."}
],q:[
{q:"Una vela de 1H cierra limpiamente por encima de una resistencia clave en 1.0900 durante la sesión asiática sin purga obvia de stops. Esto es más probablemente:",type:"mc",opts:["Un Cambio de Carácter real — compra","Un CoC Falso — cuestionalo: sin Kill Zone, sin purga","No Structure — ignóralo","Un Breaker Block formándose"],a:1,exp:"Sesión asiática + sin purga de stops + ruptura limpia (no violenta) = señales de alerta de CoC Falso. El CoC real es violento y ocurre durante Kill Zones con purga de stops visible."},
{q:"¿Qué distingue un Cambio de Carácter Real de uno Falso?",type:"mc",opts:["El CoC real tiene una vela más grande","El CoC real es violento, tiene purga de stops, respaldo de Kill Zone, alineación HTF","El CoC real ocurre solo en marcos temporales superiores","El CoC Falso ocurre solo en movimientos bajistas"],a:1,exp:"El CoC real es violento, desordenado, acompañado de una purga de stops visible, ocurre durante una Kill Zone, y tiene respaldo HTF claro. El CoC falso parece limpio y de libro de texto pero carece de todos estos factores de respaldo."},
{q:"Un CoC de 1H en una zona premium HTF (área sobrecomprada) es más probablemente:",type:"mc",opts:["Una señal alcista genuina","Una señal de venta disfrazada de compra — probablemente CoC Falso","Neutral hasta confirmado por el Diario","Una compra válida con tamaño reducido"],a:1,exp:"Un CoC de 1H en zona premium HTF = la trampa clásica del CoC Falso. La zona premium HTF hace improbable una ruptura alcista genuina. El precio es más probable que esté recolectando entradas largas del retail antes de revertir."},
{q:"El CoC Falso puede en sí mismo ser operado como un setup, similar a un Turtle Soup.",type:"tf",a:true,exp:"Verdadero. El CoC Falso es esencialmente un Turtle Soup en un nivel estructural. Una vez identificado, el rechazo Model 1 después de la ruptura falsa es tu entrada, y el nivel original es tu objetivo. Es una operación contraria de alta probabilidad."},
{q:"Para un Cambio de Carácter genuino, ¿cuántos de los 5 criterios de verificación deberían idealmente cumplirse?",type:"mc",opts:["Al menos 2","Al menos 3","Al menos 4","Los 5"],a:3,exp:"Los 5 criterios deberían cumplirse para un CoC genuino de alta probabilidad: nivel HTF roto, timing de Kill Zone, confirmación de mercado correlacionado, purga genuina de stops, y cierre de vela HTF a través del nivel. Faltar incluso dos lo hace sospechoso."}
]},
19:{s:[
{icon:"📈",title:"Reglas del Rango",body:"Operar rangos tiene tres reglas: Compra cerca del mínimo, vende cerca del máximo, nunca operes el medio. El primer rompimiento de un rango es casi siempre falso — este es el Turtle Soup que precede al movimiento direccional real. EUR/USD en rango entre 1.0800 y 1.0920 por dos semanas: el primer rompimiento por encima de 1.0920 es probablemente falso. Espera el Turtle Soup, luego opera la distribución de regreso adentro o el rompimiento genuino.",donna:"Primer rompimiento = casi siempre falso. El rango es el resorte. El Turtle Soup es la compresión. El movimiento real viene después."},
{icon:"🔄",title:"El Rango Como Acumulación",body:"Un rango no es solo un período aburrido de consolidación — es el Smart Money acumulando una posición masiva a los mejores precios posibles. Mientras los traders retail quedan picados operando dentro del rango, las instituciones están comprando silenciosamente en el fondo y vendiendo en el tope, construyendo la posición que creará la próxima tendencia mayor. El rango termina cuando han acumulado suficiente para hacer el movimiento.",donna:"Rango aburrido = Smart Money de compras. Cuando terminan de comprar, el precio se mueve fuerte. El rango te dice la dirección — compran el fondo significa que el movimiento será hacia arriba."},
{icon:"📐",title:"Transición de Rango a Tendencia",body:"El rompimiento genuino de un rango se ve diferente al falso. Rompimiento real: cierre decisivo por encima/debajo del rango con momentum creciente, respaldo HTF, timing de Kill Zone, y el pullback correctivo después del rompimiento se mantiene por encima del nivel de rompimiento (resistencia anterior se convierte en soporte). Rompimiento falso: movimiento agresivo que revierte inmediatamente, cierra de regreso adentro, sin respaldo HTF. Espera el pullback después del rompimiento real — esa es la Entrada 2.",donna:"El rompimiento real hace pullback. El falso revierte. Si el 'rompimiento' nunca hace pullback y prueba el nivel que rompió — sé sospechoso."}
],q:[
{q:"EUR/USD ha estado en rango 1.0800-1.0920 por tres semanas. El precio rompe por encima de 1.0920 durante la sesión asiática, luego cierra de regreso adentro en 1.0905. Esto es:",type:"mc",opts:["Rompimiento real — compra","Turtle Soup — probablemente el rompimiento falso del rango","Neutral — necesita más tiempo","Rango expandiéndose"],a:1,exp:"Rompimiento de sesión asiática que cierra inmediatamente de regreso adentro = Turtle Soup. El rompimiento falso del tope del rango. Esta es la manipulación antes del movimiento real (probablemente hacia abajo, de regreso hacia 1.0800)."},
{q:"En un rango, ¿dónde deberías buscar entradas de operación?",type:"mc",opts:["El medio del rango","Por encima de los máximos","Cerca del mínimo (para comprar) o cerca del máximo (para vender)","Solo en rompimientos"],a:2,exp:"Operar rangos: compra cerca del mínimo, vende cerca del máximo. El medio es tierra de nadie. Nunca operes el medio — ahí es donde los dos lados pierden."},
{q:"Después de un rompimiento genuino del rango hacia arriba, el primer pullback al nivel roto debería:",type:"mc",opts:["Romper de regreso por debajo — muestra que el rompimiento falló","Mantenerse por encima — resistencia anterior se convierte en soporte","Volver hasta el punto medio del rango","Probar el nivel múltiples veces antes de confirmar"],a:1,exp:"Después de un rompimiento real, el pullback al nivel roto debería mantenerse — resistencia anterior se convierte en soporte. Esta es la Entrada 2: confirmación del rompimiento genuino. Si rompe de regreso adentro, el rompimiento fue falso."},
{q:"El primer rompimiento de un rango establecido es casi siempre el movimiento real.",type:"tf",a:false,exp:"Falso. El primer rompimiento de un rango es casi siempre el movimiento falso — el Turtle Soup. Espera que cierre de regreso adentro, luego opera la dirección real. O espera que el falso se complete y el rompimiento genuino siga."}
]},
20:{s:[
{icon:"🏗️",title:"Top-Down Siempre",body:"El proceso completo: Semana del mes → Narrativa HTF (sesgo Semanal/Diario) → Posición del open diario → Objetivo de liquidez → Kill Zone → Nivel estructural → Vela de entrada. En ese orden. Siempre. Si empiezas con 'veo una vela bonita en el 1H,' ya empezaste mal. La vela del 1H es lo último que miras. La primera pregunta siempre es: ¿qué semana del mes es y cuál es la narrativa Semanal?",donna:"La entrada es el último paso. Lo diré hasta que lo sueñes. Último. Paso."},
{icon:"📋",title:"Cuatro Cosas Antes del Botón",body:"Antes de presionar el botón de compra o venta, debes saber cuatro cosas: 1) ¿Dónde está tu stop? (por encima/debajo de la mecha del Model 1 — nivel exacto). 2) ¿Dónde está T1? (50% del rango del setup — nivel exacto). 3) ¿Dónde está T2? (objetivo de liquidez externa — nivel exacto). 4) ¿Qué % de tu cuenta estás arriesgando? Si no puedes responder las cuatro en cinco segundos — no estás listo para entrar.",donna:"¿No puedes responder las cuatro en cinco segundos? Cierra el gráfico. Vuelve cuando puedas. El mercado siempre estará ahí mañana."},
{icon:"🔍",title:"La Narrativa Semanal",body:"Cada domingo antes de que abra la semana, pregunta: ¿qué semana del mes es? Semana 1 = acumulación, ten paciencia. Semana 2 = manipulación, no operes rompimientos. Semanas 3-4 = distribución, busca entradas de continuación. Luego mira el máximo y mínimo de la semana pasada. El precio probablemente tomará uno de esos niveles esta semana. Ese es tu objetivo semanal. Ese es el contexto para cada operación que tomas esta semana.",donna:"El domingo no es un día libre. El domingo es cuando mapeas la semana. Cinco minutos el domingo valen más que cinco horas de confusión durante la semana."},
{icon:"✅",title:"El Checklist Mental Pre-Operación",body:"Antes de cualquier entrada, corre esto en tu cabeza: ¿El sesgo HTF está claro? ¿Sé mi objetivo? ¿Estoy dentro de una Kill Zone? ¿Hay un nivel estructural aquí? ¿Veo una vela Model 1? ¿Está colocado mi stop? ¿Están marcados mis objetivos? ¿Es mi riesgo 1-2%? Ocho preguntas. Ocho síes antes de tocar el botón. Un 'no' o 'no estoy seguro' = espera. El setup volverá. La cuenta reventada no se arregla sola.",donna:"Ocho síes. No siete. Ocho. Si estás en seis y medio y entras de todas formas — así es como pierdes."}
],q:[
{q:"¿Cuál es el primer paso correcto en el análisis CRT top-down?",type:"mc",opts:["Encontrar una buena vela de entrada en el 1H","Revisar el 4H para estructura","Determinar la semana del mes y la narrativa Semanal","Dibujar niveles clave en el Diario"],a:2,exp:"El análisis top-down comienza con el contexto del marco temporal más alto. Semana del mes + narrativa Semanal establece el sesgo general. Todo lo que está debajo trabaja dentro de este marco."},
{q:"Antes de presionar el botón de entrada, ¿qué cuatro cosas debes saber?",type:"mc",opts:["Precio de entrada, tipo de vela, sesión, y par","Nivel de stop, nivel de T1, nivel de T2, y porcentaje de riesgo","Dirección de tendencia, soporte, resistencia, y noticias","Sesgo HTF, estructura ITF, entrada LTF, y eventos de noticias"],a:1,exp:"Los cuatro requisitos previos a la operación: nivel de stop exacto, T1 exacto (50%), T2 exacto (objetivo externo), y porcentaje de riesgo. Si no puedes responder los cuatro instantáneamente, no estás listo para entrar."},
{q:"Puedes tomar una operación el Martes de la Semana 2 si el setup se ve perfecto.",type:"tf",a:false,exp:"Falso. La Semana 2 es la semana de manipulación — la semana de los Turtle Soups y rompimientos falsos. Operar rompimientos de la Semana 2 como si fueran reales es cómo proporcionas liquidez para el movimiento de distribución de la Semana 3. Ten cuidado extra en la Semana 2."},
{q:"En el proceso top-down, ¿cuándo deberías mirar el gráfico 1H para una vela de entrada?",type:"mc",opts:["Primero — para encontrar la oportunidad","Después de revisar el 4H","Después de que el sesgo HTF, identificación del objetivo, Kill Zone, y nivel estructural están todos confirmados","En cualquier momento — todos los marcos temporales son iguales"],a:2,exp:"La vela de entrada del 1H es el ÚLTIMO paso. Después de: narrativa semanal, sesgo HTF, objetivo de liquidez identificado, Kill Zone activa, nivel estructural presente. Solo entonces bajas al 1H para la entrada."},
{q:"Sabes tu sesgo HTF y objetivo pero no estás dentro de una Kill Zone. Deberías:",type:"mc",opts:["Entrar de todas formas — HTF y objetivo son suficientes","Esperar la Kill Zone — el timing importa","Usar un stop más amplio para compensar","Tomar una posición más pequeña"],a:1,exp:"El timing de Kill Zone es un requisito, no una preferencia. El mismo setup fuera de una Kill Zone tiene probabilidad dramáticamente menor. Espera la Kill Zone. El setup o todavía estará ahí o ya se habrá desarrollado — de cualquier manera, tomaste la decisión correcta."}
]},
21:{s:[
{icon:"⚡",title:"Solo Dos Tipos de Entrada Válidos",body:"Una vez en una operación, solo deberías estar gestionando posiciones de dos tipos de entrada válidos: cierre Model 1 (la entrada estándar) o un cierre genuino de Cambio de Carácter. Estas son las únicas dos confirmaciones de entrada en CRT. Cualquier otra razón por la que entraste — 'se veía fuerte,' 'vi un patrón,' 'presentimiento' — significa que estás en una operación sin respaldo CRT. Eso no es una operación gestionada, es un juego de azar en progreso.",donna:"Si no puedes decirme EXACTAMENTE POR QUÉ entraste en términos CRT — Model 1 o CoC genuino — no estás operando CRT. Solo estás operando."},
