    {icon:"📏",title:"Las dos herramientas que importan",body:"Las líneas verticales marcan la apertura de una vela en el tiempo. Las líneas horizontales marcan un nivel de precio. Piénsalo como un plano cartesiano: las líneas verticales son el tiempo, las horizontales son el precio.",donna:"Líneas verticales — el tiempo. Líneas horizontales — el precio. Eso es todo lo que necesitas marcar."},
    {icon:"📐",title:"Fibonacci — solo el 50%",body:"En CRT solo necesitas un nivel Fibonacci: el 50%. Marca el alto y el bajo de tu vela 1 con el Fibonacci mostrando solo 0, 0.5 y 1. Guárdalo como template. Úsalo siempre.",donna:"Marco cada rango de vela con un Fibonacci que muestra solo el 0, el 0.5 y el 1. El 50% es siempre el primer objetivo parcial."},
    {icon:"🔙",title:"Bar Replay — arma de estudio",body:"Bar Replay te permite volver en el tiempo y reproducir el mercado vela por vela. Encuentra un setup pasado, rebobina antes de que suceda, practica leyéndolo en tiempo real. Estudia 100 setups antes de hacer trading en vivo.",donna:"Estudia 100 setups antes de operar. Bar Replay lo hace posible. Sin excusa."},
    {icon:"🔗",title:"Conecta tu cuenta fondeada",body:"TradingView se conecta directamente con la mayoría de proveedores de cuentas fondeadas. Una vez que pasas tu challenge, opera directamente desde el gráfico que has estado estudiando.",donna:"Cuando pases tu challenge, todo se transfiere. Misma plataforma. Mismos niveles. Ahora de verdad."}
  ],
  quiz_en:[
    {q:"You need many indicators on your chart to trade CRT.",type:"tf",a:false,exp:"False. Clean charts are better. Vertical lines for time, horizontal lines for price."},
    {q:"What does a vertical line represent?",type:"mc",opts:["A price level","The opening time of a candle","A support level","A trend"],a:1,exp:"Vertical lines mark TIME — specifically the opening of a candle at a specific hour. Vertical = time. Horizontal = price."},
    {q:"Which Fibonacci level matters in CRT?",type:"mc",opts:["0.236","0.382","0.5 (50%)","0.786"],a:2,exp:"The 50% of any CRT range is always significant — where you take partials and it acts as a price magnet."},
    {q:"Bar Replay lets you practice past setups in real time.",type:"tf",a:true,exp:"True. Bar Replay is one of the most powerful study tools available."}
  ],
  quiz_es:[
    {q:"Necesitas muchos indicadores en tu gráfico para operar CRT.",type:"tf",a:false,exp:"Falso. Los gráficos limpios son mejores. Líneas verticales para el tiempo, horizontales para el precio."},
    {q:"¿Qué representa una línea vertical?",type:"mc",opts:["Un nivel de precio","La hora de apertura de una vela","Un nivel de soporte","Una tendencia"],a:1,exp:"Las líneas verticales marcan el TIEMPO — específicamente la apertura de una vela a una hora específica."},
    {q:"¿Qué nivel Fibonacci importa en CRT?",type:"mc",opts:["0.236","0.382","0.5 (50%)","0.786"],a:2,exp:"El 50% de cualquier rango de CRT siempre es significativo."},
    {q:"Bar Replay te permite practicar setups pasados en tiempo real.",type:"tf",a:true,exp:"Verdadero. Bar Replay es una de las herramientas de estudio más poderosas."}
  ]
},
  {id:4,icon:"🕯️",title:"Candle Anatomy — Part 1",title_es:"Anatomía de la Vela — Parte 1",sub:"Open, High, Low, Close. The four parts that tell you everything.",sub_es:"Apertura, Alto, Bajo, Cierre. Las cuatro partes que te dicen todo.",level:1,
  slides_en:[
    {icon:"📖",title:"Every candle is data",body:"A candle is not just a shape. It is data — everything that happened between a specific open and close time. Every buy, every sell, every battle between buyers and sellers. If you cannot read a candle, you cannot read a chart.",donna:"We are candle traders. Before entering any trade ask: what candle am I trying to trade? That is the whole game."},
    {icon:"🏛️",title:"Invented in the 1700s",body:"Candlestick charts were invented by Japanese rice traders in the 1700s. 400 years later, every major financial market uses the same format. This survived 400 years because it works. That is all you need to know.",donna:"La herramienta de trading más antigua que existe. Sigue siendo la mejor. Acuérdense."},
    {icon:"📊",title:"The four parts",body:"Every candle — whether 1-minute or monthly — has exactly four parts: OPEN (where price started), HIGH (highest point reached), LOW (lowest point reached), CLOSE (where price ended). These four pieces tell you the entire story.",donna:"Apertura, alto, bajo, cierre. Que queden grabados. Todas las velas que existen solo tienen estas cuatro partes."},
    {icon:"🟩",title:"Bullish candle journey",body:"A bullish candle opened at the bottom and closed at the top. The journey: price started at the open, went DOWN to the low first, then pushed UP through the high, then settled at the close. Close is ABOVE the open. Buyers won.",donna:"En una vela alcista: apertura → bajo → alto → cierre. Los compradores ganaron."},
    {icon:"🟥",title:"Bearish candle journey",body:"A bearish candle opened at the top and closed at the bottom. The journey: price started at the open, went UP to the high first, then pushed DOWN through the low, then settled at the close. Close is BELOW the open. Sellers won.",donna:"En una vela bajista: apertura → alto → bajo → cierre. Los vendedores ganaron."},
    {icon:"📍",title:"The close is everything",body:"The open shows where a candle started. The high and low show where it tried to go. The close shows where buyers and sellers actually agreed to settle. The close reveals REAL INTENTION. Study the closes above everything else.",donna:"Los cierres muestran la intención real. Las mechas muestran el engaño. Más importante de lo que parece."}
  ],
  slides_es:[
    {icon:"📖",title:"Cada vela es información",body:"Una vela no es solo una forma. Es información — todo lo que pasó entre una hora de apertura y una de cierre. Cada compra, cada venta, cada batalla entre compradores y vendedores.",donna:"Somos traders de velas. Antes de entrar a cualquier trade pregúntate: ¿qué vela estoy intentando operar?"},
    {icon:"🏛️",title:"Inventadas en los 1700s",body:"Los gráficos de velas fueron inventados por traders de arroz japoneses en los años 1700. 400 años después, todos los mercados financieros usan el mismo formato. Sobrevivió 400 años porque funciona.",donna:"La herramienta de trading más antigua que existe. Sigue siendo la mejor. Acuérdense."},
    {icon:"📊",title:"Las cuatro partes",body:"Toda vela tiene exactamente cuatro partes: APERTURA (donde comenzó el precio), ALTO (punto más alto), BAJO (punto más bajo), CIERRE (donde terminó). Estas cuatro piezas te cuentan toda la historia.",donna:"Apertura, alto, bajo, cierre. Que queden grabados. Todas las velas que existen solo tienen estas cuatro partes."},
    {icon:"🟩",title:"El viaje de la vela alcista",body:"Una vela alcista abrió abajo y cerró arriba. El viaje: precio bajó primero al bajo, luego subió al alto, finalmente cerró. El cierre está ENCIMA de la apertura. Los compradores ganaron.",donna:"En una vela alcista: apertura → bajo → alto → cierre. Los compradores ganaron."},
    {icon:"🟥",title:"El viaje de la vela bajista",body:"Una vela bajista abrió arriba y cerró abajo. El viaje: precio subió primero al alto, luego bajó al bajo, finalmente cerró. El cierre está ABAJO de la apertura. Los vendedores ganaron.",donna:"En una vela bajista: apertura → alto → bajo → cierre. Los vendedores ganaron."},
    {icon:"📍",title:"El cierre es todo",body:"La apertura dice dónde comenzó. El alto y el bajo dicen a dónde intentó ir. El cierre dice dónde realmente se estableció. El cierre revela la INTENCIÓN REAL. Estudia los cierres por encima de todo lo demás.",donna:"Los cierres muestran la intención real. Las mechas muestran el engaño."}
  ],
  quiz_en:[
    {q:"On a bullish candle price travels: Open → Low → High → Close",type:"tf",a:true,exp:"True. Bullish candle: price dips to the low first, pushes up through the high, closes above the open."},
    {q:"On a bearish candle price travels: Open → High → Low → Close",type:"tf",a:true,exp:"True. Bearish candle: spikes to the high first, pushes down to the low, closes below the open."},
    {q:"Which candle part reveals real intention?",type:"mc",opts:["The open","The high","The low","The close"],a:3,exp:"The close reveals where buyers and sellers actually settled — the real intention."},
    {q:"A 1-minute candle and monthly candle have different structures.",type:"tf",a:false,exp:"False. All candles have the same four parts. Only the time to form is different."}
  ],
  quiz_es:[
    {q:"En una vela alcista el precio viaja: Apertura → Bajo → Alto → Cierre",type:"tf",a:true,exp:"Verdadero. Vela alcista: el precio primero baja al bajo, luego sube al alto, cierra por encima de la apertura."},
    {q:"En una vela bajista el precio viaja: Apertura → Alto → Bajo → Cierre",type:"tf",a:true,exp:"Verdadero. Vela bajista: sube al alto primero, baja al bajo, cierra por debajo de la apertura."},
    {q:"¿Qué parte de la vela revela la intención real?",type:"mc",opts:["La apertura","El alto","El bajo","El cierre"],a:3,exp:"El cierre revela dónde compradores y vendedores realmente se establecieron."},
    {q:"Una vela de 1 minuto y una mensual tienen estructuras diferentes.",type:"tf",a:false,exp:"Falso. Todas las velas tienen las mismas cuatro partes. Solo cambia el tiempo para formarse."}
  ]
},
  {id:5,icon:"🌊",title:"Candle Anatomy — Part 2",title_es:"Anatomía de la Vela — Parte 2",sub:"Wicks, bodies, and the fractal nature that makes CRT universal.",sub_es:"Mechas, cuerpos y la naturaleza fractal que hace CRT universal.",level:1,
  slides_en:[
    {icon:"📌",title:"Body vs wick",body:"The body is the space between open and close. The wick is the thin line extending beyond the body — where price tried to go but could not hold. Someone runs past their house, realizes they went too far, comes back. The house is the body. The extra distance is the wick.",donna:"The wick is the attempt. The body is the result. Focus on where price CLOSED, not where it poked."},
    {icon:"🎭",title:"Closes reveal intent. Wicks reveal deception.",body:"A close above a previous high is real — conviction, real buying power. A wick above a previous high is a trap — someone tried to push price higher but failed. The close is the truth. The wick is the lie. This distinction changes everything in CRT.",donna:"Los cierres muestran la intención real. Las mechas muestran el engaño. When you see a long wick think: someone tried to go there and failed."},
    {icon:"🔬",title:"All timeframes look identical",body:"A 1-minute candle, a 4-hour candle, a monthly candle — same structure, same anatomy, same logic. The only difference is how long each takes to form. This is the fractal nature of markets. What you see in 1 minute is the same as what you see in 1 month.",donna:"Todas las velas se ven exactamente igual. De un minuto a un mes. La única diferencia es la velocidad en la que se imprimen."},
    {icon:"🔍",title:"Large candles contain smaller ones",body:"A monthly candle contains 4 weekly candles. Each weekly contains 5 daily candles. Each daily contains six 4-hour candles. The movement you see in any large candle is made up of many smaller candles telling the same story.",donna:"Si ven una vela mensual y bajan a 4 horas — van a ver la misma historia pero en más detalle. CRTs dentro de CRTs. Todo es lo mismo."},
    {icon:"🎯",title:"You are a candle trader",body:"You do not trade indicators, news, or moving averages. You trade candles. Before entering any trade ask: what candle am I trying to trade? A 1-hour? A 4-hour? A daily? Identify the candle first. Everything else follows.",donna:"Nosotros somos traders de velas. La primera pregunta siempre es: ¿qué vela voy a operar?"},
    {icon:"📚",title:"Homework",body:"Go to TradingView. Put a vertical line at the opening of a monthly candle. Change to 4-hour and watch how that monthly candle was formed inside. Do this 20 times. This single exercise changes how you see every chart forever.",donna:"Devuélvete y estudia. Pon una línea vertical al inicio de una vela mensual, baja a 4 horas y mira cómo se formó. Haz eso 20 veces."}
  ],
  slides_es:[
    {icon:"📌",title:"Cuerpo vs mecha",body:"El cuerpo es el espacio entre apertura y cierre. La mecha es la línea fina que se extiende más allá — donde el precio intentó ir pero no pudo sostenerse. Es como alguien que corre más allá de su casa, se da cuenta, y vuelve. La casa es el cuerpo. La distancia extra es la mecha.",donna:"La mecha es el intento. El cuerpo es el resultado. Enfócate en dónde CERRÓ el precio, no en dónde se asomó."},
    {icon:"🎭",title:"Los cierres muestran intención. Las mechas muestran engaño.",body:"Un cierre por encima de un alto anterior es real — convicción. Una mecha por encima de un alto anterior es trampa — alguien intentó empujar el precio hacia arriba pero falló. El cierre es la verdad. La mecha es la mentira.",donna:"Los cierres muestran la intención real. Las mechas muestran el engaño. Cuando ves una mecha larga — piensa: alguien intentó ir allá y fracasó."},
    {icon:"🔬",title:"Todas las temporalidades se ven idénticas",body:"Una vela de 1 minuto, una de 4 horas, una mensual — misma estructura, misma anatomía, misma lógica. La única diferencia es cuánto tarda en formarse. Esta es la naturaleza fractal de los mercados.",donna:"Todas las velas se ven exactamente igual. De un minuto a un mes. La única diferencia es la velocidad en la que se imprimen."},
    {icon:"🔍",title:"Las velas grandes contienen las pequeñas",body:"Una vela mensual contiene 4 semanales. Cada semanal contiene 5 diarias. Cada diaria contiene seis de 4 horas. El movimiento en cualquier vela grande está compuesto de muchas velas más pequeñas contando la misma historia.",donna:"Si ven una vela mensual y bajan a 4 horas — van a ver la misma historia pero en más detalle. CRTs dentro de CRTs."},
    {icon:"🎯",title:"Eres un trader de velas",body:"No operas indicadores, noticias ni promedios móviles. Operas velas. Antes de entrar a cualquier trade pregúntate: ¿qué vela estoy intentando operar? Identifica la vela primero.",donna:"Nosotros somos traders de velas. La primera pregunta siempre es: ¿qué vela voy a operar?"},
    {icon:"📚",title:"Tarea",body:"Ve a TradingView. Pon una línea vertical al inicio de una vela mensual. Cambia a 4 horas y observa cómo se formó esa vela mensual por dentro. Haz esto 20 veces.",donna:"Devuélvete y estudia. Pon una línea vertical al inicio de una vela mensual, baja a 4 horas y mira cómo se formó. Haz eso 20 veces."}
  ],
  quiz_en:[
    {q:"A wick shows where price actually settled.",type:"tf",a:false,exp:"False. The wick shows where price TRIED to go. The CLOSE is where price settled."},
    {q:"A 4-hour candle and 1-minute candle have different structures.",type:"tf",a:false,exp:"False. All candles have the same structure: Open, High, Low, Close."},
    {q:"What is the body of a candle?",type:"mc",opts:["The wick above the close","The space between open and close","The highest point reached","The lowest point reached"],a:1,exp:"The body is the space between the open and the close."},
    {q:"A long wick above an old high usually means a real breakout.",type:"tf",a:false,exp:"False. A wick above an old high that closes back inside is deception — a failed attempt."},
    {q:"Every daily candle contains six 4-hour candles.",type:"tf",a:true,exp:"True. A 24-hour day contains six 4-hour candles. Same story in more detail."}
  ],
  quiz_es:[
    {q:"Una mecha muestra dónde se estableció realmente el precio.",type:"tf",a:false,exp:"Falso. La mecha muestra a dónde INTENTÓ ir el precio. El CIERRE es donde se estableció."},
    {q:"Una vela de 4 horas y una de 1 minuto tienen estructuras diferentes.",type:"tf",a:false,exp:"Falso. Todas las velas tienen la misma estructura: Apertura, Alto, Bajo, Cierre."},
    {q:"¿Qué es el cuerpo de una vela?",type:"mc",opts:["La mecha por encima del cierre","El espacio entre la apertura y el cierre","El punto más alto","El punto más bajo"],a:1,exp:"El cuerpo es el espacio entre la apertura y el cierre."},
    {q:"Una mecha larga por encima de un alto antiguo normalmente significa un breakout real.",type:"tf",a:false,exp:"Falso. Una mecha por encima de un alto antiguo que cierra adentro es engaño — un intento fallido."},
    {q:"Cada vela diaria contiene seis velas de 4 horas.",type:"tf",a:true,exp:"Verdadero. Un día de 24 horas contiene seis velas de 4 horas."}
  ]
},
  {id:6,icon:"⚡",title:"Risk Management — The Magic Potion",title_es:"Manejo de Riesgo — La Poción Mágica",sub:"More important than any strategy. More important than everything.",sub_es:"Más importante que cualquier estrategia. Más importante que todo.",level:1,
  slides_en:[
    {icon:"💡",title:"The most important lesson",body:"Risk management is not exciting. But it is the single most important concept in this entire course. More important than CRT itself. Without proper risk management, even the best strategy destroys your account eventually.",donna:"It is not about how much you win when you are right. It is about how much you lose when you are wrong. That is the entire game."},
    {icon:"📐",title:"The math that changes everything",body:"With a 1:3 risk-to-reward ratio, you only need to win 25% of your trades to be profitable. You can LOSE 7 out of every 10 trades and still make money. Read that again. Seven losses out of ten. Still profitable.",donna:"Combining risk-to-reward with risk management — that is the magic potion. Slow, consistent compound growth that becomes massive."},
    {icon:"🎯",title:"Never risk more than 1-2%",body:"Every trade, no matter how confident you feel — risk no more than 1-2% of your total account. If your account is $1,000, risk $10-20 maximum per trade. This is not optional. This is the rule that keeps you alive.",donna:"Las ocho pérdidas seguidas vienen para todos. Sin excepción. Si arriesgas el 10% cuando llegan — fin de cuenta. Si arriesgas 1-2% — sobrevives y sigues."},
    {icon:"💀",title:"The streak of death is real",body:"At some point — no matter how good you are — you will face 8 consecutive losing trades. Not a question of if. When. Your only job before it arrives: make sure your account can survive. At 1% risk, 8 losses costs you 8%. At 10% risk, it wipes you out.",donna:"Romeo talks about this clearly. The streak of death always comes. The paranoid conservative trader survives. That is who wins."},
    {icon:"🏦",title:"Funded account risk rules",body:"A $50,000 funded account might only have $2,000 of drawdown allowed. Never risk an amount that could destroy the account in 10 trades. Trade small enough that 20 consecutive losses keeps you in the game.",donna:"Cuida el drawdown como si fuera lo más valioso que tienes. Porque lo es."},
    {icon:"🔢",title:"One simple rule",body:"Before every trade, ask: if this goes wrong, how much do I lose? Make sure the answer is 1-2% of your account. No trade is so good it is worth breaking this rule. Only the paranoid survive.",donna:"Antes de cada trade: ¿cuánto pierdo si me equivoco? Si la respuesta no es 1-2% de tu cuenta — no presiones el botón."}
  ],
  slides_es:[
    {icon:"💡",title:"La lección más importante",body:"El manejo de riesgo no es emocionante. Pero es el concepto más importante de todo este curso. Más importante que CRT en sí. Sin un manejo de riesgo adecuado, incluso la mejor estrategia destruye tu cuenta eventualmente.",donna:"No se trata de cuánto ganas cuando tienes razón. Se trata de cuánto pierdes cuando te equivocas. Ese es el juego completo."},
    {icon:"📐",title:"La matemática que cambia todo",body:"Con una relación riesgo-beneficio de 1:3, solo necesitas ganar el 25% de tus trades para ser rentable. Puedes PERDER 7 de cada 10 trades y aún hacer dinero. Siete pérdidas de diez. Aún rentable.",donna:"Combinar riesgo-beneficio con manejo de riesgo — eso es la poción mágica. Crecimiento compuesto lento y consistente que eventualmente se vuelve enorme."},
    {icon:"🎯",title:"Nunca arriesgues más del 1-2%",body:"En cada trade, sin importar qué tan confiado te sientas — arriesga máximo el 1-2% de tu cuenta total. Si tu cuenta es de $1,000, arriesga máximo $10-20 por trade. Esto no es opcional.",donna:"Las ocho pérdidas seguidas vienen para todos. Sin excepción. Si arriesgas el 10% cuando llegan — fin de cuenta. Si arriesgas 1-2% — sobrevives y sigues."},
    {icon:"💀",title:"La racha de la muerte es real",body:"En algún momento — sin importar qué tan bueno seas — enfrentarás 8 trades perdedores consecutivos. No es cuestión de si. Es cuestión de cuándo. Con 1% de riesgo, 8 pérdidas te cuestan el 8%. Con 10%, te liquidan.",donna:"Romeo lo habla muy claro. La racha de la muerte siempre llega. El trader paranoico y conservador sobrevive. Ese es el que gana."},
    {icon:"🏦",title:"Reglas de riesgo en cuentas fondeadas",body:"Una cuenta fondeada de $50,000 puede tener solo $2,000 de drawdown permitido. Nunca arriesgues una cantidad que pueda destruir la cuenta en 10 trades.",donna:"Cuida el drawdown como si fuera lo más valioso que tienes. Porque lo es."},
    {icon:"🔢",title:"Una regla simple",body:"Antes de cada trade pregúntate: si esto sale mal, ¿cuánto pierdo? Asegúrate de que la respuesta sea el 1-2% de tu cuenta. Ningún trade vale romper esta regla. Solo los paranoicos sobreviven.",donna:"Antes de cada trade: ¿cuánto pierdo si me equivoco? Si la respuesta no es 1-2% de tu cuenta — no presiones el botón."}
  ],
  quiz_en:[
    {q:"With 1:3 RR you need to win 75% of trades to be profitable.",type:"tf",a:false,exp:"False. With 1:3 RR you only need to win about 25% of trades."},
    {q:"Maximum risk per trade:",type:"mc",opts:["5-10%","10-15%","1-2%","Whatever feels right"],a:2,exp:"1-2% maximum. No exceptions. At 1%, even 8 consecutive losses only costs 8% of the account."},
    {q:"The streak of death — 8 consecutive losses — can happen to any trader.",type:"tf",a:true,exp:"True. Romeo says it clearly: comes for every trader. Make sure your account survives when it arrives."},
    {q:"What is more important than your trading strategy?",type:"mc",opts:["Win rate","Risk management","Which markets you choose","Your timeframe"],a:1,exp:"Risk management prevails over strategy. Every time."},
    {q:"Risking more than 2% on a very clear setup is justified.",type:"tf",a:false,exp:"False. No setup justifies breaking the 1-2% rule. Conviction is not a risk override."}
  ],
  quiz_es:[
    {q:"Con un RR de 1:3 necesitas ganar el 75% de los trades para ser rentable.",type:"tf",a:false,exp:"Falso. Con un RR de 1:3 solo necesitas ganar aproximadamente el 25%."},
    {q:"¿El riesgo máximo por trade?",type:"mc",opts:["5-10%","10-15%","1-2%","Lo que se sienta bien"],a:2,exp:"Máximo 1-2%. Sin excepciones."},
    {q:"La racha de la muerte — 8 pérdidas consecutivas — puede pasarle a cualquier trader.",type:"tf",a:true,exp:"Verdadero. Romeo lo dice claramente: llega para todo trader."},
    {q:"¿Qué es más importante que tu estrategia de trading?",type:"mc",opts:["Tu tasa de ganancias","El manejo de riesgo","Los mercados que eliges","Tu temporalidad"],a:1,exp:"El manejo de riesgo prevalece sobre la estrategia. Siempre."},
    {q:"Arriesgar más del 2% en un setup muy claro está justificado.",type:"tf",a:false,exp:"Falso. Ningún setup justifica romper la regla del 1-2%."}
  ]
},
  {id:7,icon:"👑",title:"Smart Money vs Dumb Money",title_es:"Dinero Inteligente vs Dinero Tonto",sub:"Who actually moves the markets and how they trap everyone else.",sub_es:"Quién realmente mueve los mercados y cómo atrapa a todos los demás.",level:1,
  slides_en:[
    {icon:"👑",title:"Two sides to every market",body:"Smart Money is a small group of institutions and market makers who control the price algorithm. Everyone else is Dumb Money. Market makers know where your stops are. They use that knowledge against you every single day.",donna:"We are fleas on a dog. But if you learn to read the signals the dog leaves — you can ride the dog instead of getting shaken off."},
    {icon:"🏗️",title:"How Smart Money moves price",body:"Market makers need liquidity — other people's orders — to fill their massive positions. So they engineer fake moves to collect those orders. Push price above a high, trigger everyone's stops, collect all those orders, then reverse hard.",donna:"El dinero inteligente necesita tus órdenes para moverse. Sin liquidez no pueden mover el precio. Eso los hace predecibles si sabes qué buscar."},
    {icon:"🪤",title:"The trap they run every time",body:"Smart Money pushes price above an old high. Everyone buys the breakout or gets stop-triggered. Smart Money collects all those orders and reverses violently. The breakout was fake. The trap was the whole point.",donna:"Cada movimiento grande en el mercado empezó con una trampa. Sin la trampa no hay movimiento real."},
    {icon:"😤",title:"Dumb money always loses",body:"Dumb money buys breakouts above highs. Sells breakdowns below lows. Places stops at obvious locations. Reacts to price instead of anticipating it. Blames the market when it loses. Does any of that sound familiar?",donna:"La gente de dinero tonto culpa al mercado cuando pierde. El sistema no se equivoca. La pregunta es qué no tuviste en cuenta."},
    {icon:"🔮",title:"CRT makes Smart Money readable",body:"CRT does not turn you into Smart Money. But it teaches you to read the signals Smart Money leaves before making their move. The false breakout, the timing, the key level — their fingerprints. Once you know what to look for, you stop being the victim.",donna:"CRT te enseña a leer las señales que dejan los creadores del mercado. Una vez las veas, no vas a poder dejar de verlas."}
  ],
  slides_es:[
    {icon:"👑",title:"Dos lados en todo mercado",body:"El Dinero Inteligente es un pequeño grupo de instituciones y creadores de mercado que controlan el algoritmo del precio. Todo el mundo más es Dinero Tonto. Los creadores de mercado saben dónde están tus stops. Lo usan en tu contra.",donna:"Somos pulgas en el lomo de un perro. Pero si aprendes a leer las señales que deja el perro — puedes montarte en él en vez de que te sacuda."},
    {icon:"🏗️",title:"Cómo mueve el precio el Dinero Inteligente",body:"Los creadores de mercado necesitan liquidez — las órdenes de otras personas — para llenar sus posiciones masivas. Así que fabrican movimientos falsos para recolectar esas órdenes. Empujan el precio por encima de un alto, activan los stops de todos, recolectan esas órdenes, luego revierten fuerte.",donna:"El dinero inteligente necesita tus órdenes para moverse. Sin liquidez no pueden mover el precio. Eso los hace predecibles si sabes qué buscar."},
    {icon:"🪤",title:"La trampa que usan siempre",body:"El Dinero Inteligente empuja el precio por encima de un alto antiguo. Todos compran el breakout o son activados sus stops. El Dinero Inteligente recolecta todas esas órdenes y revierte violentamente. El breakout era falso.",donna:"Cada movimiento grande en el mercado empezó con una trampa. Sin la trampa no hay movimiento real."},
    {icon:"😤",title:"El dinero tonto siempre pierde",body:"El dinero tonto compra breakouts por encima de altos. Vende breakdowns por debajo de bajos. Coloca stops en ubicaciones obvias. Reacciona al precio en vez de anticiparlo. Culpa al mercado cuando pierde.",donna:"La gente de dinero tonto culpa al mercado cuando pierde. El sistema no se equivoca. La pregunta es qué no tuviste en cuenta."},
    {icon:"🔮",title:"CRT hace que el Dinero Inteligente sea legible",body:"CRT no te convierte en Dinero Inteligente. Pero te enseña a leer las señales que deja antes de hacer su movimiento. El breakout falso, el timing, el nivel clave — sus huellas. Una vez que sabes qué buscar, dejas de ser la víctima.",donna:"CRT te enseña a leer las señales que dejan los creadores del mercado. Una vez las veas, no vas a poder dejar de verlas."}
  ],

  {id:8,icon:"🐢",title:"Turtle Soup — The Engine",title_es:"Turtle Soup — El Motor",sub:"Every big market move starts with this. Every single one.",sub_es:"Todo movimiento grande del mercado empieza con esto. Todos y cada uno.",level:1,
  slides_en:[
    {icon:"⚡",title:"No big move without a trap",body:"There is no large price move that did not start with a false breakout. The market needs to collect stop-losses and trapped traders to fuel the real move. That false breakout — the fake push beyond an old high or low — is Turtle Soup.",donna:"Sin turtle soup, sin movimiento. El mercado necesita esa trampa para cargar el tanque antes del movimiento real."},
    {icon:"📈",title:"Turtle Soup at a high",body:"Price approaches an old high. Retail traders buy the breakout or get their sell stops triggered. Smart Money pushes just above that high, collects all those orders, then reverses violently downward. Everyone who bought the breakout is now trapped.",donna:"El precio sube, toca el alto antiguo, lo sobrepasa... y después cae con fuerza. Ese dolor es el combustible del movimiento."},
    {icon:"📉",title:"Turtle Soup at a low",body:"Price approaches an old low. Retail traders sell the breakdown or get their buy stops triggered. Smart Money pushes just below that low, collects those orders, then reverses violently upward. Everyone who sold the breakdown is now trapped.",donna:"Acuérdense: el primer breakout casi siempre es falso. Nunca compren sobre un alto antiguo. Nunca vendan debajo de un bajo antiguo."},
    {icon:"⏰",title:"Timing and key levels make it real",body:"Not every push above a high is worth trading. It must happen at the RIGHT TIME AND at a real KEY LEVEL. A Turtle Soup at a random time with no key level is noise. A Turtle Soup at a 4-hour FVG right at the 9 AM candle opening — that is high probability.",donna:"A la hora correcta, en el nivel clave correcto. Eso es lo que diferencia un turtle soup de alta probabilidad de uno que es solo ruido."},
    {icon:"❌",title:"The failure swing",body:"After you enter a trade, price will often make a second fake move toward your stop-loss — as if going to take you out. This is the failure swing. Designed to shake weak hands out. If your entry and stop are correct, price will not actually reach your stop. Stay in the trade.",donna:"El failure swing va a intentar sacarte. Si tomaste todas las reglas de tu operación, tu stop no va a ser tomado. Ten confianza en el sistema."}
  ],
  slides_es:[
    {icon:"⚡",title:"Sin trampa no hay movimiento grande",body:"No existe un movimiento de precio grande que no haya empezado con un breakout falso. El mercado necesita recolectar stop-losses y traders atrapados para combustionar el movimiento real.",donna:"Sin turtle soup, sin movimiento. El mercado necesita esa trampa para cargar el tanque antes del movimiento real."},
    {icon:"📈",title:"Turtle Soup en un alto",body:"El precio se acerca a un alto antiguo. Los traders retail compran el breakout o sus sell stops son activados. El Dinero Inteligente empuja apenas por encima de ese alto, recolecta todas esas órdenes, luego revierte violentamente hacia abajo.",donna:"El precio sube, toca el alto antiguo, lo sobrepasa... y después cae con fuerza. Ese dolor es el combustible del movimiento."},
    {icon:"📉",title:"Turtle Soup en un bajo",body:"El precio se acerca a un bajo antiguo. Los traders retail venden el breakdown o sus buy stops son activados. El Dinero Inteligente empuja apenas por debajo de ese bajo, recolecta esas órdenes, luego revierte violentamente hacia arriba.",donna:"Acuérdense: el primer breakout casi siempre es falso. Nunca compren sobre un alto antiguo. Nunca vendan debajo de un bajo antiguo."},
    {icon:"⏰",title:"Timing y niveles clave lo hacen real",body:"No todo empuje por encima de un alto vale la pena. Debe ocurrir a la hora correcta Y en un nivel clave real. Un Turtle Soup en un FVG de 4 horas justo a la apertura de las 9 AM — eso es alta probabilidad.",donna:"A la hora correcta, en el nivel clave correcto. Eso es lo que diferencia un turtle soup de alta probabilidad de uno que es solo ruido."},
    {icon:"❌",title:"El failure swing",body:"Después de entrar a un trade, el precio a menudo hace un segundo movimiento falso hacia tu stop-loss. Diseñado para sacar a las manos débiles. Si tu entrada y stop son correctos, el precio no llegará realmente a tu stop.",donna:"El failure swing va a intentar sacarte. Si tomaste todas las reglas de tu operación, tu stop no va a ser tomado. Ten confianza en el sistema."}
  ],
  quiz_en:[
    {q:"Every large market move begins with a false breakout.",type:"tf",a:true,exp:"True. Every big move requires liquidity from trapped traders' stops. The false breakout collects that liquidity."},
    {q:"What happens after Smart Money collects Turtle Soup liquidity?",type:"mc",opts:["Price continues breakout","Consolidates","Price reverses violently opposite","Moves randomly"],a:2,exp:"Price reverses hard. Trapped traders' pain fuels the real move in the opposite direction."},
    {q:"You should buy as soon as price breaks above an old high.",type:"tf",a:false,exp:"False. The first breakout is almost always false. Wait for Turtle Soup confirmation."},

  quiz_es:[
    {q:"Todo movimiento grande del mercado comienza con un breakout falso.",type:"tf",a:true,exp:"Verdadero. Todo movimiento grande necesita liquidez de los stops de los traders atrapados."},
    {q:"¿Qué sucede después de que el Dinero Inteligente recolecta la liquidez del Turtle Soup?",type:"mc",opts:["El precio continúa el breakout","Consolida","El precio revierte violentamente en dirección opuesta","Se mueve aleatoriamente"],a:2,exp:"El precio revierte fuertemente. El dolor de los traders atrapados combustiona el movimiento real."},
    {q:"Debes comprar tan pronto como el precio rompa por encima de un alto antiguo.",type:"tf",a:false,exp:"Falso. El primer breakout casi siempre es falso."},
    {q:"¿Qué es el failure swing?",type:"mc",opts:["El trade alcanza el objetivo inmediatamente","Un segundo movimiento falso hacia tu stop diseñado para sacarte","El mercado está en un rango","El precio cierra fuera del rango de la vela"],a:1,exp:"El failure swing es un segundo movimiento falso hacia tu stop. Si tu entrada fue correcta, el precio no llegará realmente."}
  ]

  {id:9,icon:"🎯",title:"What is CRT?",title_es:"¿Qué es CRT?",sub:"Every candle is a range. Time is more important than price. This is everything.",sub_es:"Cada vela es un rango. El tiempo es más importante que el precio. Esto lo es todo.",level:1,
  slides_en:[
    {icon:"📐",title:"Candle Range Theory",body:"CRT — Candle Range Theory. Every candle you see is a range. Not just a shape. A range with a high boundary, a low boundary, a 50% midpoint, and a direction. Once you see candles as ranges instead of shapes, you can predict what the next candle will do.",donna:"CRT no es un patrón. CRT es la lógica en la que se mueven los mercados. Una vez que lo ves así, no puedes ver los gráficos de ninguna otra manera."},
    {icon:"🔢",title:"Only two outcomes",body:"For any candle range you mark, only two real outcomes exist for the next candle. One: the next candle closes OUTSIDE the range (continuation). Two: the next candle wicks outside and closes BACK INSIDE (Turtle Soup — reversal). Two possibilities. You are no longer guessing.",donna:"En los ojos de un experto hay pocas posibilidades. En los ojos de un principiante hay miles. Dos resultados. Solo dos."},
    {icon:"⏰",title:"Time is more important than price",body:"This is what separates CRT from every other system. Everyone focuses on WHERE a level is. CRT focuses on WHEN price arrives at that level. The same key level at the wrong time loses. The same key level at the right time wins. Same level. Different result. Only the time changed.",donna:"El mismo setup. La hora incorrecta — pierdes. La hora correcta — ganas. Ese es el secreto de CRT."},
    {icon:"🌊",title:"CRT is universal",body:"CRT works on the 1-minute chart and the monthly chart. It works on Forex, Bitcoin, Nasdaq, Gold. Every market is made of candles and every candle is a range. The system does not change. The timeframe and market change. The logic stays identical.",donna:"Todas las velas se ven exactamente igual. Forex, Nasdaq, Bitcoin, Oro. Un minuto, un mes. El sistema no cambia."},
    {icon:"🎓",title:"What CRT gives you",body:"CRT gives you defined entry points. A clear stop-loss — the extreme of the candle that manipulated the key level. Two clear targets — the 50% first, then the full range. Specific timing. No more guessing. A system with rules.",donna:"Objetivo claro. Stop claro. Timing claro. Nivel clave claro. Cuando ves todo eso alineado — no deberías tener miedo de presionar el botón."}
  ],
  slides_es:[
    {icon:"📐",title:"Candle Range Theory",body:"CRT — Candle Range Theory — la teoría del rango de velas. Cada vela que ves es un rango. No solo una forma. Un rango con un límite superior, uno inferior, un punto medio del 50% y una dirección.",donna:"CRT no es un patrón. CRT es la lógica en la que se mueven los mercados. Una vez que lo ves así, no puedes ver los gráficos de ninguna otra manera."},
    {icon:"🔢",title:"Solo dos resultados",body:"Para cualquier rango de vela que marques, solo existen dos resultados reales para la siguiente. Uno: cierra FUERA del rango (continuación). Dos: hace mecha fuera y cierra DE VUELTA ADENTRO (Turtle Soup — reversión). Dos posibilidades. Ya no estás adivinando.",donna:"En los ojos de un experto hay pocas posibilidades. En los ojos de un principiante hay miles. Dos resultados. Solo dos."},
    {icon:"⏰",title:"El tiempo es más importante que el precio",body:"Esto separa CRT de cualquier otro sistema. Todos se enfocan en DÓNDE está un nivel. CRT se enfoca en CUÁNDO llega el precio a ese nivel. El mismo nivel clave a la hora incorrecta pierde. A la hora correcta gana.",donna:"El mismo setup. La hora incorrecta — pierdes. La hora correcta — ganas. Ese es el secreto de CRT."},
    {icon:"🌊",title:"CRT es universal",body:"CRT funciona en el gráfico de 1 minuto y en el mensual. Funciona en Forex, Bitcoin, Nasdaq, Oro. Todos los mercados están hechos de velas y toda vela es un rango. El sistema no cambia. La lógica permanece idéntica.",donna:"Todas las velas se ven exactamente igual. Forex, Nasdaq, Bitcoin, Oro. Un minuto, un mes. El sistema no cambia."},
    {icon:"🎓",title:"Lo que te da CRT",body:"CRT te da puntos de entrada definidos. Stop-loss claro — el extremo de la vela que manipuló el nivel clave. Dos objetivos claros — el 50% primero, luego el rango completo. Timing específico. Sin más adivinanzas.",donna:"Objetivo claro. Stop claro. Timing claro. Nivel clave claro. Cuando ves todo eso alineado — no deberías tener miedo de presionar el botón."}
  ],
  quiz_en:[
    {q:"CRT stands for Candle Range Theory — every candle is a range.",type:"tf",a:true,exp:"True. CRT = Candle Range Theory. Every candle is a range with a high, low, 50% midpoint, and direction."},
    {q:"In CRT what is more important — price level or time of arrival?",type:"mc",opts:["Price level","Time — same level wrong time loses, right time wins","Equally important","Neither"],a:1,exp:"Time is more important. The same key level at the wrong time produces a loss. At the right time, a winner."},
    {q:"CRT only works on Forex.",type:"tf",a:false,exp:"False. CRT works in every market. The logic is universal."},
    {q:"For any candle range how many real outcomes exist for the next candle?",type:"mc",opts:["Unlimited","5 to 10","Exactly two","Three"],a:2,exp:"Exactly two. Close outside (continuation) or wick outside and close back inside (Turtle Soup reversal)."}
  ],
  quiz_es:[
    {q:"CRT significa Candle Range Theory — cada vela es un rango.",type:"tf",a:true,exp:"Verdadero. CRT = Candle Range Theory. Cada vela es un rango con un alto, bajo, punto medio del 50% y dirección."},
    {q:"En CRT qué es más importante — nivel de precio o tiempo de llegada?",type:"mc",opts:["El nivel de precio","El tiempo — mismo nivel hora incorrecta pierde, hora correcta gana","Igualmente importantes","Ninguno"],a:1,exp:"El tiempo es más importante. El mismo nivel clave a la hora incorrecta produce una pérdida. A la hora correcta, un ganador."},
    {q:"CRT solo funciona en Forex.",type:"tf",a:false,exp:"Falso. CRT funciona en todos los mercados. La lógica es universal."},
    {q:"Para cualquier rango de vela ¿cuántos resultados reales existen para la siguiente?",type:"mc",opts:["Ilimitados","5 a 10","Exactamente dos","Tres"],a:2,exp:"Exactamente dos. Cierra fuera (continuación) o hace mecha fuera y cierra de vuelta adentro (Turtle Soup)."}
  ]
},
  {id:10,icon:"🔄",title:"AMD — The Three Candles",title_es:"AMD — Las Tres Velas",sub:"Accumulation. Manipulation. Distribution. The structure of every move.",sub_es:"Acumulación. Manipulación. Distribución. La estructura de todo movimiento.",level:2,
  slides_en:[
    {icon:"1️⃣",title:"Candle 1 — Accumulation",body:"Candle 1 sets the range. It establishes the high and low of the upcoming move. Mark the high and low with the Fibonacci tool (showing only 0, 0.5, and 1). Then wait. You NEVER trade candle 1. This is the setup phase.",donna:"La vela número uno la marcamos. El alto y el bajo. Con precisión. Eso es todo. La vela número uno nunca la operamos."},
    {icon:"2️⃣",title:"Candle 2 — Manipulation",body:"Candle 2 is the trap. After candle 1 closes, candle 2 opens and pushes into a key level — sweeping the high or low of candle 1 with a Turtle Soup. The fake move. Where dumb money gets trapped. Candle 2 MUST touch a key level. Without a key level, there is no trade.",donna:"La vela número dos es la manipulación. Toca el nivel clave. Cierra por dentro. Ese cierre confirma que el movimiento real está por venir."},
    {icon:"3️⃣",title:"Candle 3 — Distribution",body:"Candle 3 is the real move. After the Turtle Soup in candle 2, price distributes toward the opposite side — and beyond. This is where you enter and take profits. Candle 3 is the most tradeable because direction is confirmed.",donna:"La vela número tres es tu trade. La dirección está confirmada. 50% primero, luego el lado opuesto del rango."},
    {icon:"📅",title:"AMD on every timeframe",body:"Weekly: Mon=accumulation, Tue=manipulation, Wed=distribution. Daily: Asia=accumulation, London=manipulation, NY=distribution. 4H Forex: 1AM=accumulation, 5AM=manipulation, 9AM=distribution. 1H Nasdaq: 8AM=accumulation, 9AM=manipulation, 10AM=distribution. Same logic everywhere.",donna:"Acumulación, manipulación, distribución. Lo mismo en una vela de un minuto que en una mensual. CRTs dentro de CRTs. Todo es lo mismo."},
    {icon:"🔀",title:"AMD is flexible",body:"Candle 1 does not always have to be Monday. Candle 2 does not always have to be Tuesday. Roles shift with context. The sequence NEVER changes — accumulation → manipulation → distribution. Which day fills which role can shift.",donna:"El perfil semanal es flexible. Si el viernes fue la manipulación, el lunes puede ser distribución. Pero la secuencia nunca cambia."},
    {icon:"🎓",title:"Focus on candle 3",body:"Beginners focus on candle 3. It is the easiest to trade and still gives excellent risk-to-reward. Candle 2 is harder — the uncertainty of exactly where the Turtle Soup stops makes it risky. Master candle 3 first. Observe candle 2 while you do.",donna:"Principiante: vela número tres. Obsesiónate con esa. Con tiempo, ambas se vuelven legibles."}
  ],
  slides_es:[
    {icon:"1️⃣",title:"Vela 1 — Acumulación",body:"La vela 1 establece el rango. Marca el alto y el bajo con el Fibonacci (mostrando solo 0, 0.5 y 1). Luego esperas. NUNCA operas la vela 1. Esta es la fase de preparación.",donna:"La vela número uno la marcamos. El alto y el bajo. Con precisión. Eso es todo. La vela número uno nunca la operamos."},
    {icon:"2️⃣",title:"Vela 2 — Manipulación",body:"La vela 2 es la trampa. Después de que cierra la vela 1, la vela 2 abre y empuja hacia un nivel clave — barriendo el alto o bajo de la vela 1 con un Turtle Soup. El movimiento falso. La vela 2 DEBE tocar un nivel clave.",donna:"La vela número dos es la manipulación. Toca el nivel clave. Cierra por dentro. Ese cierre confirma que el movimiento real está por venir."},
    {icon:"3️⃣",title:"Vela 3 — Distribución",body:"La vela 3 es el movimiento real. Después del Turtle Soup en la vela 2, el precio se distribuye hacia el lado opuesto. Aquí es donde entras y tomas ganancias. La vela 3 es la más operable porque la dirección está confirmada.",donna:"La vela número tres es tu trade. La dirección está confirmada. 50% primero, luego el lado opuesto del rango."},
    {icon:"📅",title:"AMD en toda temporalidad",body:"Semanal: Lun=acumulación, Mar=manipulación, Mié=distribución. Diario: Asia=acumulación, Londres=manipulación, NY=distribución. 4H Forex: 1AM=acumulación, 5AM=manipulación, 9AM=distribución. 1H Nasdaq: 8AM=acumulación, 9AM=manipulación, 10AM=distribución.",donna:"Acumulación, manipulación, distribución. Lo mismo en una vela de un minuto que en una mensual. CRTs dentro de CRTs. Todo es lo mismo."},
    {icon:"🔀",title:"AMD es flexible",body:"La vela 1 no siempre tiene que ser el lunes. Los roles cambian con el contexto. La secuencia NUNCA cambia — acumulación → manipulación → distribución. Solo cambia qué día llena qué rol.",donna:"El perfil semanal es flexible. Si el viernes fue la manipulación, el lunes puede ser distribución. Pero la secuencia nunca cambia."},
    {icon:"🎓",title:"Enfócate en la vela 3",body:"Los principiantes se enfocan en la vela 3. Es la más fácil de operar y aun así da excelente riesgo-beneficio. La vela 2 es más difícil. Masteriza la vela 3 primero.",donna:"Principiante: vela número tres. Obsesiónate con esa. Con tiempo, ambas se vuelven legibles."}
  ],
  quiz_en:[
    {q:"In AMD Candle 1 is the one you enter a trade on.",type:"tf",a:false,exp:"False. Candle 1 is ACCUMULATION — mark its high and low and wait. You never trade candle 1."},
    {q:"Candle 2 is the manipulation candle that traps traders.",type:"tf",a:true,exp:"True. Candle 2 takes the high or low of Candle 1 at a key level with a Turtle Soup, then closes back inside. That is the trap."},
    {q:"AMD works on weekly candles but NOT intraday.",type:"tf",a:false,exp:"False. AMD works on EVERY timeframe. Same sequence everywhere."},
    {q:"Which day statistically forms the high or low of the week?",type:"mc",opts:["Monday","Tuesday","Thursday","Friday"],a:1,exp:"Tuesday. Monday is accumulation, Tuesday is manipulation, Wednesday-Friday deliver the distribution."},
    {q:"Beginners should focus on which candle in AMD?",type:"mc",opts:["Candle 1","Candle 2 — best RR","Candle 3 — most confirmed and easiest","Any candle with a long wick"],a:2,exp:"Candle 3. Direction is already confirmed by the Candle 2 Turtle Soup. More reliable for beginners."}
  ],
  quiz_es:[
    {q:"En AMD la Vela 1 es la que usas para entrar a un trade.",type:"tf",a:false,exp:"Falso. La Vela 1 es ACUMULACIÓN — marcas su alto y bajo y esperas. Nunca operas la vela 1."},
    {q:"La Vela 2 es la vela de manipulación que atrapa traders.",type:"tf",a:true,exp:"Verdadero. La Vela 2 toma el alto o bajo de la Vela 1 en un nivel clave con un Turtle Soup, luego cierra de vuelta adentro."},
    {q:"AMD funciona en velas semanales pero NO en intradía.",type:"tf",a:false,exp:"Falso. AMD funciona en TODA temporalidad. La misma secuencia en todos lados."},
    {q:"¿Qué día estadísticamente forma el alto o bajo de la semana?",type:"mc",opts:["Lunes","Martes","Jueves","Viernes"],a:1,exp:"El martes. Lunes es acumulación, martes es manipulación, miércoles-viernes entregan la distribución."},
    {q:"¿En qué vela deben enfocarse los principiantes en AMD?",type:"mc",opts:["Vela 1","Vela 2 — mejor RR","Vela 3 — más confirmada y fácil","Cualquier vela con mecha larga"],a:2,exp:"La Vela 3. La dirección ya está confirmada por el Turtle Soup de la Vela 2. Más confiable para principiantes."}
  ]
},
  {id:11,icon:"📅",title:"The Weekly Profile",title_es:"El Perfil Semanal",sub:"Monday to Friday — the schedule Smart Money follows every week.",sub_es:"Lunes a viernes — el horario que el Dinero Inteligente sigue cada semana.",level:2,
  slides_en:[
    {icon:"📋",title:"The market has a schedule",body:"The market does not move randomly through the week. There is a structure that repeats. Market makers have an agenda: collect liquidity early in the week, distribute the real move mid to late week. Understanding this tells you which days to trade and which to observe.",donna:"Monday-Tuesday-Wednesday form the high or low of the week. Thursday-Friday cap the range. Romeo does not trade Mondays. I do not trade Mondays. Memorize that."},
    {icon:"1️⃣",title:"Monday — Accumulation",body:"Monday is accumulation. The week opens and price wiggles, building a range. Smart Money is positioning. Monday should not be traded — its job is to create the range that Tuesday will manipulate. Mark Monday's high and low.",donna:"El lunes es el rango. Márcalo. No lo operes. Solo observa."},
    {icon:"2️⃣",title:"Tuesday — Manipulation",body:"Tuesday is statistically the most important day of the week. This is when the high or low of the entire week typically forms. Tuesday sweeps Monday's range with a Turtle Soup — trapping everyone who traded the Monday range.",donna:"El martes pone estadísticamente el alto o el bajo de la semana. El mejor día de entrada de la semana. Ahí es donde está el Turtle Soup real."},
    {icon:"3️⃣",title:"Wednesday — Distribution",body:"Wednesday confirms the move Tuesday started. After the Tuesday Turtle Soup, Wednesday is where real distribution begins. If you missed Tuesday, Wednesday often provides a second entry in the direction of the weekly bias.",donna:"El miércoles confirma. Si te perdiste el martes, el miércoles a veces te da una segunda entrada."},
    {icon:"4️⃣5️⃣",title:"Thursday-Friday cap the range",body:"Thursday and Friday slow the move and cap the weekly range. Sometimes Thursday gives a Kiss of Death setup near the target. Friday is a wrap-up day — caution holding positions over the weekend due to gap risk.",donna:"Jueves y viernes capan el rango. Viernes — ten cuidado. No te quedes en trades el fin de semana si no estás seguro."},
    {icon:"🔄",title:"The profile adapts",body:"The weekly profile is a guide, not a law. If Friday was manipulation, Monday can be distribution. Always check the monthly and weekly bias — the profile adapts to that context.",donna:"El perfil se ajusta con contexto. Si el viernes fue la manipulación, el lunes puede ser la distribución directa. Adapta, pero la secuencia nunca cambia."}
  ],
  slides_es:[
    {icon:"📋",title:"El mercado tiene un horario",body:"El mercado no se mueve aleatoriamente durante la semana. Hay una estructura que se repite. Los creadores de mercado tienen una agenda: recolectar liquidez temprano en la semana, distribuir el movimiento real a mediados y finales.",donna:"Lunes-Martes-Miércoles forman el alto o bajo de la semana. Jueves-Viernes capan el rango. Romeo no opera los lunes. Yo no opero los lunes."},
    {icon:"1️⃣",title:"Lunes — Acumulación",body:"El lunes es acumulación. La semana abre y el precio se mueve en un rango. El Dinero Inteligente se está posicionando. El lunes no debe operarse — su trabajo es crear el rango que el martes va a manipular.",donna:"El lunes es el rango. Márcalo. No lo operes. Solo observa."},
    {icon:"2️⃣",title:"Martes — Manipulación",body:"El martes es estadísticamente el día más importante de la semana. Típicamente cuando se forma el alto o bajo de toda la semana. El martes barre el rango del lunes con un Turtle Soup.",donna:"El martes pone estadísticamente el alto o el bajo de la semana. El mejor día de entrada de la semana."},
    {icon:"3️⃣",title:"Miércoles — Distribución",body:"El miércoles confirma el movimiento que el martes inició. Si te perdiste el martes, el miércoles a menudo da una segunda entrada en la dirección del sesgo semanal.",donna:"El miércoles confirma. Si te perdiste el martes, el miércoles a veces te da una segunda entrada."},
    {icon:"4️⃣5️⃣",title:"Jueves-Viernes capan el rango",body:"Jueves y viernes desaceleran el movimiento y capan el rango semanal. A veces el jueves da un setup de Kiss of Death. El viernes es de cierre — cuidado con posiciones el fin de semana.",donna:"Jueves y viernes capan el rango. Viernes — ten cuidado. No te quedes en trades el fin de semana si no estás seguro."},
    {icon:"🔄",title:"El perfil se adapta",body:"El perfil semanal es una guía, no una ley. Si el viernes fue manipulación, el lunes puede ser distribución. Siempre verifica el sesgo mensual y semanal.",donna:"El perfil se ajusta con contexto. Si el viernes fue la manipulación, el lunes puede ser la distribución directa. Adapta, pero la secuencia nunca cambia."}
  ],
  quiz_en:[
    {q:"Monday is the best day to place aggressive trades.",type:"tf",a:false,exp:"False. Monday is accumulation. Mark the range and observe — do not trade it."},
    {q:"Which day statistically forms the high or low of the week?",type:"mc",opts:["Monday","Tuesday","Thursday","Friday"],a:1,exp:"Tuesday. The manipulation day — the Turtle Soup that marks the real weekly high or low."},
    {q:"The weekly profile roles are fixed and never change.",type:"tf",a:false,exp:"False. The profile is flexible. The SEQUENCE never changes but which days fill which role can shift."},
    {q:"What is the risk of holding trades into Friday close?",type:"mc",opts:["Higher spreads","Weekend gap risk — price can open differently on Monday","Lower liquidity","No risk"],a:1,exp:"Weekend gap risk. Markets close Friday and open Monday potentially at a different price."}
  ],
  quiz_es:[
    {q:"El lunes es el mejor día para colocar trades agresivos.",type:"tf",a:false,exp:"Falso. El lunes es acumulación. Marca el rango y observa — no lo operes."},
    {q:"¿Qué día estadísticamente forma el alto o bajo de la semana?",type:"mc",opts:["Lunes","Martes","Jueves","Viernes"],a:1,exp:"El martes. El día de manipulación — el Turtle Soup que marca el alto o bajo semanal real."},
    {q:"Los roles del perfil semanal son fijos y nunca cambian.",type:"tf",a:false,exp:"Falso. El perfil es flexible. La SECUENCIA nunca cambia pero qué días llenan qué rol puede cambiar."},
    {q:"¿Cuál es el riesgo de mantener trades hasta el cierre del viernes?",type:"mc",opts:["Spreads más altos","Riesgo de gap de fin de semana","Menor liquidez","No hay riesgo"],a:1,exp:"Riesgo de gap de fin de semana. Los mercados cierran el viernes y abren el lunes potencialmente a un precio diferente."}
  ]
},
  {id:12,icon:"🧭",title:"Reading Bias — Closes and Direction",title_es:"Leyendo el Sesgo — Cierres y Dirección",sub:"How to know if you are bullish or bearish before you look at any setup.",sub_es:"Cómo saber si eres alcista o bajista antes de ver cualquier setup.",level:2,
  slides_en:[
    {icon:"🗺️",title:"Bias is everything",body:"Bias is your directional opinion before you look at a single trade setup. Bullish or bearish? Built from reading the closes and wicks of higher timeframe candles — monthly, weekly, daily. Everything in your analysis follows from your bias. No bias — no trade.",donna:"Sin sesgo claro, no hay trade. Nunca entres sin saber primero si estás alcista o bajista. Primero el sesgo. Después el setup."},
    {icon:"📈",title:"Bullish closes",body:"A candle closes ABOVE the high of the previous candle — real breakout, bullish. A candle closes ABOVE the previous candle's open — continuation higher. These patterns on weekly or daily charts tell you the direction for the next candle.",donna:"Un cierre encima del alto anterior — eso es alcista. Real. Convicción. Los compradores tienen el control."},
    {icon:"📉",title:"Bearish closes",body:"A candle closes BELOW the low of the previous candle — bearish. A candle closes BELOW the previous open — continuation lower. Check these every Sunday before the week opens. Build your bias from top down.",donna:"Un cierre por debajo del bajo anterior — eso es bajista. Los vendedores tienen el control."},
    {icon:"🎭",title:"Wicks tell you what failed",body:"Wick above the previous high but closed back inside — failed attempt to go higher, bearish signal. Wick below the previous low but closed back inside — failed attempt to go lower, bullish signal. Closes reveal intent. Wicks reveal deception.",donna:"La mecha encima del alto anterior y después cerró adentro — alguien intentó ir para arriba y fracasó. Eso es bajista."},
    {icon:"📐",title:"The daily open matters",body:"Bullish trades happen BELOW the daily opening price — the candle needs to dip first before going up. Bearish trades happen ABOVE the daily opening price — the candle needs to spike first before going down.",donna:"Alcista: opera por debajo de la apertura diaria. Bajista: opera por encima."},
    {icon:"🔭",title:"Build bias top to bottom",body:"Start monthly — closing higher or lower? Then weekly. Then daily. If all three agree, your bias is strong. If they conflict — wait. Never force a bias. The market will give you a clear direction. Be patient enough to wait for it.",donna:"Mensual → semanal → diario. Si los tres dicen lo mismo, el sesgo es fuerte. Si hay conflicto, espera."}
  ],
  slides_es:[
    {icon:"🗺️",title:"El sesgo lo es todo",body:"El sesgo es tu opinión direccional antes de ver cualquier setup. ¿Alcista o bajista? Se construye leyendo los cierres y mechas de las velas de temporalidades mayores. Todo en tu análisis sigue al sesgo. Sin sesgo — sin trade.",donna:"Sin sesgo claro, no hay trade. Primero el sesgo. Después el setup."},
    {icon:"📈",title:"Cierres alcistas",body:"Una vela cierra POR ENCIMA del alto de la vela anterior — breakout real, alcista. Una vela cierra POR ENCIMA de la apertura de la vela anterior — continuación hacia arriba.",donna:"Un cierre encima del alto anterior — eso es alcista. Real. Convicción. Los compradores tienen el control."},
    {icon:"📉",title:"Cierres bajistas",body:"Una vela cierra POR DEBAJO del bajo de la vela anterior — bajista. Una vela cierra POR DEBAJO de la apertura anterior — continuación hacia abajo. Revisa esto cada domingo antes de que abra la semana.",donna:"Un cierre por debajo del bajo anterior — eso es bajista. Los vendedores tienen el control."},
    {icon:"🎭",title:"Las mechas te dicen lo que falló",body:"Mecha por encima del alto anterior pero cerró adentro — intento fallido de ir más alto, señal bajista. Mecha por debajo del bajo anterior pero cerró adentro — intento fallido de ir más bajo, señal alcista.",donna:"La mecha encima del alto anterior y después cerró adentro — alguien intentó ir para arriba y fracasó. Eso es bajista."},
    {icon:"📐",title:"La apertura diaria importa",body:"Los trades alcistas ocurren POR DEBAJO de la apertura diaria. Los trades bajistas ocurren POR ENCIMA. Esto reduce significativamente tu zona de búsqueda.",donna:"Alcista: opera por debajo de la apertura diaria. Bajista: opera por encima."},
    {icon:"🔭",title:"Construye el sesgo de arriba hacia abajo",body:"Empieza mensual. ¿Cerrando más alto o más bajo? Luego semanal. Luego diario. Si los tres dicen lo mismo — sesgo fuerte. Si hay conflicto — espera. Nunca fuerces un sesgo.",donna:"Mensual → semanal → diario. Si los tres dicen lo mismo, el sesgo es fuerte. Si hay conflicto, espera."}
  ],
  quiz_en:[
    {q:"A candle closing above the previous high gives a bullish bias.",type:"tf",a:true,exp:"True. A close above the previous high is a real breakout — genuine buying conviction."},
    {q:"Where should you look for bullish setups relative to the daily open?",type:"mc",opts:["Above the daily open","Exactly at the daily open","Below the daily open","Does not matter"],a:2,exp:"Bullish trades happen BELOW the daily opening price. The candle needs to dip first to the low before going up."},
    {q:"A wick above the previous high closing back inside is bullish.",type:"tf",a:false,exp:"False. Wick above + close inside = BEARISH signal. Failed attempt to go higher."},
    {q:"Three-timeframe alignment means very strong bias.",type:"tf",a:true,exp:"True. When monthly, weekly, and daily all point the same direction — highest probability setups."}
  ],
  quiz_es:[
    {q:"Una vela que cierra por encima del alto anterior da un sesgo alcista.",type:"tf",a:true,exp:"Verdadero. Un cierre por encima del alto anterior es un breakout real — convicción genuina de compra."},
    {q:"¿Dónde buscar setups alcistas en relación a la apertura diaria?",type:"mc",opts:["Por encima de la apertura diaria","Exactamente en la apertura","Por debajo de la apertura diaria","No importa"],a:2,exp:"Los trades alcistas ocurren POR DEBAJO de la apertura diaria. La vela necesita primero bajar al bajo."},
    {q:"Una mecha por encima del alto anterior que cierra adentro es alcista.",type:"tf",a:false,exp:"Falso. Mecha arriba + cierre adentro = señal BAJISTA. Intento fallido de ir más alto."},
    {q:"La alineación de tres temporalidades significa sesgo muy fuerte.",type:"tf",a:true,exp:"Verdadero. Cuando mensual, semanal y diario apuntan en la misma dirección — setups de mayor probabilidad."}
  ]
},
  {id:13,icon:"🔑",title:"Key Levels",title_es:"Niveles Clave",sub:"The five price areas that stop the market. No key level — no trade.",sub_es:"Las cinco áreas de precio que detienen el mercado. Sin nivel clave — sin trade.",level:2,
  slides_en:[
    {icon:"🏔️",title:"Key levels are not random",body:"A key level is a specific price area where the market is likely to pause, react, or reverse. Only prices with a REASON qualify: a fair value gap, an order block, an old high or low, a breaker, or a rejection block. Higher timeframe key levels carry more weight.",donna:"Sin nivel clave, no hay trade. Sin nivel clave que patrocine el movimiento, no hay razón para que el precio se detenga ahí."},
    {icon:"📊",title:"Old highs and lows — external liquidity",body:"Old highs and lows from higher timeframes are the most fundamental key levels. External liquidity pools — where many traders have their stops. Daily highs, weekly highs, monthly highs. Price always moves TOWARD old highs and lows before reversing.",donna:"Los altos y bajos de temporalidades altas son los objetivos. El precio siempre se mueve hacia altos y bajos antiguos. Son la liquidez externa."},
    {icon:"📐",title:"Higher timeframe = more weight",body:"A fair value gap from a monthly chart carries far more weight than one from 15 minutes. The rule: always use key levels from a timeframe equal to or higher than the CRT you are trading. Trading a 1-hour CRT? Use a 1-hour, 4-hour, or daily key level.",donna:"Entre más alta la temporalidad del nivel clave, más peso carga. Un CRT de una hora necesita mínimo un nivel clave de una hora."},
    {icon:"🔢",title:"Two touches confirm, three break",body:"Price touches a key level and reverses — confirmed. Touches a second time and respects it — stronger. If price returns a third time and breaks through — the level is probably done. Three touches usually break the level.",donna:"Dos toques confirman un nivel. El tercero usualmente lo rompe."},
    {icon:"💡",title:"Lines not zones",body:"Always mark key levels as a single horizontal LINE — not a wide zone. Romeo marks everything as lines. The line forces precision. Zones create confusion.",donna:"Líneas. No zonas. Una línea horizontal. Eso es el nivel clave. No un rectángulo de 20 pips de ancho."}
  ],
  slides_es:[
    {icon:"🏔️",title:"Los niveles clave no son aleatorios",body:"Un nivel clave es un área de precio específica donde el mercado probablemente va a pausar, reaccionar o revertir. Solo los precios con una RAZÓN califican: un fair value gap, un order block, un alto o bajo antiguo, un breaker o un rejection block.",donna:"Sin nivel clave, no hay trade. Sin nivel clave que patrocine el movimiento, no hay razón para que el precio se detenga ahí."},
    {icon:"📊",title:"Altos y bajos antiguos — liquidez externa",body:"Los altos y bajos antiguos de temporalidades mayores son los niveles clave más fundamentales. Pools de liquidez externa — donde muchos traders tienen sus stops. El precio siempre se mueve HACIA altos y bajos antiguos antes de revertir.",donna:"Los altos y bajos de temporalidades altas son los objetivos. El precio siempre se mueve hacia altos y bajos antiguos."},
    {icon:"📐",title:"Temporalidad más alta = más peso",body:"Un fair value gap de un gráfico mensual carga mucho más peso que uno de 15 minutos. La regla: siempre usa niveles clave de una temporalidad igual o mayor al CRT que estás operando.",donna:"Entre más alta la temporalidad del nivel clave, más peso carga. Un CRT de una hora necesita mínimo un nivel clave de una hora."},
    {icon:"🔢",title:"Dos toques confirman, tres rompen",body:"El precio toca un nivel y revierte — confirmado. Lo toca dos veces y lo respeta — más fuerte. Si vuelve una tercera vez y lo rompe — el nivel probablemente ya fue usado.",donna:"Dos toques confirman un nivel. El tercero usualmente lo rompe."},
    {icon:"💡",title:"Líneas no zonas",body:"Siempre marca los niveles clave como una línea horizontal precisa — no como una zona ancha. Romeo marca todo como líneas. Las líneas fuerzan precisión. Las zonas crean confusión.",donna:"Líneas. No zonas. Una línea horizontal. Eso es el nivel clave."}
  ],
  quiz_en:[
    {q:"Any price level can be used as a key level.",type:"tf",a:false,exp:"False. Key levels must have a REASON — FVG, OB, old high/low, breaker, rejection block."},
    {q:"For a 1-hour CRT which key levels are ideal?",type:"mc",opts:["15-minute","1-minute","1-hour or higher (4H, daily)","Any timeframe"],a:2,exp:"A 1-hour CRT needs minimum 1-hour key level — ideally 4H or daily. Higher TF = stronger reaction."},
    {q:"Price touching a key level 3 times confirms it as very strong.",type:"tf",a:false,exp:"False. Two touches confirm. The THIRD touch usually breaks it — not enough fuel left to reverse."},
    {q:"Key levels should be marked as wide zones.",type:"tf",a:false,exp:"False. Mark as single precise horizontal lines. Precision is everything in CRT."}
  ],
  quiz_es:[
    {q:"Cualquier nivel de precio puede usarse como nivel clave.",type:"tf",a:false,exp:"Falso. Los niveles clave deben tener una RAZÓN — FVG, OB, alto/bajo antiguo, breaker, rejection block."},
    {q:"Para un CRT de una hora ¿qué niveles clave son ideales?",type:"mc",opts:["15 minutos","1 minuto","1 hora o mayores (4H, diario)","Cualquier temporalidad"],a:2,exp:"Un CRT de una hora necesita mínimo un nivel clave de una hora — idealmente de 4 horas o diario."},
    {q:"El precio tocando un nivel clave 3 veces confirma que es muy fuerte.",type:"tf",a:false,exp:"Falso. Dos toques confirman. El TERCER toque generalmente lo rompe."},
    {q:"Los niveles clave deben marcarse como zonas anchas.",type:"tf",a:false,exp:"Falso. Marca como líneas horizontales precisas. La precisión es todo en CRT."}
  ]
},
  {id:14,icon:"⚖️",title:"Internal vs External Liquidity",title_es:"Liquidez Interna vs Externa",sub:"The endless cycle that moves every market every single day.",sub_es:"El ciclo interminable que mueve todos los mercados todos los días.",level:2,
  slides_en:[
    {icon:"🔄",title:"Two reasons price moves",body:"Price moves for exactly two reasons. One: attack EXTERNAL liquidity — old highs and lows. Two: rebalance INTERNAL imbalances — fair value gaps and order blocks. That is the entire logic of market movement. Every candle, every day.",donna:"El mercado se mueve para tomar liquidez externa o para rebalancear imbalances internos. Eso es todo. Cada movimiento cabe en una de esas dos categorías."},
    {icon:"🏔️",title:"External liquidity — the big targets",body:"External liquidity means old highs and lows from higher timeframes. Weekly highs, daily lows, monthly highs — the big magnets. When price reaches them it collects stops (Turtle Soup) and reverses.",donna:"La liquidez externa son los altos y bajos antiguos. Esos son los grandes objetivos. El precio siempre va hacia ellos antes de revertir."},
    {icon:"🧲",title:"Internal liquidity — imbalances as magnets",body:"Internal liquidity means fair value gaps and order blocks. Areas where price moved so fast it left an imbalance. These act like magnets. Before price reaches its big external target, it often rebalances internal imbalances along the way.",donna:"Los fair value gaps y order blocks son liquidez interna. Son imanes. El precio los visita en el camino hacia la liquidez externa."},
    {icon:"🔃",title:"The cycle never stops",body:"External liquidity leads to internal rebalancing. Internal rebalancing leads to the next external target. Over and over. Always. Price takes external high → fills nearby FVG → moves to next external target.",donna:"Liquidez externa → liquidez interna → liquidez externa → liquidez interna. Ese ciclo nunca para. Así se mueve el mercado todos los días."},
    {icon:"🎯",title:"Use this for targets",body:"When you identify your trade target, check: is it external liquidity (old high or low) or internal imbalance (FVG or OB)? Take partials at internal levels and let the rest run to external liquidity. Partials at 50%, let remainder run to old high or low.",donna:"50% al nivel interno. Dejar correr al nivel externo. Esa es la gestión usando conceptos de liquidez."}
  ],
  slides_es:[
    {icon:"🔄",title:"Dos razones por las que se mueve el precio",body:"El precio se mueve por exactamente dos razones. Una: atacar LIQUIDEZ EXTERNA — altos y bajos antiguos. Dos: rebalancear IMBALANCES INTERNOS — fair value gaps y order blocks. Esa es toda la lógica del movimiento del mercado.",donna:"El mercado se mueve para tomar liquidez externa o para rebalancear imbalances internos. Eso es todo."},
    {icon:"🏔️",title:"Liquidez externa — los grandes objetivos",body:"La liquidez externa son los altos y bajos antiguos de temporalidades mayores. Altos semanales, bajos diarios, altos mensuales — los grandes imanes. Cuando el precio llega a ellos recolecta stops (Turtle Soup) y revierte.",donna:"La liquidez externa son los altos y bajos antiguos. Esos son los grandes objetivos."},
    {icon:"🧲",title:"Liquidez interna — imbalances como imanes",body:"La liquidez interna son fair value gaps y order blocks. Áreas donde el precio se movió tan rápido que dejó un imbalance. Actúan como imanes. Antes de llegar al gran objetivo externo, el precio a menudo rebalancea imbalances internos en el camino.",donna:"Los fair value gaps y order blocks son liquidez interna. Son imanes. El precio los visita en el camino hacia la liquidez externa."},
    {icon:"🔃",title:"El ciclo nunca para",body:"La liquidez externa lleva al rebalanceo interno. El rebalanceo interno lleva al siguiente objetivo externo. Una y otra vez. Siempre.",donna:"Liquidez externa → liquidez interna → liquidez externa → liquidez interna. Ese ciclo nunca para."},
    {icon:"🎯",title:"Usa esto para objetivos",body:"Cuando identifiques tu objetivo, verifica: ¿es liquidez externa (alto o bajo antiguo) o imbalance interno (FVG u OB)? Toma parciales en niveles internos y deja correr el resto hacia la liquidez externa.",donna:"50% al nivel interno. Dejar correr al nivel externo. Simple."}
  ],
  quiz_en:[
    {q:"Price only moves toward external liquidity.",type:"tf",a:false,exp:"False. Price moves for TWO reasons: external liquidity AND internal imbalance rebalancing."},
    {q:"What is an example of internal liquidity?",type:"mc",opts:["Weekly high from 3 months ago","Daily low from last week","A fair value gap left by a fast move","Previous month high"],a:2,exp:"Fair value gaps and order blocks are INTERNAL liquidity. Old highs/lows are EXTERNAL."},
    {q:"The external to internal to external cycle repeats forever.",type:"tf",a:true,exp:"True. This is the fundamental cycle of all markets."},
    {q:"How should you use internal vs external liquidity for targets?",type:"mc",opts:["Only target external","Only target internal","Partials at internal, let remainder run to external","Ignore both"],a:2,exp:"Take partial profits at internal liquidity, let positions run to external liquidity as final target."}
  ],
  quiz_es:[
    {q:"El precio solo se mueve hacia liquidez externa.",type:"tf",a:false,exp:"Falso. El precio se mueve por DOS razones: liquidez externa E imbalances internos."},
    {q:"¿Cuál es un ejemplo de liquidez interna?",type:"mc",opts:["Un alto semanal de hace 3 meses","Un bajo diario de la semana pasada","Un fair value gap dejado por un movimiento rápido","Un alto del mes anterior"],a:2,exp:"Los fair value gaps y order blocks son LIQUIDEZ INTERNA."},
    {q:"El ciclo de externo a interno a externo se repite para siempre.",type:"tf",a:true,exp:"Verdadero. Este es el ciclo fundamental de todos los mercados."},
    {q:"¿Cómo usar la liquidez interna vs externa para objetivos?",type:"mc",opts:["Solo apuntar a externa","Solo apuntar a interna","Parciales en interna, dejar correr el resto hacia externa","Ignorar ambas"],a:2,exp:"Toma parciales en la liquidez interna, deja correr las posiciones hacia la liquidez externa como objetivo final."}
  ]
},
  {id:15,icon:"📊",title:"Fair Value Gaps",title_es:"Fair Value Gaps",sub:"Imbalances that act as magnets. How to find the high-probability ones.",sub_es:"Imbalances que actúan como imanes. Cómo encontrar los de alta probabilidad.",level:2,
  slides_en:[
    {icon:"🖌️",title:"The paint brush analogy",body:"A fair value gap happens when the brush moves so fast that it leaves an unpainted spot — an area where not both buyers and sellers had a chance to participate. The market wants to come back and fill it.",donna:"El mercado quiere que la pared esté bien distribuida. Un fair value gap es una mancha. El mercado va a volver a llenarla."},
    {icon:"📐",title:"Three candles — how to identify",body:"A fair value gap requires three candles. The space between the LOW of Candle 3 and the HIGH of Candle 1 is the gap — if they do not overlap, the middle candle left an imbalance. Bullish FVG: gap going up. Bearish FVG: gap going down.",donna:"Tres velas. El bajo de la vela 3 y el alto de la vela 1 no se tocan. Ese espacio es el fair value gap. Márcalo."},
    {icon:"⭐",title:"High-probability FVGs",body:"A high-probability FVG is one where the middle candle CLOSED ABOVE a previous high (bullish) or CLOSED BELOW a previous low (bearish). This means the FVG broke structure — it has conviction behind it.",donna:"Un ferval de alta probabilidad fue responsable de cerrar encima de un alto anterior. Eso le da mucha más fuerza."},
    {icon:"🔴",title:"When FVGs are visited",body:"Price will almost always come back to fill a fair value gap before continuing the move. Before a major bullish move, price often dips into a nearby bullish FVG first. That dip is the entry opportunity.",donna:"Antes de un movimiento alcista grande, el precio a menudo baja a llenar un FVG alcista primero. Ese es el momento de entrada."},
    {icon:"📏",title:"Mark the edge as a line",body:"When using a fair value gap as a key level, mark the most relevant edge as a single horizontal line. Price reacts from the edge, not always the middle. Precise line forces you to watch for the exact touch.",donna:"Marca el FVG con una línea horizontal en el borde más relevante. Ahí es donde el precio debería reaccionar."}
  ],
  slides_es:[
    {icon:"🖌️",title:"La analogía de la brocha",body:"Un fair value gap ocurre cuando la brocha se mueve tan rápido que deja un espacio sin pintar — un área donde no tuvieron oportunidad de participar tanto compradores como vendedores. El mercado quiere volver y llenarlo.",donna:"El mercado quiere que la pared esté bien distribuida. Un fair value gap es una mancha. El mercado va a volver a llenarla."},
    {icon:"📐",title:"Tres velas — cómo identificar",body:"Un fair value gap requiere tres velas. El espacio entre el BAJO de la Vela 3 y el ALTO de la Vela 1 es el gap — si no se superponen, la vela del medio dejó un imbalance. FVG alcista: gap subiendo. FVG bajista: gap bajando.",donna:"Tres velas. El bajo de la vela 3 y el alto de la vela 1 no se tocan. Ese espacio es el fair value gap. Márcalo."},
    {icon:"⭐",title:"FVGs de alta probabilidad",body:"Un FVG de alta probabilidad es aquel donde la vela del medio CERRÓ POR ENCIMA de un alto anterior (alcista) o POR DEBAJO de un bajo anterior (bajista). Esto significa que el FVG rompió estructura.",donna:"Un ferval de alta probabilidad fue responsable de cerrar encima de un alto anterior. Eso le da mucha más fuerza."},
    {icon:"🔴",title:"Cuándo se visitan los FVGs",body:"El precio casi siempre volverá a llenar un fair value gap antes de continuar el movimiento. Antes de un gran movimiento alcista, el precio a menudo baja a llenar un FVG alcista cercano primero. Esa bajada es la oportunidad de entrada.",donna:"Antes de un movimiento alcista grande, el precio a menudo baja a llenar un FVG alcista primero. Ese es el momento de entrada."},
    {icon:"📏",title:"Marca el borde como línea",body:"Cuando uses un fair value gap como nivel clave, marca el borde más relevante como una sola línea horizontal. El precio reacciona desde el borde, no siempre desde el medio.",donna:"Marca el FVG con una línea horizontal en el borde más relevante. Ahí es donde el precio debería reaccionar."}
  ],
  quiz_en:[
    {q:"A fair value gap is formed by two candles.",type:"tf",a:false,exp:"False. A FVG requires THREE candles. The gap is between the HIGH of Candle 1 and the LOW of Candle 3."},
    {q:"What makes a high-probability FVG?",type:"mc",opts:["Any gap between candles","Middle candle closed above previous high (bullish) or below previous low (bearish)","The largest gap on chart","Any gap on 1-minute"],a:1,exp:"High-probability FVG: middle candle broke structure — closed above previous high or below previous low."},
    {q:"Price always completely fills a fair value gap.",type:"tf",a:false,exp:"False. Price often reacts from the EDGE of the FVG. Does not always fill completely."},
    {q:"Fair value gaps are which type of liquidity?",type:"mc",opts:["External","Internal","Neither","Only in Forex"],a:1,exp:"Fair value gaps are INTERNAL liquidity — imbalances that act as magnets on the way to external targets."}
  ],
  quiz_es:[
    {q:"Un fair value gap está formado por dos velas.",type:"tf",a:false,exp:"Falso. Un FVG requiere TRES velas."},
    {q:"¿Qué hace que un FVG sea de alta probabilidad?",type:"mc",opts:["Cualquier gap entre velas","La vela del medio cerró por encima del alto anterior (alcista) o por debajo del bajo anterior (bajista)","El gap más grande del gráfico","Cualquier gap en 1 minuto"],a:1,exp:"FVG de alta probabilidad: la vela del medio rompió estructura."},
    {q:"El precio siempre llena completamente un fair value gap.",type:"tf",a:false,exp:"Falso. El precio a menudo reacciona desde el BORDE del FVG."},
    {q:"Los fair value gaps son qué tipo de liquidez?",type:"mc",opts:["Externa","Interna","Ninguna","Solo en Forex"],a:1,exp:"Los fair value gaps son LIQUIDEZ INTERNA — imbalances que actúan como imanes en el camino hacia objetivos externos."}
  ]
},
  {id:16,icon:"🧱",title:"Order Blocks",title_es:"Order Blocks",sub:"Balanced price areas that hold and launch the next move.",sub_es:"Áreas de precio balanceadas que sostienen y lanzan el siguiente movimiento.",level:2,
  slides_en:[
    {icon:"🖌️",title:"The balanced wall",body:"Where a fair value gap is an unpainted spot, an order block is where the brush went up AND back down — both buyers and sellers participated. This balanced area acts as a foundation. When price returns, it uses this balance to launch.",donna:"El fair value gap es una mancha. El order block es un área balanceada. Cuando el precio regresa, lo usa como base para lanzarse."},
