{icon:"📊",title:"A Chart Is Just a History",body:"A price chart shows you what price did over time. Read it left to right — left side is the past, right side is now. The up-down movement shows price changing. Every moment that passes, the chart adds a new point on the right.",donna:"Left to right = time. Up and down = price. That's the whole chart. Everything else is just details on top of that."},
{icon:"➖",title:"Horizontal Levels — Where Price Remembers",body:"The most important things traders draw on charts are horizontal lines. A horizontal line marks a price where something significant happened — a high point, a low point, a level price kept bouncing off. When a trader says 'there's a level at 100,' they mean price has been there before and it matters. These horizontal lines cross through time because they represent a PRICE, not a moment.",donna:"If price hit 100 and bounced three times — 100 is a level. Mark it. Draw a horizontal line there. Price has memory."},
{icon:"🎯",title:"What You're Actually Looking At",body:"Bottom of chart = low prices. Top of chart = high prices. A line moving UP means price is rising. A line moving DOWN means price is falling. A flat line means price isn't moving much. That's it. You are watching the history of price, left to right, up and down.",donna:"You now know what a chart is. Most people overcomplicate this. It's a picture of price over time. Simple."}
],q:[
{q:"What direction do you read a price chart?",type:"engage",opts:["Left to right — time moving forward","Right to left — most recent first","From the middle out","Top to bottom — highest price first"],a:0,exps:["Exactly. Left is the past, right is the present. Time moves left to right, just like reading.","Good instinct — but actually left to right, like reading. Left = past, right = now.","Interesting approach — but the standard is left to right. Past on the left, present on the right.","The chart does go top to bottom in terms of price, but you read TIME left to right. Good thinking though."]},
{q:"A horizontal line on a trading chart represents:",type:"mc",opts:["A specific point in time","A specific price level that has been significant","The current trend direction","The average price over time"],a:1,exp:"Horizontal lines represent PRICE levels — places where something important happened. They run horizontally because the price stays the same across time. That's why they're called 'levels.'"},
{q:"The right side of a chart shows older price history.",type:"tf",a:false,exp:"False. The RIGHT side is the present — the most recent price action. The LEFT side shows the past. Time moves left to right."}
]},
2:{s:[
{icon:"📈",title:"You're Not Just Betting on Up",body:"Most people think trading only makes money when something goes UP — like buying a stock and hoping it rises. That's only half the game. In trading, you can profit from price going DOWN just as easily as going up. If you think price will fall, you go SHORT. If price falls, you profit. If price rises, you lose. It works both ways.",donna:"Up or down — both directions pay. That's what makes trading different from investing. You're not stuck waiting for something to rise."},
{icon:"🔄",title:"Long vs Short — Two Simple Words",body:"LONG means you think price will go UP. You buy, price rises, you sell higher, you profit. SHORT means you think price will go DOWN. You sell first (the platform handles this), price falls, you buy back lower, you profit. The platform does the mechanics for you — you just decide the direction.",donna:"Long = up. Short = down. That's literally all those words mean. Nothing fancy. Pick a direction, manage your risk, let it play out."},
{icon:"⚖️",title:"You Don't Have to Be Right Every Time",body:"A trader who wins 5 out of 10 trades but makes 3x what they risk on each winner can be very profitable. Trading is not about being right all the time. It's about making more when you're right than you lose when you're wrong. That ratio is everything.",donna:"You're not trying to be perfect. You're trying to make more on wins than you lose on losses. If your wins are bigger than your losses, you can afford to be wrong half the time."}
],q:[
{q:"What excites you more?",type:"engage",opts:["📈 Profiting when price goes UP","📉 Profiting when price goes DOWN","🔄 Both — I want all the opportunities","🤔 Still learning, taking it slow"],a:0,exps:["Long traders. Classic. Most people start here — buying when they think price rises. You'll learn both.","Short traders love catching falling markets. It's a powerful skill. You'll learn this too.","That's the goal. Being able to profit in any market condition is what separates good traders from great ones.","Smart. Understanding comes before money. Keep that mindset throughout this course."]},
{q:"You go SHORT on a trade. Imagine the asset fell from $100 to $95 (price went DOWN as expected). You:",type:"mc",opts:["Made a profit — price fell as you expected","Lost money — price went against you","Broke even — the move was too small","Can't tell without knowing the position size"],a:0,exp:"When you're SHORT and price falls, you profit. That's the whole point of shorting. If you shorted Gold at $2,010 and it falls to $1,990, that $20 move is your profit."},
{q:"You need to be right on more than 70% of trades to be profitable.",type:"tf",a:false,exp:"False. Profitability depends on the ratio of wins to losses, not just win rate. A trader winning 40% of trades but making 3x more on wins than losses on losses can be very profitable."}
]},
3:{s:[
{icon:"🕯️",title:"One Candle = One Story",body:"A candlestick stores all the price data for a specific time period. If you're looking at a 1-hour chart, each candle shows everything that happened in ONE hour: where price started (Open), where it went highest (High), where it went lowest (Low), and where it ended (Close). Four numbers. One candle. The complete story of that hour.",donna:"Open. High. Low. Close. OHLC. That's what every single candle on every chart everywhere is made of. Four numbers, one time period."},
{icon:"📦",title:"The Body and the Wicks",body:"The thick part of the candle (the body) goes from the Open to the Close. If it closed HIGHER than it opened, the body is typically green — buyers won that period. If it closed LOWER, the body is typically red — sellers won. The thin lines above and below (the wicks) show where price tried to go but couldn't stay. The wick above = price tried higher, got rejected. Wick below = price tried lower, got rejected.",donna:"Body = where price committed. Wick = where price attempted but failed. I care far more about where it CLOSED than where it tried to go."},
{icon:"⏱️",title:"Time Periods — Your Choice",body:"You choose the timeframe. A 1-minute candle = one candle per minute. A 1-hour candle = one candle per hour. A Daily candle = one candle per day. Same market, same price, completely different picture depending on which timeframe you look at. Traders use multiple timeframes together to get the full picture.",donna:"Same market. Different timeframes. Different stories. Later you'll learn which timeframes to use and when. For now — know that each candle is just one time period of data."}
],q:[
{q:"What part of a candlestick tells you the most about where price is actually going?",type:"engage",opts:["The body — where it committed","The wicks — where it tried to go","The size of the candle","The color"],a:0,exps:["The body shows commitment. Where price opened and where it actually closed. That's the real signal.","The wicks are fascinating — they show attempts and rejections. But the body shows commitment. Both matter, but commitment > attempts.","Size matters — bigger candles show stronger momentum. But you're right to look at the whole picture.","Color is a clue but it's just summarizing open vs close. The body and position tell the real story."]},
{q:"A candlestick on a Daily chart shows you:",type:"mc",opts:["The price at exactly noon","All price data (open, high, low, close) for that entire trading day","Only whether the day was bullish or bearish","The average price for the week"],a:1,exp:"A Daily candle contains all four data points for that full trading day: where price opened, where it went highest, where it went lowest, and where it closed. One candle = the full day's story."},
{q:"The wick of a candle shows where price closed.",type:"tf",a:false,exp:"False. The wick shows where price TRIED to go but didn't close. The BODY shows the close. This distinction is one of the most important in all of CRT — closes matter, wicks deceive."}
]},
4:{s:[
{icon:"🎮",title:"Practice First — Demo Accounts",body:"Before risking any real money, every trader should practice on a demo account. A demo account uses fake money but real market conditions — real prices, real movements, real everything. It's the exact same experience as live trading, without any real money at stake. This is where you learn to execute trades, make mistakes, and build habits — for free.",donna:"Practice on demo until you're consistent. Not for two weeks. Until you're actually consistent. There's no shortcut through this step."},
{icon:"🏦",title:"Funded Accounts — Trading With Other People's Money",body:"You don't need thousands of dollars of your own money to trade seriously. Funded trading programs test your discipline and skill — you take a challenge (trading a demo account with specific rules), and if you pass, they give you real money to trade. Accounts range from $25,000 to $200,000. You keep 70-90% of the profits. You never put your savings at risk.",donna:"The industry pays for your trading if you can prove you're disciplined. The challenge IS the interview. Pass it, get funded. That's the path most serious traders take."},
{icon:"🚀",title:"The Smart Path Forward",body:"Step 1: Learn the system (that's this course). Step 2: Practice on demo until profitable. Step 3: Take a funded account challenge. Step 4: Trade with funded capital and keep the profits. This path costs almost nothing upfront and removes the biggest barrier — the idea that you need a lot of money to get started.",donna:"Most people skip straight to step 3 or 4. Don't. The foundation matters. This course is step 1. Do it right."}
],q:[
{q:"Where are you right now in your journey?",type:"engage",opts:["Complete beginner — never opened a chart","Tried before but lost money","Know some basics, want to sharpen","Already trading, want a better system"],a:0,exps:["Perfect starting point. You have no bad habits to unlearn. Go through every chapter in order.","Experience, even painful experience, is valuable. You've seen what not to do. Now you'll learn what to do.","Solid foundation to build on. Even concepts you think you know — go through them. CRT often reframes things.","Your edge is in the details. The chapters on AMD, entries, and management will be the most valuable for you."]},
{q:"What is a demo account?",type:"mc",opts:["A paid trading subscription","A practice account with fake money but real market conditions","A type of funded account program","An advanced charting tool"],a:1,exp:"A demo account uses fake money with real market prices and conditions. It's free practice — same experience as live trading, no real money at stake. Every trader should spend significant time here before going live."},
{q:"You need your own money to take a funded account challenge.",type:"tf",a:false,exp:"False. Funded account challenges typically have a small fee to participate (often $100-500 depending on account size), but you are NOT risking trading capital. If you pass, they give you their money to trade. If you fail the challenge, you only lose the challenge fee."}
]},
5:{s:[
{icon:"⚖️",title:"The Only Number That Matters: 2%",body:"Never risk more than 1-2% of your total account on any single trade. This is not a preference. It is a rule. If your account is $10,000, maximum risk per trade is $200. If it is $1,000, maximum risk is $20. This seems very small. That is exactly the point.",donna:"The traders who blow accounts break this rule. Every single time. 1-2% keeps you in the game long enough to get good. Get good first. Then compound."},
{icon:"🛡️",title:"Why This Rule Protects You",body:"With 1-2% risk, you can lose 10 trades in a row and still have 80-90% of your account left. With 10% risk, 10 losses and the account is gone. Trading has losing streaks — every trader has them. The 1-2% rule means you survive losing streaks and keep trading. A 50% account loss requires a 100% gain just to get back to where you started. Never let it get there.",donna:"Losing streaks come for everyone. The rule is not about avoiding losses — it's about surviving them. 1-2% means streaks hurt but don't kill you."},
{icon:"📐",title:"How to Apply It Every Time",body:"Before entering any trade: 1) Decide where your stop loss goes (where the trade is wrong). 2) Calculate the distance from entry to stop. 3) Size your position so that distance = 1-2% of your account. You never move the stop to allow a bigger position. You size the position to fit the stop. In that order. Every time.",donna:"Entry. Stop. Size. In that order. If you ever reverse the order — if you size first and then place the stop — you're gambling, not trading."}
],q:[
{q:"How do you feel about the 1-2% rule?",type:"engage",opts:["Makes total sense — protecting capital first","Feels too small — I want bigger gains","I'll need to think about this more","I already trade this way"],a:0,exps:["That mindset will serve you. Capital preservation is the foundation. Gains compound on top of a preserved account.","The gains come — but only if you're still in the game to catch them. 10% risk and 10 bad trades = zero. 2% risk and 10 bad trades = still fighting.","Take your time with it. Run the math yourself — model 10 losses at 2% vs 10% and see the difference. The numbers make it obvious.","You're ahead of most traders. This is the rule most people learn the hard way."]},
{q:"Your account is $5,000. Following the 2% rule, your maximum risk per trade is:",type:"mc",opts:["$500 (10%)","$250 (5%)","$100 (2%)","$50 (1%)"],a:2,exp:"$5,000 × 2% = $100 maximum risk per trade. This seems small, but it means you can take 10 losing trades in a row and still have $4,000 left. That's the point — survival and consistency."},
{q:"If a trade setup requires a wide stop loss, you should make your stop tighter to keep risk at 2%.",type:"tf",a:false,exp:"False. If the stop needs to be wide, you REDUCE YOUR POSITION SIZE to keep risk at 2%. You NEVER change the stop to fit your desired position size. The stop goes where the trade is invalidated — that is not negotiable."}
]},
6:{s:[
{icon:"📊",title:"Four Parts, One Truth",body:"Every candle tells you four things: Open (where it started), High (where it tried to go), Low (where it tested), Close (where it ended up). The body — between open and close — is where price committed. The wicks are where price was rejected. The Model 1 entry candle — your trigger. When Gold hits a key level like the old high at $2,010 and creates a thick rejection candle that closes back inside — when buyers and sellers first agree on a price. Gold opens a day at $2,000. During that day it pushes up to $2,020 (that's the wick — where it tried to go). But by the end of the day it closes at $2,004. That close at $2,004 is the only number that matters. The $2,020 it touched? Irrelevant.",donna:"The body is where traders put real money. The wick is where they got trapped. Read the body, ignore the drama."},
{icon:"🎯",title:"The Close is Everything",body:"A close above a resistance level means price committed to being there. A wick above that closes back inside means price tried, failed, and got rejected. Gold wicking to $2,020 but closing at $1,995 is completely bearish. Gold closing at $2,020 is completely bullish. Same wick location, opposite meaning. The close decides everything.",donna:"I don't care where the wick went. Show me the close. That's the only question."}
,
{icon:"📗",title:"Bullish vs Bearish Candles",body:"A bullish candle: price opened low, closed higher. The close is ABOVE the open — buyers won that period. A bearish candle: price opened high, closed lower. The close is BELOW the open — sellers won. The color is just a summary. What matters is WHERE did the candle CLOSE relative to where it OPENED.",donna:"You will read thousands of these. Each one is a battle. The close tells you who won."},
{icon:"💪",title:"Body Size = Conviction",body:"A small body means buyers and sellers were nearly equal — no clear winner. A large body means one side dominated completely. A candle that opens at one extreme and closes at the other is maximum conviction. Big body = strong move = someone with real money is serious about that direction.",donna:"Small bodies are noise. Large bodies are signals. Train your eye to see the difference instantly."},
{icon:"📏",title:"Wicks Tell the Story of Rejection",body:"A long upper wick means price tried to go higher — but sellers pushed it back down before the close. A long lower wick means price tried to go lower — but buyers stepped in and rejected it. Wicks are attempted moves that FAILED. The close overrules the wick every single time.",donna:"Every long wick is a failed attempt. Somebody tried and got stopped. Remember that."}],q:[
{q:"Gold wicks up to $2,020 — pushing above the old high — but closes at $2,002, back inside the range it was in before. CRT says:",type:"mc",opts:["Bullish — Gold reached $2,020","Bearish — the move up was fake","Neutral — wait for more data","Buy the close at $2,002"],a:1,exp:"Wick above + close inside = fake move = Turtle Soup. The close at $2,002 reveals the real direction. Price tested $2,020, got rejected, and that's bearish."},
{q:"Gold closes at $2,018, above last month's high of $2,010. Your bias is:",type:"mc",opts:["Bearish — sell into strength","No bias yet","Bullish — the close confirmed the break","Wait for a retest of $2,010"],a:2,exp:"Close above an old high = True Break = bullish bias confirmed. Price committed to being above $2,010 by closing there. That's your signal."},
{q:"The wick of a candle is more important than the close for determining market direction.",type:"tf",a:false,exp:"False. The close is everything in CRT. Wicks show attempts. Closes show results. You trade closes, not wicks."}
]},
7:{s:[
{icon:"🗺️",title:"Three States. One Question.",body:"Every chart is in one of three states: Trending (consistent directional moves — higher highs, higher lows), Ranging (price bouncing between two defined levels like Gold stuck between $1,980 and $2,040 for weeks), or No Structure (random, no structure, no trade). Most losses come from applying trending strategies in ranging markets. Identify the state first. Every. Single. Time.",donna:"What state is this? Ask it before you do anything else. If you can't answer it confidently — it's no structure. Don't trade no structure."},
{icon:"🚫",title:"Never Trade the Middle",body:"In a range, the middle 50% is no-man's land. If EUR/USD is ranging between $1,980 and $2,000, the middle is $1,990. You don't trade at $2,050. You buy near $2,000 and sell near $2,100. The middle is where both bulls and bears get chopped up and nobody wins. Price at the edge of the range? That's your trade. Price in the middle? Go find something else.",donna:"Middle of a range means both sides lose. If you're trading there, you're the exit liquidity for everyone who entered at the edges."}
,
{icon:"📊",title:"Level Hierarchy: Not All Levels Are Equal",body:"Daily and Weekly levels are the most powerful — institutions look at these first. Then 4H levels. Then 1H. The higher the timeframe the level comes from, the more price respects it. A Daily high that holds for weeks is more significant than a 1H high that holds for hours. Always mark your higher timeframe levels first, then look for entries at lower timeframe ones that align with them.",donna:"A 1-minute level means nothing without a Daily level nearby. Build top-down always."}],q:[
{q:"Gold has been bouncing between $1,980 and $2,040 for three weeks. Price is now at $2,010 — right in the middle. You:",type:"mc",opts:["Buy — looks like it bounced from support","Sell — it'll go back down","Wait — you're in no-man's land (the middle of the range)","Look for a breakout entry right here in the middle"],a:2,exp:"The middle of any range is where both sides get chopped. Wait for price to reach the extremes — near $1,980 (buy zone) or near $2,040 (sell zone) — before entering."},
{q:"Nasdaq is making higher highs and higher lows consistently. The market state is:",type:"mc",opts:["Ranging","No structure","Trending","Transitioning"],a:2,exp:"Higher highs and higher lows = trending market. Clear directional structure means you look for pullback entries in the trend direction, not range edges."},
{q:"A no structure market with no structure should be traded with smaller position sizes to manage risk.",type:"tf",a:false,exp:"False. A no structure market should not be traded at all. Smaller size does not fix a bad market condition. No structure = no trade. Sit on your hands."}
]},
8:{s:[
{icon:"🔭",title:"HTF — The Why",body:"The Higher Timeframe (Daily or Weekly chart) tells you WHY price should move. It's your compass. If yesterday's daily candle (one candle = one full day of price action) closed above a significant old high — say Gold closed above $2,010 after sitting below it for weeks — your HTF bias is bullish. If it wicked above and closed back inside, HTF says bearish. This bias overrides everything on lower timeframes. Trading against the Daily is like swimming against the current — possible but exhausting and usually fatal.",donna:"The Daily candle is your boss. Every other timeframe works for the Daily. Not the other way around."},
{icon:"📡",title:"ITF — The What",body:"The Intermediate Timeframe (4H chart) shows you WHAT is happening — is the CRT pattern actually forming? This is where you watch for the AMD sequence developing: accumulation building, then the manipulation (Turtle Soup) occurring. The 4H confirms that what the Daily predicted is actually playing out. Without 4H confirmation, you're guessing.",donna:"If the 4H isn't confirming, the setup doesn't exist yet. Wait for it. Your patience is your edge."},
{icon:"⏱️",title:"LTF — The When and Where",body:"The Lower Timeframe (1H or 15min) gives you the precise entry — WHEN and WHERE. This is where you see the Model 1 candle that triggers your entry. But here's the thing: a perfect Model 1 on the 1H with no HTF reason behind it is just a candle. It's not a trade. All three timeframes must align for a high-probability setup.",donna:"A beautiful candle on the 1H with no Daily reason is just a pretty candle. You don't trade pretty. You trade aligned."}
,
{icon:"🌍",title:"The Daily Chart: Your North Star",body:"The Daily shows one candle per day — the entire day\'s battle. This is where the big picture lives. Is price trending up? Down? Ranging? You answer this on the Daily. Everything on lower timeframes must agree with the Daily. When Daily says bearish — you look for sells only. When it says bullish — buys only. No exceptions.",donna:"The Daily is not where you enter. It is where you find your direction. Never fight it."},
{icon:"🗺️",title:"The 4H Chart: Your Blueprint",body:"The 4-hour chart shows you the intermediate structure. On the Daily you know the direction. On the 4H you see the manipulation forming — the fake move, the Turtle Soup setup, the C2 of the sequence. The 4H also shows you key Order Blocks and Fair Value Gaps that price will interact with during your session.",donna:"Think of the 4H as the plan. The Daily gives you the mission. The 4H shows you how to execute it."},
{icon:"🎯",title:"1H and 15M: Where You Pull the Trigger",body:"The 1-hour and 15-minute charts are where you find your precise entry. By the time you reach these timeframes, you already know your direction (Daily) and your setup (4H). The 1H shows you the exact Model 1 candle forming. The 15M gives you the closest trigger. Entries happen here. Everything else is context. Key insight for traders coming from traditional analysis: lower timeframe levels exist INSIDE higher timeframe levels. A 1-hour support zone only matters if it aligns with a level on the Daily or 4H chart.",donna:"Lower timeframes without higher timeframe context is just guessing. With context, it is precision."}],q:[
{q:"Gold has a perfect 1-hour entry signal — the chart looks clean. But the Daily candle (yesterday's full day) shows bearish bias. You:",type:"mc",opts:["Take it — the 1H entry is perfect","Skip it — Daily bias overrides","Take it with half size","Wait for the next 1H candle"],a:1,exp:"Daily (HTF) bias overrides everything. Trading a long entry against a bearish Daily is fighting the current. Skip it — even if the 1H looks perfect."},
{q:"The 4H timeframe's main job in your analysis is to:",type:"mc",opts:["Set the directional bias","Confirm the CRT pattern is forming","Give the precise entry price","Determine your stop level"],a:1,exp:"The 4H (ITF) confirms that the AMD pattern is developing and the setup the Daily predicted is actually happening. It bridges the WHY and the WHERE."},
{q:"The 1H timeframe gives you the primary directional bias for your trades.",type:"tf",a:false,exp:"False. The HTF (Daily/Weekly) gives you the bias. The 1H gives you the entry timing and precise level. Working bottom-up is one of the most common mistakes in trading."},
{q:"Without Higher Timeframe alignment, a Model 1 candle on the 1H is:",type:"mc",opts:["Still valid with a tight stop","A high-probability trade","Just a candle with no CRT backing","Worth half position size"],a:2,exp:"No HTF reason = no trade. A Model 1 without HTF alignment is just a candle pattern. CRT requires the WHY before the WHERE. No why = no trade."}
]},
9:{s:[
{icon:"🏦",title:"Retail vs Smart Money",body:"Retail traders were taught to buy breakouts above old highs. That means their buy orders stack up just above every significant high in the market. Smart Money — banks, funds, institutions — knows exactly where those orders are stacked. They use retail's predictable behavior as fuel to fill their own massive positions at the best possible price.",donna:"You were taught to trade the wrong way. Everyone was. That was the point. Let that sink in."},
{icon:"🪤",title:"How the Trap Works",body:"Gold approaches an old high at $2,010. Retail buy orders are sitting just above — at $2,015 and $2,020. Price pushes up to $2,018, triggering every buy order stacked there. Smart Money sells into all those buyers — they just filled their short positions at $2,015-$2,018 with zero resistance. Price reverses immediately, falls back to $1,990, and everyone who bought the breakout is stopped out or holding a losing trade.",donna:"Every time you bought a breakout and immediately got destroyed? That wasn't bad luck. That was the plan. Their plan."},
{icon:"👀",title:"Reading Their Footprints",body:"The good news: Smart Money leaves footprints. When price pushes above an old high with a wick that closes back inside — that's them collecting. When price closes decisively above a high — they're distributing, and retail is actually right this time. The close tells you which game is being played. Once you can read it, you stop being the prey.",donna:"You can't beat Smart Money. But you can learn to read them. That's the whole game."}
,
{icon:"🐋",title:"The Whale in the Pool",body:"Imagine a whale trying to swim in a small pool. Every time it moves, the water moves with it — not against it. A bank trying to buy $500 million of a currency cannot buy it all at once without moving the price against themselves. So they buy in stages. They build a range. They create the accumulation phase. The price behavior you see on the chart IS the whale moving. Not random. Not emotional. Mechanical.",donna:"Once you understand this, the chart stops looking like noise and starts looking like a plan."},
{icon:"👣",title:"Reading the Institutional Footprint",body:"Institutions cannot hide their trades completely. They leave footprints: Order Blocks (the last candle before a major move — where they positioned), Fair Value Gaps (they moved so fast they left a price gap — they will return to fill it), and Turtle Soups (they needed to grab stop liquidity before their real move). These three patterns ARE the institutional footprint. Every major setup in this methodology is one of these three.",donna:"You are not fighting the institutions. You are following them. That is the entire strategy."}],q:[
{q:"Gold pushes above the old high of $2,010 during the London session, triggering all the buy orders stacked above it, then closes the full day at $1,992 — back inside. What happened?",type:"mc",opts:["Bullish breakout — buy","Smart Money collected buy stops then sold into them","Random volatility","Consolidation before the real move up"],a:1,exp:"Classic Turtle Soup liquidity grab. Price went above $2,010, triggered retail buy stops, Smart Money sold into those buyers, and the close at $1,995 reveals the real direction — bearish."},
{q:"Where do retail buy stop orders typically accumulate?",type:"mc",opts:["In the middle of ranges","Below old lows","Just above old highs","At round numbers only"],a:2,exp:"Retail was taught to buy breakouts above highs. So their buy stop orders pile up just above every significant old high — exactly where Smart Money targets to fill short positions."},
{q:"Smart Money moves price by finding predictable retail order locations and trading against them.",type:"tf",a:true,exp:"True. Retail's consistent behavior (buying breakouts above highs, selling breakdowns below lows) creates the liquidity pools Smart Money needs to fill massive positions at scale."},
{q:"A retail trader buys EUR/USD when it breaks above $2,015. Price immediately reverses to $1,992. Most likely explanation:",type:"mc",opts:["Random market fluctuation","Stop was too tight","Smart Money sold into retail buy stops above $2,015","Market makers triggered their stop"],a:2,exp:"This is the Turtle Soup. Smart Money targeted the retail buy orders above $2,015, sold into them as those orders triggered, collected the liquidity, and price reversed. This is not random — it's the mechanism."}
]},
10:{s:[
{icon:"💧",title:"Two Reasons. Only Two.",body:"Every price move in the history of every market happened for exactly two reasons: to reach a liquidity pool (buy stops above highs, sell stops below lows) or to fill a price imbalance (a gap where price moved too fast and left an area untested). From a 5-pip tick to a year-long trend — one of those two. That's the whole engine.",donna:"Two reasons. Only two. Liquidity (going to where orders are stacked — old highs and lows) or Imbalance (filling a price gap it moved through too fast). Write it down. That's the whole game in four words."},
{icon:"🎯",title:"External vs Internal",body:"External liquidity sits at the extremes — old highs and lows — the final destination. Internal liquidity sits inside the range — Fair Value Gaps, Order Blocks, imbalances. Price cycles from internal to external and back, constantly. Your job before any trade: know which one price is heading toward right now. If you can't answer that, you don't have a trade.",donna:"Before any entry — where is price going? If you can't point to a level and say 'THERE' with confidence, you're not ready to enter."},
{icon:"🔄",title:"The Cycle Never Stops",body:"Price sweeps an old low (grabs sell stops), fills imbalances on the way up (internal liquidity), reaches the old high above (grabs buy stops), fills imbalances on the way down. This cycle repeats on every timeframe simultaneously. The Weekly is doing it. The Daily is doing it inside the Weekly. The 4H is doing it inside the Daily. Fractals all the way down.",donna:"Once you see the cycle, you can't unsee it. Every move makes sense. Every reversal is predictable. That's when trading stops being gambling."}
,
{icon:"🎣",title:"Where Stops Accumulate",body:"Every trader who is long has a stop loss BELOW the most recent low. Every short trader has a stop ABOVE the most recent high. This means below every swing low there is a cluster of buy stops. Above every swing high is a cluster of sell stops. These are liquidity pools. The market knows exactly where they are.",donna:"Your stop loss is someone else\'s target. That is not a conspiracy — that is market structure."},
{icon:"🏹",title:"The Hunt: Why Price Seeks These Levels",body:"To fill a large buy order, an institution needs sellers. The most concentrated sellers are right below a swing low where all the stop losses sit. Price moves down, triggers those stops, fills the institutional order, then reverses. That sweep below the low IS the Turtle Soup. It is not random. It is the market doing its job.",donna:"Every time you see price spike below a low and close back inside — stops were just hunted. That is your signal."},
{icon:"⚖️",title:"Two Types of Liquidity",body:"External liquidity: the highs and lows from previous sessions, days, and weeks. These are the big targets. Internal liquidity: Fair Value Gaps and Order Blocks within the current range. When external liquidity is swept, price returns to fill internal gaps. Knowing which type you see tells you exactly what price is trying to accomplish right now.",donna:"Always ask: what is price hunting right now? The answer is always one of these two things."}],q:[
{q:"Gold drops below last week's low of $1,980, grabbing all the sell orders sitting there, then immediately reverses and starts moving higher. This tells you:",type:"mc",opts:["Real breakdown — go short","Liquidity grab — price took the sell stops, now likely going up","Random volatility — no trade","Failed breakdown — wait"],a:1,exp:"Price swept the external liquidity below $1,975 (sell stops), then reversed. The sweep collected the fuel Smart Money needed. The reversal direction is bullish — toward the next liquidity target above."},
{q:"What's the difference between External and Internal liquidity?",type:"mc",opts:["External is bigger, internal is smaller moves","External is at old highs/lows (final targets), internal is within the range (FVGs, OBs)","External is on higher timeframes only","They're the same thing, different names"],a:1,exp:"External liquidity = old highs and lows (the final destinations). Internal liquidity = imbalances (FVGs, Order Blocks) within the range. Price uses internal as stepping stones to reach external."},
{q:"Before finding your entry, you must first identify where price is going (your target).",type:"tf",a:true,exp:"True. Target first, always. Without knowing where price is going, your entry has no context and no logical take-profit. The target defines whether the trade makes sense."},
{q:"Price collected the buy stops above $2,020 on EUR/USD and closed back inside at $2,015. Where will price most likely go next?",type:"mc",opts:["Higher — momentum is up","Sideways — consolidation","Lower — toward internal or external lows","Cannot determine"],a:2,exp:"After collecting buy stops above $2,020 (Turtle Soup) and closing inside at $2,015, Smart Money sold into those buyers. Price should now move lower toward the next liquidity target."}
]},
11:{s:[
{icon:"🗺️",title:"Target First. Always.",body:"The most common mistake in trading: looking for an entry before knowing the target. If you don't know WHERE price is going, you can't know IF the trade makes sense or what the risk-reward is. Gold at $2,000 with a target at $2,060 = a $60 move potential. Gold at $2,000 with a target only at $2,010 = a $10 move. Same entry point, completely different trade. The target decides whether the trade makes sense before you even think about entering.",donna:"Entry is the last thing you look for. Target is the first. I will repeat this in every session until it's permanent."},
{icon:"🎯",title:"How to Find Your Target",body:"Look left. Find the most significant untested levels — old highs above you (buy stops), old lows below you (sell stops). The most powerful targets are old highs that formed after a sweep of a low, or old lows that formed after a sweep of a high. Those are clean liquidity pools that Smart Money will target. Gold sitting at $1,990? Look left. There's an old high at $2,025 that formed right after price swept down to $1,965. That $2,025 level is where buy orders are stacked — that's your target.",donna:"The level nobody is talking about is usually the next target. The obvious ones get front-run. Look for the clean ones that formed after a sweep."},
{icon:"🛤️",title:"The Path: ERL to IRL",body:"Price doesn't go from external level to external level in a straight line. It goes External → Internal → External. From the old low sweep, up through Fair Value Gaps and Order Blocks (internal), to the old high. Understanding this path lets you map not just the final target but the intermediate levels where price will pause, accelerate, or retrace. That's where your entries live.",donna:"Know the full route before you get in the car. ERL to IRL to ERL. Map it. Then wait for the entry on that route."}
,
{icon:"🚌",title:"The Institutional Bus Stop",body:"Think of an Order Block as a bus stop. The institution (the bus) stopped here to pick up passengers (fill their order). The bus then drove away — price moved strongly in one direction. When price comes back to that same bus stop, the institution is there again, picking up the last of their passengers. That is why price reacts at Order Blocks. It is not magic. The institution still has unfilled orders there waiting.",donna:"When you see an Order Block hold, you are watching an institution finishing what they started."}],q:[
{q:"Gold is sitting at $1,990. There's an old high at $2,025 above and an old low at $1,965 below. Price just pushed down to $1,965, grabbed the sell orders there, then reversed. Your target is most likely:",type:"mc",opts:["$1,975 — nearest resistance","$1,990 — current price (no trade)","$2,025 — the old high where buy orders are stacked","$1,950 — further down (wrong direction after the sweep)"],a:2,exp:"Price swept the old low at $1,965 (collected sell stops), suggesting a reversal. The logical target is now the external liquidity above — the old high at $2,025."},
{q:"Your entry is at $2,000. Stop is 25 points. The nearest target is 15 points away. You:",type:"mc",opts:["Take it — the setup looks good","Skip it — negative risk-reward","Tighten the stop to 10 pips","Take half size"],a:1,exp:"Target 15 points, stop 25 points = 0.6:1 risk-reward. That's negative — you're risking more than you could win. No setup quality justifies that. The target defines whether the trade makes sense."},
{q:"You must identify your target before looking for an entry candle.",type:"tf",a:true,exp:"True. Target first, always. Without a target, you have no idea if the reward justifies the risk. Entry is the last step, not the first."},
{q:"What makes one old high more significant as a target than another?",type:"mc",opts:["It's the most recent high","It's the highest high on the chart","It formed after a sweep of a low — clean liquidity pool","It was tested multiple times"],a:2,exp:"Old highs that formed after a sweep of a low are the cleanest targets. The sweep created the fuel (collected sell stops), now the high above is where buy stops are stacked — Smart Money's next target."}
]},
12:{s:[
{icon:"🐢",title:"Every Big Move Starts Here",body:"Before every significant price move, there's a fake breakout. Before a major drop, price pushes above an old high to trigger buy stops. Before a major rally, price breaks below an old low to trigger sell stops. This is not a sometimes-pattern — it's the mechanism that enables large-scale Smart Money positioning. Name one major Gold move that didn't start with a liquidity grab. You can't.",donna:"The fake breakout isn't a glitch in the matrix. It IS the matrix. Once you see it, you trade it instead of getting trapped by it."},
{icon:"📋",title:"Three Types of Turtle Soup",body:"Continuation: brief sweep of a swing high within a trend, then continuation — a pullback entry. Range: price sweeps the high or low of an established range — classic reversal. Reversal: at a major HTF structural level, price sweeps and reverses completely — this is Entry 1, the most powerful and the highest reward. The HTF reversal Turtle Soup is what you build your system around.",donna:"The HTF reversal type is the one. Hardest to catch live. Most violent when it goes. Entry 1. Learn to recognize it."},
{icon:"⚡",title:"The Failure Swing",body:"After a Turtle Soup, watch for the failure swing — price tries to go back in the direction of the fake breakout but makes a lower high (or higher low if below). Gold fake breakout above $2,020, closes at $1,998, then tries again to $2,010 but fails to push higher — making a lower high — that lower high is confirmation. The failure swing tells you the Turtle Soup is real and the move is about to begin.",donna:"Failure swing is your confirmation. Don't skip it. It filters 80% of the false signals."},
{icon:"🚫",title:"Rule 1: Never Buy Above an Old High",body:"The most important rule in CRT: never buy above an old high, never sell below an old low. The breakout is almost always fake. The close back inside is your signal. A genuine close above is the exception — and even then, you wait for the pullback, not the breakout itself. This single rule eliminates the most common losing trade in retail trading.",donna:"Never buy above an old high. If you forget everything else I taught you — remember this one. Put it on your screen."}
,
{icon:"🔢",title:"FVG by the Numbers",body:"Here is an exact example: Candle 1 closes at $2,000. Candle 2 opens at $2,000, shoots up to $2,020, and closes at $2,018. Candle 3 opens at $2,010. The space between Candle 1\'s close ($2,000) and Candle 3\'s open ($2,010) — that $10 gap — is the Fair Value Gap. Price moved so fast through that zone that no real trading happened there. The market will return to that zone. It has to fill the imbalance. Always.",donna:"Mark every FVG you find. Price comes back. This is not an opinion — it is market mechanics."}],q:[
{q:"Gold pushes above the old high of $2,020 — reaching $2,025 on the wick — then closes the daily candle back at $2,002, below where the old high was. CRT says:",type:"mc",opts:["Bullish — buy the break","Bearish Turtle Soup — Smart Money sold above $2,020","Neutral — wait","Bullish — wick shows demand"],a:1,exp:"Wick above $2,020, close inside at $2,004 = Turtle Soup. Smart Money grabbed buy stops above the high and sold into them. The daily close at $2,005 confirms the bearish bias."},
{q:"Which type of Turtle Soup has the highest probability and reward?",type:"mc",opts:["Continuation type in a trend","Range extreme reversal","Reversal at a major HTF structural level","Any type with a large wick"],a:2,exp:"HTF reversal Turtle Soup is Entry 1 — the highest quality. It combines maximum liquidity collection with major structural significance. Hardest to catch live, most powerful when you do."},
{q:"After a Turtle Soup above an old high, price tries to push back up but only reaches a lower high before reversing. This is called:",type:"mc",opts:["Double top pattern","False change of character","The failure swing — confirms the Turtle Soup","Consolidation before continuation"],a:2,exp:"The failure swing — price failed to go back where the fake breakout happened, making a lower high. This confirms the Turtle Soup and gives you high-confidence entry timing."},
{q:"You should buy when price closes above an old high on strong volume and momentum.",type:"tf",a:false,exp:"False in CRT. Volume doesn't change the analysis. A close above an old high needs context — is it a True Break or will it be Turtle Souped? Even if True Break, you wait for the pullback, not the breakout itself."},
{q:"Gold is rising toward the old high of $2,020 that's been resistance twice before. CRT Rule 1 says:",type:"mc",opts:["Buy the breakout above $2,000","Watch for a Turtle Soup — expect a fake break and reversal","Set a buy stop above $2,000","Buy when price touches $2,000"],a:1,exp:"Rule 1: Never buy above an old high. Watch for the Turtle Soup — price wicking above $2,000 and closing back inside. That's your sell signal, not your buy."}
]},
13:{s:[
{icon:"📅",title:"AMD — The Universal Pattern",body:"Every price move on every timeframe follows three phases. Accumulation (C1): price ranges, building the spring. Manipulation (C2): the fake breakout — the Turtle Soup — the liquidity grab. Distribution (C3): the real move — your trade. Monday: Gold ranges between $1,990 and $2,010 — going nowhere (C1). Tuesday: Gold breaks above $2,010, reaching $2,018 on the wick, but closes back at $2,003 — the fake (C2). Wednesday-Thursday: Gold drops to $1,975 — the real move (C3). It runs on every timeframe.",donna:"C2 is the most tempting candle to trade. It looks explosive. It looks obvious. Never trade C2. It is designed to trap you."},
{icon:"📆",title:"AMD on the Weekly",body:"Monday builds the weekly accumulation range. Tuesday is manipulation day — this is where the real weekly high or low almost always forms. Wednesday and Thursday distribute in the true direction. If you know Tuesday is manipulation day, you stop trading Tuesday breakouts and start trading Wednesday's follow-through. That one change alone will improve your results immediately.",donna:"Mark Tuesday's high and low. Every week. That's usually where the weekly High or Low is. I'm not kidding."},
{icon:"🗓️",title:"AMD on the Monthly",body:"Week 1 of the month = accumulation. Week 2 = manipulation (the fake monthly high or low forms here). Week 3-4 = distribution (the real monthly move). This is why markets often go one direction in the first two weeks, then violently reverse in week 3. If you're trading week 2 breakouts, you are the fuel for week 3's reversal.",donna:"Week 2 is manipulation week. If you're trading week 2 breakouts like they're real — you're the liquidity. Every single month."},
{icon:"🔄",title:"Fractals — Same Pattern Every Speed",body:"AMD repeats on every timeframe simultaneously. The manipulation candle on the Weekly contains its own AMD on the Daily. The Daily manipulation day contains its own AMD on the 4H. When you find AMD alignment across three timeframes simultaneously — Weekly AMD, Daily AMD, 4H AMD all pointing the same direction — that's the highest-probability setup in CRT.",donna:"When all three timeframes are in AMD alignment — that's the trade. That's when you size up."}
,
{icon:"🌱",title:"C1 in Detail: The Accumulation",body:"During Accumulation, price is ranging. Retail traders get frustrated — \"the market is not moving.\" But institutions are quietly building positions, buying small amounts repeatedly without moving price much. They need the range to persist long enough to fill their full order. This is the spring being compressed. The longer the range, the bigger the move when it releases.",donna:"When price is going nowhere and you are bored — that is the accumulation. Pay attention. Something is being loaded."},
{icon:"🎭",title:"C2 in Detail: The Manipulation",body:"After accumulation, price breaks in one direction — usually opposite to the real move. It takes out the stops of traders who correctly identified the range. It looks like a breakout. Retail enters in the direction of the break. Then price closes back inside the range. That close back inside IS the Turtle Soup signal. The manipulation creates the entry opportunity.",donna:"C2 is where the trap is set. When you see a candle spike outside the range and close back inside — that is your invitation."},
{icon:"🚀",title:"C3 in Detail: The Distribution",body:"After the manipulation has cleared out the wrong-side traders, the real move begins. This is the distribution. Price moves in the direction institutions were actually building during accumulation. This move is fast and committed — big bodies, minimal wicks. This is where your TP1 and TP2 targets live. You already knew the direction from C1. C3 is where you collect.",donna:"C3 is not where you figure out direction. You knew that from C1. C3 is where you collect what you planned for."}],q:[
{q:"It's Tuesday in New York session. EUR/USD breaks above Monday's high. Based on AMD, you:",type:"mc",opts:["Buy the breakout — momentum is real","This is likely C2 — do not buy the breakout, watch for reversal","Wait for Wednesday to confirm","It's accumulation — range trade it"],a:1,exp:"Tuesday is typically the manipulation day (C2). The breakout above Monday's high is likely the Turtle Soup. Don't buy Tuesday breakouts. Mark Tuesday's high and watch for Wednesday's reversal."},
{q:"In the AMD sequence, which phase is your actual trade entry?",type:"mc",opts:["C1 — Accumulation","C2 — Manipulation","C3 — Distribution","Any of the three"],a:2,exp:"C3 — Distribution — is your trade. C1: don't trade, no direction. C2: never trade, it's the trap. C3: the real move that follows the manipulation."},
{q:"The real weekly high or low typically forms on which day?",type:"mc",opts:["Monday","Tuesday","Wednesday","Friday"],a:1,exp:"Tuesday is the manipulation day. It's where Smart Money creates the weekly fake high or low — the level that the rest of the week will reference and trade off of."},
{q:"AMD only applies to the daily and weekly timeframes.",type:"tf",a:false,exp:"False. AMD is fractal — it appears on every timeframe simultaneously. The 4H has its own AMD. The 1H has its own inside that. When they align across multiple timeframes, that's the highest-quality setup."},
{q:"It's Week 2 of the month. The market breaks to new monthly highs. Based on monthly AMD:",type:"mc",opts:["Buy — strong momentum","Watch for the monthly Turtle Soup — this could be the fake high","Week 2 is always bullish","Accumulation is completing"],a:1,exp:"Week 2 is manipulation week. New highs in week 2 are likely the monthly fake breakout — the Turtle Soup that precedes the real bearish move in weeks 3-4."}
]},
14:{s:[
{icon:"👁️",title:"Closes Reveal. Wicks Deceive.",body:"Reading daily bias is simple once you know this: a prior daily that CLOSED above an old high = bullish bias for today. A prior daily that WICKED above an old high but closed inside = bearish bias. The close is the vote. A bullish bias means you only look for long entries below the daily open. A bearish bias means you only look for shorts above the daily open.",donna:"One filter. One rule. Eliminate most bad trades. The daily close tells you everything."},
{icon:"🔍",title:"The One Filter That Changes Everything",body:"Here's how powerful this is: if the daily has a bearish bias, you should NOT be taking bullish trades — no matter how perfect the setup looks on the 1H. And if the daily shows bullish bias, you should NOT be taking shorts — even if price is near a resistance. This one daily bias filter eliminates the majority of losing trades for most retail traders.",donna:"Most bad trades happen when people ignore the daily bias. They see a pretty 1H candle and forget to ask: what's the Daily doing? Check the Daily first. Always first."}
,
{icon:"🔬",title:"Step 1: Identify the Key Level",body:"Before any entry, find the key level — an old high or low from a previous session or day where liquidity sits. Price needs to approach this level with momentum. You wait for price to sweep beyond it, taking out the stops. Without a key level there is no Model 1. The level is the stage. The candle is the actor.",donna:"No level = no trade. First question always: what is the nearest old high or low?"},
{icon:"⚡",title:"Step 2: The Model 1 Trigger Candle",body:"The trigger candle must do three things: 1) Wick beyond the key level — taking out the stops. 2) Have a thick, decisive body — strong conviction. 3) Close back inside the range — the Turtle Soup confirmation. When all three are present, the candle CLOSE is your entry. Not before the close. Not after waiting. The close IS the confirmation. One candle. One decision.",donna:"If you are not sure if the body is thick enough, it is not. The best Model 1 candles are unmistakable."},
{icon:"🛡️",title:"Step 3: Stop Loss and Targets",body:"Stop loss: beyond the full wick of the Model 1 candle. Not a few pips past — beyond the wick completely. This is fixed. It does not move. TP1 is at 50% of the range — take your partials here, every single time. TP2 is the opposite liquidity — the old high or low on the other side of the range. This is the full target.",donna:"The stop does not move. It goes where the setup is invalidated and it stays there. That is what discipline looks like."}],q:[
{q:"Yesterday's daily candle wicked above the old high of $2,015 but closed at $1,998, back inside. Today's bias is:",type:"mc",opts:["Bullish — Gold tested $2,020","Bearish — the wick was rejected","Neutral — one candle isn't enough","Bullish — the wick shows demand"],a:1,exp:"Wick above + close inside = bearish bias. Yesterday the close at $1,998 revealed that buyers failed to sustain above $2,015. Today you only look for short (sell) entries above today's opening price."},
{q:"Gold's daily candle closes at $2,018, above the old weekly high of $2,010. Today you should look for:",type:"mc",opts:["Short (sell) entries above today's opening price","Long (buy) entries below today's opening price","No trades — wait for more confirmation","Long (buy) entries above today's opening price — chasing price"],a:1,exp:"Daily close above old high = bullish bias. In a bullish bias, you look for buy entries BELOW today's opening price (waiting for a pullback — a small dip — to enter), not above it where you're chasing."},
{q:"You can take short trades even when the daily bias is bullish, as long as the 1H setup is perfect.",type:"tf",a:false,exp:"False. Daily bias overrides 1H setups. Trading against the daily bias — even with a 'perfect' lower timeframe setup — puts you against the dominant flow. Skip those trades."}
]},
15:{s:[
{icon:"⏰",title:"When Matters More Than Where",body:"A perfect looking setup at 3AM Saturday? Almost no probability — nobody significant is trading. The exact same setup at 9:30AM New York on Tuesday? That's a trade. There are three Kill Zones where Smart Money actively moves price: London (2-5AM NY time, best for EUR/USD, GBP), New York Open (7-11AM NY, best for Indices, Crypto, USD pairs), NY PM (1:30-4PM NY, continuation moves). Outside these windows — think twice.",donna:"Your setup matters. Your timing matters more. Perfect level, wrong session = low probability. Mark the Kill Zones on your chart. Trade inside them."},
{icon:"📍",title:"NYSE Open — The Big One",body:"Every day at 9:30AM New York, the New York Stock Exchange opens. This is the biggest liquidity injection of the session — buy and sell orders from every major institution hit the market simultaneously. This moment often creates the Day's Manipulation (C2 of the daily AMD) — a sharp move to grab stops just before the real direction plays out. The 9:30 candle is almost never your entry. It's the trap.",donna:"9:30AM is when you WATCH, not when you TRADE. Let the 9:30 candle develop. Mark its high and low. Trade what comes after it."},
{icon:"🌍",title:"Session Profiles",body:"Each session has its own personality. London creates the daily manipulation for EUR/USD and GBP pairs — expect fake moves and reversals. New York Open creates the US market manipulation — sharp moves that often reverse. Asian session (8PM-12AM NY) is quieter — best for Gold and JPY. A setup that forms during Asian session should be evaluated with lower probability weight than the same setup during London or NY.",donna:"Same setup, different session — different probability. Context is everything in trading."}
,
{icon:"💀",title:"Why the Kiss of Death Exists",body:"After you enter and price starts moving your direction, it almost always makes one final move against you before continuing. This happens because: latecomers placed stops near your entry, trapped traders hope for a recovery, and the market needs to clear this final liquidity before the real continuation. It is not random. It is not personal. It is structural.",donna:"The KoD is not the market being cruel. It is the market being efficient. It needs that last pool of stops before it can continue."},
{icon:"🧠",title:"How to Trade Through the KoD",body:"The only way to survive the Kiss of Death is to know it is coming before it arrives. Your stop is placed correctly beyond the Model 1 wick. The KoD will move against you but it will NOT reach your stop if your placement is correct. If your stop gets hit during a KoD, your stop was too tight. The solution is not a tighter stop — it is correct placement from the start.",donna:"Every trader who gets stopped out on the Kiss of Death had their stop in the wrong place. Not bad luck. Wrong placement."}],q:[
{q:"You find a perfect entry setup on Gold at 11:45PM New York time — deep in the Asian session, very low volume. You:",type:"mc",opts:["Take it — the setup is there","Take it with smaller size","Be cautious — Asian session has lower probability for EUR/USD","Skip it — Asian session is always wrong"],a:2,exp:"Asian session is not the primary session for EUR/USD. The same setup during London (2-5AM NY) would have much higher probability. Adjust your confidence level based on session timing."},
{q:"At exactly 9:30AM New York, price makes a sharp move up through an old high. Based on CRT:",type:"mc",opts:["Buy the breakout — NYSE open = bullish","Wait — this is likely the 9:30AM manipulation trap","Sell immediately — 9:30 always reverses","It depends on the direction of the move"],a:1,exp:"9:30AM NYSE open creates massive volatility and often the daily manipulation (C2). Sharp moves at 9:30 are frequently Turtle Soups. Watch, mark the high and low, and trade what develops after."},
{q:"The three main Kill Zones are London Open, New York Open, and:",type:"mc",opts:["Tokyo Open","Asian session","NY PM (1:30-4PM NY)","Pre-market (4-6AM NY)"],a:2,exp:"The three Kill Zones are London (2-5AM NY), New York Open (7-11AM NY), and NY PM (1:30-4PM NY). These are the windows where institutional flow is highest and CRT setups have the most probability."},
{q:"A CRT setup that forms during a Kill Zone has higher probability than the same setup outside a Kill Zone.",type:"tf",a:true,exp:"True. Kill Zones are when institutional participants are most active. The same structural setup carries significantly more probability when it forms during a Kill Zone vs during dead hours."}
,
{q:"The Kiss of Death means your stop loss was placed in the wrong spot.",type:"tf",a:false,exp:"False. The KoD happens even with correct stop placement — it is a structural move that sweeps final liquidity before continuation. A correctly placed stop beyond the wick will NOT be hit by the KoD."}]},
16:{s:[
{icon:"🎯",title:"One Candle. One Rule. One Trigger.",body:"The Model 1 is your entry candle. It has three requirements and all three must be present: 1) It's THICK — a significant body, not a doji or small candle. 2) It nails a real structural level — an old high, old low, Order Block, or Fair Value Gap. 3) It forms inside a Kill Zone. When all three are present, that candle's CLOSE is your trigger. Not the wick. The close.",donna:"Three things. If one is missing — it's not a Model 1. Don't enter. Wait for the real one."},
{icon:"📏",title:"Stop, Targets, and the Sacred 50%",body:"Stop goes above or below the Model 1 wick — FIXED, never moves. First target (T1) is always 50% of the setup range — this is MANDATORY. You take partial profit there no matter what. Second target (T2) is the full objective — the external liquidity target you identified before the trade. An FVG (Fair Value Gap) inside the Model 1 candle's body increases the probability significantly.",donna:"The 50% partial is not optional. I don't care how good the trade looks. Take the partial at T1. Always."},
{icon:"⚡",title:"Why the Close — Not the Wick",body:"Retail traders enter on the wick — they see price touch a level and jump in. Smart Money confirms on the close — they wait to see if price COMMITTED to rejecting the level. Entering on the wick means you enter during the noise. Entering on the close means you enter after the signal is confirmed. The extra few seconds of patience is the difference between a high-probability entry and a coin flip.",donna:"Wick touch = hope trade. Close confirmation = CRT trade. You trade closes. Period."},
{icon:"🔄",title:"Managing the Model 1 Trade",body:"Once in: stop is above the wick and stays there. If price hits T1 (50%), take the partial — reduce risk immediately. Move stop to breakeven after T1. Let T2 run. If price hits your stop before T1 — that's a loss. Accept it, log it, move on. If price takes you out at breakeven after T1 — that's a free trade. The Model 1 managed correctly loses no money on 70% of losing trades.",donna:"Manage it correctly and the Model 1 makes money even when it's wrong. That's the system."}
,
{icon:"1️⃣",title:"E1: The Primary Entry — First and Best",body:"E1 is the Model 1 entry at the very first opportunity — when the Turtle Soup candle forms at your key level and closes back inside the range. This is your highest probability entry. If you take E1 correctly, your stop is at the wick, your TP1 is at 50% of range, and TP2 is the opposite liquidity. E1 is always the first attempt. You cannot skip to E2 or E3 without first having E1 available.",donna:"E1 is the one everyone wants. Train your eye to see it and have the discipline to wait for it."},
{icon:"2️⃣",title:"E2 and E3: When E1 Misses or You Missed It",body:"E2 is a retest of the area after the initial E1 move. If E1 ran but you missed it, E2 gives you a second entry at a slightly worse price but still valid structure. E3 is the Breaker Block entry — the old support that became resistance (or vice versa) after a structure break. E3 is the entry for traders who study structure carefully. All three remain valid only if the original bias is still intact.",donna:"Never go back in the sequence. If structure changes, the trade is over — not E4 or E5."},
{icon:"⚡",title:"E4 and E5: OTE and KoD Entries",body:"E4 is the OTE — Optimal Trade Entry — at the 62-79% retracement of the initial move. If price ran from the E1 area and pulled back 62-79% of that move, that is E4. It is a late entry but valid. E5 is the Kiss of Death entry — price comes back one final time to grab liquidity right before the full continuation. E5 is the hardest to take psychologically because it feels wrong. But it is often the best risk-reward of all five.",donna:"The sequence goes in one direction only — forward. Miss E1, take E2. Miss E2, take E3. Never reverse."}],q:[
{q:"You see a thick candle that closes back inside after wicking above an old high. It's during London session. The level is a clean Order Block. This is:",type:"mc",opts:["A regular candle — wait for more confirmation","A Model 1 entry — all three criteria met","A Turtle Soup but not a Model 1","A potential entry but check the Daily first"],a:1,exp:"All three Model 1 criteria present: thick body, real structural level (Order Block), Kill Zone timing (London). After checking Daily bias alignment, this is a valid entry on the close."},
{q:"Where does the stop go on a Model 1 trade?",type:"mc",opts:["Below the entry candle's body","Below the entry candle's wick","At the nearest support level","2% below entry"],a:1,exp:"Stop goes above or below the Model 1 wick — the extreme of the candle. This protects you from the noise while keeping the stop logical. Fixed. Never moved after placement."},
{q:"Your Model 1 trade hits T1 (50% of the range). You should:",type:"mc",opts:["Hold everything — let it run to T2","Take partial profit — this is mandatory","Move your stop to breakeven and hold","Close the entire trade"],a:1,exp:"TP1 at 50% is a mandatory partial exit. Non-negotiable. After T1, move stop to breakeven and let T2 run risk-free. The partial at 50% is what makes the Model 1 consistently profitable."},
{q:"You should enter a Model 1 trade when the wick touches your level, not waiting for the close.",type:"tf",a:false,exp:"False. The close is the trigger — always. Entering on the wick touch is entering before confirmation. Wait for the candle to close and confirm rejection. The few seconds of patience significantly improves entry quality."},
{q:"What increases the probability of a Model 1 setup?",type:"mc",opts:["A large wick above the level","An FVG inside the Model 1 candle's body","Multiple recent tests of the same level","A strong trend into the level"],a:1,exp:"An FVG (Fair Value Gap) inside the Model 1 candle's body adds confluence — price filled an imbalance and rejected simultaneously. This combination carries significantly higher probability than a plain Model 1."}
]},
17:{s:[
{icon:"💀",title:"It Happens Every Single Time",body:"The Kiss of Death is the last fake move before price reaches its target. It happens before every significant target — every single one. Smart Money knows exactly where your stop is (above the Model 1 wick, where you placed it like CRT taught you). Before price reaches the final target, it makes one last move against your trade — just far enough to shake out lightly managed positions.",donna:"The Kiss of Death is not optional. It's not sometimes. It's guaranteed. Every target. If you know it's coming, you stop getting shaken out by it."},
{icon:"📍",title:"Entry 5 — The Most Violent Move",body:"The Kiss of Death is also Entry 5 in the CRT entry sequence. It's the last entry before the final target — and it's the most violent, fastest-moving trade of all five entries. Price has already gone through E1, E2, E3, E4 — all of which have already been stopped out or have taken profits. E5 (the KoD) is for traders who understand the full picture and know the target is imminent.",donna:"If you got stopped out at the KoD — you weren't wrong about the trade. You just didn't size it right. The loss is information, not failure."},
{icon:"🛡️",title:"How to Survive the Kiss of Death",body:"After T1 (50% partial), your stop should be at breakeven. The KoD often reaches just above breakeven — stopping you out but with no actual loss. This is the 'free trade' outcome. If you haven't taken T1 yet when the KoD hits — that's the lesson. Always take T1. The system protects you from the KoD only when you followed the rules leading up to it.",donna:"Took T1? KoD kicks you out at breakeven. Didn't take T1? KoD kills the trade. The partial at 50% is the KoD insurance. Don't skip it."},
{icon:"🎭",title:"Using the KoD as Entry 5",body:"Advanced traders USE the Kiss of Death as a high-probability entry. If you've mapped the full CRT sequence — swept the low, Model 1 formed, partial taken, trade managed — and then price makes one final push against you, that's E5. The entry is the KoD wick rejection, the target is the full objective, and the stop is tight because the trade has significant confirmation behind it.",donna:"Entry 5 is only valid if you understand Entries 1 through 4 first. Don't try to use it before you understand the full sequence."}
],q:[
{q:"Your Gold trade is running toward $2,060. You're up $40 per ounce. Then price suddenly drops $15 back toward your entry. That sharp counter-move just before the target — This is most likely:",type:"mc",opts:["The trade is wrong — close it","A random pullback","The Kiss of Death — the final shakeout before the target","Normal volatility — hold"],a:2,exp:"The Kiss of Death always appears before the target. The sharp drop to your stop level is the final shakeout. If you took TP1 at 50%, you're at breakeven. If you didn't — this is why T1 exists."},
{q:"The Kiss of Death is:",type:"mc",opts:["A chart pattern","The last fake move before price reaches its final target","A type of Turtle Soup","A stop loss placement technique"],a:1,exp:"The Kiss of Death is the last fake move against your position before price reaches its final target. It's designed to shake out traders who entered correctly but managed incorrectly."},
{q:"You can avoid being stopped out by the Kiss of Death by:",type:"mc",opts:["Using a wider stop","Taking your TP1 partial at 50% and moving stop to breakeven","Avoiding volatile sessions","Closing the trade manually before the target"],a:1,exp:"Taking TP1 at 50% and moving stop to breakeven means the KoD kicks you out at breakeven — no loss. This is the system's built-in KoD protection. Always take T1."},
{q:"The Kiss of Death only happens on losing trades.",type:"tf",a:false,exp:"False. The Kiss of Death happens on winning trades — specifically before they hit the final target. It's the final test of your discipline. It shakes out traders who didn't follow the rules."},
{q:"Entry 5 (the KoD entry) is the best entry point for beginners because it's closest to the target.",type:"tf",a:false,exp:"False. E5 is for advanced traders who understand the full 5-entry sequence. Without understanding E1-E4 and the full CRT picture, attempting E5 is extremely dangerous."}
]},
18:{s:[
{icon:"🗝️",title:"The Gap Price Always Fills",body:"A Fair Value Gap (FVG) is a 3-candle imbalance where price moved so fast it left an untested area. Candle 1's high and Candle 3's low don't overlap — there's a gap between them. That gap acts like a magnet. Price almost always comes back to test it. Gold moves sharply from $1,990 up to $2,030 in a single candle — moving so fast it left the $2,000-$2,015 zone untested? Price will come back to fill it — usually within hours or days.",donna:"FVGs are magnets. Mark them. Price goes back. Not sometimes — almost always. Use them for targets and entries."},
{icon:"📐",title:"The 50% Rule for FVGs",body:"The critical level inside any FVG is its 50% midpoint. Price might enter the FVG from the top and only reach 50% before reversing — or it might fill the entire gap. But the 50% level is where the highest concentration of orders sits. For entries: watch for rejection at the 50% of an FVG. For targets: mark the 50% as your T1 inside FVG zones.",donna:"Mark the FVG. Then mark its 50%. That midpoint is where the action happens most of the time."},
{icon:"🔗",title:"OB + FVG = Maximum Confluence",body:"When an Order Block and a Fair Value Gap overlap at the same price level, that's maximum confluence. An Order Block with an FVG inside it on the Daily chart, during a Kill Zone, with HTF alignment — this is the setup you wait for. Gold at $1,995 where there's a Daily OB and a 4H FVG at the same level? That's not just a level, that's an invitation.",donna:"When everything lines up at the same level — OB, FVG, structural significance, Kill Zone — that's when you size up. That's the setup of setups."}
],q:[
{q:"Gold has a Fair Value Gap between $2,005 and $2,020 from three days ago — a zone price moved through too quickly and never properly tested. Price is now approaching from below. You should expect:",type:"mc",opts:["Price to ignore the FVG","Price to be rejected exactly at the bottom of the FVG","Price to be drawn into and through the FVG zone","Price to stop exactly at the top of the FVG"],a:2,exp:"FVGs act as magnets — price is drawn to fill them. Price will likely enter the FVG zone ($2,010-$2,010) and either fill partially (to the 50%) or completely fill the gap."},
{q:"Inside a Fair Value Gap, what is the most significant level?",type:"mc",opts:["The top of the FVG","The bottom of the FVG","The 50% midpoint","The level where the gap formed"],a:2,exp:"The 50% midpoint of the FVG is where the highest concentration of orders sits. It's the most common reversal point inside a FVG and the key level for entries and partial targets."},
{q:"An Order Block and Fair Value Gap at the same price level represents:",type:"mc",opts:["A weak zone — too many traders know about it","Maximum confluence — highest probability level","Two signals canceling each other out","Only valid on the 1H timeframe"],a:1,exp:"OB + FVG at the same level = maximum confluence. Two separate reasons for price to react at the same spot dramatically increases the probability of a reaction there."},
{q:"A Fair Value Gap will always be fully filled before price continues in its direction.",type:"tf",a:false,exp:"False. FVGs often fill to 50% and then reverse. They don't always fill completely. The 50% midpoint is the key level — price reaching it is considered the FVG doing its job."}
]},
19:{s:[
{icon:"📦",title:"Where Big Money Left Its Mark",body:"An Order Block (OB) is the last candle of the opposite color before a significant impulsive move. In an uptrend, the last bearish (red) candle before the big bullish move up = the Order Block. That's where Smart Money placed their positions. Price almost always comes back to test that area before continuing. Gold was at $1,980. Then a big bullish move happened — price shot from $1,980 to $2,040. The last bearish (red) candle just before that move started is your Order Block. That's where Smart Money first positioned themselves.",donna:"The Order Block is where Smart Money entered. They need price to come back there to add to positions. That's your entry — riding their second buy."},
{icon:"📐",title:"The 50% Rule for OBs",body:"Just like FVGs, the 50% level of an Order Block is the key entry point. The OB body (between open and close of that last opposite candle) defines the zone. The 50% midpoint is where you look for your entry, your limit orders, your Model 1 rejection. Higher timeframe OBs (Daily, 4H) carry significantly more weight than lower timeframe OBs.",donna:"Daily OB + Kill Zone + Model 1 rejection = one of the cleanest entries in CRT. Mark your HTF Order Blocks every week."},
{icon:"🔗",title:"Why Price Returns to Order Blocks",body:"Institutions can't fill massive position sizes in one moment without moving price against themselves. They fill in batches. The Order Block is where the first batch went in — when price returns, they add more. This is why OBs act as support and resistance with remarkable consistency. You're not trading a pattern; you're trading the mechanics of how large players have to operate.",donna:"You're not guessing at a level. You're following the footprint of where institutions HAVE to add to their positions. Different mindset entirely."}
],q:[
{q:"Before a major bullish move on Gold, the last bearish candle had a high of $2,000 and a close of $1,985. The Order Block zone is:",type:"mc",opts:["Only at $1,990","Only at $1,985","Between $1,985 and $1,990 (the candle's body)","Below $1,985"],a:2,exp:"The Order Block is the body of the last bearish candle before the bullish move — between its close ($1,985) and open ($1,990). The 50% of this zone is at $2,000 — your key entry level."},
{q:"Which Order Block carries more weight?",type:"mc",opts:["The most recent one","The Daily timeframe Order Block","The one that has been tested most times","The largest candle body"],a:1,exp:"Higher timeframe Order Blocks (Daily, 4H) carry more weight than lower timeframe OBs. A Daily OB represents larger institutional positioning and commands more significant price reactions."},
{q:"Price returning to an Order Block means the trade is invalidated.",type:"tf",a:false,exp:"False. Price returning to an Order Block is expected and is actually the entry point. OBs are exactly where you look to enter — when price pulls back to where Smart Money originally positioned."},
{q:"What makes Order Blocks consistently reliable as support and resistance levels?",type:"mc",opts:["Many retail traders know about them","Technical analysis tradition","Institutions add to their positions when price returns there","Chart pattern recognition"]
,a:2,exp:"OBs are reliable because institutions can't fill entire positions at once. They place initial orders, then add when price returns. That consistent institutional behavior is what makes OBs work — it's mechanics, not magic."}
]},
20:{s:[
{icon:"🔄",title:"When Support Becomes Resistance",body:"A Breaker Block is an Order Block that was broken — price moved through it, invalidating it as support. But here's the thing: that zone doesn't disappear. It flips. Old support at $1,990 that price breaks below = Breaker Block. Now when price comes back up to $1,990, it acts as resistance. The same zone, opposite role. And the reaction there is often the cleanest, lowest-drawdown entry in CRT.",donna:"Flip it. If it was support and price breaks below, it's now resistance. If it was resistance and price breaks above, it's now support. Mark the flip, wait for the return, enter on rejection."},
{icon:"📊",title:"Three Passes — The Most Balanced Level",body:"When price has passed through the same zone three times — once as support, broken through, once as resistance, broken through, then returns — that area is the most balanced location on the entire chart. Least drawdown. Most predictable reaction. Nasdaq at 17,000: tested as support, broke below, tested as resistance, broke above, returns to 17,000 — that's three passes. Highest probability zone.",donna:"Three passes through the same zone = the chart's most balanced level. Least drawdown entry of all five. This is Entry 3 in the sequence."},
{icon:"🔑",title:"Valid Flip vs Random Level",body:"Not every broken level becomes a valid Breaker Block. For a valid flip: the original move through the level must be decisive (a genuine break, not a wick), the zone must be clearly defined (a previous Order Block or structural level, not random price), and the return must happen within a reasonable timeframe (not months later). A vague break of a vague level is not a Breaker Block.",donna:"Quality over quantity. One valid Breaker Block setup a week is worth more than five questionable ones. Mark only the clean ones."}
],q:[
{q:"Imagine Gold had strong support at $2,000 for three weeks — every time it dropped there, buyers came back. Then last week, price broke convincingly below $2,000 and stayed there. Now price is coming back up toward $2,000. What is $1,995 now?",type:"mc",opts:["Still support — multi-week levels are strong","A Breaker Block — now acting as resistance","Neutral — broken levels lose significance","A target for a long trade"],a:1,exp:"Old support broken = Breaker Block = new resistance. The $1,995 zone flipped when price decisively broke below it. Now when price returns, you look for rejection and a short entry there."},
{q:"A Breaker Block is:",type:"mc",opts:["An Order Block that hasn't been tested yet","An Order Block that was broken and flipped its role","A failed Turtle Soup","A Fair Value Gap in reverse"],a:1,exp:"A Breaker Block is an Order Block that price broke through decisively, causing the zone to flip its role — support becomes resistance, resistance becomes support."},
{q:"The zone where price has passed through three times (both as support and resistance) is:",type:"mc",opts:["A weak zone — too much traffic","The most balanced location on the chart — lowest drawdown entry","A zone to avoid — too much noise","Only valid as a short entry"],a:1,exp:"Three passes through the same zone = the most balanced location on the chart. Both bulls and bears have been tested there. The third touch reaction typically has the lowest drawdown of any entry in the CRT sequence."},
{q:"Any broken level automatically becomes a valid Breaker Block.",type:"tf",a:false,exp:"False. A valid Breaker Block requires: a decisive break (not a wick), a clearly defined zone (previous OB or structural level), and a return within a reasonable timeframe. Not every broken level qualifies."}
]},
21:{s:[
