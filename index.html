{icon:"🛑",title:"Por Qué el Stop Nunca Se Mueve",body:"Mover tu stop alejándolo de la mecha del Model 1 — haciéndolo más amplio porque el precio se está acercando — es cómo las buenas operaciones se convierten en pérdidas devastadoras. Tu stop está colocado donde está porque ahí es donde el setup está invalidado. Si el precio llega a ese nivel, el setup está equivocado. Eso no es mala suerte — el mercado te está diciendo que la operación era incorrecta. Acéptalo. Regístralo. Sigue adelante.",donna:"Cada vez que moviste tu stop y salvó la operación — el mercado te enseñó la lección equivocada. Cada vez que lo moviste y dobló tu pérdida — esa fue la lección correcta."},
{icon:"💰",title:"El Parcial Obligatorio",body:"T1 al 50% no es una sugerencia. No es 'tómalo si el precio llega fácilmente.' Es obligatorio en cada operación. Por qué: el parcial al 50% financia tu trading. Incluso cuando T2 no llega, estás en verde. Incluso cuando el precio revierte después de T1, estás en equilibrio o ganaste. En 100 operaciones, siempre tomar T1 crea ganancias pequeñas consistentes que se componen en una ventaja real. Saltarse T1 'porque se ve fuerte' es cómo devuelves ganancias.",donna:"Siempre toma T1. Tu yo futuro te lo agradecerá. La única vez que te lo saltes porque 'se ve fuerte' será cuando revierta fuerte. Siempre toma T1."},
{icon:"📓",title:"El Diario Es La Ventaja Real",body:"La ventaja real en el trading no es un setup — son los datos. Tu diario te dice en qué sesiones pierdes más, qué estados emocionales precedieron tus peores operaciones, qué tipos de setup tienen la mayor tasa de éxito para ti específicamente. Donna puede ver patrones en tu diario que tú no puedes ver en el momento. ¿Operaciones FOMO a las 3PM después de una pérdida? Ese es un patrón. El diario lo detecta. Tú lo arreglas.",donna:"Tu diario es tu sesión de coaching. Cada semana, lee las últimas 10 entradas. Te garantizo que verás un patrón que te está costando dinero. Arregla ese patrón. Esa es la ventaja."}
],q:[
{q:"Tu stop está colocado correctamente por debajo de la mecha del Model 1. El precio se mueve contra ti y se acerca al stop. Tú:",type:"mc",opts:["Mueves el stop más amplio — dale más espacio","Cierras la operación manualmente — corta la pérdida","Deja que el stop haga su trabajo — no lo toques","Añades a la posición — promedia hacia abajo"],a:2,exp:"El stop está donde está porque ahí es donde el setup está invalidado. Moverlo es el hábito más peligroso en el trading. Deja que haga su trabajo. Si se activa — la operación estaba equivocada y limitaste tu pérdida. Correcto."},
{q:"Has estado usando un diario de trading por tres meses. El mejor uso de esos datos es:",type:"mc",opts:["Contar solo la tasa de éxito","Encontrar patrones en tus errores — sesión, emoción, tipo de setup — y eliminarlos sistemáticamente","Mostrarlo a otros traders","Eliminar operaciones perdedoras antiguas para enfocarte en ganadoras"],a:1,exp:"El poder del diario es el reconocimiento de patrones. ¿En qué sesiones pierdes más? ¿Qué estado emocional precede tus mayores pérdidas? ¿Qué tipos de setup funcionan para ti? Los datos te dicen qué arreglar específicamente."},
{q:"Tomaste T1 al 50%. El precio continúa hacia T2. Luego el Kiss of Death golpea y activa tu stop en punto de equilibrio. Este resultado es:",type:"mc",opts:["Una pérdida — la operación falló","Una ganancia — se tomó T1","Punto de equilibrio — resultado aceptable","Debería evitarse moviendo el stop alejado del punto de equilibrio"],a:2,exp:"Parado en punto de equilibrio después de T1 = operación en punto de equilibrio. Hiciste dinero en T1, lo devolviste en el stop, cero neto. Este es un resultado perfectamente aceptable y exactamente cómo el sistema está diseñado para funcionar."},
{q:"Mover tu stop más amplio cuando el precio se acerca a él es una técnica válida de gestión de riesgo.",type:"tf",a:false,exp:"Falso. Mover tu stop más amplio es lo opuesto de la gestión de riesgo — es expansión de riesgo. Tu stop fue colocado donde la operación está invalidada. Moverlo significa que ahora estás sosteniendo una operación invalidada con más riesgo. Así es como las pérdidas pequeñas se convierten en grandes."},
{q:"¿Cuál es el patrón de comportamiento principal que causa más pérdidas en los traders CRT?",type:"mc",opts:["Operar demasiados pares","Usar indicadores equivocados","Entrar sin criterios completos y mover stops — rompiendo las reglas de gestión","Operar en sesión asiática"],a:2,exp:"Las violaciones de reglas durante la gestión de la operación — entrar sin criterios completos, saltarse T1, mover stops — causan la mayoría de las pérdidas. Los setups frecuentemente son correctos. La gestión es lo que falla."}
]},
22:{s:[
{icon:"🏆",title:"El Patrón Universal",body:"Open. Nivel clave. Rompimiento falso. Movimiento real. Eso es cada movimiento de precio significativo en la historia en cualquier activo en cualquier marco temporal. Semanal, Diario, 4H, 1H — mismo patrón, diferentes velocidades. La carrera del Oro de $1,900 a $2,400 en 2024? Open, nivel clave en $2,000, rompimiento falso arriba, recolección, distribución real hacia arriba. S&P 500 cada mañana? Open, nivel clave, manipulación, movimiento real. El patrón nunca cambia.",donna:"Una vez que ves este patrón en todas partes, no puedes ignorarlo. Y dejas de operar el ruido y empiezas a operar el patrón. Ese es el cambio."},
{icon:"🔄",title:"Fractales — Cada Marco Temporal",body:"El patrón CRT es fractal. El patrón Semanal contiene el Diario. El Diario contiene el 4H. El 4H contiene el 1H. Cuando los tres marcos temporales principales están alineados en la misma fase AMD simultáneamente — Semanal en Distribución, Diario en Distribución, 4H en Distribución, 1H mostrando el Model 1 — esa es la operación de mayor probabilidad que jamás verás. Rara. Pero inolvidable.",donna:"La alineación de tres marcos temporales es el unicornio. Cuando la ves — dimensiona apropiadamente. Esas operaciones pagan por meses de pérdidas."},
{icon:"📊",title:"La Racha de 8 Pérdidas",body:"Aquí está la verdad que nadie te dice: cada trader rentable ha pasado por al menos una racha de 8 pérdidas consecutivas. Le llega a todos. Tu ventaja no desaparece — la varianza hace eso. La pregunta no es si pasa. La pregunta es si todavía estás en el juego cuando termina. Riesgo del 1-2% significa que una racha de 8 pérdidas es un drawdown del 16%. Recuperable. Al 5% de riesgo por operación, es un drawdown del 40%. Fin de carrera.",donna:"La racha de 8 pérdidas viene. No sé cuándo. Pero viene. El riesgo del 1-2% es lo que te mantiene en el juego cuando sucede."},
{icon:"📝",title:"La Documentación Separa a los Rentables",body:"La diferencia entre traders que eventualmente se vuelven rentables y traders que perpetuamente luchan es la documentación. Los traders rentables conocen su tasa de éxito, su R promedio, su mejor sesión, su peor patrón emocional. Los traders que luchan operan por instinto. Donna puede ayudarte a rastrear esto — pero tienes que registrar cada operación. Cada una. Sin excepciones. El atajo en el trading tiene un nombre: pérdidas.",donna:"El atajo tiene un nombre: pérdidas. Documenta todo. Revisa semanalmente. Ese es el sistema completo. Todo lo demás es un detalle."}
],q:[
{q:"El patrón CRT universal en todos los marcos temporales y activos es:",type:"mc",opts:["Arriba, consolidación, abajo, consolidación","Open, nivel clave, rompimiento falso, movimiento real","Acumulación, rompimiento, tendencia, reversión","Soporte, resistencia, rompimiento, pullback"],a:1,exp:"Open, nivel clave, rompimiento falso, movimiento real. Eso es cada movimiento de precio significativo en CRT. El mismo patrón en el 1H y en el Semanal. El mismo en Oro y en Nasdaq. El fractal nunca cambia."},
{q:"La alineación AMD de tres marcos temporales (Semanal, Diario, 4H todos en fase de Distribución) señala:",type:"mc",opts:["Evita la operación — demasiada confirmación es sospechoso","La operación de mayor probabilidad en CRT","Una ganancia garantizada","Probabilidad promedio — se necesitan señales adicionales"],a:1,exp:"La alineación de tres marcos temporales es el setup de mayor probabilidad en CRT. Cuando Semanal, Diario y 4H están todos en la misma fase apuntando en la misma dirección, la probabilidad de que el movimiento se complete está maximizada."},
{q:"Un trader que arriesga 5% por operación pasa por una racha de 8 pérdidas. Su drawdown es aproximadamente:",type:"mc",opts:["8%","24%","40%","60%"],a:2,exp:"8 pérdidas consecutivas al 5% de riesgo = aproximadamente 40% de drawdown. Al 1-2% de riesgo, la misma racha de 8 pérdidas es 8-16% — recuperable. Un drawdown del 40% es devastador psicológica y financieramente para la mayoría de los traders."},
{q:"El atajo para volverse rentable en el trading es:",type:"mc",opts:["Encontrar los indicadores correctos","Mejorar las entradas","Las pérdidas — son el costo inevitable del aprendizaje real","Operar marcos temporales superiores únicamente"],a:2,exp:"El atajo en el trading tiene un nombre: pérdidas. Aprendes más de tus operaciones perdedoras — si las documentas. Los traders rentables no encontraron un atajo. Pagaron la matrícula en pérdidas y documentaron lo que las pérdidas les enseñaron."},
{q:"Has completado los 22 capítulos de la Academia CRT CHRONOS. Ahora estás listo para:",type:"mc",opts:["Operar con tamaño completo inmediatamente","Empezar con trading demo, registrar cada operación, revisar con Donna semanalmente","No perder nunca más — conoces el sistema completo","Dejar de aprender — el sistema está completo"],a:1,exp:"Completar la academia significa que entiendes el marco. Ahora el trabajo real comienza: trading demo, registrando cada operación, revisando con Donna, identificando tus patrones personales. El conocimiento sin práctica no es una ventaja."}
]}

  {id:0,icon:"🎯",title:"Start Here",title_es:"Empezar Aquí",sub:"What is trading and how does it work.",sub_es:"Qué es el trading y cómo funciona.",level:1,static:true,
  slides_en:[
    {icon:"💡",title:"What is trading?",body:"Trading means buying and selling things that change in price — like currencies, gold, stocks, or crypto. The best part? You can make money whether the price goes UP or DOWN. Most people don't know that. You're not stuck waiting for something to rise.",donna:"Up or down — doesn't matter. If you know which way it's going, there's money in it."},
    {icon:"💰",title:"You don't need your own money",body:"Most people think you need thousands of dollars to start trading. That's not true. Funded trading accounts let companies give you real money to trade with — you keep a percentage of the profits. You prove you can trade, they fund you. That's how most serious traders operate.",donna:"No capital? Not an excuse anymore. The industry literally gives you money if you can prove you know what you're doing."},
    {icon:"🗺️",title:"What happens next",body:"Donna is going to teach you everything from scratch. How to read a chart. How price actually moves. How to make decisions without gambling. It's going to take time — that's normal. Go through each chapter in order and don't skip anything. Every chapter builds on the last one.",donna:"You're at the beginning of something real. Take it one chapter at a time. I'll be here the whole way."}
  ],
  slides_es:[
    {icon:"💡",title:"¿Qué es el trading?",body:"El trading significa comprar y vender cosas que cambian de precio — como divisas, oro, acciones o cripto. Lo mejor? Puedes ganar dinero tanto cuando el precio SUBE como cuando BAJA. La mayoría de la gente no sabe eso. No estás atascado esperando que algo suba.",donna:"Arriba o abajo — no importa. Si sabes hacia dónde va, hay dinero en eso."},
    {icon:"💰",title:"No necesitas tu propio dinero",body:"La mayoría de la gente cree que necesita miles de dólares para empezar a hacer trading. Eso no es verdad. Las cuentas fondeadas permiten que las empresas te den dinero real para operar — tú te quedas un porcentaje de las ganancias. Demuestras que sabes operar, ellos te fondean. Así es como operan la mayoría de los traders serios.",donna:"¿Sin capital? Ya no es una excusa. La industria literalmente te da dinero si puedes demostrar que sabes lo que haces."},
    {icon:"🗺️",title:"Qué pasa ahora",body:"Donna te va a enseñar todo desde cero. Cómo leer un gráfico. Cómo se mueve el precio de verdad. Cómo tomar decisiones sin apostar. Va a tomar tiempo — eso es normal. Ve cada capítulo en orden y no te saltes nada. Cada capítulo construye sobre el anterior.",donna:"Estás al principio de algo real. Ve un capítulo a la vez. Voy a estar aquí en todo momento."}

    {q:"Can you make money in trading when the price of something goes DOWN?",type:"tf",a:true,exp:"Yes! This is called going short or short-selling. In trading, you can profit from price moving in either direction — up or down. This is one of the biggest advantages over traditional investing."},
    {q:"To start trading seriously, you always need to use your own money.",type:"tf",a:false,exp:"False. Funded trading accounts exist specifically for this. Companies give traders real capital to trade with, and you keep a percentage of the profits. Many professional traders never use their own money."},
    {q:"What is Donna here to do?",type:"mc",opts:["Tell you exactly which trades to take","Teach you how markets work and keep you accountable","Manage your trading account","Predict where price is going"],a:1,exp:"Donna is your coach and accountability partner. She teaches you how to read price and make your own decisions — she never tells you what to trade."}

    {q:"Para empezar a hacer trading en serio, siempre necesitas usar tu propio dinero.",type:"tf",a:false,exp:"Falso. Las cuentas fondeadas existen exactamente para esto. Las empresas dan a los traders capital real para operar, y tú te quedas un porcentaje de las ganancias. Muchos traders profesionales nunca usan su propio dinero."},

  {id:1,icon:"🕯️",title:"Reading Candles",sub:"What every candle is actually telling you.",level:1,desc:"The four parts of a candlestick (OHLC), body vs wick, why the CLOSE is the single most important data point. Closes reveal intention. Wicks reveal deception. A wick above a high that closes inside = failed attempt = bearish. A close above a high = commitment = bullish. Include specific price examples with real numbers."},
  {id:2,icon:"📊",title:"Market States",sub:"First question every time you open a chart.",level:1,desc:"Three market states: trending (clear direction), ranging (bouncing between two levels), no structure (no trade). How to identify each. The devastating mistake of applying trending strategy in a ranging market. The no-man\'s-land concept — never trade the middle of a range."},
  {id:3,icon:"🔭",title:"The Three Timeframes",sub:"HTF · ITF · LTF — one purpose each.",level:2,desc:"Higher TF tells you WHY price should move. Intermediate confirms the CRT is happening. Lower gives the WHEN and WHERE. What breaks when one is missing. Daily→4H→1H example. A Model 1 without an HTF reason is just a candle."},
  {id:4,icon:"🌊",title:"Who Moves Price",sub:"Smart Money vs Retail — the invisible hand.",level:2,desc:"Large participants use predictable retail behavior as fuel. Retail was taught to buy breakouts above highs — large players know exactly where those orders are. Dumb Money buys above highs; Smart Money sells to them. Include the buy stop / sell stop accumulation concept."},
  {id:5,icon:"💧",title:"Why Price Moves",sub:"Two reasons. Only two. Every move in history.",level:2,desc:"Price moves to reach liquidity (stacked orders at old highs and lows) or to fill an imbalance. The ERL/IRL cycle. Buy stops above highs, sell stops below lows. Old highs that formed after sweeping a low matter most."},
  {id:6,icon:"🗺️",title:"Knowing Your Target",sub:"Always know where before you look for how.",level:2,desc:"Why you must identify the target BEFORE looking for an entry. External liquidity (old highs/lows) vs Internal liquidity (imbalances along the way). Without a target, there is no trade."},
  {id:7,icon:"🐢",title:"The Fake Breakout",sub:"The engine behind every big move.",level:3,desc:"The fake breakout precedes every major move. Price pushes above an old high, triggers buy stops, collects liquidity, then reverses. Three types: continuation, range, reversal. Rule 1: never buy above old high, never sell below old low. Reversal type at HTF key level = highest quality."},
  {id:8,icon:"📅",title:"The 3-Candle Sequence",sub:"Accumulation · Manipulation · Distribution.",level:3,desc:"Every price move follows AMD: C1 accumulates the range, C2 performs the fake breakout (never trade this candle), C3 is the real move. Weekly: Monday=accumulation, Tuesday=manipulation and real high/low, Wednesday-Thursday=distribution."},
  {id:9,icon:"👁️",title:"Reading Bias",sub:"Closes reveal. Wicks deceive.",level:1,desc:"How to read daily bias from candle closes. Bullish trades only below the daily open. Bearish trades only above the daily open. Prior daily closed above old high = bullish bias. Wicked above but closed inside = bearish bias. This one filter eliminates most bad trades."},
  {id:10,icon:"⏰",title:"Trading Sessions",sub:"When matters more than where.",level:2,desc:"Three Kill Zones: Asia 8PM-12AM NY (Gold, JPY), London 2-5AM NY (EUR/USD, GBP), NY Open 7-11AM (Indices, Crypto, USD). NYSE opens 9:30AM = biggest liquidity injection. A perfect level at 3AM Saturday has different probability than the same level during Tuesday London Kill Zone."},
  {id:11,icon:"🎯",title:"The Entry Candle",sub:"One candle. One rule. One trigger.",level:3,desc:"The Model 1 entry: one thick decisive candle that nails a structural level and closes back inside. Three requirements: thick, real structural level, Kill Zone timing. The close is the trigger — never the wick. Stop above/below the wick (fixed, never moved). T1=50% mandatory first, T2=opposite end."},
  {id:12,icon:"💀",title:"The Final Trap",sub:"It happens before every target. Every time.",level:3,desc:"The Kiss of Death: the last fake move right before price reaches its target. Always happens — guaranteed. Designed to shake out traders who entered correctly. Why it\'s Entry 5 and the most violent move. If you\'re stopped out by the KoD, you didn\'t lose — you just didn\'t size it right."},
  {id:13,icon:"🗝️",title:"Price Imbalances",sub:"The gap price always comes back to fill.",level:2,desc:"Fair Value Gaps: 3-candle imbalances where price moved too fast and left a gap. Acts as a magnet. The 50% rule. High-probability FVGs are backed by structural events. OB+FVG at same level = maximum confluence."},
  {id:14,icon:"📦",title:"Order Blocks",sub:"Where big money left its footprint.",level:2,desc:"The last candle of the opposite color before a major move = Order Block. In a bullish market, the last bearish candle before the impulse up = support. The 50% rule. Higher TF Order Blocks carry more weight."},
  {id:15,icon:"🔄",title:"Flipped Levels",sub:"Old support becomes resistance — and vice versa.",level:2,desc:"Breaker Blocks: Order Blocks that were broken and flipped. Three price passes through same area = most balanced location on chart. Least drawdown of all entries. Same event as the true Change of Character."},
  {id:16,icon:"🔢",title:"Five Entry Points",sub:"The full sequence. Never go backward.",level:3,desc:"E1: Turtle Soup wick (live, hardest, highest reward). E2: Model 1 close (standard entry). E3: Breaker Block (least drawdown). E4: OTE 60-75% retrace (KoD often traps here). E5: Kiss of Death (most violent, most certain). Never go backward — if E3 formed, only E5 remains."},
  {id:17,icon:"🔗",title:"Correlated Markets",sub:"When one market tells on another.",level:2,desc:"SMT divergence: correlated assets not confirming each other. EUR/USD vs DXY (inverse). BTC vs ETH (direct). S&P vs NASDAQ (direct). One takes a high the other doesn\'t = fake move in the one that took it. Never trade SMT alone — combine with Model 1 at structural level."},
  {id:18,icon:"⚠️",title:"Real vs Fake Breakouts",sub:"The trap that destroys the most accounts.",level:3,desc:"False Change of Character looks perfect — that\'s the point. Real CoC: violent purge of stops + decisive close through the level. False CoC: textbook-perfect setup designed to trap informed traders. Verification: key HTF level + Kill Zone + correlated market confirmation."},
  {id:19,icon:"📈",title:"Trading Ranges",sub:"Rules, targets, and the fake breakout rule.",level:2,desc:"Buy at range low, sell at range high, never the middle. The first breakout is almost always fake — wait for the fake to confirm direction. Range = accumulation for the next big move. What defines a valid range vs no structure noise."},
  {id:20,icon:"🏗️",title:"Building a Trade",sub:"Top-down always. Entry is the last step.",level:3,desc:"The complete top-down process: week of month → HTF narrative → daily open position → liquidity target → Kill Zone → structural level → entry candle. Entry is ALWAYS last. Four things to know before pressing the button: stop level, 50% target, full target, risk percentage."},
  {id:21,icon:"⚡",title:"Managing the Trade",sub:"From button to exit — behavior is everything.",level:3,desc:"Two valid entry types only (Model 1 close and true CoC). Why the stop never moves. Managing through the failure swing and the Kiss of Death. The mandatory 50% partial and why it\'s sacred. The behavioral patterns that cause losses: early exits, moving stops, FOMO entries."},
  {id:22,icon:"🏆",title:"The Complete System",sub:"Put it all together. This is your process.",level:3,desc:"The universal pattern: Open. Key Level. Fake breakout. Real move. The fractal nature — same logic at every timeframe. The 1-2% risk rule. The 8-loss streak that comes for everyone. Why documentation separates profitable traders."},

const timeAgo=(ts)=>{
  const m=Math.floor((Date.now()-ts)/60000);
  if(m<60)return`${m}m`;
  const h=Math.floor(m/60);
  if(h<24)return`${h}h`;
  return`${Math.floor(h/24)}d`;
};

const getStats=(trades)=>{
  const closed=trades.filter(t=>t.status==="closed");
  const wins=closed.filter(t=>t.result==="win").length;
  const losses=closed.filter(t=>t.result==="loss").length;
  return{total:closed.length,wins,losses,winRate:closed.length>0?Math.round(wins/closed.length*100):0};
};

async function generateLesson(chapter, lang){
  // Static content — instant, always works
  const _SL=window.SL||{};
  const langData = _SL[lang] || _SL['en'] || {};
  const chData = langData[chapter.id] || (_SL['en']||{})[chapter.id];
  if(chData){
    // Normalize keys for rendering
    const slides = chData.s.map(s=>({icon:s.icon,title:s.title,body:s.body,donna:s.donna}));
    const quiz = chData.q.map(q=>({q:q.q,type:q.type,opts:q.opts,a:q.a,exp:q.exp}));
    return {slides,quiz};
  }
  // Fallback: this chapter doesn't have static content yet
  return {
    slides:[{icon:"🚧",title:"Coming Soon",body:"This chapter is being prepared. Check back soon!",donna:"Good things take time. Go review the previous chapters while you wait."}],
    quiz:[{q:"The academy chapters are added progressively.",type:"tf",a:true,exp:"True. Chapters are released as they're refined and ready."}]
  };
}

function VoiceButton({onResult,lang}){
  const [listening,setListening]=useState(false);
  const recRef=useRef(null);
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  const toggle=()=>{
    if(listening){recRef.current?.stop();setListening(false);return;}
    try{
      const r=new SR();
      r.lang=lang==="es"?"es-ES":"en-US";
      r.continuous=false;r.interimResults=false;
      r.onresult=(e)=>{const txt=e.results[0][0].transcript;onResult(txt);};
      r.onend=()=>setListening(false);
      r.onerror=(ev)=>{
      setListening(false);
      const msg={
        "not-allowed":lang==="es"?"Permiso de micrófono denegado. Actívalo en la configuración del navegador.":"Mic permission denied. Enable it in browser settings.",
        "no-speech":lang==="es"?"No se detectó voz. Inténtalo de nuevo.":"No speech detected. Try again.",
        "network":lang==="es"?"Error de red con el micrófono.":"Network error with mic.",
      }[ev.error]||(lang==="es"?"Micrófono no disponible.":"Mic unavailable.");
      showNotif(msg);
    };
      recRef.current=r;r.start();setListening(true);
    }catch(e){setListening(false);showNotif(lang==="es"?"El micrófono no está disponible en este navegador. Prueba Chrome o Safari.":"Mic not available in this browser. Try Chrome or Safari.");}
  };
  return(
    <button onClick={toggle} style={{width:36,height:36,borderRadius:"50%",background:listening?RED:DARK2,border:"none",cursor:"pointer",fontSize:17,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:"#fff",transition:"background .2s",animation:listening?"pulseMic 1s ease-in-out infinite":"none"}}>
      🎤
    </button>
  );
}

  return(
    <div style={{padding:"4px 14px 8px",display:"flex",gap:8,overflowX:"auto",flexShrink:0,WebkitOverflowScrolling:"touch"}}>
      {pills.map(p=>(
        <button key={p} onClick={()=>{Sounds.tap();onTap(p);}}
          style={{padding:"9px 16px",borderRadius:22,whiteSpace:"nowrap",background:`${BLUE}18`,border:`1.5px solid ${BLUE}55`,color:BLUE,fontSize:14,fontWeight:600,cursor:"pointer",flexShrink:0,letterSpacing:.2}}>
          {p}
        </button>
      ))}
    </div>
  );
}

                <div style={{flex:1}}>

        <div style={{padding:"14px 20px 28px",display:"flex",flexDirection:"column",gap:10}}>

/* ═══════════════════════════════════
   TRADE LOG MODAL
═══════════════════════════════════ */
function TradeLogModal({lang,mode,activeTrade,onSave,onClose}){
  const t=T[lang];
  const isClose=mode==="close"&&activeTrade;
  const [step,setStep]=useState(0);
  const [data,setData]=useState(isClose?{...activeTrade}:{});
  const [textVal,setTextVal]=useState("");

  const openSteps=[
    {key:"asset",label:t.tradeAsset,type:"text",ph:lang==="es"?"Ej: Gold, EUR/USD, NQ":"e.g. Gold, EUR/USD, NQ"},
    {key:"direction",label:t.tradeDirection,type:"pills",opts:lang==="es"?["📈 Alcista","📉 Bajista"]:["📈 Bullish","📉 Bearish"]},
    {key:"killZone",label:t.tradeKZ,type:"pills",opts:lang==="es"?["🌅 Londres","🗽 NY Open","🌆 NY PM","⏰ Sin KZ"]:["🌅 London","🗽 NY Open","🌆 NY PM","⏰ No KZ"]},
    {key:"emotion",label:t.tradeEmotion,type:"pills",opts:lang==="es"?["😌 Calmado","💪 Confiado","😰 Ansioso","😤 FOMO"]:["😌 Calm","💪 Confident","😰 Anxious","😤 FOMO"]},
    {key:"reason",label:t.tradeReason,type:"text",ph:lang==="es"?"Estructura + sesgo HTF...":"Structure + HTF bias..."},
    {key:"risk",label:t.tradeRisk,type:"pills",opts:["1%","1.5%","2%"]},
  ];
  const closeSteps=[
    {key:"result",label:t.tradeResult,type:"pills",opts:lang==="es"?["✅ Ganada","❌ Pérdida","➡️ Empate"]:["✅ Win","❌ Loss","➡️ Break Even"]},
    {key:"rMultiple",label:t.tradeR,type:"text",ph:"e.g. 2.5R"},
    {key:"didRight",label:t.tradeDoneRight,type:"text",ph:lang==="es"?"Seguí el plan...":"Followed the plan..."},
    {key:"wouldChange",label:t.tradeWouldChange,type:"text",ph:lang==="es"?"Esperar la KZ...":"Wait for KZ..."},
  ];
  const steps=isClose?closeSteps:openSteps;
  const cur=steps[step];
  if(!cur)return null;

  const next=(val)=>{
    const nd={...data,[cur.key]:val};
    setData(nd);setTextVal("");
    if(step<steps.length-1){setStep(step+1);}
    else{
      const trade={
        ...nd,
        id:activeTrade?.id||Date.now(),
        status:isClose?"closed":"open",
        openedAt:activeTrade?.openedAt||Date.now(),
        closedAt:isClose?Date.now():undefined,
      };
      onSave(trade);
    }
  };

  return(
    <div style={{position:"absolute",inset:0,zIndex:992,background:"rgba(0,0,0,.78)",display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
      <div className="slide-up-panel" style={{background:"#111",borderRadius:"22px 22px 0 0",padding:"0 0 24px"}}>
        <div style={{display:"flex",justifyContent:"center",padding:"12px 0 4px"}}>
          <div style={{width:36,height:4,borderRadius:2,background:DARK2}}/>
        </div>
        <div style={{padding:"8px 20px 16px",borderBottom:`1px solid ${DARK}`,display:"flex",alignItems:"center",gap:10}}>
          <DAvatar size={32}/>
          <div>
            <div style={{fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:15}}>{isClose?t.tradeClose:t.journalLog}</div>
            <div style={{fontSize:12,color:MUTED}}>{step+1} / {steps.length}</div>
          </div>
          <div style={{marginLeft:"auto",display:"flex",gap:4}}>
            {steps.map((_,i)=><div key={i} style={{width:20,height:3,borderRadius:2,background:i<=step?RED:DARK2,transition:"background .2s"}}/>)}
          </div>
        </div>
        <div style={{padding:"20px 20px 8px"}}>
          <div style={{fontSize:16,fontWeight:700,color:"#fff",marginBottom:16}}>{cur.label}</div>
          {cur.type==="pills"?(
            <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
              {cur.opts.map(o=>(
                <button key={o} onClick={()=>next(o)}
                  style={{padding:"12px 18px",borderRadius:14,background:`${BLUE}18`,border:`1.5px solid ${BLUE}55`,color:BLUE,fontSize:15,fontWeight:600,cursor:"pointer"}}>
                  {o}
                </button>
              ))}
            </div>
          ):(
            <div style={{display:"flex",gap:10}}>
              <input autoFocus value={textVal} onChange={e=>setTextVal(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&textVal.trim()&&next(textVal.trim())}
                placeholder={cur.ph||""}
                style={{flex:1,padding:"13px 16px",borderRadius:12,background:DARK,border:`1.5px solid ${DARK2}`,color:"#fff",fontSize:15,outline:"none"}}/>
              <button onClick={()=>textVal.trim()&&next(textVal.trim())}
                style={{padding:"13px 20px",borderRadius:12,background:RED,border:"none",cursor:"pointer",fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:14,color:"#fff"}}>
                {lang==="es"?"Sigue":"Next"}
              </button>
            </div>
          )}
        </div>
        <button onClick={onClose} style={{display:"block",margin:"12px auto 0",background:"none",border:"none",cursor:"pointer",fontSize:13,color:MUTED,padding:"4px 16px"}}>
          {lang==="es"?"Cancelar":"Cancel"}
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════
   JOURNAL SCREEN

function JournalScreen({trades,lang,activeTrade,onClose,onOpen}){
  const t=T[lang];
  const stats=getStats(trades);
  const sorted=[...trades].sort((a,b)=>b.id-a.id);
  const resultColor=(r)=>r==="win"?GREEN:r==="loss"?RED:MUTED;
  const resultLabel=(r,l)=>{
    if(l==="es")return r==="win"?"✅ Ganada":r==="loss"?"❌ Pérdida":r==="be"?"➡️ Empate":"🔵 Abierta";
    return r==="win"?"✅ Win":r==="loss"?"❌ Loss":r==="be"?"➡️ Break Even":"🔵 Open";
  };
  return(
    <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",background:"#000",minHeight:0}}>
      <div style={{padding:"16px 16px 12px",borderBottom:`1px solid ${DARK}`}}>
        <div style={{fontFamily:"'Sora',sans-serif",fontWeight:900,fontSize:20,marginBottom:12}}>{lang==="es"?"📓 Diario de Operaciones":"📓 Trade Journal"}</div>
        {stats.total>0?(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            {[[lang==="es"?"Total":"Total",stats.total,"🔢"],[lang==="es"?"Ganadas %":"Win Rate",stats.winRate+"%","📈"],[lang==="es"?"G / P":"W / L",`${stats.wins}/${stats.losses}`,"⚖️"]].map(([lb,v,ic])=>(
              <div key={lb} style={{background:"#111",borderRadius:12,padding:"10px 12px",textAlign:"center"}}>
                <div style={{fontSize:18,marginBottom:4}}>{ic}</div>
                <div style={{fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:18}}>{v}</div>
                <div style={{fontSize:11,color:MUTED}}>{lb}</div>
              </div>
            ))}
          </div>
        ):(
          <div style={{textAlign:"center",padding:"24px 0",color:MUTED,fontSize:14}}>{t.journalEmpty}</div>
        )}
      </div>
      {activeTrade&&(
        <div onClick={()=>onOpen("close")} style={{margin:"16px 16px 0",padding:"14px 16px",background:`${GOLD}12`,border:`1.5px solid ${GOLD}55`,borderRadius:16,display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
          <div style={{fontSize:24}}>🔵</div>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:14,color:GOLD}}>{t.activeTrade}</div>
            <div style={{fontSize:13,color:"#fff",marginTop:2}}>{activeTrade.asset} · {activeTrade.direction} · {activeTrade.killZone}</div>
            <div style={{fontSize:12,color:MUTED,marginTop:1}}>{lang==="es"?"Abierta hace":"Open for"} {timeAgo(activeTrade.openedAt)}</div>
          </div>
          <div style={{background:GOLD,borderRadius:10,padding:"6px 12px",fontSize:12,fontWeight:700,color:"#000"}}>{t.tradeClose}</div>
        </div>
      )}
      <div style={{padding:"16px 16px 60px"}}>
        {sorted.map(trade=>(
          <div key={trade.id} style={{marginBottom:12,background:"#111",borderRadius:16,overflow:"hidden",border:`1px solid ${trade.status==="open"?GOLD:resultColor(trade.result)}22`}}>
            <div style={{padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:44,height:44,borderRadius:12,background:`${trade.status==="open"?GOLD:resultColor(trade.result)}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>
                {trade.direction?.includes("Bull")||trade.direction?.includes("Alcista")?"📈":"📉"}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:14}}>{trade.asset}</div>
                <div style={{fontSize:12,color:MUTED,marginTop:2}}>{trade.killZone} · {new Date(trade.id).toLocaleDateString()}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:13,fontWeight:700,color:trade.status==="open"?GOLD:resultColor(trade.result)}}>{resultLabel(trade.status==="open"?"open":trade.result,lang)}</div>
                {trade.rMultiple&&<div style={{fontSize:12,color:MUTED,marginTop:2}}>{trade.rMultiple}</div>}
              </div>
            </div>
            {trade.donnaReview&&(
              <div style={{padding:"10px 16px 14px",borderTop:`1px solid ${DARK}`,display:"flex",gap:8,alignItems:"flex-start"}}>
                <DAvatar size={22}/>
                <div style={{fontSize:13,color:"#D1D1D6",lineHeight:1.55,flex:1}}>{trade.donnaReview}</div>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════
   LESSON MODAL
═══════════════════════════════════ */
function LessonModal({chapter,lang,onClose,onComplete}){
  const t=T[lang];
  const[data,setData]=useState(null);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState(false);
  const[phase,setPhase]=useState("slides");
  const[si,setSi]=useState(0);
  const[qi,setQi]=useState(0);
  const[ans,setAns]=useState(null);
  const[ok,setOk]=useState(null);
  const[score,setScore]=useState(0);
  const[ak,setAk]=useState(0);
  const cfg=COMPLEXITY[chapter.level]||COMPLEXITY[1];

  const load=useCallback(async()=>{
    if(chapter.static){
      const slides=(lang==="es")
        ?(chapter.slides_es||chapter.slides_en||chapter.slides||[])
        :(chapter.slides_en||chapter.slides||[]);
      const quiz=(lang==="es")
        ?(chapter.quiz_es||chapter.quiz_en||chapter.quiz||[])
        :(chapter.quiz_en||chapter.quiz||[]);
      setData({slides,quiz});
      setLoading(false);return;
    }
    setLoading(true);setError(false);
    try{const d=await generateLesson(chapter,lang);setData(d);}
    catch(e){setError(true);}
    setLoading(false);
  },[chapter,lang]);

  useEffect(()=>{load();},[load]);

  const slides=data?.slides||[],quiz=data?.quiz||[];
  const total=slides.length+quiz.length;
  const cur=phase==="slides"?si:slides.length+qi;
  const prog=total>0?cur/total*100:0;
  const slide=slides[si],q=quiz[qi];
  const confetti=Array.from({length:12},(_,i)=>({x:Math.random()*100,c:[RED,GREEN,GOLD,"#A78BFA","#06B6D4"][i%5],d:Math.random()*.8,s:6+Math.random()*8}));

  const handleAnswer=(a)=>{
    if(ans!==null)return;
    const c=a===q.a;setAns(a);setOk(c);
    if(c){Sounds.correct();setScore(s=>s+1);}else Sounds.wrong();
  };

  const goNext=()=>{
    setAk(k=>k+1);
    if(phase==="slides"){
      if(si<slides.length-1)setSi(i=>i+1);
      else{setPhase("quiz");setQi(0);setAns(null);setOk(null);}
    }else if(qi<quiz.length-1){setQi(i=>i+1);setAns(null);setOk(null);}
    else{setPhase("done");Sounds.complete();}
  };

  return(
    <div style={{position:"absolute",inset:0,zIndex:995,background:"#000",display:"flex",flexDirection:"column"}} className="slide-in">
      <div style={{padding:"12px 16px 10px",display:"flex",alignItems:"center",gap:12,borderBottom:`1px solid ${DARK}`,flexShrink:0}}>
        <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:MUTED,fontSize:22,lineHeight:1}}>✕</button>
        <div style={{flex:1,height:7,background:DARK2,borderRadius:4,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${prog}%`,background:cfg.color||RED,borderRadius:4,transition:"width .4s"}}/>
        </div>
        {!loading&&!error&&<span style={{fontSize:12,color:MUTED,fontWeight:600}}>{phase==="slides"?`${si+1}/${slides.length}`:`Q${qi+1}/${quiz.length}`}</span>}
      </div>
      <div style={{background:`${cfg.color||RED}11`,borderBottom:`1px solid ${cfg.color||RED}22`,padding:"6px 16px",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
        <span style={{fontSize:16}}>{chapter.icon}</span>
        <span style={{fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:13}}>{chapter.title}</span>
        <span style={{marginLeft:"auto",fontSize:11,color:MUTED,background:DARK,padding:"2px 8px",borderRadius:10}}>{cfg.emoji} {cfg.label} · {cfg.slides}s · {cfg.minQ}Q</span>
      </div>
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:16,minHeight:0}}>
        {loading&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:16}}>
            <DAvatar size={52} online/>
            <div style={{fontSize:14,color:MUTED,textAlign:"center"}}>{lang==="es"?"Preparando tu lección...":"Building your lesson..."}</div>
            <div style={{display:"flex",gap:6}}>{[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:RED,animation:`dot 1.2s ease-in-out ${i*.2}s infinite`}}/>)}</div>
          </div>
        )}
        {error&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:16}}>
            <div style={{fontSize:40}}>⚠️</div>
            <div style={{fontSize:14,color:MUTED,textAlign:"center"}}>{lang==="es"?"No se pudo cargar. Comprueba que la API esté configurada.":"Couldn't load lesson. Make sure the API is configured."}</div>
            <button onClick={load} style={{padding:"12px 24px",borderRadius:12,background:RED,border:"none",cursor:"pointer",fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:14,color:"#fff"}}>Retry</button>
          </div>
        )}
        {!loading&&!error&&data&&(
          <div key={ak} className="fade-up">
            {phase==="slides"&&slide&&(
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                <div style={{display:"flex",alignItems:"flex-end",gap:10}}>
                  <DAvatar size={46} online/>
                  <div style={{background:DARK,border:`1px solid ${DARK2}`,borderRadius:"18px 18px 18px 4px",padding:"12px 14px",flex:1,fontSize:14,lineHeight:1.65,color:"#D1D1D6"}}>{slide.donna||slide.d}</div>
                </div>
                <div style={{background:"#111",border:`1px solid ${DARK2}`,borderRadius:20,padding:22}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                    <span style={{fontSize:28}}>{slide.icon}</span>
                    <h3 style={{fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:18,color:"#fff"}}>{slide.title||slide.t}</h3>
                  </div>
                  <p style={{fontSize:15,color:"#D1D1D6",lineHeight:1.7}}>{slide.body||slide.b}</p>
                </div>
              </div>
            )}
            {phase==="quiz"&&q&&(
              <div style={{display:"flex",flexDirection:"column",gap:14}} className={ans!==null?(ok?"correct-flash":"wrong-shake"):""}>
                <div style={{background:"#111",borderRadius:16,padding:16,border:`1px solid ${DARK2}`}}>
                  <div style={{fontSize:10,fontWeight:700,color:RED,letterSpacing:2.5,marginBottom:10}}>{t.quizTitle}</div>
                  <p style={{fontSize:15,fontWeight:600,lineHeight:1.6,color:"#fff"}}>{q.q}</p>
                </div>
                {q.type==="tf"?(
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    {[{val:true,label:"TRUE",c:GREEN},{val:false,label:"FALSE",c:RED}].map(opt=>{
                      const sel=ans===opt.val,ir=opt.val===q.a;
                      return(
                        <button key={String(opt.val)} onClick={()=>handleAnswer(opt.val)}
                          style={{padding:"20px 12px",borderRadius:16,background:ans!==null?(ir?"rgba(48,209,88,.14)":sel?"rgba(232,37,60,.14)":"transparent"):"transparent",border:`2px solid ${ans!==null?(ir?GREEN:sel?RED:DARK2):DARK2}`,cursor:ans!==null?"default":"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
                          <div style={{width:44,height:44,borderRadius:13,background:ans!==null?(ir?GREEN:sel?RED:DARK2):DARK2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>
                            {ans!==null&&ir?"✓":ans===opt.val&&!ir?"✗":opt.val?"✓":"✗"}
                          </div>
                          <span style={{fontFamily:"'Sora',sans-serif",fontWeight:900,fontSize:18,color:ans!==null?(ir?GREEN:sel?RED:"#fff"):opt.c}}>{opt.label}</span>
                        </button>
                      );
                    })}
                  </div>
                ):(
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    {(q.opts||[]).map((opt,i)=>{
                      const sel=ans===i,ir=i===q.a;
                      return(
                        <button key={i} onClick={()=>handleAnswer(i)}
                          style={{padding:"13px 15px",borderRadius:14,background:ans!==null?(ir?"rgba(48,209,88,.13)":sel?"rgba(232,37,60,.13)":"transparent"):"transparent",border:`2px solid ${ans!==null?(ir?GREEN:sel?RED:DARK2):DARK2}`,cursor:ans!==null?"default":"pointer",display:"flex",alignItems:"center",gap:12,textAlign:"left",opacity:ans!==null&&!ir&&!sel?.4:1}}>

/* ── SMART PILLS based on Donna response ── */
function getPillsForResponse(text, lang){
  if(!text)return null;
  const es=lang==="es", lo=text.toLowerCase();
  if(lo.includes("timeframe")||lo.includes("temporalidad")||lo.includes("candle")||lo.includes("vela de"))
    return es?["📅 Diaria","🕓 4H","⏰ 1H","🌊 Las combino"]:["📅 Daily","🕓 4H","⏰ 1H","🌊 I combine them"];
  if(lo.includes("bias")||lo.includes("sesgo")||lo.includes("direction")||lo.includes("alcista")||lo.includes("bajista"))
    return es?["📈 Alcista","📉 Bajista","😐 No lo tengo claro"]:["📈 Bullish","📉 Bearish","😐 Not sure yet"];
  if(lo.includes("kill zone")||lo.includes("session")||lo.includes("sesión")||lo.includes("london")||lo.includes("nueva york"))
    return es?["🌅 Londres","🗽 NY Open","🌆 NY PM","⏰ Sin KZ"]:["🌅 London","🗽 NY Open","🌆 NY PM","⏰ No KZ"];
  if(lo.includes("stop")||lo.includes("target")||lo.includes("50%")||lo.includes("partial"))
    return es?["✅ Stop fijo","🎯 Toqué el 50%","❌ Me sacó"]:["✅ Stop is fixed","🎯 Hit 50%","❌ Got stopped out"];
  if(lo.includes("checklist")||lo.includes("ready")||lo.includes("listo"))
    return es?["✅ Abrir checklist","📝 Registrar operación"]:["✅ Open checklist","📝 Log a trade"];
  if((lo.match(/\?/)&&(lo.includes("did you")||lo.includes("have you")||lo.includes("¿lo")||lo.includes("¿pasaste")||lo.includes("¿tienes")||lo.includes("¿estás"))))
    return es?["✅ Sí","❌ No","🤔 Más o menos"]:["✅ Yes","❌ No","🤔 Kind of"];
  if(lo.includes("chart")||lo.includes("setup")||lo.includes("gráfico")||lo.includes("setup"))
    return es?["📊 Te mando el gráfico","✅ Listo para operar","📝 Registrar"]:["📊 Send chart","✅ Ready to trade","📝 Log trade"];
  if(lo.includes("academy")||lo.includes("academia")||lo.includes("chapter")||lo.includes("capítulo"))
    return es?["🎓 Ir a academia","📚 Capítulo 1","💬 Tengo preguntas"]:["🎓 Go to academy","📚 Chapter 1","💬 I have questions"];
  return null;
}

  const DEFAULT_PILLS=lang==="es"
    ?["✅ Listo para operar","📊 Analiza mi gráfico","📝 Registrar operación","🎓 ¿Por dónde empiezo?"]

  /* ── ONBOARDING ── */
  const startApp=()=>{
    if(!nameInput.trim()||!selMode)return;
    const p={name:nameInput.trim(),lang:selLang,mode:selMode};
    setProfile(p);setPhase("main");

    if(selMode==="advanced"){
      // Advanced: no questionnaire, go straight to chat with accountability message
      const welcomeAdv=p.lang==="es"
        ?"Hey. Soy Donna. Estoy aquí para mantenerte responsable — no para enseñarte los básicos. Dime en qué estás trabajando o comparte un setup cuando estés listo."
        :"Hey. I'm Donna. I'm here to keep you accountable — not to teach you basics. Tell me what you're working on, or share a setup when you're ready.";
      addMsg("donna",welcomeAdv);
    }else{
      const msg=p.lang==="es"
        ?`Hola ${p.name}! Soy Donna — tu coach de trading. Estoy aquí para enseñarte desde cero y mantenerte responsable. Empieza con el Capítulo 0 en la Academia, o pregúntame lo que quieras.`
        :`Hey ${p.name}! I'm Donna — your trading coach. I'll teach you from scratch and keep you accountable. Start with Chapter 0 in the Academy, or just ask me anything.`;
      addMsg("donna",msg);
      // No questionnaire - go straight to chat with helpful pills
      setContextPills(p.lang==="es"
        ?["🎓 Ir a la Academia","💬 Tengo preguntas","✅ Ver el checklist"]
        :["🎓 Go to Academy","💬 I have questions","✅ See the checklist"]);
    }
  };

  /* ── PROFILE Q FLOW ── */
  const handlePQ=(pill)=>{
    const p=profile,adv=p.mode==="advanced";
    addMsg("user",pill);
    if(pqStep===1){
      setProfile(pr=>adv?{...pr,candle:pill}:{...pr,inspiration:pill});
      setPqStep(2);
      if(adv){
        setTimeout(()=>{
          const q=p.lang==="es"?"¿Y cuál es tu proceso antes de entrar a una operación?":"And what's your process before entering a trade?";
          addMsg("donna",q);
          setContextPills(p.lang==="es"
            ?["📊 Top-down desde HTF","📍 Encuentro nivel y espero","⚡ Reacciono a lo que veo","🔄 Aún lo estoy construyendo"]
            :["📊 Top-down from HTF","📍 I find a level and wait","⚡ I react to what I see","🔄 Still building my process"]);
        },400);
      }else{
        setTimeout(()=>{
          const q=p.lang==="es"?"¿Alguna vez has abierto un gráfico de trading antes?":"Have you ever actually looked at a trading chart before?";
          addMsg("donna",q);
          setContextPills(p.lang==="es"
            ?["Nunca en mi vida","Los he visto pero confunden","He intentado leerlos","Los miro y no entiendo"]
            :["Never in my life","I've seen them but they confuse me","I tried reading them","I look but don't understand"]);
        },400);
      }
    }else if(pqStep===2){
      setProfile(pr=>adv?{...pr,process:pill}:{...pr,chartExp:pill});
      setPqStep(0);
      setTimeout(()=>{
        const reply=adv
          ?(p.lang==="es"?"Anotado. Mándame setups, adjunta gráficos, pasa el checklist antes de cada entrada. ¿Qué tienes en el radar?":"Noted. Send me setups, attach charts, run the checklist before every entry. What's on the radar?")
          :(p.lang==="es"?"Perfecto. La mejor forma de empezar es por la Academia — Capítulo 1. No te saltes nada. Cada pieza construye sobre la anterior. ¿Quieres empezar ahora?":"Perfect. The best way to start is the Academy — Chapter 1. Don't skip anything. Each piece builds on the last. Want to start now?");
        addMsg("donna",reply);
        setContextPills(adv
          ?(p.lang==="es"?["📊 Te mando un setup","✅ Abrir checklist","📝 Registrar operación","🎓 Ver academia"]:["📊 Send you a setup","✅ Open checklist","📝 Log a trade","🎓 View academy"])
          :(p.lang==="es"?["🎓 Ir a la Academia","💬 Tengo preguntas","📊 Muéstrame un gráfico"]:["🎓 Go to Academy","💬 I have questions","📊 Show me a chart"]));
      },500);
    }
  };

  /* ── TRADE LOG ── */
  const handleTradeSave=async(trade)=>{
    setShowTradeLog(false);
    const isClose=trade.status==="closed";
    if(isClose){
      setActiveTrade(null);
      setTrades(prev=>prev.map(t=>t.id===trade.id?trade:t));
      // Donna reviews the closed trade
      const review=DONNA.tradeReview(trade,trades,lang);
      addMsg("donna",review);
      setContextPills(DEFAULT_PILLS);
      showNotif(lang==="es"?"Operación cerrada. Donna la revisó.":"Trade closed. Donna reviewed it.");
    }else{
      setActiveTrade(trade);
      setTrades(prev=>{
        const exists=prev.find(t=>t.id===trade.id);
        return exists?prev.map(t=>t.id===trade.id?trade:t):[...prev,trade];
      });
      const reply=lang==="es"
        ?`${trade.asset} ${trade.direction} registrado. ${trade.killZone} kill zone. Stop fijo — no lo muevas. Primera toma al 50%. Voy a estar pendiente.`
        :`${trade.asset} ${trade.direction} logged. ${trade.killZone} kill zone. Stop is fixed — don't touch it. First take at 50%. I'll be checking in on you.`;
      addMsg("donna",reply);
      setContextPills(lang==="es"
        ?["✅ Checklist completo","📊 El mercado se movió","❌ Salí de la operación"]
        :["✅ Checklist complete","📊 Market moved","❌ I exited the trade"]);
    }
  };

  /* ── SEND MESSAGE ── */
  const sendMessage=async(text,img=null)=>{
    if(!text?.trim()&&!img||loading)return;
    if(msgCount>=FREE&&userPlan==="free"){setShowPaywall(true);return;}
    const userText=text?.trim()||(lang==="es"?"[Gráfico adjunto]":"[Chart attached]");
    addMsg("user",userText,img?{img}:{});
    setInput("");setImgData(null);setImgPrev(null);
    setLoading(true);setApiError(null);setMsgCount(c=>c+1);
    setContextPills([]);
    try{
      const sys=buildPrompt(profile,trades,activeTrade);
      const history=msgs.slice(-14).map(m=>{
        if(m.role==="donna")return{role:"assistant",content:m.text};
        if(m.img){const b64=m.img.split(",")[1],mime=m.img.split(";")[0].split(":")[1];return{role:"user",content:[{type:"image",source:{type:"base64",media_type:mime,data:b64}},{type:"text",text:m.text||(lang==="es"?"Analiza con CRT.":"Analyze with CRT.")}]};}
        return{role:"user",content:m.text};
      });
      const cur=img?[{type:"image",source:{type:"base64",media_type:img.split(";")[0].split(":")[1],data:img.split(",")[1]}},{type:"text",text:userText}]:userText;
      history.push({role:"user",content:cur});
      const res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-5-20250929",max_tokens:500,system:sys,messages:history})});
      if(!res.ok){const ed=await res.json().catch(()=>({}));throw new Error(ed.error?.message||`API ${res.status}`);}
      const data=await res.json();
      const reply=data.content?.[0]?.text;
      if(!reply)throw new Error("Empty response");
      addMsg("donna",reply);
      setContextPills(getPillsForResponse(reply,lang)||DEFAULT_PILLS);
    }catch(e){
      setApiError(e.message);
      addMsg("donna",DONNA.fallback(lang,profile.mode));
      setContextPills(DEFAULT_PILLS);
    }
    setLoading(false);
  };

  const handleSend=()=>{

    const inp=input.toLowerCase().trim();
    const isChkRequest=["checklist","check list","lista de verificación","lista de control"].some(k=>inp.includes(k));
    if(isChkRequest&&!imgData){setShowCL(true);setInput("");return;}
    if(imgData&&userPlan!=="pro"&&userPlan!=="free_trial"){
      setShowPaywall(true);return;
    }
    imgData?sendMessage(input,imgData):sendMessage(input);
  };

  const handlePillTap=(pill)=>{try{
    if(pqStep>0){handlePQ(pill);return;}
    // Checklist triggers — catch all variants
    const isChecklistPill=["ready to trade","listo para operar","open checklist","abrir checklist","checklist"].some(k=>pill.toLowerCase().includes(k));
    if(isChecklistPill){setShowCL(true);return;}
    // Trade log trigger
    if(pill.toLowerCase().includes("log a trade")||pill.toLowerCase().includes("registrar operación")||pill.toLowerCase().includes("registrar operacion")){setTradeLogMode("open");setShowTradeLog(true);return;}
    // Academy trigger
    if(pill.toLowerCase().includes("academy")||pill.toLowerCase().includes("academia")){setTab("academy");return;}
    if(flowState){handleFlowPill(pill);return;}
    sendMessage(pill);
  };

  const onCLConfirm=(grade)=>{
    setShowCL(false);
    addMsg("donna",lang==="es"

¿Quieres registrar esta operación ahora?`
      :`${grade} — ${DONNA.gradeComment(grade,lang)}

Want to log this trade now?`);
    setContextPills(lang==="es"?["📝 Sí, registrar","💬 Hazme una pregunta"]:["📝 Yes, log it","💬 Ask me something"]);
    if(pill==="📝 Sí, registrar"||pill==="📝 Yes, log it"){setTradeLogMode("open");setShowTradeLog(true);}
  };

  const msgsLeft=FREE-msgCount;
  const displayPills=pills.length>0?pills:pqStep===0?DEFAULT_PILLS:[];

  /* ── ONBOARDING SCREEN ── */
  if(phase==="onboard"){
    const tO=T[selLang];
    return(

                {[{code:"en",Flag:FlagUS,label:"English"},{code:"es",Flag:FlagES,label:"Español"}].map(l=>(
                  <button key={l.code} onClick={()=>setSelLang(l.code)}
                    style={{padding:"16px 12px",borderRadius:12,background:selLang===l.code?"rgba(232,37,60,.12)":DARK,border:`1.5px solid ${selLang===l.code?RED:"transparent"}`,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:8,transition:"all .2s"}}>
                    <l.Flag size={44}/>
                    <span style={{fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:14,color:"#fff"}}>{l.label}</span>
                  </button>
                ))}
              </div>
            </div>
            <div>
              <div style={{fontSize:11,fontWeight:700,color:MUTED,letterSpacing:1.2,marginBottom:8}}>{tO.modeLabel}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {[{key:"beginner",icon:"📚",label:tO.beg,sub:tO.begSub,desc:lang==="es"?"Empezamos desde cero":"We start from zero"},{key:"advanced",icon:"⚡",label:tO.adv,sub:tO.advSub,desc:lang==="es"?"Directo al grano":"Straight to the point"}].map(m=>(
                  <button key={m.key} onClick={()=>setSelMode(m.key)}
                    style={{padding:"16px 12px",borderRadius:12,background:selMode===m.key?"rgba(232,37,60,.12)":DARK,border:`1.5px solid ${selMode===m.key?RED:"transparent"}`,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:6,transition:"all .2s"}}>
                    <span style={{fontSize:28}}>{m.icon}</span>
                    <span style={{fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:14,color:"#fff"}}>{m.label}</span>
                    <span style={{fontSize:11,color:MUTED,textAlign:"center"}}>{m.sub}</span>
                  </button>
                ))}
              </div>
            </div>
            <button onClick={startApp} disabled={!nameInput.trim()||!selMode}
              style={{width:"100%",padding:17,borderRadius:14,background:nameInput.trim()&&selMode?RED:"#2C2C2E",border:"none",cursor:nameInput.trim()&&selMode?"pointer":"not-allowed",fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:17,color:"#fff",transition:"background .25s",marginTop:4}}>
              {tO.start}
            </button>
            <div style={{textAlign:"center",display:"flex",flexDirection:"column",gap:4}}>
              <span style={{fontSize:12,color:"#48484A"}}>{tO.disclaimer}</span>
              <span style={{fontSize:12,color:"#48484A"}}>{tO.privacy}</span>
            </div>
          </div>
        </div>
      </>
    );
  }

  /* ── MAIN APP ── */
  return(
    <>
      <style>{CSS}</style>

        {/* Modals */}
        {openChapter&&<LessonModal chapter={openChapter} lang={lang} onClose={()=>setOpenChapter(null)}
          onComplete={(id,passed)=>{if(passed){setCompletedCh(p=>{const n=new Set([...p,id]);try{localStorage.setItem("donna_comp",JSON.stringify([...n]));}catch{}return n;});setPassedCh(p=>{const n=new Set([...p,id]);try{localStorage.setItem("donna_passed_ch",JSON.stringify([...n]));}catch{}return n;});showNotif(lang==="es"?`✅ ${CHAPTERS.find(c=>c.id===id)?.title} completado`:`✅ ${CHAPTERS.find(c=>c.id===id)?.title} complete`);}setOpenChapter(null);}}/>}

          onConfirm={onCLConfirm} onClose={()=>setShowCL(false)}/>}
        {showTradeLog&&<TradeLogModal lang={lang} mode={tradeLogMode} activeTrade={activeTrade} onSave={handleTradeSave} onClose={()=>setShowTradeLog(false)}/>}

        {/* Toast */}
        {notif&&<div style={{position:"absolute",top:0,left:0,right:0,zIndex:999,background:"rgba(28,28,30,.96)",backdropFilter:"blur(14px)",borderBottom:`1px solid ${DARK}`,padding:"12px 16px",display:"flex",alignItems:"center",gap:10,animation:"notifDrop 5s ease forwards",cursor:"pointer"}}>
          <DAvatar size={32}/>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:RED}}>Donna</div>
            <div style={{fontSize:13}}>{notif}</div>
          </div>
        </div>}

        {/* Header */}
        <div style={{padding:"10px 16px 8px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:`1px solid ${DARK}`,flexShrink:0}}>
          <div style={{fontSize:11,color:MUTED,width:72}}>{profile.mode==="advanced"?t.advMode:t.begMode}</div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <DAvatar size={34} online={tab==="chat"}/>

          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            {activeTrade&&tab==="chat"&&(
              <button onClick={()=>{setTradeLogMode("close");setShowTradeLog(true);}}
                style={{padding:"5px 10px",borderRadius:20,background:`${GOLD}22`,border:`1px solid ${GOLD}66`,cursor:"pointer",fontSize:11,fontWeight:700,color:GOLD}}>
                🔵 {t.checkIn}
              </button>
            )}
            <button onClick={()=>{if(activeTrade){setTradeLogMode("close");setShowTradeLog(true);}else{setTradeLogMode("open");setShowTradeLog(true);}}}
              style={{width:30,height:30,borderRadius:"50%",background:activeTrade?`${GOLD}33`:DARK,border:activeTrade?`1px solid ${GOLD}66`:"none",cursor:"pointer",color:activeTrade?GOLD:"#fff",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>
              {activeTrade?"⏺":"＋"}
            </button>
          </div>

        {/* Trial banner */}
        {msgsLeft<=5&&msgsLeft>0&&(
          <div style={{background:`${RED}15`,borderBottom:`1px solid ${RED}33`,padding:"5px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
            <span style={{fontSize:12,color:RED,fontWeight:600}}>{t.trialLeft(msgsLeft)}</span>
          </div>

        {/* Active trade banner */}
        {activeTrade&&tab==="chat"&&(
          <div style={{background:`${GOLD}0F`,borderBottom:`1px solid ${GOLD}33`,padding:"8px 16px",display:"flex",alignItems:"center",gap:10,flexShrink:0,cursor:"pointer"}} onClick={()=>{setTradeLogMode("close");setShowTradeLog(true);}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:GOLD,animation:"pulse 2s ease-in-out infinite",flexShrink:0}}/>
            <div style={{flex:1}}>
              <span style={{fontSize:12,fontWeight:700,color:GOLD}}>{t.activeTrade}: </span>
              <span style={{fontSize:12,color:"#fff"}}>{activeTrade.asset} · {activeTrade.direction} · {activeTrade.killZone}</span>
            </div>
            <span style={{fontSize:11,color:MUTED}}>{timeAgo(activeTrade.openedAt)}</span>
          </div>

        {/* Content */}

          {/* CHAT TAB */}
          {tab==="chat"&&(
            <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minHeight:0}}>
              <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"10px 14px",display:"flex",flexDirection:"column",minHeight:0}}>
                {msgs.map(m=>(
                  <div key={m.id} className="msg-in" style={{display:"flex",flexDirection:m.role==="donna"?"row":"row-reverse",alignItems:"flex-end",gap:7,marginBottom:10}}>
                    {m.role==="donna"&&<DAvatar size={26}/>}
                    <div style={{maxWidth:"80%",display:"flex",flexDirection:"column",gap:3,alignItems:m.role==="donna"?"flex-start":"flex-end"}}>
                      {m.img&&<img src={m.img} alt="" style={{maxWidth:"100%",borderRadius:14,maxHeight:180,objectFit:"cover",border:`1px solid ${DARK}`}}/>}
                      {m.text&&(
                        <div style={{padding:"10px 13px",borderRadius:m.role==="donna"?"18px 18px 18px 4px":"18px 18px 4px 18px",background:m.role==="donna"?DARK:"#0A84FF",color:"#fff",fontSize:15,lineHeight:1.58,whiteSpace:"pre-wrap",fontWeight:m.role==="user"?500:400}}>
                          {m.text.split(/(\*\*.*?\*\*)/).map((p,i)=>p.startsWith("**")?<strong key={i}>{p.slice(2,-2)}</strong>:p)}
                        </div>
                      )}
                      <div style={{fontSize:11,color:"#48484A",padding:"0 3px"}}>{new Date(m.id).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</div>
                    </div>

                ))}
                {loading&&(
                  <div className="msg-in" style={{display:"flex",alignItems:"flex-end",gap:7,marginBottom:10}}>

                      {[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:MUTED,animation:`dot 1.2s ease-in-out ${i*.18}s infinite`}}/>)}
                    </div>

                {apiError&&(
                  <div style={{padding:"8px 12px",margin:"0 0 8px",background:"rgba(232,37,60,.1)",borderRadius:10,fontSize:12,color:"#FF6B6B",border:`1px solid ${RED}44`}}>

                <button onClick={()=>fileRef.current?.click()} style={{width:36,height:36,borderRadius:"50%",background:DARK2,border:"none",cursor:"pointer",fontSize:17,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:MUTED}}>📷</button>
                <VoiceButton onResult={(txt)=>setInput(i=>i?i+" "+txt:txt)} lang={lang}/>
                <input ref={inputRef} value={input} onChange={e=>setInput(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&handleSend()}

                <button onClick={handleSend} disabled={!input.trim()&&!imgData}
                  style={{width:36,height:36,borderRadius:"50%",background:input.trim()||imgData?BLUE:DARK,border:"none",cursor:"pointer",color:"#fff",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"background .2s"}}>▶</button>
              </div>

          {/* JOURNAL TAB */}
          {tab==="journal"&&(

              onClose={()=>setTab("chat")}
              onOpen={(mode)=>{setTradeLogMode(mode);setShowTradeLog(true);}}/>
          )}

          {/* ACADEMY TAB */}
          {tab==="academy"&&(
            <AcademyScreen profile={profile} completed={completedCh} passedCh={passedCh} onOpen={ch=>setOpenChapter(ch)}/>
          )}
        </div>

        {/* Tab Bar */}
        <div style={{display:"flex",borderTop:`1px solid ${DARK}`,flexShrink:0}}>
          {[{id:"chat",icon:"💬",label:t.tabChat},{id:"journal",icon:"📓",label:t.tabJournal},{id:"academy",icon:"📚",label:t.tabAcademy}].map(tb=>(
            <button key={tb.id} onClick={()=>setTab(tb.id)}
              style={{flex:1,padding:"10px 8px 14px",background:"transparent",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,position:"relative"}}>
              <span style={{fontSize:22}}>{tb.icon}</span>
              <span style={{fontSize:10,fontWeight:700,color:tab===tb.id?RED:MUTED}}>{tb.label}</span>
              {tab===tb.id&&<div style={{width:5,height:5,borderRadius:"50%",background:RED}}/>}
              {tb.id==="journal"&&activeTrade&&<div style={{position:"absolute",top:8,right:"25%",width:8,height:8,borderRadius:"50%",background:GOLD,border:"2px solid #000"}}/>}
            </button>
          ))}
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
