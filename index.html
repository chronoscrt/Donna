{icon:"🔢",title:"Five Entries. One Sequence.",body:"CRT has five entry points for any setup. E1: Turtle Soup wick (live, hardest, highest reward). E2: Model 1 close (daily confirmed, your standard entry). E3: Breaker Block (least drawdown, very clean). E4: OTE 60-75% retrace (where ICT traders enter — also where the Kiss of Death often traps them). E5: Kiss of Death (most violent, most certain, smallest stop). Each is valid. Each has its context.",donna:"Five entries means you have five chances to get the same trade right. But you can only go forward — never backward in the sequence."},
{icon:"🚫",title:"Never Go Backward",body:"The rule that most people miss: once a higher entry has formed, you cannot go back to a lower-numbered entry. If E3 (Breaker Block) has formed, E1 and E2 no longer exist for this setup. You're now at E3 or waiting for E4-E5. If you missed E1 and E2, your only valid entries are E3, E4, and E5. Trying to enter at E1 after E3 has formed means you're fighting the sequence.",donna:"Missed E1? You're an E2 trader now. Missed E2? E3. Missed E3? E4. Missed everything? Wait for E5. Never go back."},
{icon:"⚡",title:"E4 and the ICT Trap",body:"Entry 4 is the 60-75% retrace of the full setup range — this is where ICT methodology traders enter. Smart Money knows this. The Kiss of Death (E5) is specifically designed to stop out E4 traders before the final move. If you enter at E4, your stop needs to account for the KoD. Many E4 entries get stopped out by the KoD before the target — that's why E5 exists.",donna:"If you enter at E4, the KoD is coming for you. Size accordingly, stop below the KoD zone, or wait for E5."},
{icon:"🏆",title:"Combining the Entries",body:"Advanced traders use the 5-entry sequence to scale into positions. Small size at E1, add at E2, add at E3 with stop moved to near entry of E1, add at E5 with tight stop. This creates a position that's partially free by E3, fully at risk only at E5, and maximally sized for the final move. The sequence is not just five separate entries — it's a position-building framework.",donna:"This is the advanced game. Build the position across the sequence. By E5, most of the position is running free."}
],q:[
{q:"A setup has completed its E1 (Turtle Soup wick) and E2 (Model 1 close). You missed both. Your valid entries now are:",type:"mc",opts:["E1 is still valid — it just formed","Only E2","E3, E4, and E5","No valid entries remain"],a:2,exp:"Once E1 and E2 have formed, you cannot go back. Your valid remaining entries are E3 (Breaker Block), E4 (OTE 60-75%), and E5 (Kiss of Death). The sequence only moves forward."},
{q:"Entry 4 — the OTE (Optimal Trade Entry), which sits at the 60-75% retracement of the full setup range is specifically designed to be trapped by:",type:"mc",opts:["E3 traders","The Kiss of Death (E5)","E1 traders","Stop hunters"],a:1,exp:"E4 is where ICT methodology traders enter — and Smart Money knows this. The Kiss of Death is specifically designed to stop out E4 traders before the final move. E5 is the KoD response to E4 traders getting shaken out."},
{q:"In the 5-entry sequence, E5 (Kiss of Death) has the:",type:"mc",opts:["Highest risk and lowest reward","Widest stop but most time","Tightest stop and most certainty — the target is imminent","Same characteristics as E2"],a:2,exp:"E5 has the tightest stop because price is closest to the target — the KoD wick's extreme is the stop. Most certainty because all previous entries have already played out. Target is imminent."},
{q:"You can enter at E1 again after E3 has already formed in the same setup.",type:"tf",a:false,exp:"False. The sequence only moves forward. Once E3 has formed, E1 and E2 are no longer valid for this setup. Never go backward in the entry sequence."},
{q:"What is the primary advantage of scaling into a trade across multiple entry points?",type:"mc",opts:["Increases the average entry price","Creates a position that becomes progressively risk-free as entries play out","Reduces total position size","Simplifies stop management"],a:1,exp:"Scaling across E1-E5 means by E3, your E1 and E2 entries can have stops moved to breakeven — a portion of the position is running free. By E5, most of the position carries no risk while being maximally sized for the final move."}
]},
22:{s:[
{icon:"🔗",title:"When Markets Tattle on Each Other",body:"SMT Divergence (Smart Money Technique) is when two correlated assets don't confirm each other's move. EUR/USD and DXY are inverse — when one goes up, the other goes down. S&P 500 and Nasdaq are direct — they should move together. When they don't — when one takes a new high that the other doesn't — that's divergence. The one that took the false high is about to reverse.",donna:"When correlated markets diverge, one of them is lying. It's always the one that extended to a new high or low without confirmation."},
{icon:"📊",title:"The Pairs to Watch",body:"Key correlations: EUR/USD vs DXY (inverse). GBP/USD vs DXY (inverse). BTC vs ETH (direct — both should move together). S&P 500 vs Nasdaq (direct). Gold vs DXY (inverse). When EUR/USD takes a new high but DXY doesn't make a new low, or BTC makes a new high but ETH doesn't — that's your signal. The one that extended is the Turtle Soup. The other is telling the truth.",donna:"Watch the pair. Watch its correlated market. If they disagree on a new high or low — trade the disagreement."},
{icon:"⚠️",title:"SMT Alone Is Not a Trade",body:"SMT divergence is a filter and a signal enhancer — not a standalone trade trigger. Never enter on SMT alone. You need: SMT divergence at a structural level, during a Kill Zone, with a Model 1 confirmation candle. SMT tells you WHICH direction. The Model 1 tells you WHEN and WHERE to enter. Both together = one of the cleanest setups in CRT.",donna:"SMT divergence is the why. The Model 1 is the when. You need both. One without the other is just observation."}
],q:[
{q:"EUR/USD (the Euro vs US Dollar) makes a new high. But DXY (the Dollar Index — which moves opposite to EUR/USD) does NOT make a new low to confirm. That disagreement between correlated markets — This is:",type:"mc",opts:["Confirmation — both agree EUR/USD is bullish","SMT Divergence — EUR/USD's new high is likely false","Normal market behavior — pairs don't always sync","Bullish for EUR/USD — the extension shows strength"],a:1,exp:"EUR/USD up + DXY not confirming (not going lower) = SMT Divergence. EUR/USD's new high is likely a Turtle Soup. DXY is telling the truth — no real directional change happened. Look for EUR/USD to reverse."},
{q:"Bitcoin makes a new high but Ethereum doesn't. SMT divergence suggests:",type:"mc",opts:["Bitcoin is stronger than Ethereum — buy Bitcoin","Ethereum will catch up to Bitcoin","Bitcoin's new high may be false — watch for reversal","No action — crypto pairs don't correlate"],a:2,exp:"BTC and ETH are directly correlated. If BTC takes a new high without ETH confirming, BTC's new high is likely false (Turtle Soup). Watch for BTC to reverse back inside the range."},
{q:"You see SMT Divergence at a structural level. You should:",type:"mc",opts:["Enter immediately — SMT is enough","Wait for a Model 1 candle to confirm at the level","Use a wider stop since SMT signals are less reliable","Trade both correlated assets simultaneously"],a:1,exp:"SMT is a signal enhancer, not a trade trigger. You still need the Model 1 candle confirmation at the structural level, during a Kill Zone, with HTF alignment. SMT tells you direction, Model 1 tells you entry."},
{q:"SMT Divergence alone, without a Model 1 confirmation, is a complete and valid entry signal.",type:"tf",a:false,exp:"False. SMT divergence alone is observation, not a trade. It needs to be combined with a structural level, Kill Zone timing, and a Model 1 confirmation candle. SMT tells you the WHY — Model 1 gives you the WHEN."}
]},
23:{s:[
{icon:"⚠️",title:"The Setup Designed to Trap Smart Traders",body:"The False Change of Character (FCoC) is specifically designed to trap informed traders — the ones who know what a real Change of Character (CoC) looks like. It looks perfect: decisive move through a key level, looks like a genuine break, looks like the trend is changing. But there's no real stop purge, no Kill Zone backing, no HTF alignment. It's the Turtle Soup for people who think they're too smart to get Turtle Souped.",donna:"If a setup looks too perfect and shows up outside a Kill Zone — that's your first warning. Smart Money traps smart traders too."},
{icon:"✅",title:"Real CoC vs False CoC",body:"Real CoC: violent, explosive move through a key level that also triggers a significant stop purge, closes decisively THROUGH the level on a higher timeframe candle, with HTF backing and Kill Zone timing. False CoC: textbook clean break, medium-sized move, no obvious stop purge, often outside Kill Zone, no strong HTF reason behind it. Real is violent and supported. False is clean and unsupported.",donna:"Real Change of Character is ugly and violent. If it looks clean and textbook — question it. Real market moves are messy."},
{icon:"🔍",title:"Verification Checklist",body:"Before calling any move a real Change of Character: 1) Is there a key HTF level being broken? 2) Is it inside a Kill Zone? 3) Does a correlated market confirm (SMT)? 4) Was there a genuine stop purge (visible wick or gap)? 5) Did the higher timeframe candle CLOSE through the level? All five should be yes for a real CoC. Missing even two makes it suspect.",donna:"1H CoC in an HTF premium zone = sell signal dressed as a buy. Check the HTF first. Always first."},
{icon:"🔄",title:"Trading the False CoC",body:"The False CoC is itself a tradable setup — and a powerful one. It's essentially a Turtle Soup at a structural level. Price appears to break, traps informed traders who go long (or short), collects their stops, then violently reverses. If you've identified it correctly: the Model 1 rejection candle after the false break is your entry, and your target is the original structural level that the false CoC was supposed to break.",donna:"The FCoC traps smart traders. If you can identify it — you get to trade against them. That's the sweetest trade in CRT."}
],q:[
{q:"A 1-hour candle closes cleanly above a key resistance level during the Asian session — overnight, very low volume, no major institutions active with no obvious stop purge. This is most likely:",type:"mc",opts:["A real Change of Character — buy","A False CoC — question it: no Kill Zone, no purge","No Structure — ignore it","A Breaker Block forming"],a:1,exp:"Asian session + no stop purge + clean (not violent) break = False CoC red flags. Real CoC is violent and occurs during Kill Zones with visible stop purging."},
{q:"What distinguishes a Real Change of Character from a False one?",type:"mc",opts:["Real CoC has a bigger candle","Real CoC is violent, has stop purge, Kill Zone backing, HTF alignment","Real CoC happens on higher timeframes only","False CoC occurs on bearish moves only"],a:1,exp:"Real CoC is violent, messy, accompanied by a visible stop purge, happens during a Kill Zone, and has clear HTF backing. False CoC looks clean and textbook but lacks all of these supporting factors."},
{q:"A 1H Change of Character in an HTF premium zone (overbought area) is most likely:",type:"mc",opts:["A genuine bullish signal","A sell signal dressed as a buy — likely False CoC","Neutral until confirmed by Daily","A valid buy with reduced size"],a:1,exp:"A 1H CoC in an HTF premium zone = the classic False CoC trap. The HTF premium zone makes a genuine bullish break unlikely. Price is more likely collecting retail long entries before reversing."},
{q:"The False CoC can itself be traded as a setup, similar to a Turtle Soup.",type:"tf",a:true,exp:"True. The False CoC is essentially a Turtle Soup at a structural level. Once identified, the Model 1 rejection after the false break is your entry, and the original level is your target. It's a high-probability contrarian trade."},
{q:"For a genuine Change of Character, how many of the 5 verification criteria should ideally be met?",type:"mc",opts:["At least 2","At least 3","At least 4","All 5"],a:3,exp:"All 5 criteria should be met for a high-probability genuine CoC: HTF level being broken, Kill Zone timing, correlated market confirmation, genuine stop purge, and HTF candle close through the level. Missing even two makes it suspect."}
]},
24:{s:[
{icon:"📈",title:"Range Rules",body:"Trading ranges have three rules: Buy near the low, sell near the high, never trade the middle. The first breakout from a range is almost always fake — this is the Turtle Soup that precedes the real directional move. EUR/USD ranging between $1,980 and $2,015 for two weeks: the first breakout above $2,015 is likely fake. Wait for the Turtle Soup, then trade the distribution back inside or the genuine break.",donna:"First breakout = almost always fake. The range is the spring. The Turtle Soup is the compression. The real move comes after."},
{icon:"🔄",title:"Range as Accumulation",body:"A range is not just a boring period of consolidation — it's Smart Money accumulating a massive position at the best possible prices. While retail traders get chopped up trading inside the range, institutions are quietly buying at the bottom and selling at the top, building the position that will create the next major trend. The range ends when they've accumulated enough to make the move.",donna:"Boring range = Smart Money shopping. When they're done shopping, price moves hard. The range tells you the direction — they're buying the bottom means the move will be up."},
{icon:"📐",title:"Range to Trend Transition",body:"The genuine break out of a range looks different from the fake one. Real breakout: decisive close above/below the range on increasing momentum, HTF backing, Kill Zone timing, and the corrective pullback after the break holds above the breakout level (former resistance becomes support). Fake breakout: aggressive move that immediately reverses, closes back inside, no HTF backing. Wait for the pullback after the real break — that's Entry 2.",donna:"Real break pulls back. Fake break reverses. If the 'breakout' never pulls back and tests the level it broke — be suspicious."}
],q:[
{q:"Gold has been ranging $1,980-$2,040 for three weeks. Price breaks above $2,015 during Asian session, then immediately closes back inside at $2,000. This is:",type:"mc",opts:["Real breakout — buy","Turtle Soup — likely the fake break from the range","Neutral — needs more time","Range expanding"],a:1,exp:"Asian session break that immediately closes back inside = Turtle Soup. The fake breakout from the range top. This is the manipulation before the real move (probably down, back toward $1,980)."},
{q:"In a range, where should you look for trade entries?",type:"mc",opts:["The middle of the range","Above the highs","Near the low (to buy) or near the high (to sell)","Only on breakouts"],a:2,exp:"Range trading: buy near the low, sell near the high. The middle is no-man's land. Never trade the middle — that's where both sides lose."},
{q:"After a genuine range breakout to the upside, the first pullback back to the broken level should:",type:"mc",opts:["Break back below it — this shows the breakout failed","Hold above it — former resistance becomes support","Go all the way back to the range mid-point","Test it multiple times before confirming"],a:1,exp:"After a real breakout, the pullback to the broken level should hold — former resistance becomes support. This is Entry 2: the confirmation of the genuine break. If it breaks back inside, the breakout was fake."},
{q:"The first breakout from an established range is almost always the real move.",type:"tf",a:false,exp:"False. The first breakout from a range is almost always the fake move — the Turtle Soup. Wait for it to close back inside, then trade the real direction. Or wait for the fake to complete and the genuine break to follow."}
]},
25:{s:[
{icon:"🏗️",title:"Top-Down Always",body:"The complete process: Week of month → HTF narrative (Weekly/Daily bias) → Daily open position → Liquidity target → Kill Zone → Structural level → Entry candle. In that order. Always. If you start with 'I see a nice candle on the 1H,' you've already started wrong. The 1H candle is the last thing you look at. The first question is always: what week of the month is it and what is the Weekly narrative?",donna:"Entry is the last step. I will say this until you dream about it. Last. Step."},
{icon:"📋",title:"Four Things Before the Button",body:"Before you press the buy or sell button, you must know four things: 1) Where is your stop? (above/below the Model 1 wick — exact level). 2) Where is T1? (50% of the setup range — exact level). 3) Where is T2? (external liquidity target — exact level). 4) What % of your account are you risking? If you cannot answer all four in five seconds — you are not ready to enter.",donna:"Can't answer all four in five seconds? Close the chart. Come back when you can. The market will always be there tomorrow."},
{icon:"🔍",title:"The Weekly Narrative",body:"Every Sunday before the week opens, ask: what week of the month is this? Week 1 = accumulation, be patient. Week 2 = manipulation, do not trade breakouts. Week 3-4 = distribution, look for continuation entries. Then look at last week's high and low. Price will most likely take one of those levels this week. That's your weekly target. That's the context for every trade you take this week.",donna:"Sunday is not a day off. Sunday is when you map the week. Five minutes on Sunday beats five hours of confusion during the week."},
{icon:"✅",title:"The Pre-Trade Mental Checklist",body:"Before any entry, run this in your head: Is the HTF bias clear? Do I know my target? Am I inside a Kill Zone? Is there a structural level here? Do I see a Model 1 candle? Is my stop placed? Are my targets marked? Is my risk 1-2%? Eight questions. Eight yeses before you touch the button. One 'no' or 'not sure' = wait. The setup will come again. The blown account will not fix itself.",donna:"Eight yeses. Not seven. Eight. If you're at six and a half and entering anyway — that's how you lose."}
],q:[
{q:"What is the correct first step in top-down CRT analysis?",type:"mc",opts:["Find a good 1H entry candle","Check the 4H for structure","Determine the week of month and Weekly narrative","Draw key levels on the Daily"],a:2,exp:"Top-down analysis starts with the highest timeframe context. Week of month + Weekly narrative sets the overall bias. Everything below it works within this framework."},
{q:"Before pressing the entry button, which four things must you know?",type:"mc",opts:["Entry price, candle type, session, and pair","Stop level, T1 level, T2 level, and risk percentage","Trend direction, support, resistance, and volume","HTF bias, ITF structure, LTF entry, and news events"],a:1,exp:"The four pre-trade requirements: exact stop level, exact T1 (50%), exact T2 (external target), and risk percentage. If you can't answer all four instantly, you're not ready to enter."},
{q:"Week 2 of the month just started. You spot what looks like the perfect setup. You:",type:"tf",a:false,exp:"False. Week 2 is manipulation week — the week of Turtle Soups and fake breakouts. Trading Week 2 breakouts like they're real is how you provide liquidity for the Week 3 distribution move. Be extra cautious in Week 2."},
{q:"In the top-down process, when should you look at the 1H chart for an entry candle?",type:"mc",opts:["First — to find the opportunity","After checking the 4H","After HTF bias, target identification, Kill Zone, and structural level are all confirmed","Any time — all timeframes are equal"],a:2,exp:"The 1H entry candle is the LAST step. After: weekly narrative, HTF bias, liquidity target identified, Kill Zone active, structural level present. Only then do you drop to the 1H for the entry."},
{q:"You know your HTF bias and target but you're not inside a Kill Zone. You should:",type:"mc",opts:["Enter anyway — HTF and target are enough","Wait for the Kill Zone — timing matters","Use a wider stop to compensate","Take a smaller position size"],a:1,exp:"Kill Zone timing is a requirement, not a preference. The same setup outside a Kill Zone has dramatically lower probability. Wait for the Kill Zone. The setup will either still be there or it will have already played out — either way, you made the right decision."}
]},
26:{s:[
{icon:"⚡",title:"Two Valid Entry Types Only",body:"Once in a trade, you should only be managing positions from two valid entry types: Model 1 close (the standard entry) or a genuine Change of Character close. These are the only two entry confirmations in CRT. Any other reason you entered — 'it looked strong,' 'I saw a pattern,' 'gut feeling' — means you're in a trade with no CRT backing. That's not a managed trade, that's gambling in progress.",donna:"If you can't tell me exactly WHY you entered in CRT terms — Model 1 or genuine CoC — you're not trading CRT. You're just trading."},
{icon:"🛑",title:"Why the Stop Never Moves",body:"Moving your stop away from the Model 1 wick — making it wider because price is getting close — is how good trades become account-destroying losses. Your stop is placed where it is because that's where the setup is invalidated. If price reaches that level, the setup is wrong. That's not bad luck — that's the market telling you the trade was incorrect. Accept it. Log it. Move on.",donna:"Every time you moved your stop and it saved the trade — the market taught you the wrong lesson. Every time you moved it and it doubled your loss — that was the right lesson."},
{icon:"💰",title:"The Mandatory Partial",body:"TP1 at 50% is not a suggestion. It's not 'take it if price gets there easily.' It is mandatory every single trade. Here's why: the 50% partial funds your trading. Even when T2 doesn't hit, you're green. Even when price reverses after T1, you broke even or made money. Over 100 trades, always taking T1 creates consistent small gains that compound into a real edge. Skipping T1 'because it looks strong' is how you give back profits.",donna:"Always take T1. Your future self will thank you. The one time you skip it because it 'looks strong' will be the time it reverses hard. Always take T1."},
{icon:"📓",title:"The Journal Is the Real Edge",body:"The actual edge in trading is not a setup — it's data. Your journal tells you which sessions you lose most in, which emotional states preceded your worst trades, which setup types have the highest win rate for you specifically. Donna can see patterns in your journal that you can't see in the moment. FOMO trades at 3PM after a loss? That's a pattern. The journal catches it. You fix it.",donna:"Your journal is your coaching session. Every week, read the last 10 entries. I guarantee you'll see a pattern that's costing you money. Fix that pattern. That's the edge."}
],q:[
{q:"Your stop is placed correctly below the Model 1 wick. Price moves against you and approaches the stop. You:",type:"mc",opts:["Move the stop wider — give it more room","Close the trade manually — cut the loss","Let the stop do its job — don't touch it","Add to the position — average down"],a:2,exp:"The stop is where it is because that's where the setup is invalidated. Moving it is the most dangerous habit in trading. Let it do its job. If it triggers — the trade was wrong and you limited your loss. Correct."},
{q:"You've been using a trading journal for three months. The best use of that data is to:",type:"mc",opts:["Count win rate only","Find patterns in your mistakes — session, emotion, setup type — and systematically eliminate them","Show it to other traders","Delete old losing trades to focus on winners"],a:1,exp:"The journal's power is pattern recognition. Which sessions do you lose in most? What emotional state precedes your biggest losses? What setup types work for you? The data tells you what to fix specifically."},
{q:"You took TP1 at 50%. Price continues toward T2. Then the Kiss of Death hits and triggers your stop at breakeven. This outcome is:",type:"mc",opts:["A loss — the trade failed","A win — T1 was taken","Breakeven — acceptable outcome","Should be avoided by moving stop away from breakeven"],a:2,exp:"Stopped at breakeven after T1 = breakeven trade. You made money on T1, gave it back on the stop, net zero. This is a perfectly acceptable outcome and exactly how the system is designed to work."},
{q:"Moving your stop wider when price approaches it is a valid risk management technique.",type:"tf",a:false,exp:"False. Moving your stop wider is the opposite of risk management — it's risk expansion. Your stop was placed where the trade is invalidated. Moving it means you're now holding an invalidated trade with more risk. This is how small losses become large ones."},
{q:"What is the primary behavioral pattern that causes the most losses in CRT traders?",type:"mc",opts:["Trading too many pairs","Using wrong indicators","Entering before T1 and moving stops — breaking the management rules","Trading in Asian session"],a:2,exp:"Rule violations during trade management — entering without full criteria, skipping T1, moving stops — cause the majority of losses. The setups are often correct. The management is what fails."}
]},
27:{s:[
{icon:"🏆",title:"The Universal Pattern",body:"Open. Key Level. Fake breakout. Real move. That is every significant price move in history on every asset on every timeframe. Weekly, Daily, 4H, 1H — same pattern, different speeds. Gold's 2024 run from $1,900 to $2,400? Open, key level at $2,000, fake break above, collection, real distribution up. S&P 500 every single morning? Open, key level, manipulation, real move. The pattern never changes.",donna:"Once you see this pattern everywhere, you can't unsee it. And you stop trading the noise and start trading the pattern. That's the shift."},
{icon:"🔄",title:"Fractals — Every Timeframe",body:"The CRT pattern is fractal. The Weekly pattern contains the Daily pattern. The Daily contains the 4H. The 4H contains the 1H. When all three major timeframes are aligned in the same AMD phase simultaneously — Weekly in Distribution, Daily in Distribution, 4H in Distribution, 1H showing the Model 1 — that's the highest probability trade you will ever see. Rare. But unforgettable.",donna:"Three timeframe alignment is the unicorn. When you see it — size appropriately. Those trades pay for months of losses."},
{icon:"📊",title:"The 8-Loss Streak",body:"Here's the truth nobody tells you: every profitable trader has gone through at least one streak of 8 consecutive losses. It comes for everyone. Your edge doesn't disappear — variance does that. The question is not if it happens. The question is whether you're still in the game when it ends. 1-2% risk means an 8-loss streak is a 16% drawdown. Recoverable. At 5% risk per trade, it's a 40% drawdown. Career-ending.",donna:"The 8-loss streak is coming. I don't know when. But it's coming. 1-2% risk is what keeps you in the game when it does."},
{icon:"📝",title:"Documentation Separates the Profitable",body:"The difference between traders who eventually become profitable and traders who perpetually struggle is documentation. Profitable traders know their win rate, their average R, their best session, their worst emotional pattern. Struggling traders trade by feel. Donna can help you track this — but you have to log every trade. Every one. No exceptions. The shortcut in trading has one name: losses.",donna:"The shortcut has one name: losses. Document everything. Review weekly. That's the full system. Everything else is a detail."}
,
{icon:"🏆",title:"You Now Have a Complete Trading System",body:"You have covered everything: how to read a candle, how to identify key levels, how to understand liquidity, how to read the AMD sequence, how to enter with the Model 1, how to manage risk, how to use the checklist, and how to stay disciplined session after session. Most traders spend years searching for this and never find it in one place. You found it. The edge is not secret anymore. The only variable left is your execution. That is entirely in your hands.",donna:"I am proud of you for getting here. Now go prove to yourself that you can execute it."}],q:[
{q:"The universal CRT pattern across all timeframes and assets is:",type:"mc",opts:["Up, consolidation, down, consolidation","Open, key level, fake breakout, real move","Accumulation, breakout, trend, reversal","Support, resistance, breakout, pullback"],a:1,exp:"Open, key level, fake breakout, real move. That's every significant price move in CRT. Same pattern on the 1H and on the Weekly. Same on Gold and on Nasdaq. The fractal never changes."},
{q:"Three timeframe AMD alignment (Weekly, Daily, 4H all in Distribution phase) signals:",type:"mc",opts:["Avoid the trade — too much confirmation is suspicious","The highest probability trade in CRT","A guaranteed win","Average probability — additional signals needed"],a:1,exp:"Three timeframe alignment is the highest probability setup in CRT. When Weekly, Daily, and 4H are all in the same phase pointing the same direction, the probability of the move completing is maximized."},
{q:"A trader risking 5% per trade goes through an 8-loss streak. Their drawdown is approximately:",type:"mc",opts:["8%","24%","40%","60%"],a:2,exp:"8 consecutive losses at 5% risk = approximately 40% drawdown. At 1-2% risk, the same 8-loss streak is 8-16% — recoverable. 40% drawdown is psychologically and financially devastating for most traders."},
{q:"The shortcut to becoming profitable in trading is:",type:"mc",opts:["Finding the right indicators","Getting better entries","Losses — they are the unavoidable cost of real learning","Trading higher timeframes only"],a:2,exp:"The shortcut in trading has one name: losses. You learn most from your losing trades — if you document them. Profitable traders didn't find a shortcut. They paid the tuition in losses and documented what the losses taught them."},
{q:"You have completed all 22 chapters of the CHRONOS CRT Academy. You are now ready to:",type:"mc",opts:["Trade with full size immediately","Start with demo trading, log every trade, review with Donna weekly","Never lose again — you know the full system","Stop learning — the system is complete"],a:1,exp:"Completing the academy means you understand the framework. Now the real work begins: demo trading, logging every trade, reviewing with Donna, identifying your personal patterns. Knowledge without practice is not an edge."}
]}
},

{q:"¿Por qué es importante registrar cada operación en el Diario?",type:"mc",opts:["No lo es — es opcional","Ayuda a Donna a aprender tus patrones específicos y darte coaching relevante","Copia automáticamente tus operaciones a Stripe","Es necesario para desbloquear nuevos capítulos"],a:1,exp:"El diario es cómo Donna aprende tus patrones. Sin él, el coaching es genérico. Con él, Donna puede ver exactamente qué estás haciendo bien, qué estás haciendo mal, y señalarlo por nombre."},

1:{s:[
{icon:"📊",title:"Un gráfico es solo una historia",body:"Un gráfico de precios te muestra qué hizo el precio a lo largo del tiempo. Léelo de izquierda a derecha — el lado izquierdo es el pasado, el lado derecho es el presente. El movimiento hacia arriba y hacia abajo muestra cómo cambia el precio. Cada momento que pasa, el gráfico añade un nuevo punto a la derecha.",donna:"Izquierda a derecha = tiempo. Arriba y abajo = precio. Eso es todo el gráfico. Todo lo demás son detalles sobre eso."},
{icon:"➖",title:"Niveles horizontales — donde el precio recuerda",body:"Las cosas más importantes que los traders dibujan en los gráficos son líneas horizontales. Una línea horizontal marca un precio donde ocurrió algo significativo — un máximo, un mínimo, un nivel donde el precio siguió rebotando. Cuando un trader dice 'hay un nivel en 100,' significa que el precio ha estado ahí antes y eso importa. Estas líneas horizontales cruzan el tiempo porque representan un PRECIO, no un momento.",donna:"Si el precio llegó a 100 y rebotó tres veces — 100 es un nivel. Márcalo. Dibuja una línea horizontal ahí. El precio tiene memoria."},
{icon:"🎯",title:"Qué estás mirando realmente",body:"Parte inferior del gráfico = precios bajos. Parte superior = precios altos. Una línea que sube significa que el precio está subiendo. Una línea que baja significa que el precio está bajando. Una línea plana significa que el precio no se mueve mucho. Eso es todo. Estás viendo la historia del precio, de izquierda a derecha, arriba y abajo.",donna:"Ya sabes qué es un gráfico. La mayoría de la gente complica esto demasiado. Es una imagen del precio a lo largo del tiempo. Simple."}
],q:[
{q:"¿En qué dirección lees un gráfico de precios?",type:"engage",opts:["De izquierda a derecha — el tiempo avanza hacia adelante","De derecha a izquierda — lo más reciente primero","Desde el centro hacia afuera","De arriba a abajo — el precio más alto primero"],a:0,exps:["Exacto. La izquierda es el pasado, la derecha es el presente. El tiempo avanza de izquierda a derecha, igual que al leer.","Buen instinto — pero en realidad es de izquierda a derecha. Pasado a la izquierda, presente a la derecha.","Enfoque interesante — pero el estándar es de izquierda a derecha. Pasado a la izquierda, presente a la derecha.","El gráfico sí va de arriba a abajo en términos de precio, pero el TIEMPO lo lees de izquierda a derecha. Buen razonamiento."]},
{q:"Una línea horizontal en un gráfico de trading representa:",type:"mc",opts:["Un momento específico en el tiempo","Un nivel de precio específico que ha sido significativo","La dirección actual de la tendencia","El precio promedio a lo largo del tiempo"],a:1,exp:"Las líneas horizontales representan niveles de PRECIO — lugares donde ocurrió algo importante. Corren horizontalmente porque el precio permanece igual a través del tiempo. Por eso se llaman 'niveles.'"},
{q:"El lado derecho del gráfico muestra el historial de precios más antiguo.",type:"tf",a:false,exp:"Falso. El lado DERECHO es el presente — la acción de precio más reciente. El lado izquierdo muestra el pasado. El tiempo avanza de izquierda a derecha."}
]},
2:{s:[
{icon:"📈",title:"No solo apostás a que suba",body:"La mayoría de la gente cree que el trading solo genera dinero cuando algo SUBE — como comprar una acción y esperar que suba. Ese es solo la mitad del juego. En el trading, puedes ganar cuando el precio baja igual de fácilmente que cuando sube. Si crees que el precio va a caer, vas en corto (SHORT). Si el precio cae, ganas. Si sube, pierdes. Funciona en ambas direcciones.",donna:"Arriba o abajo — ambas direcciones pagan. Eso es lo que hace al trading diferente de invertir. No estás atascado esperando que algo suba."},
{icon:"🔄",title:"Long vs short — dos palabras simples",body:"LONG significa que crees que el precio va a SUBIR. Compras, el precio sube, vendes más caro, ganas. SHORT significa que crees que el precio va a BAJAR. Vendes primero (la plataforma lo gestiona), el precio baja, recompras más barato, ganas. La plataforma hace la mecánica por ti — tú solo decides la dirección.",donna:"Long = arriba. Short = abajo. Literalmente eso es todo lo que significan esas palabras. Nada sofisticado. Elige una dirección, gestiona tu riesgo, deja que se desarrolle."},
{icon:"⚖️",title:"No tienes que tener razón todo el tiempo",body:"Un trader que gana 5 de cada 10 operaciones pero gana 3 veces lo que arriesga en cada ganadora puede ser muy rentable. El trading no se trata de tener razón siempre. Se trata de ganar más cuando tienes razón de lo que pierdes cuando te equivocas. Esa proporción es todo.",donna:"No estás intentando ser perfecto. Estás intentando ganar más en las victorias de lo que pierdes en las derrotas. Si tus ganancias son mayores que tus pérdidas, puedes permitirte equivocarte la mitad del tiempo."}
],q:[
{q:"¿Qué te emociona más?",type:"engage",opts:["📈 Ganar cuando el precio SUBE","📉 Ganar cuando el precio BAJA","🔄 Ambas — quiero todas las oportunidades","🤔 Aún estoy aprendiendo"],a:0,exps:["Traders en largo. Clásico. La mayoría empieza aquí — comprando cuando creen que el precio sube. Aprenderás ambas.","Los traders en corto aman atrapar mercados bajistas. Es una habilidad poderosa. También aprenderás esto.","Ese es el objetivo. Poder ganar en cualquier condición de mercado es lo que separa a los buenos traders de los grandes.","Inteligente. Entender viene antes que el dinero. Mantén esa mentalidad a lo largo de este curso."]},
{q:"Vas en SHORT en una operación. El precio cae de $2,000 a $1,990. Tú:",type:"mc",opts:["Ganaste — el precio cayó como esperabas","Perdiste — el precio fue en tu contra","Empataste — el movimiento fue demasiado pequeño","No se puede saber sin conocer el tamaño de la posición"],a:0,exp:"Cuando estás en SHORT y el precio cae, ganas. Ese es el punto de ir en corto — ganar cuando el precio baja. La caída de $2,000 a $1,990 sería una operación ganadora."},
{q:"Necesitas tener razón en más del 70% de las operaciones para ser rentable.",type:"tf",a:false,exp:"Falso. La rentabilidad depende de la proporción de ganancias a pérdidas, no solo de la tasa de acierto. Un trader que gana el 40% de las operaciones pero gana 3 veces más en las ganadoras puede ser muy rentable."}
]},
3:{s:[
{icon:"🕯️",title:"Una vela = una historia",body:"Una vela almacena todos los datos de precio de un período de tiempo específico. Si estás viendo un gráfico de 1 hora, cada vela muestra todo lo que pasó en UNA hora: dónde empezó el precio (Open), dónde fue más alto (High), dónde fue más bajo (Low), y dónde terminó (Close). Cuatro números. Una vela. La historia completa de esa hora.",donna:"Open. High. Low. Close. OHLC. Eso es lo que es cada vela en cada gráfico en todo el mundo. Cuatro números, un período de tiempo."},
{icon:"📦",title:"El cuerpo y las mechas",body:"La parte gruesa de la vela (el cuerpo) va desde donde abrió el precio (Open) hasta donde cerró (Close). Si cerró MÁS ALTO que abrió, el cuerpo típicamente es verde — los compradores ganaron ese período. Si cerró MÁS BAJO, el cuerpo es típicamente rojo — los vendedores ganaron. Las líneas delgadas arriba y abajo (las mechas) muestran dónde intentó ir el precio pero no pudo quedarse. Mecha arriba = el precio intentó subir más, fue rechazado. Mecha abajo = el precio intentó bajar más, fue rechazado.",donna:"Cuerpo = donde el precio se comprometió. Mecha = donde el precio intentó pero falló. Me importa mucho más dónde CERRÓ que dónde intentó ir."},
{icon:"⏱️",title:"Períodos de tiempo — tu elección",body:"Tú eliges el temporalidad. Una vela de 1 minuto = una vela por minuto. Una vela de 1 hora = una vela por hora. Una vela Diaria = una vela por día. Mismo mercado, mismo precio, imagen completamente diferente dependiendo del temporalidad que mires. Los traders usan múltiples temporalidades juntos para obtener el panorama completo.",donna:"Mismo mercado. Diferentes temporalidades. Diferentes historias. Más adelante aprenderás cuáles usar y cuándo. Por ahora — sabe que cada vela es solo un período de tiempo de datos."}
],q:[
{q:"¿Qué parte de una vela te dice más sobre hacia dónde va el precio realmente?",type:"engage",opts:["El cuerpo — donde se comprometió","Las mechas — donde intentó ir","El tamaño de la vela","El color"],a:0,exps:["El cuerpo muestra el compromiso. Donde abrió el precio y donde realmente cerró. Esa es la señal real.","Las mechas son fascinantes — muestran intentos y rechazos. Pero el cuerpo muestra el compromiso. Ambas importan, pero el compromiso > los intentos.","El tamaño importa — las velas más grandes muestran momentum más fuerte. Pero tienes razón en mirar el cuadro completo.","El color es una pista pero solo resume open vs close. El cuerpo y la posición cuentan la historia real."]},
{q:"Una vela en un gráfico Diario te muestra:",type:"mc",opts:["El precio exactamente al mediodía","Todos los datos de precio (open, high, low, close) para todo ese día de trading","Solo si el día fue alcista o bajista","El precio promedio de la semana"],a:1,exp:"Una vela Diaria contiene los cuatro datos del día de trading completo: dónde abrió el precio, dónde fue más alto, dónde fue más bajo, y dónde cerró. Una vela = la historia completa del día."},
{q:"La mecha de una vela muestra dónde cerró el precio.",type:"tf",a:false,exp:"Falso. La mecha muestra dónde INTENTÓ ir el precio pero no cerró. El CUERPO muestra el cierre. Esta distinción es una de las más importantes en todo CRT — los cierres importan, las mechas engañan."}
]},
4:{s:[
{icon:"🎮",title:"Practica primero — cuentas demo",body:"Antes de arriesgar cualquier dinero real, todo trader debe practicar en una cuenta demo. Una cuenta demo usa dinero falso pero condiciones de mercado reales — precios reales, movimientos reales, todo real. Es exactamente la misma experiencia que el trading en vivo, sin dinero real en juego. Aquí es donde aprendes a ejecutar operaciones, cometer errores y construir hábitos — gratis.",donna:"Practica en demo hasta que seas consistente. No por dos semanas. Hasta que realmente seas consistente. No hay atajo en este paso."},
{icon:"🏦",title:"Cuentas fondeadas — operando con dinero ajeno",body:"No necesitas miles de dólares propios para operar en serio. Los programas de cuentas fondeadas ponen a prueba tu disciplina y habilidad — tomas un challenge (operar una cuenta demo con reglas específicas), y si lo pasas, te dan dinero real para operar. Las cuentas van desde $25,000 hasta $200,000. Te quedas el 70-90% de las ganancias. Nunca arriesgas tus ahorros.",donna:"La industria paga por tu trading si puedes demostrar que eres disciplinado. El challenge ES la entrevista. Pásalo, te fondean. Ese es el camino que toma la mayoría de los traders serios."},
{icon:"🚀",title:"El camino inteligente hacia adelante",body:"Paso 1: Aprende el sistema (eso es este curso). Paso 2: Practica en demo hasta ser rentable. Paso 3: Toma un challenge de cuenta fondeada. Paso 4: Opera con capital fondeado y quédate con las ganancias. Este camino cuesta casi nada por adelantado y elimina la mayor barrera — la idea de que necesitas mucho dinero para empezar.",donna:"La mayoría de la gente se salta directo al paso 3 o 4. No lo hagas. La base importa. Este curso es el paso 1. Hazlo bien."}
],q:[
{q:"¿Dónde estás ahora en tu camino?",type:"engage",opts:["Principiante completo — nunca abrí un gráfico","Lo intenté antes y perdí dinero","Conozco algunas bases, quiero mejorar","Ya opero, quiero un mejor sistema"],a:0,exps:["Punto de partida perfecto. No tienes malos hábitos que desaprender. Ve cada capítulo en orden.","La experiencia, incluso la dolorosa, es valiosa. Has visto lo que no hay que hacer. Ahora aprenderás qué hacer.","Buena base sobre la que construir. Incluso los conceptos que crees conocer — vélos. CRT a menudo replantea las cosas.","Tu ventaja está en los detalles. Los capítulos sobre AMD, entradas y gestión serán los más valiosos para ti."]},
{q:"¿Qué es una cuenta demo?",type:"mc",opts:["Una suscripción de trading de pago","Una cuenta de práctica con dinero falso pero condiciones de mercado reales","Un tipo de programa de cuenta fondeada","Una herramienta avanzada de análisis de gráficos"],a:1,exp:"Una cuenta demo usa dinero falso con precios y condiciones de mercado reales. Es práctica gratuita — la misma experiencia que el trading en vivo, sin dinero real en juego. Cada trader debería pasar tiempo significativo aquí antes de operar en vivo."},
{q:"Necesitas tu propio dinero para tomar un challenge de cuenta fondeada.",type:"tf",a:false,exp:"Falso. Los challenges de cuentas fondeadas típicamente tienen una pequeña tarifa de participación (a menudo $100-500 dependiendo del tamaño de la cuenta), pero NO estás arriesgando capital de trading. Si pasas, te dan su dinero para operar. Si fallas el challenge, solo pierdes la tarifa del challenge."}
]},
5:{s:[
{icon:"⚖️",title:"El único número que importa: 2%",body:"Nunca arriesgues más del 1-2% de tu cuenta total en ninguna operación individual. Esto no es una preferencia. Es una regla. Si tu cuenta es $10,000, el riesgo máximo por operación es $200. Si es $1,000, el máximo es $20. Esto parece muy pequeño. Ese es exactamente el punto.",donna:"Los traders que revientan cuentas rompen esta regla. Siempre. El 1-2% te mantiene en el juego el tiempo suficiente para mejorar. Mejora primero. Luego compón."},
{icon:"🛡️",title:"Por qué esta regla te protege",body:"Con riesgo del 1-2%, puedes perder 10 operaciones seguidas y aún tener el 80-90% de tu cuenta. Con riesgo del 10%, 10 pérdidas y la cuenta desaparece. El trading tiene rachas de pérdidas — todos los traders las tienen. La regla del 1-2% significa que sobrevives las rachas y sigues operando. Una pérdida del 50% de la cuenta requiere una ganancia del 100% solo para volver al punto de partida. Nunca llegues ahí.",donna:"Las rachas de pérdidas llegan para todos. La regla no se trata de evitar pérdidas — se trata de sobrevivirlas. El 1-2% significa que las rachas duelen pero no te matan."},
{icon:"📐",title:"Cómo aplicarlo cada vez",body:"Antes de entrar en cualquier operación: 1) Decide dónde va tu stop loss (donde la operación está equivocada). 2) Calcula la distancia desde la entrada al stop. 3) Dimensiona tu posición para que esa distancia = 1-2% de tu cuenta. Nunca mueves el stop para permitir una posición más grande. Dimensionas la posición para que quepa en el stop. En ese orden. Siempre.",donna:"Entrada. Stop. Tamaño. En ese orden. Si alguna vez inviertes el orden — si defines el tamaño primero y luego pones el stop — estás apostando, no operando."}
],q:[
{q:"¿Cómo te hace sentir la regla del 1-2%?",type:"engage",opts:["Tiene todo el sentido — proteger el capital primero","Se siente demasiado pequeño — quiero ganancias mayores","Necesito pensar más en esto","Ya opero así"],a:0,exps:["Esa mentalidad te servirá. La preservación del capital es la base. Las ganancias se componen sobre una cuenta preservada.","Las ganancias llegan — pero solo si sigues en el juego para capturarlas. 10% de riesgo y 10 malas operaciones = cero. 2% de riesgo y 10 malas operaciones = todavía peleando.","Tómate tu tiempo. Haz los cálculos tú mismo — modela 10 pérdidas al 2% vs 10% y ve la diferencia. Los números lo hacen obvio.","Estás por delante de la mayoría de los traders. Esta es la regla que la mayoría aprende de la manera difícil."]},
{q:"Tu cuenta es $5,000. Siguiendo la regla del 2%, tu riesgo máximo por operación es:",type:"mc",opts:["$500 (10%)","$250 (5%)","$100 (2%)","$50 (1%)"],a:2,exp:"$5,000 × 2% = $100 de riesgo máximo por operación. Parece pequeño, pero significa que puedes tomar 10 operaciones perdedoras seguidas y aún te quedan $4,000. Ese es el punto — supervivencia y consistencia."},
{q:"Si una operación requiere un stop loss amplio, debes ajustar el stop para mantener el riesgo en 2%.",type:"tf",a:false,exp:"Falso. Si el stop necesita ser amplio, REDUCES EL TAMAÑO DE TU POSICIÓN para mantener el riesgo en 2%. NUNCA cambias el stop para que quepa el tamaño de posición deseado. El stop va donde la operación está invalidada — eso no es negociable."}
]},
6:{s:[
{icon:"📊",title:"Cuatro partes, una verdad",body:"Cada vela te dice cuatro cosas: Open (apertura — donde empezó), Alto (donde intentó ir), Bajo (donde probó), Close (cierre — donde terminó). El cuerpo — entre el open y el close — es donde el precio se comprometió. Las mechas son donde el precio fue rechazado. El Oro abre en $1,985, la mecha llega hasta $2,010, pero cierra en $1,992. Ese cierre en $1,992 es el único que importa — no dónde fue la mecha, sino dónde cerró.",donna:"El cuerpo es donde los traders ponen dinero real. La mecha es donde quedaron atrapados. Lee el cuerpo, ignora el drama."},
{icon:"🎯",title:"El cierre lo decide todo",body:"Un cierre por encima de una resistencia significa compromiso — el precio se fue y se quedó. Una mecha por encima que cierra de regreso adentro significa rechazo — el precio intentó, falló, y fue rechazado. El Oro mecheando hasta $2,020 pero cerrando en $1,995 es completamente bajista. El Oro cerrando en $2,020 es completamente alcista. Misma ubicación de mecha, significado opuesto. El cierre decide todo.",donna:"No me importa dónde fue la mecha. Muéstrame el cierre. Esa es la única pregunta."}
,
{icon:"📗",title:"Velas alcistas vs bajistas",body:"Una vela alcista: el precio abrió abajo y cerró más arriba. El cierre está POR ENCIMA de la apertura — ganaron los compradores. Una vela bajista: abrió arriba y cerró más abajo — ganaron los vendedores. El color es solo un resumen. Lo que importa es dónde cerró la vela respecto a donde abrió.",donna:"Vas a leer miles de estas. Cada una es una batalla. El cierre te dice quién ganó."},
{icon:"💪",title:"El tamaño del cuerpo = convicción",body:"Un cuerpo pequeño significa compradores y vendedores casi iguales — sin ganador claro. Un cuerpo grande significa que un lado dominó completamente. Una vela que abre en un extremo y cierra en el otro es convicción máxima. Cuerpo grande = movimiento fuerte = alguien con dinero real está comprometido con esa dirección.",donna:"Los cuerpos pequeños son ruido. Los cuerpos grandes son señales. Entrena tu ojo para verlo al instante."},
{icon:"📏",title:"Las mechas cuentan la historia del rechazo",body:"Una mecha superior larga significa que el precio intentó subir más — pero los vendedores lo empujaron hacia abajo antes del cierre. Una mecha inferior larga significa que el precio intentó bajar — pero los compradores lo rechazaron. Las mechas son intentos FALLIDOS. El cierre supera a la mecha en todo momento.",donna:"Cada mecha larga es un intento fallido. Alguien lo intentó y fue detenido. Recuérdalo."}],q:[
{q:"EUR/USD mecha hasta $2,015 pero cierra en $2,010, de regreso dentro del rango de la semana. CRT dice:",type:"mc",opts:["Alcista — llegó a $2,015","Bajista — el movimiento alcista fue falso","Neutral — espera más datos","Compra el cierre en $2,010"],a:1,exp:"Mecha arriba + cierre adentro = movimiento falso = Turtle Soup. El cierre en $2,010 revela la dirección real. El precio probó $2,015, fue rechazado, y eso es bajista."},
{q:"Oro cierra en $2,018, por encima del alto del mes pasado de $2,010. Tu sesgo es:",type:"mc",opts:["Bajista — vende en la fortaleza","Sin sesgo todavía","Alcista — el cierre confirmó el rompimiento","Espera un nuevo test de $2,010"],a:2,exp:"Cierre por encima del alto anterior = True Break = sesgo alcista confirmado. El precio se comprometió a estar por encima de $2,010 cerrando ahí. Esa es tu señal."},
{q:"La mecha de una vela es más importante que el cierre para determinar la dirección del mercado.",type:"tf",a:false,exp:"Falso. El cierre lo es todo en CRT. Las mechas muestran intentos. Los cierres muestran resultados. Operas cierres, no mechas."}
]},
7:{s:[
{icon:"🗺️",title:"Tres estados. Una pregunta.",body:"Todo gráfico está en uno de tres estados: En Tendencia (movimientos direccionales consistentes), En Rango (precio rebotando entre dos niveles definidos como EUR/USD atascado entre $1,980 y $2,015 por semanas), o No Structure (aleatorio, sin estructura, sin operación). La mayoría de las pérdidas vienen de aplicar estrategias de tendencia en mercados en rango. Identifica el estado primero. Cada. Vez.",donna:"¿En qué estado está esto? Pregúntalo antes de hacer cualquier cosa. Si no puedes responderlo con confianza — es no structure. No operes no structure."},
{icon:"🚫",title:"Nunca operes el medio",body:"En un rango, el 50% del medio es tierra de nadie. Si EUR/USD está en rango entre $1,980 y $2,000, el medio es $1,990. No operas en $1,990. Compras cerca de $1,980 y vendes cerca de $2,000. El medio es donde tanto alcistas como bajistas quedan picados y nadie gana. ¿Precio en el borde del rango? Esa es tu operación. ¿Precio en el medio? Ve a buscar otra cosa.",donna:"El medio de un rango significa que los dos lados pierden. Si estás operando ahí, eres la liquidez de salida para todos los que entraron en los bordes."}
,
{icon:"📊",title:"Jerarquía de niveles: no todos son iguales",body:"Los niveles del Diario y Semanal son los más poderosos — las instituciones los ven primero. Luego los del 4H. Luego los del 1H. Cuanto mayor la temporalidad del nivel, más lo respeta el precio. Un alto diario que aguanta semanas es más significativo que un alto de 1H que aguanta horas. Siempre marca primero tus niveles de temporalidad mayor, luego busca entradas en los menores que se alineen.",donna:"Un nivel de 1 minuto no significa nada sin un nivel Diario cerca. Siempre construye top-down."}],q:[
{q:"EUR/USD ha estado rebotando entre $1,980 y $2,015 por tres semanas. El precio está en $2,010. Tú:",type:"mc",opts:["Compras — parece que rebotó del soporte","Vendes — volverá hacia abajo","Esperas — estás en tierra de nadie","Buscas una entrada de rompimiento aquí"],a:2,exp:"$2,010 es el medio del rango de $1,980-$2,015 — tierra de nadie. Esperas a que el precio alcance los bordes antes de considerar una operación."},
{q:"Nasdaq está haciendo máximos más altos y mínimos más altos consistentemente. El estado del mercado es:",type:"mc",opts:["En rango","No structure","En tendencia","En transición"],a:2,exp:"Máximos más altos y mínimos más altos = mercado en tendencia. Estructura direccional clara significa que buscas entradas en pullback en la dirección de la tendencia, no en los bordes del rango."},
{q:"Un mercado no structure sin estructura debería operarse con posiciones más pequeñas para manejar el riesgo.",type:"tf",a:false,exp:"Falso. Un mercado no structure no debería operarse en absoluto. Un tamaño más pequeño no arregla una mala condición de mercado. Sin estructura = sin operación. Siéntate en tus manos."}
]},
8:{s:[
{icon:"🔭",title:"HTF — el por qué",body:"El Temporalidad Superior (gráfico Diario o Semanal) te dice POR QUÉ debería moverse el precio. Es tu brújula. Si la vela Diaria cerró por encima de un alto significativo anterior, tu sesgo HTF es alcista. Si mechó arriba y cerró de regreso adentro, el HTF dice bajista. Este sesgo anula todo en temporalidades inferiores. Operar contra el Diario es como nadar contra la corriente.",donna:"La vela Diaria es tu jefe. Todos los demás temporalidades trabajan para el Diario. No al revés."},
{icon:"📡",title:"ITF — el qué",body:"El Temporalidad intermedia (gráfico 4H) te muestra QUÉ está pasando — ¿se está formando realmente el patrón CRT? Aquí es donde observas la secuencia AMD desarrollándose: la acumulación construyendo, luego la manipulación (Turtle Soup) ocurriendo. El 4H confirma que lo que predijo el Diario está realmente sucediendo. Sin confirmación del 4H, estás adivinando.",donna:"Si el 4H no confirma, el setup aún no existe. Espéralo. Tu paciencia es tu ventaja."},
{icon:"⏱️",title:"LTF — el cuándo y dónde",body:"El Temporalidad Inferior (1H o 15min) te da la entrada precisa — CUÁNDO y DÓNDE. Aquí es donde ves la vela Modelo #1 que activa tu entrada. Pero aquí está la cosa: un Modelo #1 perfecto en el 1H sin razón HTF detrás es solo una vela. No es una operación. Los tres temporalidades deben alinearse para un setup de alta probabilidad.",donna:"Una vela hermosa en el 1H sin razón Diaria es solo una vela bonita. No operas lo bonito. Operas lo alineado."}
,
{icon:"🌍",title:"La temporalidad diaria: tu norte",body:"El Diario muestra una vela por día — toda la batalla del día. Aquí vive el panorama completo. ¿Sube el precio? ¿Baja? ¿Está en rango? Respondes esto en el Diario. Todo lo que hagas en temporalidades menores debe estar de acuerdo con el Diario. Cuando el Diario dice bajista — buscas ventas solamente.",donna:"El Diario no es donde entras. Es donde encuentras tu dirección. Nunca lo pelees."},
{icon:"🗺️",title:"La temporalidad de 4H: tu plano",body:"La temporalidad de 4 horas muestra la estructura intermedia. En el Diario conoces la dirección. En el 4H ves la manipulación formándose — el movimiento falso, el setup del Turtle Soup, el C2 de la secuencia. El 4H también muestra Order Blocks y Fair Value Gaps clave con los que el precio interactuará durante tu sesión.",donna:"Piensa en el 4H como el plan. El Diario te da la misión. El 4H te muestra cómo ejecutarla."},
{icon:"🎯",title:"1H y 15M: donde aprietas el gatillo",body:"Las temporalidades de 1 hora y 15 minutos son donde encuentras tu entrada precisa. Cuando llegas aquí, ya conoces tu dirección (Diario) y tu setup (4H). El 1H muestra la vela Modelo #1 formándose exactamente. El 15M te da el trigger más cercano. Las entradas ocurren aquí. Todo lo demás es contexto. Punto clave para traders de análisis técnico tradicional: los niveles de temporalidad menor existen DENTRO de los niveles de temporalidad mayor. Una zona de soporte de 1 hora solo importa si se alinea con un nivel en el Diario o el 4H.",donna:"Las temporalidades bajas sin contexto de las altas es simplemente adivinar. Con contexto, es precisión."}],q:[
{q:"Ves una vela de entrada perfecta en el 1H pero el Diario muestra sesgo bajista. Tú:",type:"mc",opts:["La tomas — la entrada del 1H es perfecta","La saltas — el sesgo Diario anula","La tomas con la mitad del tamaño","Esperas la próxima vela del 1H"],a:1,exp:"El sesgo Diario (HTF) anula todo. Operar una entrada larga contra un Diario bajista es pelear contra la corriente. Saltátela — aunque el 1H se vea perfecto."},
{q:"El trabajo principal del temporalidad 4H en tu análisis es:",type:"mc",opts:["Establecer el sesgo direccional","Confirmar que el patrón CRT se está formando","Dar el precio de entrada preciso","Determinar tu nivel de stop"],a:1,exp:"El 4H (ITF) confirma que el patrón AMD se está desarrollando y que el setup que predijo el Diario está realmente ocurriendo. Es el puente entre el POR QUÉ y el DÓNDE."},
{q:"El temporalidad 1H da el sesgo direccional principal para tus operaciones.",type:"tf",a:false,exp:"Falso. El HTF (Diario/Semanal) da el sesgo. El 1H da el tiempo de entrada y el nivel preciso. Trabajar de abajo hacia arriba es uno de los errores más comunes en el trading."},
{q:"Sin alineación del Temporalidad Superior, una vela Modelo #1 en el 1H es:",type:"mc",opts:["Todavía válida con un stop ajustado","Una operación de alta probabilidad","Solo una vela sin respaldo CRT","Vale la mitad del tamaño de posición"],a:2,exp:"Sin razón HTF = sin operación. Un Modelo #1 sin alineación HTF es solo un patrón de vela. CRT requiere el POR QUÉ antes del DÓNDE. Sin por qué = sin operación."}
]},
9:{s:[
{icon:"🏦",title:"Retail vs Smart Money",body:"Los traders minoristas fueron enseñados a comprar rompimientos por encima de altos anteriores. Eso significa que sus órdenes de compra se acumulan justo por encima de cada máximo significativo en el mercado. El Smart Money — bancos, fondos, instituciones — sabe exactamente dónde están apiladas esas órdenes. Usan el comportamiento predecible del retail como combustible para llenar sus propias posiciones masivas al mejor precio posible.",donna:"Te enseñaron a operar de la manera equivocada. A todos les enseñaron. Ese era el punto. Déjalo absorber."},
{icon:"🪤",title:"Cómo funciona la trampa",body:"El Oro se acerca a un alto anterior en $2,050. Los stops de compra del retail están apilados justo arriba. El precio sube a $2,010, activando cada orden de compra. El Smart Money vende a todos esos compradores — acaban de llenar sus cortos en $2,010 con liquidez ilimitada. El precio revierte inmediatamente, cae a $1,990, y todos los que compraron el rompimiento están parados o sosteniendo una posición perdedora.",donna:"Cada vez que compraste un rompimiento y te destruyeron inmediatamente? No fue mala suerte. Ese era el plan. Su plan."},
{icon:"👀",title:"Leyendo sus huellas",body:"La buena noticia: el Smart Money deja huellas. Cuando el precio sube por encima de un alto anterior con una mecha que cierra de regreso adentro — eso es ellos recolectando. Cuando el precio cierra decisivamente por encima de un alto — están distribuyendo, y el retail está realmente en lo correcto esta vez. El cierre te dice qué juego se está jugando. Una vez que puedes leerlo, dejas de ser la presa.",donna:"No puedes vencer al Smart Money. Pero puedes aprender a leerlos. Ese es el juego completo."}
,
{icon:"🐋",title:"La ballena en la piscina",body:"Imagina una ballena intentando nadar en una piscina pequeña. Cada vez que se mueve, el agua se mueve con ella — no contra ella. Un banco intentando comprar $500 millones de una divisa no puede comprarlo todo de una vez sin mover el precio en su contra. Así que compra por etapas. Construye un rango. Crea la fase de acumulación. El comportamiento del precio que ves en el gráfico ES la ballena moviéndose. No es aleatorio. No es emocional. Es mecánico.",donna:"Una vez que entiendes esto, el gráfico deja de parecer ruido y empieza a verse como un plan."},
{icon:"👣",title:"Leyendo la huella institucional",body:"Las instituciones no pueden esconder completamente sus operaciones. Dejan huellas: Order Blocks (la última vela antes de un movimiento importante — donde se posicionaron), Fair Value Gaps (se movieron tan rápido que dejaron un hueco de precio — volverán a llenarlo), y Turtle Soups (necesitaban capturar liquidez de stops antes de su movimiento real). Estos tres patrones SON la huella institucional. Cada setup importante en esta metodología es uno de estos tres.",donna:"No estás luchando contra las instituciones. Las estás siguiendo. Esa es toda la estrategia."}],q:[
{q:"Oro sube por encima del alto anterior de $2,010 durante Londres, recolectando todos los stops de compra, luego cierra el diario en $1,995 — de regreso adentro. ¿Qué pasó?",type:"mc",opts:["Rompimiento alcista — compra","El Smart Money recolectó stops de compra luego vendió","Volatilidad aleatoria","Consolidación antes del movimiento real alcista"],a:1,exp:"Turtle Soup clásico de recolección de liquidez. El precio subió por encima de $2,010, activó los stops de compra del retail, el Smart Money vendió a esos compradores, y el cierre en $1,995 revela la dirección real — bajista."},
{q:"¿Dónde típicamente se acumulan las órdenes de stop de compra del retail?",type:"mc",opts:["En el medio de los rangos","Por debajo de bajos anteriores","Justo por encima de altos anteriores","Solo en números redondos"],a:2,exp:"Al retail le enseñaron a comprar rompimientos por encima de máximos. Entonces sus órdenes de stop de compra se apilan justo por encima de cada alto anterior significativo — exactamente donde el Smart Money apunta para llenar posiciones cortas."},
{q:"El Smart Money mueve el precio encontrando ubicaciones predecibles de órdenes del retail y operando contra ellas.",type:"tf",a:true,exp:"Verdadero. El comportamiento consistente del retail (comprar rompimientos por encima de máximos, vender rompimientos por debajo de mínimos) crea los pools de liquidez que el Smart Money necesita para llenar posiciones masivas a escala."},
{q:"Un trader retail compra EUR/USD cuando rompe por encima de $2,015. El precio revierte inmediatamente a $1,992. La explicación más probable:",type:"mc",opts:["Fluctuación aleatoria del mercado","El stop era muy ajustado","El Smart Money vendió a los stops de compra del retail por encima de $2,015","Los market makers activaron su stop"],a:2,exp:"Esto es el Turtle Soup en acción. El Smart Money apuntó a las órdenes de compra del retail por encima de $2,015, vendió a ellos cuando esas órdenes se activaron, recolectó la liquidez, y el precio revirtió. Esto no es aleatorio — es el mecanismo."}
]},
10:{s:[
{icon:"💧",title:"Dos razones. Solo dos.",body:"Cada movimiento de precio en la historia de cada mercado sucedió por exactamente dos razones: alcanzar un pool de liquidez (stops de compra por encima de máximos, stops de venta por debajo de mínimos) o llenar un desequilibrio de precio (un gap donde el precio se movió demasiado rápido y dejó un área sin probar). Desde un tick de 5 points hasta una tendencia de un año — uno de esos dos. Ese es todo el motor.",donna:"Liquidez o desequilibrio. Escríbelo. Enmárcalo. Ese es el juego completo en cuatro palabras."},
{icon:"🎯",title:"Externa vs interna",body:"La liquidez externa está en los extremos — altos y bajos anteriores — el destino final. La liquidez interna está dentro del rango — Fair Value Gaps, Order Blocks, desequilibrios. El precio cicla de interna a externa y de regreso, constantemente. Tu trabajo antes de cualquier operación: saber hacia cuál se dirige el precio ahora mismo. Si no puedes responder eso, no tienes una operación.",donna:"Antes de cualquier entrada — ¿hacia dónde va el precio? Si no puedes señalar un nivel y decir 'AHÍ' con confianza, no estás listo para entrar."},
{icon:"🔄",title:"El ciclo nunca para",body:"El precio barre un bajo anterior (agarra stops de venta), llena desequilibrios en el camino hacia arriba (liquidez interna), alcanza el alto anterior arriba (agarra stops de compra), llena desequilibrios en el camino hacia abajo. Este ciclo se repite en cada temporalidad simultáneamente. El Semanal lo hace. El Diario lo hace dentro del Semanal. El 4H lo hace dentro del Diario. Fractales hasta abajo.",donna:"Una vez que ves el ciclo, no puedes ignorarlo. Cada movimiento tiene sentido. Cada reversión es predecible. Ahí es cuando el trading deja de ser un juego de azar."}
,
{icon:"🎣",title:"Donde se acumulan los stops",body:"Cada trader comprado tiene un stop loss POR DEBAJO del bajo más reciente. Cada trader vendido tiene un stop POR ENCIMA del alto más reciente. Esto significa que debajo de cada bajo hay un grupo de stops de compra. Encima de cada alto hay un grupo de stops de venta. Estos grupos son pools de liquidez. El mercado sabe exactamente dónde están.",donna:"Tu stop loss es el objetivo de alguien más. No es conspiración — es la estructura del mercado."},
{icon:"🏹",title:"La caza: por qué el precio busca estos niveles",body:"Para llenar una orden de compra grande, una institución necesita vendedores. La zona más concentrada de vendedores está justo debajo de un bajo de swing donde están los stop losses. El precio baja, activa esos stops, llena la orden institucional y luego revierte. Esa barrida del bajo ES el Turtle Soup. No es aleatoria. Es el mercado haciendo su trabajo.",donna:"Cada vez que ves el precio perforar un bajo y cerrar de vuelta adentro — los stops acaban de ser cazados. Esa es tu señal."},
{icon:"⚖️",title:"Dos tipos de liquidez",body:"Liquidez externa: los altos y bajos de sesiones anteriores, días y semanas anteriores. Estos son los objetivos grandes. Liquidez interna: Fair Value Gaps y Order Blocks dentro del rango actual. Cuando se barre la liquidez externa, el precio vuelve a llenar los gaps internos. Saber qué tipo estás viendo te dice exactamente qué intenta hacer el precio ahora.",donna:"Siempre pregunta: ¿qué está cazando el precio ahora mismo? La respuesta siempre es una de estas dos cosas."}],q:[
{q:"EUR/USD barre por debajo del bajo de la semana pasada de $1,975, agarra stops de venta, luego revierte inmediatamente hacia arriba. Esto te dice:",type:"mc",opts:["Rompimiento real — vende","Recolección de liquidez — el precio tomó los stops de venta, ahora probablemente va arriba","Volatilidad aleatoria — sin operación","Rompimiento fallido — espera"],a:1,exp:"El precio barrió la liquidez externa por debajo de $1,975 (stops de venta), luego revirtió. El barrido recolectó el combustible que el Smart Money necesitaba. La dirección de reversión es alcista — hacia el próximo objetivo de liquidez arriba."},
{q:"¿Cuál es la diferencia entre liquidez Externa e Interna?",type:"mc",opts:["Externa es más grande, interna son movimientos más pequeños","Externa está en máximos/bajos anteriores (destinos finales), interna está dentro del rango (FVGs, OBs)","Externa solo está en temporalidades superiores","Son lo mismo, nombres diferentes"],a:1,exp:"Liquidez externa = altos y bajos anteriores (los destinos finales). Liquidez interna = desequilibrios (FVGs, Order Blocks) dentro del rango. El precio usa la interna como peldaños para alcanzar la externa."},
{q:"Antes de encontrar tu entrada, primero debes identificar hacia dónde va el precio (tu objetivo).",type:"tf",a:true,exp:"Verdadero. Objetivo primero, siempre. Sin saber hacia dónde va el precio, tu entrada no tiene contexto y no tiene un take-profit lógico. El objetivo define si la operación tiene sentido."},
{q:"El precio recolectó los stops de compra por encima de $2,020 en EUR/USD y cerró de regreso adentro en $2,015. ¿Hacia dónde irá el precio más probablemente después?",type:"mc",opts:["Más arriba — el momentum es alcista","Lateral — consolidación","Más abajo — hacia mínimos internos o externos","No se puede determinar"],a:2,exp:"Después de recolectar stops de compra por encima de $2,020 (Turtle Soup) y cerrar adentro en $2,015, el Smart Money vendió a esos compradores. El precio ahora debería moverse hacia abajo hacia el próximo objetivo de liquidez."}
]},
11:{s:[
{icon:"🗺️",title:"Objetivo primero. Siempre.",body:"El error más común en el trading: buscar una entrada antes de saber el objetivo. Si no sabes HACIA DÓNDE va el precio, no puedes saber SI la operación tiene sentido o cuál será la relación riesgo-recompensa. EUR/USD en $2,000 con objetivo en $2,020 = 90 points potenciales. Con objetivo en $1,995 = 20 points potenciales. Misma entrada, operación completamente diferente.",donna:"La entrada es lo último que buscas. El objetivo es lo primero. Esto no es opcional."},
{icon:"🎯",title:"Cómo encontrar tu objetivo",body:"Mira hacia la izquierda. Encuentra los niveles significativos no probados — altos anteriores arriba (stops de compra), bajos anteriores abajo (stops de venta). Los objetivos más poderosos son altos anteriores que se formaron después de un barrido de un mínimo, o bajos anteriores que se formaron después de un barrido de un máximo. Oro en $1,990? Ese alto anterior en $2,025 que se formó después del barrido de $1,965 es tu objetivo.",donna:"El nivel del que nadie habla es usualmente el próximo objetivo. Los obvios son anticipados por todos. Busca los limpios que se formaron después de un barrido."},
{icon:"🛤️",title:"La ruta: ERL a IRL",body:"El precio no va de nivel externo a nivel externo en línea recta. Va Externo → Interno → Externo. Desde el barrido del bajo anterior, arriba a través de Fair Value Gaps y Order Blocks (interno), hasta el alto anterior. Entender esta ruta te permite mapear no solo el objetivo final sino los niveles intermedios donde el precio pausará, acelerará o retrocederá. Ahí es donde viven tus entradas.",donna:"Conoce la ruta completa antes de subirte al carro. ERL a IRL a ERL. Mapéala. Luego espera la entrada en esa ruta."}
,
{icon:"🚌",title:"La parada de autobús institucional",body:"Piensa en un Order Block como una parada de autobús. La institución (el autobús) se detuvo aquí para recoger pasajeros (llenar su orden). El autobús luego se fue — el precio se movió fuertemente en una dirección. Cuando el precio vuelve a esa misma parada, la institución está ahí de nuevo, recogiendo a los últimos pasajeros. Por eso el precio reacciona en los Order Blocks. No es magia. La institución todavía tiene órdenes sin llenar esperando ahí.",donna:"Cuando ves que un Order Block aguanta, estás viendo a una institución terminando lo que empezó."}],q:[
{q:"Oro está en $1,990. Máximo anterior en $2,025, bajo anterior en $1,965. El precio acaba de barrer el mínimo de $1,965. Tu objetivo más probable es:",type:"mc",opts:["$1,975 — la resistencia más cercana","$1,990 — precio actual","$2,025 — el alto anterior arriba","Por debajo de $1,965 — continuación hacia abajo"],a:2,exp:"El precio barrió el bajo anterior en $1,965 (recolectó stops de venta), sugiriendo una reversión. El objetivo lógico ahora es la liquidez externa arriba — el alto anterior en $2,025."},
{q:"Tu entrada es en $2,000. Stop es 25 points. El objetivo más cercano es 15 points de distancia. Tú:",type:"mc",opts:["La tomas — el setup se ve bien","La saltas — relación riesgo-recompensa negativa","Ajustas el stop a 10 pips","Tomas la mitad del tamaño"],a:1,exp:"Objetivo 15 points, stop 25 points = 0.6:1 riesgo-recompensa. Eso es negativo. Ninguna calidad de setup justifica una operación con R negativo. El objetivo define si la operación tiene sentido."},
{q:"Debes identificar tu objetivo de liquidez antes de buscar una vela de entrada.",type:"tf",a:true,exp:"Verdadero. Objetivo primero, siempre. Sin un objetivo, no tienes idea si la recompensa justifica el riesgo. La entrada es el último paso, no el primero."},
{q:"¿Qué hace que un alto anterior sea más significativo como objetivo que otro?",type:"mc",opts:["Es el más reciente","Es el máximo más alto en el gráfico","Se formó después de un barrido de un mínimo — pool de liquidez limpio","Ha sido probado múltiples veces"],a:2,exp:"Los altos anteriores que se formaron después de un barrido de un mínimo son los objetivos más limpios. El barrido creó el combustible (recolectó stops de venta), ahora el máximo arriba es donde los stops de compra están apilados — el próximo objetivo del Smart Money."}
]},
12:{s:[
{icon:"🐢",title:"Cada gran movimiento empieza aquí",body:"Antes de cada movimiento de precio significativo, hay un rompimiento falso. Antes de una gran caída, el precio sube por encima de un alto anterior para activar stops de compra. Antes de un gran rally, el precio rompe por debajo de un bajo anterior para activar stops de venta. Esto no es un patrón que pasa a veces — es el mecanismo que permite el posicionamiento a gran escala del Smart Money.",donna:"El rompimiento falso no es un error en la matrix. ES la matrix. Una vez que lo ves, lo operas en lugar de quedar atrapado por él."},
{icon:"📋",title:"Tres tipos de Turtle Soup",body:"Continuación: barrido breve de un máximo reciente dentro de una tendencia, luego continuación — entrada en pullback. Rango: el precio barre el máximo o mínimo de un rango establecido — reversión clásica. Reversión: en un nivel estructural HTF mayor, el precio barre y revierte completamente — esta es la Entrada 1, la más poderosa y de mayor recompensa. El Turtle Soup de reversión HTF es lo que construyes alrededor de tu sistema.",donna:"El tipo de reversión HTF es el bueno. El más difícil de capturar en vivo. El más violento cuando va. Entrada 1. Aprende a reconocerlo."},
{icon:"⚡",title:"El swing de falla",body:"Después de un Turtle Soup, observa el swing de falla — el precio intenta volver en la dirección del rompimiento falso pero hace un máximo más bajo (o mínimo más alto si está abajo). EUR/USD rompimiento falso por encima de $2,015, cierra en $1,997, luego intenta de nuevo hasta $2,010 pero falla — ese máximo más bajo es confirmación. El swing de falla te dice que el Turtle Soup es real y el movimiento está por comenzar.",donna:"El swing de falla es tu confirmación. No te lo saltes. Filtra el 80% de las señales falsas."},
{icon:"🚫",title:"Regla 1: nunca compres por encima de un alto anterior",body:"La regla más importante en CRT: nunca compres por encima de un alto anterior, nunca vendas por debajo de un bajo anterior. El rompimiento casi siempre es falso. El cierre de regreso adentro es tu señal. Un cierre genuino por encima es la excepción — e incluso entonces, esperas el pullback, no el rompimiento mismo. Esta regla elimina la operación perdedora más común en el trading retail.",donna:"Nunca compres por encima de un alto anterior. Si olvidas todo lo demás que te enseñé — recuerda esto. Ponlo en tu pantalla."}
,
{icon:"🔢",title:"El FVG con números concretos",body:"Aquí tienes un ejemplo exacto con Oro: Vela 1 cierra en $2,000. Vela 2 abre en $2,000, dispara hasta $2,020 y cierra en $2,018. Vela 3 abre en $2,010. El espacio entre el cierre de Vela 1 ($2,000) y la apertura de Vela 3 ($2,010) — ese hueco de $10 — es el Fair Value Gap. El precio se movió tan rápido a través de esa zona que no hubo operaciones reales ahí. El mercado volverá a esa zona. Tiene que llenar el desequilibrio. Siempre.",donna:"Marca cada FVG que encuentres. El precio vuelve. Esto no es una opinión — es mecánica del mercado."}],q:[
{q:"EUR/USD mecha por encima del alto del mes pasado de $2,020, luego cierra el diario en $2,005. CRT dice:",type:"mc",opts:["Alcista — compra el rompimiento","Turtle Soup bajista — el Smart Money vendió por encima de $2,020","Neutral — espera","Alcista — la mecha muestra demanda"],a:1,exp:"Mecha arriba de $2,020, cierre adentro en $2,005 = Turtle Soup. El Smart Money agarró stops de compra por encima del alto y vendió a ellos. El cierre diario en $2,005 confirma el sesgo bajista."},
{q:"¿Qué tipo de Turtle Soup tiene la mayor probabilidad y recompensa?",type:"mc",opts:["Tipo continuación en una tendencia","Reversión en extremo de rango","Reversión en un nivel estructural HTF mayor","Cualquier tipo con una mecha grande"],a:2,exp:"El Turtle Soup de reversión HTF es la Entrada 1 — la de mayor calidad. Combina la máxima recolección de liquidez con la máxima importancia estructural. El más difícil de capturar en vivo, el más poderoso cuando lo logras."},
{q:"Después de un Turtle Soup por encima de un alto anterior, el precio intenta volver pero solo alcanza un máximo más bajo antes de revertir. Esto se llama:",type:"mc",opts:["Doble techo","Falso cambio de carácter","El swing de falla — confirma el Turtle Soup","Consolidación antes de continuar"],a:2,exp:"El swing de falla — el precio falló en volver donde ocurrió el rompimiento falso, haciendo un máximo más bajo. Esto confirma el Turtle Soup y te da tiempo de entrada de alta confianza."},
{q:"Deberías comprar cuando el precio cierra por encima de un alto anterior con volumen y momentum fuertes.",type:"tf",a:false,exp:"Falso en CRT. El volumen no cambia el análisis. Un cierre por encima de un alto anterior necesita contexto — ¿es un True Break o será objeto de Turtle Soup? E incluso si es True Break, esperas el pullback, no el rompimiento mismo."},
{q:"El Oro se acerca al alto anterior de $2,000. La Regla 1 de CRT dice que deberías:",type:"mc",opts:["Comprar el rompimiento por encima de $2,000","Observar el Turtle Soup — esperar un rompimiento falso y reversión","Poner un stop de compra por encima de $2,000","Comprar cuando el precio toca $2,000"],a:1,exp:"Regla 1: Nunca compres por encima de un alto anterior. La jugada correcta es observar el Turtle Soup — precio mecheando por encima de $2,000 y cerrando de regreso adentro. Esa es tu señal de venta, no de compra."}
]},
13:{s:[
{icon:"📅",title:"AMD — el patrón universal",body:"Cada movimiento de precio en cada temporalidad sigue tres fases. Acumulación (C1): el precio forma rango, construyendo el resorte. Manipulación (C2): el rompimiento falso — el Turtle Soup — la recolección de liquidez. Distribución (C3): el movimiento real — tu operación. Lunes en rango (C1), Martes rompe el máximo con cierre de regreso adentro (C2), Miércoles-Jueves cae fuerte (C3). Eso es AMD en el semanal. Funciona en cada temporalidad.",donna:"C2 es la vela más tentadora de operar. Se ve explosiva. Se ve obvia. Nunca operes C2. Está diseñada para atraparte."},
{icon:"📆",title:"AMD en el semanal",body:"El Lunes construye el rango de acumulación semanal. El Martes es el día de manipulación — aquí es donde el máximo o mínimo semanal real casi siempre se forma. El Miércoles y Jueves distribuyen en la dirección verdadera. Si sabes que el Martes es el día de manipulación, dejas de operar rompimientos del Martes y empiezas a operar el seguimiento del Miércoles. Solo ese cambio mejorará tus resultados inmediatamente.",donna:"Marca el máximo y mínimo del Martes. Cada semana. Ahí es usualmente donde está el Máximo o Mínimo semanal. No estoy bromeando."},
