{icon:"🗓️",title:"AMD en el mensual",body:"Semana 1 del mes = acumulación. Semana 2 = manipulación (el máximo o mínimo mensual falso se forma aquí). Semana 3-4 = distribución (el movimiento mensual real). Por eso los mercados frecuentemente van en una dirección las primeras dos semanas del mes, luego revierten violentamente en la semana 3. Si operas rompimientos de la Semana 2 como si fueran reales — eres el combustible para la reversión de la Semana 3.",donna:"La Semana 2 es la semana de manipulación. Si operas rompimientos de la Semana 2 como si fueran reales — eres la liquidez. Cada mes."},
{icon:"🔄",title:"Fractales — el mismo patrón a cada velocidad",body:"AMD se repite en cada temporalidad simultáneamente. La vela de manipulación en el Semanal contiene su propio AMD en el Diario. El día de manipulación Diario contiene su propio AMD en el 4H. Cuando encuentras alineación AMD en tres temporalidades simultáneamente — Semanal AMD, Diario AMD, 4H AMD todos apuntando en la misma dirección — ese es el setup de mayor probabilidad en CRT.",donna:"Cuando los tres temporalidades están en alineación AMD — ese es el trade. Ese es cuando aumentas el tamaño."}
,
{icon:"🌱",title:"C1 en detalle: la acumulación",body:"Durante la acumulación, el precio está en rango. Los traders minoristas se frustran. Pero las instituciones están construyendo posiciones en silencio, comprando pequeñas cantidades sin mover mucho el precio. Necesitan que el rango persista el tiempo suficiente para llenar su orden completa. Es el resorte comprimiéndose. Cuanto más largo el rango, más grande el movimiento cuando se libere.",donna:"Cuando el precio no va a ningún lado y estás aburrido — eso es la acumulación. Presta atención. Algo se está cargando."},
{icon:"🎭",title:"C2 en detalle: la manipulación",body:"Después de la acumulación, el precio rompe en una dirección — generalmente opuesta al movimiento real. Se llevan los stops de los traders que identificaron el rango. Parece una ruptura. Los minoristas entran en la dirección de la ruptura. Luego el precio cierra de vuelta dentro del rango. Ese cierre de regreso ES la señal del Turtle Soup. La manipulación crea la oportunidad de entrada.",donna:"C2 es donde se tiende la trampa. Cuando ves una vela perforar el rango y cerrar de vuelta adentro — esa es tu invitación."},
{icon:"🚀",title:"C3 en detalle: la distribución",body:"Después de que la manipulación limpió a los traders del lado equivocado, comienza el movimiento real. El precio se mueve en la dirección en la que las instituciones estaban construyendo durante la acumulación. Este movimiento es rápido y comprometido — cuerpos grandes, mechas mínimas. Aquí viven tus objetivos TP1 y TP2. Ya conocías la dirección desde C1. C3 es donde cobras.",donna:"C3 no es donde descubres la dirección. Ya lo sabías desde C1. C3 es donde cobras lo que planificaste."}],q:[
{q:"Es Martes en sesión de Nueva York. EUR/USD rompe por encima del alto del Lunes. Basado en AMD, tú:",type:"mc",opts:["Compras el rompimiento — el momentum es real","Esto es probablemente C2 — no compres el rompimiento, observa reversión","Esperas el Miércoles para confirmar","Es acumulación — opéralo en rango"],a:1,exp:"El Martes es típicamente el día de manipulación (C2). El rompimiento por encima del alto del Lunes es probablemente el Turtle Soup. No compres rompimientos del Martes. Marca el máximo del Martes y observa la reversión del Miércoles."},
{q:"En la secuencia AMD, ¿cuál fase es tu entrada real de operación?",type:"mc",opts:["C1 — Acumulación","C2 — Manipulación","C3 — Distribución","Cualquiera de los tres"],a:2,exp:"C3 — Distribución — es tu operación. C1: no operes, sin dirección. C2: nunca operes, es la trampa. C3: el movimiento real que sigue a la manipulación."},
{q:"El máximo o mínimo semanal real típicamente se forma en qué día:",type:"mc",opts:["Lunes","Martes","Miércoles","Viernes"],a:1,exp:"El Martes es el día de manipulación. Es donde el Smart Money crea el máximo o mínimo semanal falso — el nivel que el resto de la semana referenciará y desde el cual operará."},
{q:"AMD solo aplica a los temporalidades diario y semanal.",type:"tf",a:false,exp:"Falso. AMD es fractal — aparece en cada temporalidad simultáneamente. El 4H tiene su propio AMD. El 1H tiene el suyo dentro de ese. Cuando se alinean en múltiples temporalidades, ese es el setup de mayor calidad."},
{q:"Es la Semana 2 del mes. El mercado rompe a nuevos altos mensuales. Basado en AMD mensual:",type:"mc",opts:["Compra — momentum fuerte","Observa el Turtle Soup mensual — este podría ser el máximo falso","La Semana 2 siempre es alcista","La acumulación está completando"],a:1,exp:"La Semana 2 es la semana de manipulación. Los nuevos altos en la Semana 2 son probablemente el rompimiento falso mensual — el Turtle Soup que precede el movimiento bajista real en las semanas 3-4."}
]},
14:{s:[
{icon:"👁️",title:"Los cierres revelan. Las mechas engañan.",body:"Leer el sesgo diario es simple cuando sabes esto: un diario anterior que CERRÓ por encima de un alto anterior = sesgo alcista para hoy. Un diario anterior que MECHÓ por encima de un alto anterior pero cerró adentro = sesgo bajista. El cierre es el voto. Un sesgo alcista significa que solo buscas entradas largas por debajo del open diario. Un sesgo bajista significa que solo buscas cortos por encima del open diario.",donna:"Un filtro. Una regla. Elimina la mayoría de las malas operaciones. El cierre diario te dice todo."},
{icon:"🔍",title:"El filtro que lo cambia todo",body:"Así de poderoso es esto: si el diario tiene sesgo bajista, NO deberías tomar operaciones alcistas — sin importar qué tan perfecto se vea el setup en el 1H. Y si el diario muestra sesgo alcista, NO deberías tomar cortos — incluso si el precio está cerca de una resistencia. Este único filtro de sesgo diario elimina la mayoría de las operaciones perdedoras para la mayoría de los traders retail.",donna:"La mayoría de las malas operaciones pasan cuando la gente ignora el sesgo diario. Ven una vela bonita en el 1H y olvidan preguntar: ¿qué está haciendo el Diario? Revisa el Diario primero. Siempre primero."}
,
{icon:"🔬",title:"Paso 1: identifica el nivel clave",body:"Antes de cualquier entrada, encuentra el nivel clave — un alto o bajo anterior de una sesión o día donde está la liquidez. El precio necesita acercarse a este nivel con momentum. Esperas que el precio barra más allá de él, llevándose los stops. Sin un nivel clave no hay Modelo #1. El nivel es el escenario. La vela es el actor.",donna:"Sin nivel = sin operación. Primera pregunta siempre: ¿cuál es el alto o bajo anterior más cercano?"},
{icon:"⚡",title:"Paso 2: la vela trigger Modelo #1",body:"La vela trigger debe hacer tres cosas: 1) Mechar más allá del nivel clave — llevándose los stops. 2) Tener un cuerpo grueso y decisivo — fuerte convicción. 3) Cerrar de vuelta dentro del rango — la confirmación del Turtle Soup. Cuando las tres están presentes, el CIERRE de la vela es tu entrada. No antes del cierre. No después esperando. El cierre ES la confirmación.",donna:"Si no estás seguro de si el cuerpo es suficientemente grueso, no lo es. Las mejores velas Modelo #1 son inconfundibles."},
{icon:"🛡️",title:"Paso 3: stop loss y objetivos",body:"Stop loss: más allá de la mecha completa de la vela Modelo #1. No unos pips más allá — más allá de la mecha completamente. Este es fijo. No se mueve. TP1 está al 50% del rango — toma parciales aquí, siempre. TP2 es la liquidez opuesta — el alto o bajo del otro extremo del rango. Este es el objetivo completo.",donna:"El stop no se mueve. Va donde el setup queda invalidado y ahí se queda. Así es la disciplina."}],q:[
{q:"La vela diaria de ayer mechó por encima del alto anterior de $2,015 pero cerró en $1,998, de regreso adentro. El sesgo de hoy es:",type:"mc",opts:["Alcista — probó $2,015","Bajista — la mecha fue rechazada","Neutral — una vela no es suficiente","Alcista — la mecha muestra demanda"],a:1,exp:"Mecha arriba + cierre adentro = sesgo bajista. Ayer el cierre en $1,998 reveló que los compradores fallaron en sostenerse por encima de $2,015. Hoy solo buscas entradas cortas por encima del open diario."},
{q:"La vela diaria cierra en $2,018, por encima del alto de la semana pasada de $2,010. Hoy deberías buscar:",type:"mc",opts:["Entradas cortas por encima del open diario","Entradas largas por debajo del open diario","Sin operaciones — espera más confirmación","Entradas largas por encima del open diario"],a:1,exp:"Cierre diario por encima del alto anterior = sesgo alcista. En sesgo alcista, buscas entradas largas POR DEBAJO del open diario (en pullbacks), no por encima donde estás persiguiendo."},
{q:"Puedes tomar operaciones cortas incluso cuando el sesgo diario es alcista, siempre que el setup del 1H sea perfecto.",type:"tf",a:false,exp:"Falso. El sesgo diario anula los setups del 1H. Operar contra el sesgo diario — incluso con un setup 'perfecto' en el temporalidad inferior — te pone contra el flujo dominante. Sáltate esas operaciones."}
]},
15:{s:[
{icon:"⏰",title:"Cuándo importa más que dónde",body:"Un setup perfecto a las 3AM del sábado tiene casi ninguna probabilidad. El mismo setup perfecto a las 9:30AM de Nueva York un Martes? Esa es una operación. Hay tres Kill Zones donde el Smart Money activamente mueve el precio: Londres (2-5AM hora NY, mejor para EUR/USD, GBP), Nueva York Open (7-11AM hora NY, mejor para Índices, Cripto, pares USD), NY PM (1:30-4PM hora NY, movimientos de continuación). Fuera de estas ventanas — piénsalo dos veces.",donna:"Tu setup importa. Tu timing importa más. Nivel perfecto, sesión equivocada = baja probabilidad. Marca las Kill Zones en tu gráfico. Opera dentro de ellas."},
{icon:"📍",title:"NYSE Open — el grande",body:"Cada día a las 9:30AM de Nueva York, la Bolsa de Nueva York abre. Esta es la mayor inyección de liquidez de la sesión — órdenes de compra y venta de cada institución importante golpean el mercado simultáneamente. Este momento frecuentemente crea la Manipulación del Día (C2 del AMD diario) — un movimiento brusco para agarrar stops justo antes de que la dirección real se desarrolle. La vela de las 9:30 casi nunca es tu entrada. Es la trampa.",donna:"Las 9:30AM es cuando OBSERVAS, no cuando OPERAS. Deja que la vela de las 9:30 se desarrolle. Marca su máximo y mínimo. Opera lo que viene después."},
{icon:"🌍",title:"Perfiles de sesión",body:"Cada sesión tiene su propia personalidad. Londres crea la manipulación diaria para pares EUR/USD y GBP — espera movimientos falsos y reversiones. Nueva York Open crea la manipulación del mercado US — movimientos bruscos que frecuentemente revierten. Sesión Asiática (8PM-12AM hora NY) es más tranquila — mejor para Oro y JPY. Un setup que se forma durante la sesión asiática debería evaluarse con menor peso de probabilidad que el mismo setup durante Londres o NY.",donna:"Mismo setup, sesión diferente — probabilidad diferente. El contexto lo es todo en el trading."}
,
{icon:"💀",title:"Por qué existe el Kiss of Death",body:"Después de entrar y que el precio empiece a moverse en tu dirección, casi siempre hará un último movimiento en tu contra antes de continuar. Esto ocurre porque: los recién llegados colocaron stops cerca de tu entrada, los traders atrapados esperan una recuperación, y el mercado necesita limpiar esta última liquidez antes de la continuación real. No es aleatorio. Es estructural.",donna:"El KoD no es el mercado siendo cruel. Es el mercado siendo eficiente. Necesita ese último pool de stops antes de continuar."},
{icon:"🧠",title:"Cómo operar a través del KoD",body:"La única forma de sobrevivir el Kiss of Death es saber que viene antes de que llegue. Tu stop está colocado correctamente más allá de la mecha del Modelo #1. El KoD se moverá en tu contra pero NO llegará a tu stop si tu colocación es correcta. Si tu stop es alcanzado durante un KoD, estaba demasiado ajustado. La solución no es un stop más ajustado — es colocación correcta desde el principio.",donna:"Cada trader que sale por stop en el Kiss of Death tenía el stop en el lugar equivocado. No es mala suerte. Es colocación incorrecta."}],q:[
{q:"Encuentras una vela Modelo #1 perfecta en EUR/USD a las 11:45PM hora de Nueva York (sesión asiática). Tú:",type:"mc",opts:["La tomas — el setup está ahí","La tomas con posición más pequeña","Tienes cuidado — la sesión asiática tiene menor probabilidad para EUR/USD","La saltas — la sesión asiática siempre está equivocada"],a:2,exp:"La sesión asiática no es la sesión principal para EUR/USD. El mismo setup durante Londres (2-5AM hora NY) tendría probabilidad mucho mayor. Ajusta tu nivel de confianza según el timing de la sesión."},
{q:"Exactamente a las 9:30AM Nueva York, el precio hace un movimiento brusco hacia arriba a través de un alto anterior. Basado en CRT:",type:"mc",opts:["Compra el rompimiento — NYSE open = alcista","Espera — esto es probablemente la trampa de manipulación de las 9:30AM","Vende inmediatamente — las 9:30 siempre revierten","Depende de la dirección del movimiento"],a:1,exp:"El open NYSE de las 9:30AM crea volatilidad masiva y frecuentemente la manipulación diaria (C2). Los movimientos bruscos a las 9:30 son frecuentemente Turtle Soups. Observa, marca el máximo y mínimo, y opera lo que se desarrolla después."},
{q:"Las tres Kill Zones principales son Londres Open, Nueva York Open, y:",type:"mc",opts:["Tokyo Open","Sesión asiática","NY PM (1:30-4PM hora NY)","Pre-market (4-6AM hora NY)"],a:2,exp:"Las tres Kill Zones son Londres (2-5AM hora NY), Nueva York Open (7-11AM hora NY), y NY PM (1:30-4PM hora NY). Estas son las ventanas donde el flujo institucional es más alto y los setups CRT tienen la mayor probabilidad."},
{q:"Un setup CRT que se forma durante una Kill Zone tiene mayor probabilidad que el mismo setup fuera de una Kill Zone.",type:"tf",a:true,exp:"Verdadero. Las Kill Zones son cuando los participantes institucionales están más activos. El mismo setup estructural tiene significativamente más probabilidad cuando se forma durante una Kill Zone que durante horas muertas."}
,
{q:"El Kiss of Death significa que tu stop loss estaba en el lugar equivocado.",type:"tf",a:false,exp:"Falso. El KoD ocurre incluso con stop correctamente colocado — es un movimiento estructural que barre la liquidez final antes de la continuación. Un stop correctamente colocado más allá de la mecha NO será alcanzado por el KoD."}]},
16:{s:[
{icon:"🎯",title:"Una vela. Una regla. Un trigger.",body:"El Modelo #1 es tu vela de entrada. Tiene tres requisitos y los tres deben estar presentes: 1) Es GRUESA — un cuerpo significativo, no un doji o vela pequeña. 2) Clava un nivel estructural real — un alto anterior, bajo anterior, Order Block, o Fair Value Gap. 3) Se forma dentro de una Kill Zone. Cuando los tres están presentes, el CIERRE de esa vela es tu trigger. No la mecha. El cierre.",donna:"Tres cosas. Si falta una — no es un Modelo #1. No entres. Espera el real."},
{icon:"📏",title:"Stop, objetivos, y el sagrado 50%",body:"El stop va por encima o por debajo de la mecha del Modelo #1 — FIJO, nunca se mueve. El primer objetivo (TP1) siempre es el 50% del rango del setup — esto es OBLIGATORIO. Tomas ganancia parcial ahí sin importar qué. El segundo objetivo (TP2) es el objetivo completo — el objetivo de liquidez externa que identificaste antes de la operación. Un FVG dentro del cuerpo de la vela Modelo #1 aumenta la probabilidad significativamente.",donna:"El parcial al 50% no es opcional. No me importa qué tan buena se vea la operación. Toma el parcial en T1. Siempre."},
{icon:"⚡",title:"Por qué el cierre — no la mecha",body:"Los traders retail entran cuando la mecha toca — ven el precio tocar un nivel y se lanzan. El Smart Money confirma en el cierre — esperan a ver si el precio SE COMPROMETIÓ a rechazar el nivel. Entrar en la mecha significa entrar durante el ruido. Entrar en el cierre significa entrar después de que la señal es confirmada. Los pocos segundos extra de paciencia es la diferencia entre una entrada de alta probabilidad y un lanzamiento de moneda.",donna:"Toque de mecha = operación de esperanza. Confirmación de cierre = operación CRT. Operas cierres. Punto."},
{icon:"🔄",title:"Gestionando la operación Modelo #1",body:"Una vez dentro: el stop está por encima de la mecha y se queda ahí. Si el precio llega a T1 (50%), toma el parcial — reduce el riesgo inmediatamente. Mueve el stop a punto de equilibrio después de T1. Deja T2 correr. Si el precio llega a tu stop antes de T1 — eso es una pérdida. Acéptala, regístrala, sigue adelante. Si el precio te saca en punto de equilibrio después de T1 — eso es una operación gratuita. El Modelo #1 gestionado correctamente no pierde dinero en el 70% de las operaciones perdedoras.",donna:"Gestiónala correctamente y el Modelo #1 hace dinero incluso cuando está equivocado. Ese es el sistema."}
,
{icon:"1️⃣",title:"E1: la entrada primaria — primera y mejor",body:"E1 es la entrada Modelo #1 en la primera oportunidad — cuando la vela Turtle Soup se forma en tu nivel clave y cierra de vuelta dentro del rango. Esta es tu entrada de mayor probabilidad. Si tomas E1 correctamente, tu stop está en la mecha, tu TP1 está al 50% del rango y TP2 es la liquidez opuesta. E1 es siempre el primer intento. No puedes saltar a E2 o E3 sin que E1 haya estado disponible primero.",donna:"E1 es la que todos quieren. Entrena tu ojo para verla y ten la disciplina de esperarla."},
{icon:"2️⃣",title:"E2 y E3: cuando E1 falló o te la perdiste",body:"E2 es un retesteo del área después del movimiento inicial de E1. Si E1 corrió pero te la perdiste, E2 te da una segunda entrada a un precio ligeramente peor pero con estructura válida. E3 es la entrada del Breaker Block — el antiguo soporte que se convirtió en resistencia (o viceversa) después de una ruptura de estructura. Las tres siguen siendo válidas solo si el sesgo original sigue intacto.",donna:"Nunca vayas hacia atrás en la secuencia. Si la estructura cambia, la operación terminó — no E4 o E5."},
{icon:"⚡",title:"E4 y E5: entradas OTE y KoD",body:"E4 es el OTE — entrada óptima al trading — en el retroceso del 62-79% del movimiento inicial. Si el precio corrió desde el área de E1 y retrocedió el 62-79% de ese movimiento, eso es E4. Es una entrada tardía pero válida. E5 es la entrada del Kiss of Death — el precio vuelve una última vez a capturar liquidez justo antes de la continuación completa. E5 es la más difícil de tomar psicológicamente porque se siente equivocada. Pero a menudo es el mejor riesgo-beneficio de las cinco.",donna:"La secuencia va en una sola dirección — hacia adelante. Te perdiste E1, toma E2. Te perdiste E2, toma E3. Nunca al revés."}],q:[
{q:"Ves una vela gruesa que cierra de regreso adentro después de mechar por encima de un alto anterior. Es durante la sesión de Londres. El nivel es un Order Block limpio. Esto es:",type:"mc",opts:["Una vela regular — espera más confirmación","Una entrada Modelo #1 — los tres criterios cumplidos","Un Turtle Soup pero no un Modelo #1","Una entrada potencial pero revisa el Diario primero"],a:1,exp:"Los tres criterios del Modelo #1 presentes: cuerpo grueso, nivel estructural real (Order Block), timing de Kill Zone (Londres). Después de verificar la alineación del sesgo Diario, esta es una entrada válida en el cierre."},
{q:"¿Dónde va el stop en una operación Modelo #1?",type:"mc",opts:["Por debajo del cuerpo de la vela de entrada","Por debajo de la mecha de la vela de entrada","En el nivel de soporte más cercano","2% por debajo de la entrada"],a:1,exp:"El stop va por encima o por debajo de la mecha del Modelo #1 — el extremo de la vela. Esto te protege del ruido mientras mantiene el stop lógico. Fijo. Nunca movido después de colocarlo."},
{q:"Tu operación Modelo #1 llega a T1 (50% del rango). Deberías:",type:"mc",opts:["Mantener todo — deja que corra a T2","Tomar ganancia parcial — esto es obligatorio","Mover tu stop a punto de equilibrio y mantener","Cerrar toda la operación"],a:1,exp:"T1 al 50% es una salida parcial obligatoria. No negociable. Después de T1, mueve el stop a punto de equilibrio y deja T2 correr sin riesgo. El parcial al 50% es lo que hace al Modelo #1 consistentemente rentable."},
{q:"Deberías entrar en una operación Modelo #1 cuando la mecha toca tu nivel, sin esperar el cierre.",type:"tf",a:false,exp:"Falso. El cierre es el trigger — siempre. Entrar cuando la mecha toca es entrar antes de la confirmación. Espera que la vela cierre y confirme el rechazo. Los pocos segundos de paciencia mejoran significativamente la calidad de la entrada."},
{q:"¿Qué aumenta la probabilidad de un setup Modelo #1?",type:"mc",opts:["Una mecha grande por encima del nivel","Un FVG dentro del cuerpo de la vela Modelo #1","Múltiples pruebas recientes del mismo nivel","Una tendencia fuerte hacia el nivel"],a:1,exp:"Un FVG dentro del cuerpo de la vela Modelo #1 añade confluencia — el precio llenó un desequilibrio y rechazó simultáneamente. Esta combinación tiene probabilidad significativamente mayor que un Modelo #1 simple."}
]},
17:{s:[
{icon:"💀",title:"Pasa cada vez. Sin excepción.",body:"El Kiss of Death (KoD) es el último movimiento falso antes de que el precio alcance su objetivo. Pasa antes de cada objetivo significativo — cada uno. El el Smart Money (dinero institucional — bancos y fondos de inversión) sabe exactamente dónde está tu stop (por encima de la mecha del Modelo #1, donde CRT te enseñó a colocarlo). Antes de que el precio alcance el objetivo final, hace un último movimiento contra tu operación — justo lo suficiente para sacudir las posiciones gestionadas ligeramente.",donna:"El Kiss of Death no es opcional. No es a veces. Es garantizado. Cada objetivo. Si sabes que viene, dejas de ser sacudido por él."},
{icon:"📍",title:"Entrada 5 — el movimiento más violento",body:"El Kiss of Death también es la Entrada 5 en la secuencia de entradas CRT. Es la última entrada antes del objetivo final — y es la operación más violenta y de movimiento más rápido de las cinco entradas. El precio ya ha pasado por E1, E2, E3, E4 — todos los cuales ya han sido parados o han tomado ganancias. E5 (el KoD) es para traders que entienden el panorama completo y saben que el objetivo es inminente.",donna:"Si te sacaron en el KoD — no estabas equivocado en la operación. Solo no la dimensionaste bien. La pérdida es información, no fracaso."},
{icon:"🛡️",title:"Cómo sobrevivir el Kiss of Death",body:"Después de T1 (50% parcial), tu stop debería estar en punto de equilibrio. El KoD frecuentemente llega justo por encima del punto de equilibrio — sacándote pero sin pérdida real. Este es el resultado de 'operación gratuita'. Si no has tomado T1 todavía cuando llega el KoD — esa es la lección. Siempre toma T1. El sistema te protege del KoD solo cuando seguiste las reglas que llevaron hasta él.",donna:"¿Tomaste T1? El KoD te saca en punto de equilibrio. ¿No tomaste T1? El KoD mata la operación. El parcial al 50% es el seguro contra el KoD. No te lo saltes."},
{icon:"🎭",title:"Usando el KoD como entrada 5",body:"Los traders avanzados USAN el Kiss of Death como entrada de alta probabilidad. Si has mapeado la secuencia CRT completa — barrido del mínimo, Modelo #1 formado, parcial tomado, operación gestionada — y luego el precio hace un último empuje contra ti, esa es E5. La entrada es el rechazo de la mecha del KoD, el objetivo es el completo, y el stop es ajustado porque la operación tiene confirmación significativa detrás.",donna:"La Entrada 5 solo es válida si entiendes las Entradas 1 a 4 primero. No intentes usarla antes de entender la secuencia completa."}
],q:[
{q:"Tu operación en Oro está arriba, acercándose al objetivo en $2,050. Antes de alcanzarlo, el precio cae bruscamente a tu nivel de stop. Esto es más probablemente:",type:"mc",opts:["La operación está equivocada — ciérrala","Un pullback aleatorio","El Kiss of Death — la última sacudida antes del objetivo","Volatilidad normal — mantén"],a:2,exp:"El Kiss of Death siempre aparece antes del objetivo. La caída brusca a tu nivel de stop es la última sacudida. Si tomaste T1 al 50%, estás en punto de equilibrio. Si no — por eso existe T1."},
{q:"El Kiss of Death es:",type:"mc",opts:["Un patrón gráfico","El último movimiento falso antes de que el precio alcance su objetivo final","Un tipo de Turtle Soup","Una técnica de colocación de stop"],a:1,exp:"El Kiss of Death es el último movimiento falso contra tu posición antes de que el precio alcance su objetivo final. Está diseñado para sacudir a los traders que entraron correctamente pero gestionaron incorrectamente."},
{q:"Puedes evitar ser parado por el Kiss of Death:",type:"mc",opts:["Usando un stop más amplio","Tomando tu parcial T1 al 50% y moviendo el stop a punto de equilibrio","Evitando sesiones volátiles","Cerrando la operación manualmente antes del objetivo"],a:1,exp:"Tomar T1 al 50% y mover el stop a punto de equilibrio significa que el KoD te saca en punto de equilibrio — sin pérdida. Esta es la protección incorporada del sistema contra el KoD. Siempre toma T1."},
{q:"El Kiss of Death solo pasa en operaciones perdedoras.",type:"tf",a:false,exp:"Falso. El Kiss of Death pasa en operaciones ganadoras — específicamente antes de que lleguen al objetivo final. Es la prueba final de tu disciplina. Sacude a los traders que no siguieron las reglas."},
{q:"La Entrada 5 (entrada KoD) es la mejor para principiantes porque está más cerca del objetivo.",type:"tf",a:false,exp:"Falso. E5 es para traders avanzados que entienden la secuencia completa de 5 entradas. Sin entender E1-E4 y el panorama CRT completo, intentar E5 es extremadamente peligroso."}
]},
18:{s:[
{icon:"🗝️",title:"El Gap que el precio siempre llena",body:"Un Fair Value Gap (FVG) es un desequilibrio de 3 velas donde el precio se movió tan rápido que dejó un área sin probar. El máximo de la Vela 1 y el mínimo de la Vela 3 no se superponen — hay un gap entre ellos. Ese gap actúa como un imán. El precio casi siempre vuelve a probarlo. EUR/USD hace un gap alcista a través de $1,995-$2,005, dejando esa zona sin probar? El precio volverá a llenarla — usualmente en horas o días.",donna:"Los FVGs son imanes. Márcalos. El precio vuelve. No a veces — casi siempre. Úsalos para objetivos y entradas."},
{icon:"📐",title:"La regla del 50% para FVGs",body:"El nivel crítico dentro de cualquier FVG es su punto medio al 50%. El precio podría entrar al FVG desde arriba y solo alcanzar el 50% antes de revertir — o podría llenar el gap completo. Pero el nivel del 50% es donde se concentra la mayor cantidad de órdenes. Para entradas: observa el rechazo al 50% de un FVG. Para objetivos: marca el 50% como tu T1 dentro de zonas FVG.",donna:"Marca el FVG. Luego marca su 50%. Ese punto medio es donde pasa la acción la mayor parte del tiempo."},
{icon:"🔗",title:"OB + FVG = máxima confluencia",body:"Cuando un Order Block y un Fair Value Gap se superponen en el mismo nivel de precio, eso es máxima confluencia. Un Order Block con un FVG dentro en el gráfico Diario, durante una Kill Zone, con alineación HTF — este es el setup que esperas. Oro en $1,995 donde hay un OB Diario y un FVG de 4H en el mismo nivel? Eso no es solo un nivel, eso es una invitación.",donna:"Cuando todo se alinea en el mismo nivel — OB, FVG, importancia estructural, Kill Zone — es cuando aumentas el tamaño. Ese es el setup de los setups."}
],q:[
{q:"EUR/USD tiene un Fair Value Gap entre $2,010 y $2,010 de hace tres días. El precio se acerca desde abajo. Deberías esperar:",type:"mc",opts:["Que el precio ignore el FVG","Que el precio sea rechazado exactamente en el fondo del FVG","Que el precio sea atraído hacia y a través de la zona FVG","Que el precio se detenga exactamente en la parte superior del FVG"],a:2,exp:"Los FVGs actúan como imanes — el precio es atraído para llenarlos. El precio probablemente entrará a la zona FVG ($2,010-$2,010) y ya sea llenará parcialmente (al 50%) o completará el gap."},
{q:"Dentro de un Fair Value Gap, ¿cuál es el nivel más significativo?",type:"mc",opts:["La parte superior del FVG","La parte inferior del FVG","El punto medio al 50%","El nivel donde se formó el gap"],a:2,exp:"El punto medio al 50% del FVG es donde se concentra la mayor cantidad de órdenes. Es el punto de reversión más común dentro de un FVG y el nivel clave para entradas y objetivos parciales."},
{q:"Un Order Block y Fair Value Gap en el mismo nivel de precio representa:",type:"mc",opts:["Una zona débil — demasiados traders la conocen","Máxima confluencia — nivel de mayor probabilidad","Dos señales que se cancelan","Solo válido en el temporalidad 1H"],a:1,exp:"OB + FVG en el mismo nivel = máxima confluencia. Dos razones separadas para que el precio reaccione en el mismo punto dramáticamente aumentan la probabilidad de una reacción ahí."},
{q:"Un Fair Value Gap siempre será llenado completamente antes de que el precio continúe en su dirección.",type:"tf",a:false,exp:"Falso. Los FVGs frecuentemente se llenan al 50% y luego revierten. No siempre se llenan completamente. El punto medio al 50% es el nivel clave — que el precio lo alcance se considera que el FVG hizo su trabajo."}
]},
19:{s:[
{icon:"📦",title:"Donde el dinero grande dejó su marca",body:"Un Order Block (OB) es la última vela del color opuesto antes de un movimiento impulsivo significativo. En una tendencia alcista, la última vela bajista (roja) antes del gran movimiento alcista = el Order Block. Ahí es donde el Smart Money colocó sus posiciones. El precio casi siempre vuelve a probar esa área antes de continuar. EUR/USD en $1,980, gran movimiento alcista — la última vela bajista antes de ese movimiento es tu OB.",donna:"El Order Block es donde entró el Smart Money. Necesitan que el precio vuelva ahí para añadir posiciones. Esa es tu entrada — montándote en su segunda compra."},
{icon:"📐",title:"La regla del 50% para oBs",body:"Al igual que los FVGs, el nivel del 50% de un Order Block es el punto de entrada clave. El cuerpo del OB (entre el open y close de esa última vela opuesta) define la zona. El punto medio al 50% es donde buscas tu entrada, tus órdenes límite, tu rechazo del Modelo #1. Los Order Blocks de temporalidades superiores (Diario, 4H) tienen significativamente más peso que los OBs de temporalidades inferiores.",donna:"OB Diario + Kill Zone + rechazo Modelo #1 = una de las entradas más limpias en CRT. Marca tus Order Blocks HTF cada semana."},
{icon:"🔗",title:"Por qué el precio vuelve a los Order Blocks",body:"Las instituciones no pueden llenar tamaños de posición masivos en un momento sin mover el precio contra ellas mismas. Llenan en lotes. El Order Block es donde entró el primer lote — cuando el precio vuelve, añaden más. Por eso los OBs actúan como soporte y resistencia con consistencia notable. No estás operando un patrón; estás operando la mecánica de cómo los grandes participantes tienen que operar.",donna:"No estás adivinando en un nivel. Estás siguiendo la huella de donde las instituciones TIENEN que añadir a sus posiciones. Una mentalidad completamente diferente."}
],q:[
{q:"Antes de un gran movimiento alcista en EUR/USD, la última vela bajista tenía un máximo de $1,990 y un cierre de $1,985. La zona de Order Block es:",type:"mc",opts:["Solo en $1,990","Solo en $1,985","Entre $1,985 y $1,990 (el cuerpo de la vela)","Por debajo de $1,985"],a:2,exp:"El Order Block es el cuerpo de la última vela bajista antes del movimiento alcista — entre su cierre ($1,985) y apertura ($1,990). El 50% de esta zona es en $2,010 — tu nivel de entrada clave."},
{q:"¿Qué Order Block tiene más peso?",type:"mc",opts:["El más reciente","El Order Block del temporalidad Diario","El que ha sido probado más veces","El cuerpo de vela más grande"],a:1,exp:"Los Order Blocks de temporalidades superiores (Diario, 4H) tienen más peso que los OBs de temporalidades inferiores. Un OB Diario representa un posicionamiento institucional mayor y genera reacciones de precio más significativas."},
{q:"El precio volviendo a un Order Block significa que la operación está invalidada.",type:"tf",a:false,exp:"Falso. El precio volviendo a un Order Block es esperado y es el punto de entrada. Los OBs son exactamente donde buscas entrar — cuando el precio hace pullback a donde el Smart Money originalmente se posicionó."},
{q:"¿Qué hace que los Order Blocks sean niveles confiables de soporte y resistencia?",type:"mc",opts:["Muchos traders retail los conocen","Tradición del análisis técnico","Las instituciones añaden a sus posiciones cuando el precio vuelve","Reconocimiento de patrones gráficos"],a:2,exp:"Los OBs son confiables porque las instituciones no pueden llenar posiciones completas a la vez. Colocan órdenes iniciales, luego añaden cuando el precio vuelve. Ese comportamiento institucional consistente es lo que hace funcionar los OBs — es mecánica, no magia."}
]},
20:{s:[
{icon:"🔄",title:"Cuando el soporte se convierte en resistencia",body:"Un Breaker Block es un Order Block que fue roto — el precio se movió a través de él, invalidándolo como soporte. Pero la zona no desaparece. Se invierte. Soporte anterior en $1,990 que el precio rompe por debajo = Breaker Block. Ahora cuando el precio vuelve a $1,990, actúa como resistencia. La misma zona, rol opuesto. Y la reacción ahí es frecuentemente la entrada más limpia y de menor drawdown en CRT.",donna:"Inviértelo. Si era soporte y el precio rompe por debajo, ahora es resistencia. Si era resistencia y el precio rompe por encima, ahora es soporte. Marca la inversión, espera el retorno, entra en el rechazo."},
{icon:"📊",title:"Tres pasadas — el nivel más equilibrado",body:"Cuando el precio ha pasado por la misma zona tres veces — una vez como soporte, roto, una vez como resistencia, roto, luego vuelve — esa área es la ubicación más equilibrada del gráfico completo. Menor drawdown. Reacción más predecible. Nasdaq en 17,000: probado como soporte, rompió por debajo, probado como resistencia, rompió por encima, vuelve a 17,000 — esas son tres pasadas. Zona de mayor probabilidad.",donna:"Tres pasadas por la misma zona = el nivel más equilibrado del gráfico. Entrada de menor drawdown de las cinco. Esta es la Entrada 3 en la secuencia."},
{icon:"🔑",title:"Inversión válida vs nivel aleatorio",body:"No todo nivel roto se convierte en Breaker Block válido. Para una inversión válida: el movimiento original a través del nivel debe ser decisivo (un rompimiento genuino, no una mecha), la zona debe estar claramente definida (un Order Block o nivel estructural previo, no precio aleatorio), y el retorno debe ocurrir en un tiempo razonable. Un rompimiento vago de un nivel vago no es un Breaker Block.",donna:"Calidad sobre cantidad. Un setup de Breaker Block válido a la semana vale más que cinco cuestionables. Marca solo los limpios."}
],q:[
{q:"EUR/USD tenía soporte sólido en $1,995 por dos semanas. El precio rompió decisivamente por debajo la semana pasada. Ahora el precio está volviendo a $1,995. ¿Qué es $1,995 ahora?",type:"mc",opts:["Todavía soporte — niveles de varias semanas son fuertes","Un Breaker Block — ahora actuando como resistencia","Neutral — los niveles rotos pierden importancia","Un objetivo para una operación larga"],a:1,exp:"Soporte anterior roto = Breaker Block = nueva resistencia. La zona de $1,995 se invirtió cuando el precio rompió decisivamente por debajo. Ahora cuando el precio vuelve, buscas rechazo y una entrada corta ahí."},
{q:"Un Breaker Block es:",type:"mc",opts:["Un Order Block que aún no ha sido probado","Un Order Block que fue roto e invirtió su rol","Un Turtle Soup fallido","Un Fair Value Gap invertido"],a:1,exp:"Un Breaker Block es un Order Block que el precio rompió decisivamente, causando que la zona invierta su rol — soporte se convierte en resistencia, resistencia se convierte en soporte."},
{q:"La zona donde el precio ha pasado tres veces (tanto como soporte como resistencia) es:",type:"mc",opts:["Una zona débil — demasiado tráfico","La ubicación más equilibrada del gráfico — entrada de menor drawdown","Una zona a evitar — demasiado ruido","Solo válida como entrada corta"],a:1,exp:"Tres pasadas por la misma zona = la ubicación más equilibrada del gráfico. Tanto alcistas como bajistas han sido probados ahí. La tercera reacción típicamente tiene el menor drawdown de cualquier entrada en la secuencia CRT."},
{q:"Cualquier nivel roto se convierte automáticamente en un Breaker Block válido.",type:"tf",a:false,exp:"Falso. Un Breaker Block válido requiere: una ruptura decisiva (no una mecha), una zona claramente definida (OB o nivel estructural previo), y un retorno en un tiempo razonable. No todo nivel roto califica."}
]},
21:{s:[
{icon:"🔢",title:"Cinco entradas. Una secuencia.",body:"CRT tiene cinco puntos de entrada para cualquier setup. E1: Mecha Turtle Soup (en vivo, la más difícil, mayor recompensa). E2: Cierre Modelo #1 (confirmado diario, tu entrada estándar). E3: Breaker Block (menor drawdown, muy limpia). E4: OTE retroceso 60-75% (donde entran los traders ICT — también donde el Kiss of Death frecuentemente los atrapa). E5: Kiss of Death (la más violenta, la más segura, stop más pequeño). Cada una es válida. Cada una tiene su contexto.",donna:"Cinco entradas significa que tienes cinco oportunidades de acertar el mismo trade. Pero solo puedes avanzar — nunca retroceder en la secuencia."},
{icon:"🚫",title:"Nunca vayas hacia atrás",body:"La regla que la mayoría de la gente omite: una vez que se ha formado una entrada de número mayor, no puedes volver a una de número menor. Si E3 (Breaker Block) se ha formado, E1 y E2 ya no existen para este setup. Ahora estás en E3 o esperando E4-E5. Intentar entrar en E1 después de que se ha formado E3 significa que estás peleando contra la secuencia.",donna:"¿Perdiste E1? Ahora eres un trader de E2. ¿Perdiste E2? E3. ¿Perdiste E3? E4. ¿Perdiste todo? Espera E5. Nunca vayas hacia atrás."},
{icon:"⚡",title:"E4 y la trampa ICT",body:"La Entrada 4 es el retroceso del 60-75% del rango completo del setup — aquí es donde entran los traders de metodología ICT. El Smart Money lo sabe. El Kiss of Death (E5) está diseñado específicamente para parar a los traders de E4 antes del movimiento final. Si entras en E4, tu stop necesita tener en cuenta el KoD. Muchas entradas de E4 son paradas por el KoD antes del objetivo — por eso existe E5.",donna:"Si entras en E4, el KoD viene por ti. Dimensiona adecuadamente, stop por debajo de la zona KoD, o espera E5."},
{icon:"🏆",title:"Combinando las entradas",body:"Los traders avanzados usan la secuencia de 5 entradas para escalar en posiciones. Tamaño pequeño en E1, añadir en E2, añadir en E3 con stop movido cerca de la entrada de E1, añadir en E5 con stop ajustado. Esto crea una posición que es parcialmente libre en E3, completamente en riesgo solo en E5, y maximalmente dimensionada para el movimiento final. La secuencia no es solo cinco entradas separadas — es un marco de construcción de posición.",donna:"Este es el juego avanzado. Construye la posición a través de la secuencia. Para E5, la mayor parte de la posición está corriendo libre."}
],q:[
{q:"Un setup ha completado su E1 (mecha Turtle Soup) y E2 (cierre Modelo #1). Perdiste ambos. Tus entradas válidas ahora son:",type:"mc",opts:["E1 todavía es válida — acaba de formarse","Solo E2","E3, E4, y E5","No quedan entradas válidas"],a:2,exp:"Una vez que E1 y E2 se han formado, no puedes volver. Tus entradas restantes válidas son E3 (Breaker Block), E4 (OTE 60-75%), y E5 (Kiss of Death). La secuencia solo avanza."},
{q:"La Entrada 4 (OTE, retroceso 60-75%) es específicamente diseñada para ser atrapada por:",type:"mc",opts:["Traders de E3","El Kiss of Death (E5)","Traders de E1","Cazadores de stops"],a:1,exp:"E4 es donde entran los traders de metodología ICT — y el Smart Money lo sabe. El Kiss of Death está diseñado específicamente para parar a los traders de E4 antes del movimiento final. E5 es la respuesta del KoD a que los traders de E4 son sacudidos."},
{q:"En la secuencia de 5 entradas, E5 (Kiss of Death) tiene el:",type:"mc",opts:["Mayor riesgo y menor recompensa","Stop más amplio pero más tiempo","Stop más ajustado y mayor certeza — el objetivo es inminente","Mismas características que E2"],a:2,exp:"E5 tiene el stop más ajustado porque el precio está más cerca del objetivo — el extremo de la mecha del KoD es el stop. Mayor certeza porque todas las entradas anteriores ya se han desarrollado. El objetivo es inminente."},
{q:"Puedes entrar en E1 de nuevo después de que E3 ya se ha formado en el mismo setup.",type:"tf",a:false,exp:"Falso. La secuencia solo avanza. Una vez que se ha formado E3, E1 y E2 ya no son válidas para este setup. Nunca vayas hacia atrás en la secuencia de entradas."},
{q:"¿Cuál es la principal ventaja de escalar una operación a través de múltiples puntos de entrada?",type:"mc",opts:["Aumenta el precio promedio de entrada","Crea una posición que progresivamente se vuelve libre de riesgo a medida que se desarrollan las entradas","Reduce el tamaño total de la posición","Simplifica la gestión del stop"],a:1,exp:"Escalar a través de E1-E5 significa que para E3, tus entradas de E1 y E2 pueden tener stops movidos a punto de equilibrio — parte de la posición corre libre. Para E5, la mayor parte de la posición no tiene riesgo mientras está maximalmente dimensionada para el movimiento final."}
]},
22:{s:[
{icon:"🔗",title:"Cuando los mercados se delatan",body:"La Divergencia SMT (Smart Money Technique) es cuando dos activos correlacionados no se confirman el movimiento del otro. EUR/USD y DXY son inversos — cuando uno sube, el otro baja. S&P 500 y Nasdaq son directos — deberían moverse juntos. Cuando no lo hacen — cuando uno toma un nuevo máximo que el otro no confirma — eso es divergencia. El que tomó el máximo falso está a punto de revertir.",donna:"Cuando mercados correlacionados divergen, uno de ellos está mintiendo. Siempre es el que se extendió a un nuevo máximo o mínimo sin confirmación."},
{icon:"📊",title:"Los pares a observar",body:"Correlaciones clave: EUR/USD vs DXY (inverso). GBP/USD vs DXY (inverso). BTC vs ETH (directo — ambos deberían moverse juntos). S&P 500 vs Nasdaq (directo). Oro vs DXY (inverso). Cuando EUR/USD toma un nuevo máximo pero DXY no hace un nuevo mínimo, o BTC hace un nuevo máximo pero ETH no — esa es tu señal. El que se extendió es el Turtle Soup. El otro está diciendo la verdad.",donna:"Observa el par. Observa su mercado correlacionado. Si están en desacuerdo en un nuevo máximo o mínimo — opera el desacuerdo."},
{icon:"⚠️",title:"SMT solo no es una operación",body:"La divergencia SMT es un filtro y potenciador de señal — no un disparador de operación independiente. Nunca entres solo con SMT. Necesitas: divergencia SMT en un nivel estructural, durante una Kill Zone, con una vela Modelo #1 de confirmación. SMT te dice CUÁL dirección. El Modelo #1 te dice CUÁNDO y DÓNDE entrar. Ambos juntos = uno de los setups más limpios en CRT.",donna:"La divergencia SMT es el por qué. El Modelo #1 es el cuándo. Necesitas ambos. Uno sin el otro es solo observación."}
],q:[
{q:"EUR/USD hace un nuevo máximo de 4H en $2,020. Al mismo tiempo, DXY NO hace un nuevo mínimo de 4H. Esto es:",type:"mc",opts:["Confirmación — ambos acuerdan que EUR/USD es alcista","Divergencia SMT — el nuevo máximo de EUR/USD es probablemente falso","Comportamiento normal del mercado","Alcista para EUR/USD — la extensión muestra fuerza"],a:1,exp:"EUR/USD arriba + DXY no confirmando (no bajando) = Divergencia SMT. El nuevo máximo de EUR/USD es probablemente un Turtle Soup. DXY está diciendo la verdad — no ocurrió ningún cambio direccional real. Busca que EUR/USD revierta."},
{q:"Bitcoin hace un nuevo máximo pero Ethereum no. La divergencia SMT sugiere:",type:"mc",opts:["Bitcoin es más fuerte que Ethereum — compra Bitcoin","Ethereum alcanzará a Bitcoin","El nuevo máximo de Bitcoin podría ser falso — observa la reversión","Sin acción — los pares cripto no se correlacionan"],a:2,exp:"BTC y ETH están directamente correlacionados. Si BTC toma un nuevo máximo sin que ETH confirme, el nuevo máximo de BTC es probablemente falso (Turtle Soup). Observa que BTC revierta de regreso dentro del rango."},
{q:"Ves Divergencia SMT en un nivel estructural. Deberías:",type:"mc",opts:["Entrar inmediatamente — SMT es suficiente","Esperar una vela Modelo #1 que confirme en el nivel","Usar un stop más amplio ya que las señales SMT son menos confiables","Operar ambos activos correlacionados simultáneamente"],a:1,exp:"SMT es un potenciador de señal, no un disparador de operación. Todavía necesitas la confirmación de la vela Modelo #1 en el nivel estructural, durante una Kill Zone, con alineación HTF. SMT te dice la dirección, Modelo #1 te da la entrada."},
{q:"La Divergencia SMT sola, sin confirmación Modelo #1, es una señal de entrada completa y válida.",type:"tf",a:false,exp:"Falso. La divergencia SMT sola es observación, no una operación. Necesita combinarse con un nivel estructural, timing de Kill Zone, y vela de confirmación Modelo #1. SMT te dice el POR QUÉ — Modelo #1 te da el CUÁNDO."}
]},
23:{s:[
{icon:"⚠️",title:"El setup diseñado para atrapar traders inteligentes",body:"El Falso Cambio de Carácter (FCoC) está diseñado específicamente para atrapar a traders informados — los que saben cómo se ve un Cambio de Carácter real. Se ve perfecto: movimiento decisivo a través de un nivel clave, parece una ruptura genuina. Pero no hay una purga real de stops, sin respaldo de Kill Zone, sin alineación HTF. Es el Turtle Soup para personas que piensan ser demasiado inteligentes para ser atrapadas por un Turtle Soup.",donna:"Si un setup se ve demasiado perfecto y aparece fuera de una Kill Zone — esa es tu primera advertencia. El Smart Money atrapa a los traders inteligentes también."},
{icon:"✅",title:"CoC real vs CoC falso",body:"CoC Real: movimiento violento y explosivo a través de un nivel clave que también activa una purga significativa de stops, cierra decisivamente A TRAVÉS del nivel en una vela de temporalidad superior, con respaldo HTF y timing de Kill Zone. CoC Falso: ruptura limpia de libro de texto, movimiento de tamaño mediano, sin purga obvia de stops, frecuentemente fuera de Kill Zone, sin razón HTF fuerte. El real es violento y respaldado. El falso es limpio y sin respaldo.",donna:"El Cambio de Carácter real es feo y violento. Si se ve limpio y de libro de texto — cuestionalo. Los movimientos reales del mercado son desordenados."},
{icon:"🔍",title:"Lista de verificación",body:"Antes de llamar a cualquier movimiento un Cambio de Carácter real: 1) ¿Se está rompiendo un nivel HTF clave? 2) ¿Está dentro de una Kill Zone? 3) ¿Un mercado correlacionado confirma (SMT)? 4) ¿Hubo una purga genuina de stops? 5) ¿La vela del temporalidad superior CERRÓ a través del nivel? Los cinco deberían ser sí para un CoC real. Faltar incluso dos lo hace sospechoso.",donna:"CoC de 1H en una zona premium HTF = señal de venta disfrazada de compra. Revisa el HTF primero. Siempre primero."},
{icon:"🔄",title:"Operando el CoC falso",body:"El CoC Falso es en sí mismo un setup operable — y uno poderoso. Es esencialmente un Turtle Soup en un nivel estructural. El precio parece romper, atrapa a traders informados que van largo (o corto), recolecta sus stops, luego revierte violentamente. Si lo has identificado correctamente: la vela de rechazo Modelo #1 después de la ruptura falsa es tu entrada, y tu objetivo es el nivel estructural original que el CoC falso supuestamente iba a romper.",donna:"El FCoC atrapa a traders inteligentes. Si puedes identificarlo — puedes operar contra ellos. Esa es la operación más dulce en CRT."}
],q:[
{q:"Una vela de 1H cierra limpiamente por encima de una resistencia clave en $2,000 durante la sesión asiática sin purga obvia de stops. Esto es más probablemente:",type:"mc",opts:["Un Cambio de Carácter real — compra","Un CoC Falso — cuestionalo: sin Kill Zone, sin purga","No Structure — ignóralo","Un Breaker Block formándose"],a:1,exp:"Sesión asiática + sin purga de stops + ruptura limpia (no violenta) = señales de alerta de CoC Falso. El CoC real es violento y ocurre durante Kill Zones con purga de stops visible."},
{q:"¿Qué distingue un Cambio de Carácter Real de uno Falso?",type:"mc",opts:["El CoC real tiene una vela más grande","El CoC real es violento, tiene purga de stops, respaldo de Kill Zone, alineación HTF","El CoC real ocurre solo en temporalidades superiores","El CoC Falso ocurre solo en movimientos bajistas"],a:1,exp:"El CoC real es violento, desordenado, acompañado de una purga de stops visible, ocurre durante una Kill Zone, y tiene respaldo HTF claro. El CoC falso parece limpio y de libro de texto pero carece de todos estos factores de respaldo."},
{q:"Un CoC de 1H en una zona premium HTF (área sobrecomprada) es más probablemente:",type:"mc",opts:["Una señal alcista genuina","Una señal de venta disfrazada de compra — probablemente CoC Falso","Neutral hasta confirmado por el Diario","Una compra válida con tamaño reducido"],a:1,exp:"Un CoC de 1H en zona premium HTF = la trampa clásica del CoC Falso. La zona premium HTF hace improbable una ruptura alcista genuina. El precio es más probable que esté recolectando entradas largas del retail antes de revertir."},
{q:"El CoC Falso puede en sí mismo ser operado como un setup, similar a un Turtle Soup.",type:"tf",a:true,exp:"Verdadero. El CoC Falso es esencialmente un Turtle Soup en un nivel estructural. Una vez identificado, el rechazo Modelo #1 después de la ruptura falsa es tu entrada, y el nivel original es tu objetivo. Es una operación contraria de alta probabilidad."},
{q:"Para un Cambio de Carácter genuino, ¿cuántos de los 5 criterios de verificación deberían idealmente cumplirse?",type:"mc",opts:["Al menos 2","Al menos 3","Al menos 4","Los 5"],a:3,exp:"Los 5 criterios deberían cumplirse para un CoC genuino de alta probabilidad: nivel HTF roto, timing de Kill Zone, confirmación de mercado correlacionado, purga genuina de stops, y cierre de vela HTF a través del nivel. Faltar incluso dos lo hace sospechoso."}
]},
24:{s:[
{icon:"📈",title:"Reglas del rango",body:"Operar rangos tiene tres reglas: Compra cerca del mínimo, vende cerca del máximo, nunca operes el medio. El primer rompimiento de un rango es casi siempre falso — este es el Turtle Soup que precede al movimiento direccional real. EUR/USD en rango entre $1,980 y $2,015 por dos semanas: el primer rompimiento por encima de $2,015 es probablemente falso. Espera el Turtle Soup, luego opera la distribución de regreso adentro o el rompimiento genuino.",donna:"Primer rompimiento = casi siempre falso. El rango es el resorte. El Turtle Soup es la compresión. El movimiento real viene después."},
{icon:"🔄",title:"El rango como acumulación",body:"Un rango no es solo un período aburrido de consolidación — es el Smart Money acumulando una posición masiva a los mejores precios posibles. Mientras los traders retail quedan picados operando dentro del rango, las instituciones están comprando silenciosamente en el fondo y vendiendo en el tope, construyendo la posición que creará la próxima tendencia mayor. El rango termina cuando han acumulado suficiente para hacer el movimiento.",donna:"Rango aburrido = Smart Money de compras. Cuando terminan de comprar, el precio se mueve fuerte. El rango te dice la dirección — compran el fondo significa que el movimiento será hacia arriba."},
{icon:"📐",title:"Transición de rango a tendencia",body:"El rompimiento genuino de un rango se ve diferente al falso. Rompimiento real: cierre decisivo por encima/debajo del rango con momentum creciente, respaldo HTF, timing de Kill Zone, y el pullback correctivo después del rompimiento se mantiene por encima del nivel de rompimiento (resistencia anterior se convierte en soporte). Rompimiento falso: movimiento agresivo que revierte inmediatamente, cierra de regreso adentro, sin respaldo HTF. Espera el pullback después del rompimiento real — esa es la Entrada 2.",donna:"El rompimiento real hace pullback. El falso revierte. Si el 'rompimiento' nunca hace pullback y prueba el nivel que rompió — sé sospechoso."}
],q:[
{q:"EUR/USD ha estado en rango $1,980-$2,015 por tres semanas. El precio rompe por encima de $2,015 durante la sesión asiática, luego cierra de regreso adentro en $2,010. Esto es:",type:"mc",opts:["Rompimiento real — compra","Turtle Soup — probablemente el rompimiento falso del rango","Neutral — necesita más tiempo","Rango expandiéndose"],a:1,exp:"Rompimiento de sesión asiática que cierra inmediatamente de regreso adentro = Turtle Soup. El rompimiento falso del tope del rango. Esta es la manipulación antes del movimiento real (probablemente hacia abajo, de regreso hacia $1,980)."},
{q:"En un rango, ¿dónde deberías buscar entradas de operación?",type:"mc",opts:["El medio del rango","Por encima de los máximos","Cerca del mínimo (para comprar) o cerca del máximo (para vender)","Solo en rompimientos"],a:2,exp:"Operar rangos: compra cerca del mínimo, vende cerca del máximo. El medio es tierra de nadie. Nunca operes el medio — ahí es donde los dos lados pierden."},
{q:"Después de un rompimiento genuino del rango hacia arriba, el primer pullback al nivel roto debería:",type:"mc",opts:["Romper de regreso por debajo — muestra que el rompimiento falló","Mantenerse por encima — resistencia anterior se convierte en soporte","Volver hasta el punto medio del rango","Probar el nivel múltiples veces antes de confirmar"],a:1,exp:"Después de un rompimiento real, el pullback al nivel roto debería mantenerse — resistencia anterior se convierte en soporte. Esta es la Entrada 2: confirmación del rompimiento genuino. Si rompe de regreso adentro, el rompimiento fue falso."},
{q:"El primer rompimiento de un rango establecido es casi siempre el movimiento real.",type:"tf",a:false,exp:"Falso. El primer rompimiento de un rango es casi siempre el movimiento falso — el Turtle Soup. Espera que cierre de regreso adentro, luego opera la dirección real. O espera que el falso se complete y el rompimiento genuino siga."}
]},
25:{s:[
{icon:"🏗️",title:"Top-Down siempre",body:"El proceso completo: Semana del mes → Narrativa HTF (sesgo Semanal/Diario) → Posición del open diario → Objetivo de liquidez → Kill Zone → Nivel estructural → Vela de entrada. En ese orden. Siempre. Si empiezas con 'veo una vela bonita en el 1H,' ya empezaste mal. La vela del 1H es lo último que miras. La primera pregunta siempre es: ¿qué semana del mes es y cuál es la narrativa Semanal?",donna:"La entrada es el último paso. Lo diré hasta que lo sueñes. Último. Paso."},
{icon:"📋",title:"Cuatro cosas antes del botón",body:"Antes de presionar el botón de compra o venta, debes saber cuatro cosas: 1) ¿Dónde está tu stop? (por encima/debajo de la mecha del Modelo #1 — nivel exacto). 2) ¿Dónde está T1? (50% del rango del setup — nivel exacto). 3) ¿Dónde está T2? (objetivo de liquidez externa — nivel exacto). 4) ¿Qué % de tu cuenta estás arriesgando? Si no puedes responder las cuatro en cinco segundos — no estás listo para entrar.",donna:"¿No puedes responder las cuatro en cinco segundos? Cierra el gráfico. Vuelve cuando puedas. El mercado siempre estará ahí mañana."},
{icon:"🔍",title:"La narrativa semanal",body:"Cada domingo antes de que abra la semana, pregunta: ¿qué semana del mes es? Semana 1 = acumulación, ten paciencia. Semana 2 = manipulación, no operes rompimientos. Semanas 3-4 = distribución, busca entradas de continuación. Luego mira el máximo y bajo de la semana pasada. El precio probablemente tomará uno de esos niveles esta semana. Ese es tu objetivo semanal. Ese es el contexto para cada operación que tomas esta semana.",donna:"El domingo no es un día libre. El domingo es cuando mapeas la semana. Cinco minutos el domingo valen más que cinco horas de confusión durante la semana."},
{icon:"✅",title:"El checklist mental pre-operación",body:"Antes de cualquier entrada, corre esto en tu cabeza: ¿El sesgo HTF está claro? ¿Sé mi objetivo? ¿Estoy dentro de una Kill Zone? ¿Hay un nivel estructural aquí? ¿Veo una vela Modelo #1? ¿Está colocado mi stop? ¿Están marcados mis objetivos? ¿Es mi riesgo 1-2%? Ocho preguntas. Ocho síes antes de tocar el botón. Un 'no' o 'no estoy seguro' = espera. El setup volverá. La cuenta reventada no se arregla sola.",donna:"Ocho síes. No siete. Ocho. Si estás en seis y medio y entras de todas formas — así es como pierdes."}
],q:[
{q:"¿Cuál es el primer paso correcto en el análisis CRT top-down?",type:"mc",opts:["Encontrar una buena vela de entrada en el 1H","Revisar el 4H para estructura","Determinar la semana del mes y la narrativa Semanal","Dibujar niveles clave en el Diario"],a:2,exp:"El análisis top-down comienza con el contexto del temporalidad más alto. Semana del mes + narrativa Semanal establece el sesgo general. Todo lo que está debajo trabaja dentro de este marco."},
{q:"Antes de presionar el botón de entrada, ¿qué cuatro cosas debes saber?",type:"mc",opts:["Precio de entrada, tipo de vela, sesión, y par","Nivel de stop, nivel de T1, nivel de T2, y porcentaje de riesgo","Dirección de tendencia, soporte, resistencia, y noticias","Sesgo HTF, estructura ITF, entrada LTF, y eventos de noticias"],a:1,exp:"Los cuatro requisitos previos a la operación: nivel de stop exacto, T1 exacto (50%), T2 exacto (objetivo externo), y porcentaje de riesgo. Si no puedes responder los cuatro instantáneamente, no estás listo para entrar."},
{q:"Puedes tomar una operación el Martes de la Semana 2 si el setup se ve perfecto.",type:"tf",a:false,exp:"Falso. La Semana 2 es la semana de manipulación — la semana de los Turtle Soups y rompimientos falsos. Operar rompimientos de la Semana 2 como si fueran reales es cómo proporcionas liquidez para el movimiento de distribución de la Semana 3. Ten cuidado extra en la Semana 2."},
{q:"En el proceso top-down, ¿cuándo deberías mirar el gráfico 1H para una vela de entrada?",type:"mc",opts:["Primero — para encontrar la oportunidad","Después de revisar el 4H","Después de que el sesgo HTF, identificación del objetivo, Kill Zone, y nivel estructural están todos confirmados","En cualquier momento — todos los temporalidades son iguales"],a:2,exp:"La vela de entrada del 1H es el ÚLTIMO paso. Después de: narrativa semanal, sesgo HTF, objetivo de liquidez identificado, Kill Zone activa, nivel estructural presente. Solo entonces bajas al 1H para la entrada."},
{q:"Sabes tu sesgo HTF y objetivo pero no estás dentro de una Kill Zone. Deberías:",type:"mc",opts:["Entrar de todas formas — HTF y objetivo son suficientes","Esperar la Kill Zone — el timing importa","Usar un stop más amplio para compensar","Tomar una posición más pequeña"],a:1,exp:"El timing de Kill Zone es un requisito, no una preferencia. El mismo setup fuera de una Kill Zone tiene probabilidad dramáticamente menor. Espera la Kill Zone. El setup o todavía estará ahí o ya se habrá desarrollado — de cualquier manera, tomaste la decisión correcta."}
]},
26:{s:[
{icon:"⚡",title:"Solo dos tipos de entrada válidos",body:"Una vez en una operación, solo deberías estar gestionando posiciones de dos tipos de entrada válidos: cierre Modelo #1 (la entrada estándar) o un cierre genuino de Cambio de Carácter. Estas son las únicas dos confirmaciones de entrada en CRT. Cualquier otra razón por la que entraste — 'se veía fuerte,' 'vi un patrón,' 'presentimiento' — significa que estás en una operación sin respaldo CRT. Eso no es una operación gestionada, es un juego de azar en progreso.",donna:"Si no puedes decirme EXACTAMENTE POR QUÉ entraste en términos CRT — Modelo #1 o CoC genuino — no estás operando CRT. Solo estás operando."},
{icon:"🛑",title:"Por qué el stop nunca se mueve",body:"Mover tu stop alejándolo de la mecha del Modelo #1 — haciéndolo más amplio porque el precio se está acercando — es cómo las buenas operaciones se convierten en pérdidas devastadoras. Tu stop está colocado donde está porque ahí es donde el setup está invalidado. Si el precio llega a ese nivel, el setup está equivocado. Eso no es mala suerte — el mercado te está diciendo que la operación era incorrecta. Acéptalo. Regístralo. Sigue adelante.",donna:"Cada vez que moviste tu stop y salvó la operación — el mercado te enseñó la lección equivocada. Cada vez que lo moviste y dobló tu pérdida — esa fue la lección correcta."},
{icon:"💰",title:"El parcial obligatorio",body:"T1 al 50% no es una sugerencia. No es 'tómalo si el precio llega fácilmente.' Es obligatorio en cada operación. Por qué: el parcial al 50% financia tu trading. Incluso cuando T2 no llega, estás en verde. Incluso cuando el precio revierte después de T1, estás en equilibrio o ganaste. En 100 operaciones, siempre tomar T1 crea ganancias pequeñas consistentes que se componen en una ventaja real. Saltarse T1 'porque se ve fuerte' es cómo devuelves ganancias.",donna:"Siempre toma T1. Tu yo futuro te lo agradecerá. La única vez que te lo saltes porque 'se ve fuerte' será cuando revierta fuerte. Siempre toma T1."},
{icon:"📓",title:"El diario es la ventaja real",body:"La ventaja real en el trading no es un setup — son los datos. Tu diario te dice en qué sesiones pierdes más, qué estados emocionales precedieron tus peores operaciones, qué tipos de setup tienen la mayor tasa de éxito para ti específicamente. Donna puede ver patrones en tu diario que tú no puedes ver en el momento. ¿Operaciones FOMO a las 3PM después de una pérdida? Ese es un patrón. El diario lo detecta. Tú lo arreglas.",donna:"Tu diario es tu sesión de coaching. Cada semana, lee las últimas 10 entradas. Te garantizo que verás un patrón que te está costando dinero. Arregla ese patrón. Esa es la ventaja."}
],q:[
{q:"Tu stop está colocado correctamente por debajo de la mecha del Modelo #1. El precio se mueve contra ti y se acerca al stop. Tú:",type:"mc",opts:["Mueves el stop más amplio — dale más espacio","Cierras la operación manualmente — corta la pérdida","Deja que el stop haga su trabajo — no lo toques","Añades a la posición — promedia hacia abajo"],a:2,exp:"El stop está donde está porque ahí es donde el setup está invalidado. Moverlo es el hábito más peligroso en el trading. Deja que haga su trabajo. Si se activa — la operación estaba equivocada y limitaste tu pérdida. Correcto."},
{q:"Has estado usando un diario de trading por tres meses. El mejor uso de esos datos es:",type:"mc",opts:["Contar solo la tasa de éxito","Encontrar patrones en tus errores — sesión, emoción, tipo de setup — y eliminarlos sistemáticamente","Mostrarlo a otros traders","Eliminar operaciones perdedoras antiguas para enfocarte en ganadoras"],a:1,exp:"El poder del diario es el reconocimiento de patrones. ¿En qué sesiones pierdes más? ¿Qué estado emocional precede tus mayores pérdidas? ¿Qué tipos de setup funcionan para ti? Los datos te dicen qué arreglar específicamente."},
{q:"Tomaste T1 al 50%. El precio continúa hacia T2. Luego el Kiss of Death golpea y activa tu stop en punto de equilibrio. Este resultado es:",type:"mc",opts:["Una pérdida — la operación falló","Una ganancia — se tomó T1","Punto de equilibrio — resultado aceptable","Debería evitarse moviendo el stop alejado del punto de equilibrio"],a:2,exp:"Parado en punto de equilibrio después de T1 = operación en punto de equilibrio. Hiciste dinero en T1, lo devolviste en el stop, cero neto. Este es un resultado perfectamente aceptable y exactamente cómo el sistema está diseñado para funcionar."},
{q:"Mover tu stop más amplio cuando el precio se acerca a él es una técnica válida de gestión de riesgo.",type:"tf",a:false,exp:"Falso. Mover tu stop más amplio es lo opuesto de la gestión de riesgo — es expansión de riesgo. Tu stop fue colocado donde la operación está invalidada. Moverlo significa que ahora estás sosteniendo una operación invalidada con más riesgo. Así es como las pérdidas pequeñas se convierten en grandes."},
{q:"¿Cuál es el patrón de comportamiento principal que causa más pérdidas en los traders CRT?",type:"mc",opts:["Operar demasiados pares","Usar indicadores equivocados","Entrar sin criterios completos y mover stops — rompiendo las reglas de gestión","Operar en sesión asiática"],a:2,exp:"Las violaciones de reglas durante la gestión de la operación — entrar sin criterios completos, saltarse T1, mover stops — causan la mayoría de las pérdidas. Los setups frecuentemente son correctos. La gestión es lo que falla."}
]},
27:{s:[
{icon:"🏆",title:"El patrón universal",body:"Open. Nivel clave. Rompimiento falso. Movimiento real. Eso es cada movimiento de precio significativo en la historia en cualquier activo en cualquier temporalidad. Semanal, Diario, 4H, 1H — mismo patrón, diferentes velocidades. La carrera del Oro de $1,900 a $2,400 en 2024? Open, nivel clave en $2,000, rompimiento falso arriba, recolección, distribución real hacia arriba. S&P 500 cada mañana? Open, nivel clave, manipulación, movimiento real. El patrón nunca cambia.",donna:"Una vez que ves este patrón en todas partes, no puedes ignorarlo. Y dejas de operar el ruido y empiezas a operar el patrón. Ese es el cambio."},
{icon:"🔄",title:"Fractales — cada temporalidad",body:"El patrón CRT es fractal. El patrón Semanal contiene el Diario. El Diario contiene el 4H. El 4H contiene el 1H. Cuando los tres temporalidades principales están alineados en la misma fase AMD simultáneamente — Semanal en Distribución, Diario en Distribución, 4H en Distribución, 1H mostrando el Modelo #1 — esa es la operación de mayor probabilidad que jamás verás. Rara. Pero inolvidable.",donna:"La alineación de tres temporalidades es el unicornio. Cuando la ves — dimensiona apropiadamente. Esas operaciones pagan por meses de pérdidas."},
{icon:"📊",title:"La racha de 8 pérdidas",body:"Aquí está la verdad que nadie te dice: cada trader rentable ha pasado por al menos una racha de 8 pérdidas consecutivas. Le llega a todos. Tu ventaja no desaparece — la varianza hace eso. La pregunta no es si pasa. La pregunta es si todavía estás en el juego cuando termina. Riesgo del 1-2% significa que una racha de 8 pérdidas es un drawdown del 16%. Recuperable. Al 5% de riesgo por operación, es un drawdown del 40%. Fin de carrera.",donna:"La racha de 8 pérdidas viene. No sé cuándo. Pero viene. El riesgo del 1-2% es lo que te mantiene en el juego cuando sucede."},
{icon:"📝",title:"La documentación separa a los rentables",body:"La diferencia entre traders que eventualmente se vuelven rentables y traders que perpetuamente luchan es la documentación. Los traders rentables conocen su tasa de éxito, su R promedio, su mejor sesión, su peor patrón emocional. Los traders que luchan operan por instinto. Donna puede ayudarte a rastrear esto — pero tienes que registrar cada operación. Cada una. Sin excepciones. El atajo en el trading tiene un nombre: pérdidas.",donna:"El atajo tiene un nombre: pérdidas. Documenta todo. Revisa semanalmente. Ese es el sistema completo. Todo lo demás es un detalle."}
,
{icon:"🏆",title:"Ahora tienes un sistema de trading completo",body:"Has cubierto todo: cómo leer una vela, cómo identificar niveles clave, cómo entender la liquidez, cómo leer la secuencia AMD, cómo entrar con el Modelo #1, cómo gestionar el riesgo, cómo usar el checklist y cómo mantenerte disciplinado sesión tras sesión. La mayoría de los traders pasan años buscando esto y nunca lo encuentran en un solo lugar. Tú lo encontraste. La ventaja ya no es un secreto. La única variable que queda es tu ejecución. Eso está completamente en tus manos.",donna:"Estoy orgullosa de que llegaste hasta aquí. Ahora ve y demuéstrate que puedes ejecutarlo."}],q:[
{q:"El patrón CRT universal en todos los temporalidades y activos es:",type:"mc",opts:["Arriba, consolidación, abajo, consolidación","Open, nivel clave, rompimiento falso, movimiento real","Acumulación, rompimiento, tendencia, reversión","Soporte, resistencia, rompimiento, pullback"],a:1,exp:"Open, nivel clave, rompimiento falso, movimiento real. Eso es cada movimiento de precio significativo en CRT. El mismo patrón en el 1H y en el Semanal. El mismo en Oro y en Nasdaq. El fractal nunca cambia."},
{q:"La alineación AMD de tres temporalidades (Semanal, Diario, 4H todos en fase de Distribución) señala:",type:"mc",opts:["Evita la operación — demasiada confirmación es sospechoso","La operación de mayor probabilidad en CRT","Una ganancia garantizada","Probabilidad promedio — se necesitan señales adicionales"],a:1,exp:"La alineación de tres temporalidades es el setup de mayor probabilidad en CRT. Cuando Semanal, Diario y 4H están todos en la misma fase apuntando en la misma dirección, la probabilidad de que el movimiento se complete está maximizada."},
{q:"Un trader que arriesga 5% por operación pasa por una racha de 8 pérdidas. Su drawdown es aproximadamente:",type:"mc",opts:["8%","24%","40%","60%"],a:2,exp:"8 pérdidas consecutivas al 5% de riesgo = aproximadamente 40% de drawdown. Al 1-2% de riesgo, la misma racha de 8 pérdidas es 8-16% — recuperable. Un drawdown del 40% es devastador psicológica y financieramente para la mayoría de los traders."},
{q:"El atajo para volverse rentable en el trading es:",type:"mc",opts:["Encontrar los indicadores correctos","Mejorar las entradas","Las pérdidas — son el costo inevitable del aprendizaje real","Operar temporalidades superiores únicamente"],a:2,exp:"El atajo en el trading tiene un nombre: pérdidas. Aprendes más de tus operaciones perdedoras — si las documentas. Los traders rentables no encontraron un atajo. Pagaron la matrícula en pérdidas y documentaron lo que las pérdidas les enseñaron."},
{q:"Has completado los 22 capítulos de la Donna Academy CHRONOS. Ahora estás listo para:",type:"mc",opts:["Operar con tamaño completo inmediatamente","Empezar con trading demo, registrar cada operación, revisar con Donna semanalmente","No perder nunca más — conoces el sistema completo","Dejar de aprender — el sistema está completo"],a:1,exp:"Completar la academia significa que entiendes el marco. Ahora el trabajo real comienza: trading demo, registrando cada operación, revisando con Donna, identificando tus patrones personales. El conocimiento sin práctica no es una ventaja."}
]},
28:{s:[
{icon:"⏱️",title:"El CRT de 1H — tu campo de batalla",body:"El CRT de 1 hora es la operación más común. Tu contexto HTF es siempre el 4H. Tus niveles clave vienen del 1H o del 4H. Aquí es donde la mayoría de traders de NASDAQ y Forex trabajan.",donna:"La mayoría de traders con los que trabajo viven en el 1H."},
{icon:"📊",title:"La cascada del 1H",body:"C1 en 1H = acumulación (lateral, aburrido). C2 en 1H = nueva vela toca el nivel clave. Ese toque = señal para bajar al 15min o 5min. Busca un mini-CRT con su propio C1 y C2 en esa temporalidad intermedia.",donna:"Cuando el C2 toca el nivel, tu trabajo empieza. Todavía no entras."},
{icon:"🎯",title:"Modelo #1 en el 1 minuto",body:"Dentro de la mecha del C2 del ITF — baja al 1min. Modelo #1: vela gruesa, mecha afuera, cierra adentro. El CIERRE de esa vela = tu entrada. Stop fijo en la mecha. Nunca se mueve.",donna:"Tres temporalidades. Una entrada. El Modelo #1 en el 1min es el trigger."},
{icon:"📐",title:"Tu mapa para el 1H CRT",body:"Temporalidad mayor = 4H (sesgo). Temporalidad intermedia = 15min o 5min (mini-CRT). Temporalidad baja = 1min (Modelo #1). Siempre top-down. Si el 4H dice bajista y el 1H muestra alcista — el 4H gana siempre.",donna:"Si falta cualquier nivel — no hay operación."},
{icon:"⚡",title:"Si te perdiste la E1",body:"E1 = Modelo #1 en la mecha del C2. Si la perdiste, espera E2: Breaker o OTE, solo si el C2 NO distribuyó completamente. Si distribuyó — sesgo muerto. La E2 también forma un Modelo #1 en el LTF.",donna:"Perderse una operación no es un error. Perseguirla sí lo es."},
{icon:"📋",title:"El checklist del 1H CRT",body:"1) Sesgo 4H confirmado. 2) Nivel clave 1H o 4H. 3) C2 tocó el nivel al abrir nueva vela. 4) Mini-CRT en 15min o 5min. 5) Modelo #1 en 1min. 6) Stop colocado. 7) TP1 y TP2. 8) Riesgo 1-2%.",donna:"Ocho puntos. Si falta uno — sin operación."}
],q:[
{q:"¿Cuál es la temporalidad mayor cuando operas un CRT de 1H?",type:"mc",opts:["El 1min","El 4H","El 15min","El Diario"],a:1,exp:"El 4H siempre da el contexto de sesgo cuando operas CRTs de 1H."},
{q:"¿Dónde encuentras el Modelo #1 en un CRT de 1H?",type:"mc",opts:["En el 4H","En el 1H","En el 1min dentro de la mecha del C2","En el 15min"],a:2,exp:"Bajas al 1min y buscas el Modelo #1 dentro de la mecha del C2 del ITF."},
{q:"Si el C2 distribuyó completamente, todavía existe una entrada E2 válida.",type:"tf",a:false,exp:"Falso. Si el C2 distribuyó completamente, el sesgo murió. Sin más entradas."},
{q:"¿Qué activa la señal para bajar del 1H a la temporalidad intermedia?",type:"mc",opts:["Cualquier vela tocando un nivel","Nueva vela del 1H que abre y toca el nivel clave","Tres velas rojas seguidas","El precio cerrando bajo el soporte"],a:1,exp:"Una NUEVA vela del 1H abre y toca el nivel clave. Ese toque es la señal."}
]},
29:{s:[
{icon:"🕐",title:"El CRT de 4H — mayor convicción",body:"El CRT de 4H da setups más grandes. Tus niveles clave vienen del Diario, Semanal, o del 4H. Siempre necesitas sesgo Semanal + estructura Diaria antes del setup.",donna:"Los CRTs de 4H mueven más. También requieren más paciencia."},
{icon:"📊",title:"La cascada del 4H",body:"C1 en 4H = acumulación. C2 en 4H = nueva vela del 4H que se clava en el nivel Diario o Semanal. Baja al 1H o 15min para encontrar el mini-CRT con su propio C1 y C2.",donna:"La mecha del C2 en el 4H puede ser enorme. Dentro hay otro CRT completo."},
{icon:"🎯",title:"Modelo #1 en el 5 minutos",body:"Dentro de la mecha del C2 del ITF (1H o 15min) — baja al 5min. Modelo #1: CIERRE de esa vela = tu entrada. Stop fijo en la mecha del 5min. Nunca se mueve.",donna:"Misma lógica que el 1H CRT — una temporalidad más grande en cada nivel."},
{icon:"💡",title:"Nugget de oro — flujo de órdenes para el C3",body:"Si buscas entrada en el C3, baja al ITF (15min para un 4H CRT). Observa si el precio CIERRA por encima de altos anteriores (alcista) o por debajo de bajos anteriores (bajista). Cierres consistentes = flujo real confirmando el C3 antes de comprometerte.",donna:"Los cierres del 15min no mienten. Si se apilan en tu dirección, el C3 es válido."},
{icon:"📐",title:"Tu mapa para el 4H CRT",body:"Temporalidad mayor = Semanal + Diario (sesgo). Temporalidad intermedia = 1H o 15min (mini-CRT). Temporalidad baja = 5min (Modelo #1). Si el Semanal no está de acuerdo — sin operación.",donna:"Niveles semanales no se tocan seguido. Cuando se tocan, es significativo."},

  {id:0,icon:"🎯",title:"Meet Donna",title_es:"Conoce a Donna",sub:"What is trading and why now is the best moment in history.",sub_es:"Qué es el trading y por qué ahora es el mejor momento de la historia.",level:1,static:true,

    {icon:"🏆",title:"El mejor perdedor gana",body:"El mejor trader no es el que gana más. Es el que pierde mejor. Pérdidas pequeñas y controladas. Stops disciplinados. Sin trading de venganza.",donna:"El mejor perdedor gana. Dilo todos los días. Porque vas a perder — y cómo pierdas lo determinará todo."},

    {icon:"⏱️",title:"Timeframes to save",body:"Save these: Monthly, Weekly, Daily, 4H, 1H, 15min, 5min, 1min. These are the only ones that matter for CRT. More is not better. Clean charts beat cluttered charts every time.",donna:"Clean charts. The more you add, the worse your trading gets. Lines and timeframes. Nothing else."},
    {icon:"📏",title:"Two tools that matter",body:"Vertical lines mark the opening of a candle in time. Horizontal lines mark a price level. Think of it like a cartesian plane: vertical lines are time, horizontal lines are price. That is CRT.",donna:"Líneas verticales — el tiempo. Líneas horizontales — el precio. Eso es todo lo que necesitas marcar."},
